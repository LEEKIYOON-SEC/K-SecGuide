      - "전원선 및 통신선은 도청 및 손상 방지를 위해 이중마루 하부 또는 천장 배관을 통해 물리적으로 분리·배선하고 적정 이격 거리를 유지하여 은폐·보호되도록 설치하여야 한다."
    considerations:
