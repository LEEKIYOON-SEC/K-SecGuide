domain: "1. 물리보안"
domain_number: 1
category: "물리적 분야"
items:
  - id: "P-1"
    title: "보호구역의 출입에 관한 정책과 절차를 수립하고 이에 따라 출입통제 수행"
    domain: "1. 물리보안"
    related_org:
    - "정보보호 부서"
    - "시설 관리 부서"
    description:
      - "비밀, 개인정보 및 중요정보 저장시설, 기반시설 서비스(업무)의 주요 장비가 운영되는 시설 등은 인가된 사람만이 출입하도록 접근통제 정책과 절차를 수립·이행하여야 한다."
      - |
        보호구역 지정기준을 마련하고 해당 기준에 따라 물리적 시설을 제한구역, 통제구역 등으로 분류하고 각 보호구역별 보호대책을 수립·이행하여야 한다.

        | 보호구역 | 정의 | 예시 |
        | --- | --- | --- |
        | 제한구역 | 비인가 접근을 방지하기 위해 출입 통제 장치 및 감시 시스템이 설치되어 있으며, 직원 카드와 같은 출입증이 필요한 장소 | 부서별 사무실, 회의실등 |
        | 통제구역 | 제한 구역의 통제 항목을 모두 포함하며 출입 자격이 최소 인원으로 유지되고 출입을 위해 추가 절차가 필요한 장소 | 서버실, 전산실, 통신실, 관제실, 전원실, 공조실, 발전기실 등 |
      - "각 보호구역의 중요도 및 특성을 반영하여 보호대책 이행을 위한 출입통제 장비를 갖추어야 한다."
    considerations:
      - "공공기관은 지정된 보호구역에 대한 출입자 식별ㆍ인증 등을 위한 출입문 보안장치 설치 및 주·야간 감시대책을 수립하여야 한다."
      - "출입통제 장비는 지식·소유·생체 기반 중 자산의 중요도 및 통제 목적 등을 고려하여 디지털도어락, ID카드, 지문인식기 등을 선택하여 통제하여야 한다."
      - "출입통제 장비에 출입 및 접근 이력이 기록되지 않을 경우 이력관리를 위해 출입관리대장 등을 작성하여야 한다."
      - "개별 출입 통제 장비를 통합하여 출입 보안 시스템을 구축함으로써 종합적인 물리보안 체계를 마련하여 위험요소가 최소화된 환경을 조성하는 것을 고려할 수 있다."
      - "출입통제시스템이 있더라도 필요시 출입하는 인원에 대한 출입 및 접근현황을 목록으로 관리할 수 있는 별도의 출입관리대장을 비치하여 관리한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제10조(물리적 안전조치)"
      public:
        - "국가 정보보안 기본지침 제87조(정보통신시설 보호대책), 제88조(정보통신시설 출입관리)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제9조(건물에 관한 사항), 제11조(전산실 등에 관한 사항)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제46조(집적된 정보통신시설의 보호)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.4.1 보호구역 지정, 2.4.2 출입통제"
    checklist:
      - "보호구역(물리적) 보안 지침"
      - "보호구역 지정 현황"
      - "제한구역·통제구역 표시"
      - "보호구역별 설치된 보호설비"
      - "출입통제시스템"
      - "(서식 자료 제20호) 보호구역 관리대장"
      - "(서식 자료 제21호) 제한구역· 통제구역 출입자 명부"

  - id: "P-2"
    title: "물리적 중요도에 따라 제한구역, 통제구역 등으로 분류하는 다단계 보호 대책 수행"
    domain: "1. 물리보안"
    related_org:
    - "정보보호 부서"
    - "시설 관리 부서"
    description:
      - "보호구역은 그 중요도에 따라 제한구역, 통제구역 등으로 차등화하고 중요 구역에 따른 차별화된 보호 대책을 강구하여야 하며, 보호구역 내 작업 절차를 수립하고 필요 설비를 갖추어야 한다."
      - "보호구역별 내부 직원, 외부 직원(유지보수 등)의 출입에 대한 출입 절차를 수립하여 적용하여야 한다."
      - "통제구역은 제한구역의 통제 항목을 모두 포함하여 보호대책을 수립·이행하고 외부인 또는 비인가자의 출입을 통제할 수 있도록 ‘출입통제구역’임을 표시하여 최소한으로 제한한 인가자만을 출입 허용하여야 한다."
      - "비인가자의 접근이 엄격히 통제되어야 하는 장소(예:정보통신실, 서버실 등)는 출입을 통제할 수 있는 기술적인 출입통제 조치를 하여야 하며, 관계 법규에 따른 요건이 있는 경우 이를 준수하여야 한다."
    considerations:
      - |
        공공기관 등에 적용되는 보안업무규정 시행규칙 제54조(보호지역의 구분)에서는 제한지역, 제한구역, 통제구역 등의 보호구역을 다음과 같이 정의한다.

        | 구분 | 정의 |
        | --- | --- |
        | 제한지역 | 비밀 또는 국·공유재산의 보호를 위하여 울타리 또는 방호·경비인력에 의하여 승인을 받지 않은 사람의 접근이나 출입에 대한 감시가 필요한 지역 |
        | 제한구역 | 비인가자가 비밀, 주요시설 및 Ⅲ급 비밀 소통용 암호자재에 접근하는 것을 방지하기 위하여 안내를 받아 출입하여야 하는 구역 |
        | 통제구역 | 보안상 매우 중요한 구역으로서 비인가자의 출입이 금지되는 구역 |
      - "제한구역은 접견구역 이외의 모든 장소로 지정하여 출입통제 절차(예: 사전 방문신청, 임직원 상시 동행, 신분증 패용)를 따르고, 통제구역은 연구개발실, 전산실, 기계실, 문서고로 지정하여 CCTV, 사전출입권한이 부여된 인원만 출입, 이중신원확인(예: ID카드 및 지문) 절차를 적용하여야 한다."
      - "관계 법규에 따라 공공기관, 집적정보통신시설(IDC)의 경우는 주요시설 중 중앙감시실, 전산실, 전력감시실, 통신장비실, 방재센터의 출입구에 출입자의 신원확인을 통해 개폐되는 잠금장치를 설치하고, 해당 보호구역에 반드시 ID카드 또는 지문 등 출입통제를 적용하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
      public:
        - "국가 정보보안 기본지침 제87조(정보통신시설 보호대책)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제9조(건물에 관한 사항), 제11조(전산실 등에 관한 사항)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제46조(집적된 정보통신시설의 보호)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.4.1 보호구역 지정"
    checklist:
      - "보호구역(물리적) 보안 지침"
      - "제한구역·통제구역 표시"
      - "보호구역 출입 관리 대장"
      - "보호구역별 출입 통제 절차"
      - "보호구역별 설치된 보호설비"

  - id: "P-3"
    title: "주요 시스템에 대한 별도의 출입통제를 실시하거나 이중의 보호장치 설치"
    domain: "1. 물리보안"
    related_org:
    - "정보보호 부서"
    - "시설 관리 부서"
    description:
      - "주요 시스템이 배치된 구역은 비인가자에 대한 철저한 출입통제가 이루어지도록 별도의 출입통제 절차를 마련하여 실시하거나 이중의 출입통제장비를 설치하여야 한다."
      - "주요 시스템이 배치된 구역은 상시 이용하는 출입문은 한 곳으로 정하고 이중의 출입통제장비를 설치하여야 하며, 외벽이 유리인 경우 유리창문을 통하여 접근할 수 없도록 조치하여야 한다."
    considerations:
      - "출입통제 방법을 ID카드, 지문 등 소유·생체기반으로 적용하고, 불가피한 사유로 정보시스템을 통제구역 내에 위치시키기 어렵다면 시건 가능한 출입통제(예: 디지털 도어락)와 정보시스템이 위치한 랙(Rack)을 열쇠 시건하는 등의 이중 출입통제를 적용할 수 있다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보 안전성 확보조치 기준 제10조(물리적 안전조치)"
      public:
        - "국가 정보보안 기본지침 제87조(정보통신시설 보호대책)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제9조(건물에 관한 사항), 제11조(전산실 등에 관한 사항)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제46조(집적된 정보통신시설의 보호)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.4.2 출입통제"
    checklist:
      - "보호구역(물리적) 보안 지침"
      - "주요 시스템 출입통제 절차 또는 방법"
      - "보호구역별 설치된 보호설비"
      - "(서식 자료 제20호) 보호구역 관리대장"
      - "(서식 자료 제21호) 제한구역· 통제구역 출입자 명부"

  - id: "P-4"
    title: "민감한 시설에 대해 물리적으로 접근하는 사람들의 출입기록 및 허가의 타당성을 주기적으로 검토"
    domain: "1. 물리보안"
    related_org:
    - "정보보호 부서"
    - "시설 보안 부서"
    description:
      - "통제구역 등의 민감한 시설에 대해 출입기록 및 출입권한 타당성 검토 등을 매월 또는 분기마다 주기적으로 수행하여 불필요한 권한을 삭제하여야 한다."
      - "타당성 검토 등을 주기적으로 수행하기 위해 보호구역 별로 출입가능한 부서·직무·업무 등을 정의하고, 출입권한이 부여된 임직원을 식별하고 그 현황을 관리하여야 한다."
      - "출입권한을 보유한 인원에 대한 변경사항(임직원의 퇴사 및 부서이동, 외주용역인원의 종료 및 인원교체 등)이 발생하는 경우 지체없이 권한을 삭제하여야 한다."
    considerations:
      - |
        통제구역 등의 보호구역에 대한 출입권한 타당성 검토는 다음의 사항을 포함하여야 한다. 또한 검토 결과에 따라 출입권한의 변경, 삭제 등 출입권한 조정이 필요하면 관리책임자에게 승인을 받아야 한다.

        | No. | 출입권한 타당성검토 체크리스트 |
        | --- | --- |
        | 1 | 퇴사 및 부서 이동 등의 사유로 출입권한이 불필요하게 된 인원이 있는가? |
        | 2 | 장기간 출입기록이 없어 출입권한이 불필요한 인원이 있는가? |
        | 3 | 일과 외 시간 등 출입 사유가 타당하지 않는 것으로 추정되는 출입기록(출입인원)이 있는가? |
      - "시스템으로 출입 및 접근로그를 남길 수 없는 경우 기록된 출입관리대장을 검토하여야 한다."
      - "출입기록 및 출입권한 타당성 검토 시 내･외부직원의 출입기록 뿐만 아니라 외주용역인원(시설 용역원, 청소 용역원 등)의 출입기록 또한 검토하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제10조(물리적 안전조치)"
      public:
        - "국가 정보보안 기본지침 제87조(정보통신시설 보호대책), 제88조(정보통신시설 출입관리)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제9조(건물에 관한 사항), 제11조(전산실 등에 관한 사항)"
      ict:
