    - "시설 관리 부서"
    description:
      - "전산실 등의 정보통신 시설은 화재, 습도 등 환경적 영향에 따라 정보시스템의 가동 정지, 데이터 훼손 위험이 존재하기 때문에 소방설비, 누수감지설비, 항온항습설비를 적절한 곳에 배치하여 관리하여야 한다."
    considerations:
      - "주요 장비 및 시스템이 위치한 보호구역의 특성에 따라 화재, 습도 등 환경재해 등에 대비하여 필요한 보호 설비를 갖추고 운영절차를 수립하여 운영하여야 한다."
      - "화재로부터 자산을 안전하게 보호하기 위해 화재 감지기를 적절한 간격으로 설치하고 충분한 소화시설(예: 화재 감지기, 소화설비)을 설치하고 주기적인 점검을 수행하여야 한다."
      - |
        소화설비란 화재시에 소화의 역할을 수행하기 위해 설치되는 기기, 장치 및 용구를 의미하며, 다음과 같이 초기 소화설비와 고정식 소화설비로 구분한다.

        | 구분 | 설명 |
        | --- | --- |
        | 초기 소화설비 | 화재현장에서 사람이 사용하는 소화기구를 말하며, 소형 소화기 등이며, 소화기는 A(일반 화재) B(기름 화재) C(전기화재)로 분류되어 있다. |
        | 고정식 소화설비 | 초기소화설비에서 소화하는 것이 곤란한 장소나 대량의 위험물이 존재하는 장소, 또는 화재가 확대할만한 경우에 사설 공설을 불문하고 대량의 소화약제를 투입하여야 되기 때문에 설비되는 것이며, 옥내 및 옥외 소화전설비나 설비, 화학소화설비 등이 있다. 위험물을 취급, 저장하는 장소에서는 화학소화설비, 특히 자동소화를 할 수 있으며, 연기 감지기나 열 감지기와 연동(interlock)시키는 것이 바람직하다. |
      - "상하수도 배관이나 냉방 설비 결함에 의한 침수 피해를 방지하기 위해 누수감지 센서를 주요 지점에 설치하고, 누수 탐지 시 즉각 조치할 수 있는 알람 및 점검 절차를 마련하여야 한다."
      - "화재 감지기, 소화설비, 누수감지기는 작동기능 점검, 정기점검, 종합정밀 점검 등 매월 또는 분기마다 주기적으로 점검을 수행하여 항시 최적의 운영환경을 유지하도록 하여야 한다."
      - "보호구역의 온도 및 습도 유지를 위해 항온항습기 또는 에어컨 등을 설치하여 온습도를 적정한 상태로 유지하도록 하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "소방시설 설치 및 관리에 관한 법률 제12조(특정소방대상물에 설치하는 소방시설의 관리 등),"
        - "제16조(피난시설, 방화구역 및 방화시설의 관리)"
      public:
        - "국가 정보보안 기본지침 제87조(정보통신시설 보호대책)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제10조(전원, 공조 등 설비에 관한 사항)"
      ict:
        - "정보통신망 이용촉진 및 정보보호등에 관한 법률 제46조(집적된 정보통신시설의 보호)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.4.4 보호설비 운영"
    checklist:
      - "화재 감지 및 소화 설비 현황"
      - "누수 감지 설비 현황"
      - "항온항습 설비 현황"

  - id: "P-11"
    title: "전원공급 이상이나 기타 전기관련 사고로부터 장비 보호(UPS, 비상발전기, 이중전원선 등의 설비)"
    domain: "1. 물리보안"
    related_org:
    - "정보보호 부서"
    - "시설 관리 부서"
    description:
      - "전산실 등의 정보통신 시설은 전원공급이 차단되는 경우 서비스 중단으로 이어지기 때문에 무정전전원 장치(UPS), 비상발전기, 이중전원선 등의 설비를 갖춰야 한다."
    considerations:
      - "자가발전설비를 운영하는 집적정보통신시설(IDC)의 경우 최소 2시간 이상의 발전이 가능한 연료 공급 시설을 갖추어야 하며, UPS의 경우 정보시스템 장비의 3개월간 평균 순간사용전력의 130%에 해당하는 전력을 최소 15분 이상 공급할 수 있도록 하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제11조(재해‧재난 대비 안전조치)"
      public:
        - "국가 정보보안 기본지침 제87조(정보통신시설 보호대책), 제92조(재난 방지대책)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제10조(전원, 공조 등 설비에 관한 사항)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제46조(집적된 정보통신시설의 보호)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.4. 4 보호설비 운영"
    checklist:
      - "UPS 용량 및 성능에 관한 문서(예: 제조사 설명서 또는 정기점검 결과)"
      - "비상발전기 용량 및 성능에 관한 문서(예: 정기점검 결과)"
      - "비상 전원 설비(예: UPS, 비상발전기, 이중전원선 등)"
      - "(참고 자료 제14호) 집적정보통신시설 보호조치 세부기준"

  - id: "P-12"
    title: "전원공급 이상이나 기타 전기관련 사고로부터 장비를 보호하기 위해 설비 상태에 대해 정기적으로 검토"
    domain: "1. 물리보안"
    related_org:
    - "정보보호 부서"
    - "시설 관리 부서"
    description:
      - "전원 공급이 이루어지지 않는 비상상황을 대비하기 위하여 무정전전원공급장치(UPS), 이중전원선, 비상발전기 등의 비상설비를 마련하고 해당 설비에 대한 정기점검을 실시하여야 한다."
      - "집적정보통신시설(IDC)인 경우는 관계 법규에 따른 전력 가용성 확보 기준에 따라 UPS, 축전지설비, 자가발전설비 등 설비를 갖춰야 하고 해당 설비에 대한 정기적인 점검을 시행하여야 한다."
      - "IDC 이외의 시설에 대하여는 자체적인 비상 전력대책을 수립하고 대상 설비에 대한 정상 동작 여부를 정기적으로 점검(예: 매월 또는 분기)하여야 한다."
      - "비상 전원 설비의 안정적 운영을 위하여 연간 점검 계획을 수립하고 설비별 관리 책임자를 지정하여야 하며, 점검 결과 발견된 결함에 대해서는 즉각적인 보수 및 관리 책임자 승인 절차를 포함한 사후 관리 프로세스를 운영하여야 한다."
    considerations:
      - "비상 전원 설비는 작동기능 점검, 정기점검, 종합정밀 점검과 무부하 시험 등을 매월 또는 분기마다 주기적으로 수행하여 전원공급 차단과 같은 비상 상황에도 전원공급이 가능하게 하여야 한다."
      - "정전과 같은 비상상황에 대비하기 위한 비상발전기는 정기적인 점검과 시험이 필요하다. 이를 위해, 비상발전기에 대한 부하를 주지 않고 테스트를 수행하는 무부하 테스트를 정기적으로 실시할 필요가 있다."
      - "※ 무부하 시험(no-load test, 無負荷試驗)이란 무부하 운전에 의한 시험을 말하며, 무부하손 측정이 가능하다."
      - "외부 전문 업체를 통한 점검 시 내부 담당자가 반드시 참관하여 실제 점검 여부를 확인하고 보고서의 적정성을 검토하여야 한다."
      - "UPS 및 비상발전기의 장애 발생 시 즉시 대응할 수 있도록 원격 경보 시스템의 작동 상태를 수시로 확인하고, 소모품(축전지, 연료 등)의 교체 주기 및 적정 비축량을 체계적으로 관리하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제11조(재해‧재난 대비 안전조치)"
      public:
        - "국가 정보보안 기본지침 제87조(정보통신시설 보호대책)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제10조(전원, 공조 등 설비에 관한 사항)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제46조(집적된 정보통신시설의 보호)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.4.4 보호설비 운영"
    checklist:
      - "전력 체계도 또는 설비 구성 도면"
      - "대상 설비에 대한 정기점검 이력"
      - "대상 설비(예: UPS, 비상발전기 등)"
      - "대상 설비에 대한 연간 점검 및 운영계획서"

  - id: "P-13"
