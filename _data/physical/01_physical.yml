    considerations:
      - "설치된 CCTV가 정상 동작하는지 정기적으로 점검하고 장애, 사각지대 등이 확인되는 경우 지체 없이 보완하여 상시적인 감시통제가 이루어지도록 하여야 한다."
      - "통제구역 내부가 어둡다면 출입자의 신원과 행위를 식별하기 불가능하므로 동작 센서를 통한 자동 점등이 이루어지게 하거나 적외선 기능을 탑재한 CCTV 카메라 설치를 고려할 필요가 있다."
      - "CCTV 영상기록은 식별 가능한 수준으로 가급적 실내·외 200만 화소 이상을 유지할 필요가 있다."
      - "실외 지역이 보호구역이며 CCTV 설치가 필요하다면 저조도 기능이 탑재된 CCTV를 설치하는 것을 고려한다."
