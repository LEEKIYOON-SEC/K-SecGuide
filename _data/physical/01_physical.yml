  - id: "P-18"
    title: "CCTV 운용 시 중계·관제서버, 관리용 PC, 정보통신망 등에 대해 보안대책을 수립"
    domain: "1. 물리보안"
    related_org:
    - "정보보호 부서"
    - "시설 관리 부서"
    description:
      - "CCTV는 폐쇄망에 운영되고 중계·관제서버, 영상기록장비(DVR NVR 등), 관리용 PC 등의 CCTV 관련 자산에 대한 보안대책을 수립‧적용하여야 한다."
      - "외부에 CCTV를 설치하는 경우 카메라, 중계서버는 비인가자가 임의로 조작하지 못하도록 물리적인 접근통제를 적용하고 내부 통신망을 통하여 구성(인터넷망과 분리하고 별도 단독망 이용)하여야 한다."
      - "CCTV관제시스템이 운용되는 영역으로의 접근은 별도의 침입차단시스템(또는 네트워크 장비의 ACL 설정을 통한 접근차단)을 통해 비인가 접근을 원천 차단하여야 한다."
      - "관제시스템과 관리용 PC는 계정, 비밀번호 등의 로그인을 통해서만 접근하도록 하여야 하고, 원격에서의 접근통제를 위해 IP, MAC 등을 활용한다. 또한 관제시스템, 관리용 PC는 백신S/W를 설치하고 최신 업데이트가 적용되도록 하며 비인가 USB매체 사용 등을 차단하여야 한다."
    considerations:
