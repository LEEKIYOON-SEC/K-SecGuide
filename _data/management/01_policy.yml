domain: "1. 정보보호 정책"
domain_number: 1
category: "관리적 분야"
items:
  - id: "A-1"
    title: "조직 전반에 적용하고 있는 정보보호 정책/지침 수립 및 경영진의 승인 획득"
    domain: "1. 정보보호 정책"
    related_org:
    - "정보보호 부서"
    description:
      - "기관 자체의 최상위 정보보호 정책을 수립하여 조직이 수행하는 정보보호 활동의 근거와 기준을 명확하게  제시할 수 있도록 하여야 한다."
      - "정보보호에 대한 경영진의 방향, 역할 및 책임, 정책의 대상과 범위, 활동의 근거 등 조직 전반에 적용하고 있는 정보보호 활동과 관련된 핵심 사항이 모두 포함할 수 있도록 하여야 한다."
      - "최상위 정보보호 정책에 대한 승인은 최고경영자(기관장)가 공식적으로 승인하여야 하며, 이를 통해 경영진의 의지를 조직 전체에 명확히 전달할 수 있어야 한다."
    considerations:
      - "최상위 정보보호 정책은 관련 법률 및 상급 기관의 정책을 준수할 수 있도록 그 내용을 구성하되, 관리기관 내 사업 특성, 조직 구성 등의 환경을 고려해 각 기관의 특성에 맞도록 구체적인 내용을 수립하여야 한다."
      - "최상위 정책 하위의 시행 지침 및 세부 절차는 정보보호책임자의 승인을 받을 수 있지만, 최상위 정책은 최고경영자(기관장)의 공식적인 승인을 받아야 하며, 그 기록을 명확하게 관리해야 한다."
      - "최상위 정보보호 정책 하위에 특정 대상(예: 조직, 사업, 시스템 등)에 따른 세부 업무 지침 또는 절차를 추가적으로 수립하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립ㆍ시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제4조(책무), 제5조(정보보안담당관 운영, 제7조(정보보안 내규)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산))"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 1.1.5 정책 수립"
    checklist:
      - "기관 자체의 최상위 정보보호 정책 문서"
      - "최고경영자(기관장)의 승인을 확인할 수 있는 내부 결재문 또는 서명본"
      - "(참고 자료 제1호) 정보보호 정책 목차 (예시)"

  - id: "A-2"
    title: "정보보호 정책의 시행을 위해 필요한 방법, 절차, 주기 등을 정의하고 문서화"
    domain: "1. 정보보호 정책"
    related_org:
    - "정보보호 부서"
    - "시스템 운영 부서"
    description:
      - "정보보호 정책을 구체적으로 시행하기 위해 세부적인 방법, 절차, 주기 등이 포함된 시행문서(지침, 절차, 가이드라인, 매뉴얼 등)를 수립하여 문서화해야 한다."
      - "시행문서는 정보보호 정책에서 수립한 규정을 실제로 수행하기 위한 문서이므로 해당 문서를 기반으로 정보보호 활동을 원활하게 수행할 수 있도록 구체적으로 작성되어야 한다."
      - "문서화된 정책 및 시행문서는 제·개정 내역에 대한 승인절차와 개정이력 관리가 지속적으로 이루어져야 하며 관련 법규의 개정 등에 따라 정보보호 정책 및 시행문서의 변경이 필요한 경우 법적 요구사항을 반영하여 개정하여야 한다."
    considerations:
      - "조직의 특성에 맞게 수립된 시행문서는 정보보호 활동의 근거를 구체적으로 제시할 수 있어야 하며, 정책 및 시행문서에 포함된 내용은 일관성이 있어야 한다."
      - "지침, 절차, 가이드라인, 매뉴얼 등은 조직이 수행하는 모든 정보보호 활동의 구체적인 근거를 명확히 제시하여야 하며 보호 대상이나 수행 주체 등 다양한 관점을 고려하여 조직의 특성에 맞게 수립되어야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립ㆍ시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제4조(책무), 제6조(연도 추진계획 수립), 제7조(정보보안내규)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 1.1.5 정책 수립"
    checklist:
      - "정보시스템 운영에 관한 지침 또는 절차(문서)"
      - "정보시스템 운영에 관한 지침 또는 절차의 제·개정 승인 이력"

  - id: "A-3"
    title: "정보보호 정책 및 시행문서를 모든 임직원 및 관련자에게 접근하기 쉬운 형태로 제공"
    domain: "1. 정보보호 정책"
    related_org:
    - "정보보호 부서"
    description:
      - "정보보호 정책 및 시행문서는 확인하기 쉬운 형태(예: 사내게시판 공지, 전자우편, 책자 등)로 배포하여 모든 임직원 및 관련자가 최신본을 인지할 수 있도록 하여야 한다."
      - "정보보호 정책 및 시행문서 제·개정 시 최신본은 임직원 및 관련자가 손쉽게 접근할 수 있는 형태로 전달되어야 하고, 제·개정 사실을 모든 임직원 및 관련자들이 알 수 있도록 공지하여야 한다."
    considerations:
      - "정보보호 정책 및 시행문서는 제‧개정사항이 발생하면 즉시 공표하고 최신본을 유지하여야 한다."
      - "정보보호 정책 및 시행문서는 내용에 따라 대외비 이상의 보안등급 분류가 이루어질 수 있으나, 정책 적용의 대상들이 정보보호 원칙을 이해하고 준수할 수 있도록 널리 배포되어야 한다."
      - "정보보호 정책 및 시행문서의 공개 방법은 그룹웨어 공지, 이메일, 사내 게시물, 인쇄본 교부 등 다양할 수 있으며 모든 임직원 및 관련자가 확인하기 쉬운 방법으로 선정하여 공개한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립ㆍ시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제4조(책무), 제7조(정보보안내규)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 1.1.5 정책 수립"
    checklist:
      - "기관 자체의 최상위 정보보호 정책 및 시행문서 최신본"
      - "정보보호 정책 및 시행문서가 공개된 방법(또는 위치)"
      - "정책 및 시행문서 제·개정 공지 이력"

  - id: "A-4"
    title: "정보보호 정책 및 시행문서에 대한 타당성을 주기적으로 또는 중대한 변화 발생 시 검토·평가하여 수정 및 보완"
    domain: "1. 정보보호 정책"
    related_org:
    - "정보보호 부서"
    description:
      - "정보보호 정책 및 시행문서에 대한 공식적인 타당성 검토 절차를 수립하고 연 1회 이상 정기적으로 수행하여 필요 시 수정 및 보완될 수 있도록 하여야 한다."
      - "정기적 검토 이외에 내부적(예: 조직, 물리, ICT 환경변화) 또는 외부적(예: 법규 변화) 변화가 발생하는 경우 그에 맞추어 조직의 역할을 변경하거나 법규제에 따른 정보보호 관련 요건의 변경을 반영하여 정책 및 시행문서를 개정하여야 한다."
    considerations:
      - "대·내외 환경에 중대한 변화 발생 시 정보보호 정책 및 시행 문서에 미치는 영향을 검토하고 필요 시 변경된 법규를 준수할 수 있도록 제·개정하여야 한다."
      - "정보보호 정책의 개정이 적시에 이루어지지 않으면 부적절한 내부 보안통제가 적용되거나 변경된 법규제를 만족하지 못할 우려가 있으므로 최소 연 1회 이상 정기적으로 타당성 검토를 수행하여야 한다."
      - "정보보호 이행점검, 내부감사 등과 같은 보안활동을 수행할 때 정책 및 시행문서 개정의 필요성을 검토하여야 한다."
      - "타당성 검토는 검토를 수행하는 인원에 따라 평가 수준이 다를 수 있으므로 별도의 체크리스트 등을 통해 반드시 검토가 필요한 기준을 명확하게 설정하는 것이 효과적이다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립ㆍ시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제7조(정보보안내규)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.1.1 정책의 유지관리"
    checklist:
      - "연 1회 이상의 정보보호 정책 및 시행문서 타당성 검토 결과 (예: 개정 의견 문건)"
      - "타당성 검토 결과에 따른 제·개정 이력(예: 개정 의견 및 개정 승인 문건)"
      - "(참고 자료 제2호) 정보보호 정책 타당성 검토 체크리스트 (예시)"

  - id: "A-5"
    title: "정보보호 정책 및 시행문서의 제·개정 시 이해관계자의 검토를 받고 해당 내용 반영"
    domain: "1. 정보보호 정책"
    related_org:
    - "정보보호 부서"
    description:
      - "정보보호 정책 및 시행문서를 제·개정하는 경우 이해관계자의 검토를 통해 업무에 끼치는 영향, 법적 준거성 등을 고려하여 타당성을 검토하여야 한다."
      - "이해관계자란 정보보호 정책 및 시행문서의 직접적인 영향을 받는 조직 및 담당자, 관련 분야 전문성을 보유한 조직 및 담당자 등을 의미한다."
    considerations:
      - "이해관계자에는 정보보호 및 개인정보보호 인력, IT 부서 인력, 현업부서 실무 책임자 등이 있을 수 있으며, 필요시 정보보호 관련 전문기관 또는 전문업체 등 외부 전문가 집단을 포함할 수 있다. 정보보호 정책 및 시행문서의 제·개정 시 이들로부터 자문, 협의, 점검 등을 받아 해당 내용을 반영할 수 있다."
      - "전문가 집단 및 내부 이해관계자와의 협의를 통해 정보보호 정책 및 시행문서를 제·개정하는 경우 변경으로 인한 업무 영향도 및 법적 준거성 등을 검토하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제7조(주요정보통신기반시설의 보호지원)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립ㆍ시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제7조(정보보안내규)"
      finance:
        - "전자금융감독규정 제8조의2(정보보호위원회 운영)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.1.1 정책의 유지관리"
    checklist:
      - "전문가 집단 및 이해관계자로부터의 자문, 협의, 점검 등의 이력(예: 검토 회의록, 계약서, 협의서, 공문 등)"
      - "자문, 협의, 점검 결과를 내부 보고하고 개선 조치가 이루어진 이력(예: 결과서, 개선 조치 결과서 등)"

  - id: "A-6"
    title: "연도별 정보보호 업무 세부추진 계획을 수립·이행"
    domain: "1. 정보보호 정책"
    related_org:
    - "정보보호 부서"
    description:
      - "정보보호 업무는 관리, 물리, 기술 분야에 대해 통합적인 관리가 이루어져야 하므로 연도별 정보보호 및 개인정보보호 업무 세부추진 계획을 수립하고 추진결과에 대한 분석· 평가를 수행하여야 한다."
      - "당해 연도의 정보보호 계획의 시행 여부를 검토하고 이행하지 못한 계획이 있다면 미이행 사유 등에 대한 분석·평가를 통해 문제점을 지속적으로 관리 및 개선하여야 한다."
    considerations:
      - "해당 연도의 정보보호 및 개인정보보호 업무를 효과적으로 수행하기 위해 지속적인 관리가 요구되며, 이를 위해 연도별 정보보호 및 개인정보보호 업무 세부추진 계획을 수립하고 경영진에 보고하는 등 계획에 따른 정보보호 활동과 관리가 이루어져야 한다."
      - "개인정보보호 업무 세부추진 계획은 정보보호 업무 세부추진 계획에 포함하여 수립할 수 있다."
      - "세부추진 계획에 따른 추진결과를 분석 및 평가하여 경영진에게 보고하고 문제점이 발견된 경우 개선대책을 수립하여 이행하여야 한다."
      - "관계 법규에서 요구하는 내용이 계획과 심사분석에 반영되도록 하고, 특히 금융회사는 정보보호 예산을 수립할 때 관계 법규에서 요구하는 예산원칙을 고려하여야 한다."
      - "공공기관 정보보호 예산은 정보화 예산 대비 15% 이상을 운영할 수 있도록 노력하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제6조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립ㆍ시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제6조(연도 추진계획 수립)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제8조의2(정보보호위원회 운영), 제36조의2(정보기술부문 계획서 제출 절차 등)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 1.1.6 자원 할당"
    checklist:
      - "당해 연도(또는 차년도) 정보보호 업무 계획서"
      - "전년도(또는 당해 연도) 정보보호 업무 계획에 대한 시행결과 검토서"
      - "(참고 자료 제3호) 정보보호 예산 기준"
      - "(서식 예시 제1호) 연간 정보보호 업무 계획"
      - "(서식 예시 제2호) 연간 정보보호 업무 심사분석"

  - id: "A-7"
    title: "기관의 정보보호 강화를 위한 중장기(3년 이상) 계획 수립·이행"
    domain: "1. 정보보호 정책"
    related_org:
    - "정보보호 부서"
    description:
      - "기관의 정보보호는 일회성 또는 단기간에 이루어질 수 없는 부분도 존재하기 때문에 단계적이고 지속적인 정보보호 대책, 즉 중장기 정보보호 대책(정보보호 마스터플랜)을 수립하여야 한다."
      - "정보보호 마스터플랜은 식별된 위험에 따른 보호대책을 확인할 수 있는 증적 자료가 될 수 있으며 식별된 위험에 대한 처리전략(위험감소, 위험회피 등)을 수립하고 전략에 따른 적절한 중장기 계획을 수립·이행하여 거시적인 시각에서 정보보호 수준을 꾸준히 향상하여야 한다."
      - "정보보호 마스터플랜을 수립하는 과정에서 다양한 정보보호 대책이 도출되는 경우 각 대책을 언제 적용하고 예산은 어느 정도 소요될 것인가에 대한 세부사항도 함께 수립하여야 한다."
    considerations:
      - "정보보호 마스터플랜을 수립하는 방법 중 하나는 선진 사례, 정보보호 표준을 정보보호 목표로 정하고 해당하는 목표와의 차이(Gap)를 분석하여 그 차이를 줄이기 위한 정보보호 대책을 선정하는 방법이 있다."
      - "정보보호 대책 선정 시 위험의 심각성 및 예산 할당, 구현 용이성 등을 고려하여 일정, 담당 부서 및 담당자, 예산 등의 항목을 지정해 상세 계획을 수립하여야 한다."
      - "수립된 정보보호 마스터플랜은 정보보호책임자 및 개인정보 보호책임자 등 경영진에 보고하여야 한다."
      - "정보보호 현황분석을 토대로 도출한 수행과제에 대해 이행방안, 소요기간, 수행 주체, (필요 시) 예산 등을 포함하는 개별 세부계획을 수립하여 향후 정보보호 활동을 체계적으로 수행할 수 있도록 하여야 한다."
      - "아래는 국내 정보보호제도 중 정보보호 및 개인정보보호 관리체계(ISMS-P)의 인증기준을 만족하기 위한 정보보호 목표를 정하고 해당하는 정보보호 수준을 달성하기 위한 3개년 계획을 수립하는 예시이다."
    laws:
      common:
        - "정보통신기반 보호법 제6조(주요정보통신기반시설보호계획의 수립 등)"
        - "개인정보보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립ㆍ시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제6조(연도 추진계획 수립)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무), 제8조의2(정보보호위원회 운영)"
        - "전자금융감독규정 제36조의2(정보기술부문 계획서 제출 절차 등)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 1.1.6 자원 할당, 1.2.4 보호대책 서정"
    checklist:
      - "정보보호 마스터플랜 문서"
      - "(참고 자료 제3호) 정보보호 예산 기준"
