domain: "3. 자산분류"
domain_number: 3
category: "관리적 분야"
items:
  - id: "A-10"
    title: "주요정보통신기반시설 내 모든 자산(인력, 시설, 장비 등)을 식별하여 자산분류기준을 수립하고 문서화"
    domain: "3. 자산분류"
    related_org:
    - "정보보호 부서"
    description:
      - "기반시설을 구성하는 중요 자산의 현황을 체계적으로 관리하기 위해 자산의 유형 별 분류 및 관리(예: 연 1회 이상 목록 현행화) 기준을 수립하여야 하며 기준에 따라 작성된 자산목록은 정기적으로 검토하여 현행화하여야 한다."
      - "자산을 식별하는 것은 조직에서 보유하고 있는 자산 중 보호하여야 할 대상을 정의하는 것으로 기반시설과 관련된 모든 자산을 확인하고 보호되어야 할 자산을 분류 기준에 따라 누락 없이 식별하여 자산목록(표) 등으로 문서화하여야 한다."
    considerations:
      - "자산의 분류는 서버, 네트워크 장비, 정보시스템(응용프로그램), 소프트웨어, 보안 장비, DBMS, 단말기 등으로 구분할 수 있으며, 기반시설 및 조직의 특성에 따라 적절한 분류 기준을 마련할 필요가 있다."
      - "자산 분류기준에 따라 자산목록을 작성할 때는 자산명, 용도, 위치, 주요 직무자, 담당자 및 책임자, 관리부서 등을 확인하여 목록에 포함하여야 한다."
      - "자산을 효과적으로 관리하기 위해 자산관리시스템을 활용하거나 다양한 형태의 문서(예: 엑셀, 워드 등)로 자산 목록을 작성하여 관리할 수 있다."
      - "자산 목록은 조직의 내부 규정에 따른 분류 기준으로 작성하는 것이 일반적이나, 관련 국내외 표준 및 인증(예: ISMS, ISMS-P, ISO27001) 규격에 맞춰 상세한 분류 기준과 목록을 유지할 필요가 있는 경우에는 해당 표준을 준수하여 자체 규정을 수립하고 이에 따라 관리할 수 있다. 다만, 국제 표준을 완벽히 준수하기 어려운 경우에는 정보시스템을 중심으로 자산 목록을 관리하는 방안을 고려할 수 있다."
      - |
        ※ 자산 분류(예시)

        | 유형 | 설명 | 예시 |
        | --- | --- | --- |
        | 전자 정보 | 전자적 형태로 저장된 데이터 | 데이터베이스, 데이터 파일 등 전자파일 |
        | 문서 | 종이매체로 된 자산 업무에 사용·산출되는 문서나 기록물 | 규정 및 지침, 계약서 및 협약서 등 |
        | 소프트웨어 자산 | 상용 또는 자체 개발된 소프트카피·하드카피 보관중인 각종 소프트웨어 자산 | 애플리케이션 소프트웨어, 시스템 소프트웨어, 개발도구 및 유틸리티 |
        | 하드웨어 자산 - 서버 | 대내외 서비스 및 업무를 위해 사용되는 서버 자산 | 유닉스 서버, 윈도우 서버 등 |
        | 하드웨어 자산 - 네트워크 장비 | 네트워크와 관련된 장비 | 라우터, 스위치, 허브 등 |
        | 하드웨어 자산 - 단말기 | 임직원이 업무에 사용하는 단말기 | PC, 노트북, 모바일 기기 등 |
        | 시설 | 시스템 설치·운영 장소, 물리적 공간 및 각종 부대시설 | 전산실, 사무실, 방재실, 통신 장비실 등 |
        | 지원설비 | 전력공급, 환기시설, 방재 시설 등 정보시스템 운영 지원하기 위한 설비 | 항온항습기, UPS, 공조장비 등 |
        | 인력 | 소유자, 사용자, 운영자, 개발자 등 시스템 운영 및 업무 수행 중인 모든 인력 | 내부인력, 외부인력 및 협력업체 등 |
      - "자산의 분류 시 누락 되는 자산이 발생하지 않도록 범위 내 모든 자산을 식별하고 식별된 자산은 자산분류 기준에 따라 분류하여 관리하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설의보호대책 수립 등)"
      public:
        - "국가 정보보안 기본지침 제50조(정보시스템 보안책임), 제81조(보호대책 수립)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제13조(전산자료 보호대책), 제23조(비상대책 등의 수립·운용)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 1.2.1 정보자산 식별"
    checklist:
      - "자산 분류 및 관리 기준에 대한 지침"
      - "자산 목록(표)"
      - "(참고 자료 제7호) 자산의 보안등급 분류 기준 (예시)"
      - "(서식 예시 제30호) 자산목록표"

  - id: "A-11"
    title: "정보자산을 보안등급과 중요도 등에 따라 분류하여 관리"
    domain: "3. 자산분류"
    related_org:
    - "정보보호 부서"
    description:
      - "정보자산에 대한 보안등급 분류기준을 관련 지침 등에 명문화하고 수립된 분류 기준에 따라 개별 정보자산에 대한 보안등급을 자산목록표로 작성하여 관리하여야 한다."
      - "정보자산(예: 서버, 네트워크 장비, 보안 장비, PC 등)을 기밀성, 무결성, 가용성 등의 정보보호 특성을 고려하여 중요도를 평가하고 자산별 특성에 따라 보안등급(예: 1, 2, 3등급)을 부여하여야 한다."
    considerations:
      - "정보자산의 유출, 장애 및 침해 발생 시 조직의 업무에 미치는 영향을 고려하여 식별된 자산의 중요도를 평가할 수 있는 기준을 수립하여야 한다."
      - "정보자산 중요도 평가 시 기밀성, 무결성, 가용성, 법적 요구사항 등을 고려할 수 있으며 이외에도 서비스 영향, 이익손실, 고객 상실, 대외 이미지 등 타 자산과의 연관성을 추가적으로 고려할 수 있다."
      - |
        ※ 자산 중요도 평가를 위한 주요 고려사항

        | 기준(예시) | 설명 |
        | --- | --- |
        | 기밀성(Confidentiality) | 자산이 접근 권한이 없는 자에게 노출되었을 때의 위험성을 파악하여 데이터가 오직 인가된 사용자만 접근할 수 있도록 보호하는 것을 의미함 |
        | 무결성(Integrity) | 하드웨어/소프트웨어 변경, 데이터 값 수정 등 자산의 상태 또는 내용이 임의로 변경되었을 때의 위험성을 파악하여 데이터가 정확하고 신뢰할 수 있도록 유지하도록 보장하는 것을 의미함 |
        | 가용성(Availability) | 자산이 필요 시 사용이 불가능하거나, 접근이 되지 않을 때 서비스에 미치는 영향을 파악하여 필요한 정보에 적시에 접근할 수 있도록 보장하는 것을 의미함 |
      - "식별된 자산에 대한 법적 요구사항 및 업무에 미치는 영향 등을 고려하여 중요도를 결정하고 보안등급을 부여하여야 한다."
      - "자산 중요도 평가기준에 따라 자산별로 중요도를 평가하여야 한다. 또한 자산별 특성에 따라 보안등급을 부여하고 임직원이 보안등급을 쉽게 식별할 수 있도록 관리하여야 한다."
      - "정보자산에 대한 보안등급은 1등급, 2등급, 3등급(또는 가등급, 나등급, 다등급 등)으로 구분할 수 있으며, 회사의 자산 관리 지침에 따라 보안등급을 부여하고 현행화하여 관리하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
      public:
        - "국가 정보보안 기본지침 제51조(정보시스템 유지보수)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제13조(전산자료 보호대책), 제23조(비상대책 등의 수립·운용)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.1.3 정보자산 관리"
    checklist:
      - "정보시스템 자산에 대한 보안등급 분류 및 관리 기준(예: 지침)"
      - "정보시스템별 보안등급 지정 현황(예: 시스템별 보안등급 지정 목록)"
      - "자산별 보안등급이 표기된 자산 목록표"
      - "(참고 자료 제7호) 자산의 보안등급 분류 기준 (예시)"
      - "(서식 예시 제30호) 자산 목록표"

  - id: "A-12"
    title: "조직의 주요 자산 목록을 작성하고, 정기적인 자산 현황 조사 결과 및 변경 사항(취득, 폐기, 양도 등) 등을 자산 목록에 반영하여 변경이력을 최신으로 유지 관리"
    domain: "3. 자산분류"
    related_org:
    - "정보보호 부서"
    description:
      - "기반시설을 구성하는 각 자산을 문서화 또는 자산관리시스템을 활용하는 등 목록화하여 관리하고 정기적으로 점검하여 변경 사항이 발생할 경우 현행화하여야 한다."
      - "정보자산의 취득·신규 도입 변경·폐기·양도 등 발생 시 자산목록에 반영하고 그 변경이력을 최신으로 유지‧관리하여야 한다."
    considerations:
      - "명문화된 자산 분류기준에 근거하여 서버, 네트워크 장비, 보안 장비, DBMS, PC, 기타 설비 등에 대한 자산을 목록(또는 별도 업무시스템을 통한 목록화)으로 관리하고 정기적으로 자산 현황 조사를 수행하여 최신 목록을 유지하여야 한다."
      - "자산 목록을 변경할 경우 버전 및 변경일을 기재하는 등 변경이력을 관리할 수 있도록 하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보 안전성 확보조치 기준 제4조(내부관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제50조(정보시스템 보안책임), 제81조(보호대책 수립)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제13조(전산자료 보호대책), 제23조(비상대책 등의 수립·운용)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 1.2.1 정보자산 식별"
    checklist:
      - "목록표에 표기된 자산의 위치(예:통신실, 서버실 등)"
      - "자산 변경에 따른 자산 목록 갱신 이력"
      - "(서식 예시 제30호) 자산 목록표"

  - id: "A-13"
    title: "자산의 등급에 따른 취급절차(생성·도입, 저장, 이용, 파기) 및 보호대책을 수립·이행"
    domain: "3. 자산분류"
    related_org:
    - "정보보호 부서"
    description:
      - "자산의 보안등급 별 취급절차(생성·도입, 저장, 이용, 파기)를 수립하고 보안등급에 따른 차별화된 보안통제를 수행할 수 있는 지침 또는 절차를 정의하여 그에 따른 이행이 이루어지도록 하여야 한다."
      - "명문화된 자산의 보안등급 기준에 근거하여 보안등급에 따른 보호절차와 접근제한을 하여야 한다."
      - "물리적인 보호구역 등급에 따른 보안통제를 차별화하고, 중요한 정보시스템에 따라 네트워크 및 시스템별 보안통제을 차별화하여야 한다."
    considerations:
      - "자산 분류 및 보안등급 산정방법 정의, 자산 목록화, 자산의 보안등급 식별(결정) 등을 전제로 보호대책을 수립하여야 한다."
      - "자산의 유형 및 특성에 따라 다르겠지만 보안등급에 따른 보안통제 원칙을 명문화하여 이행하도록 한다."
    laws:
      common:
        - "개인정보 보호법 제29조(안전조치의무)"
      public:
        - "국가 정보보안 기본지침 제51조(정보시스템 유지보수)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제13조(전산자료 보호대책), 제15조(해킹 등 방지대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.1.3 정보자산 관리"
    checklist:
      - "내부규정(예: 지침 또는 절차) 중 보안등급별 보안통제에 관한 내용"
      - "정보자산별 보안등급 지정 현황(예: 시스템별 보안등급 지정 목록) 및 보안통제 적용 여부"
      - "(참고 자료 제8호) 정보시스템 저장매체·자료별 삭제방법 (예시)"

  - id: "A-14"
    title: "정보자산별로 관리자 및 관리 책임자가 지정되어 있으며, 목록을 최신으로 유지·관리"
    domain: "3. 자산분류"
    related_org:
    - "정보보호 부서"
    description:
      - "식별된 자산별로 자산 관리(도입, 변경, 폐기, 반·출입 등)를 총괄 책임질 수 있는 소유자와 자산을 실제 관리 운영하는 관리자 및 실무 담당자를 지정하여 각각의 책임과 역할을 정의하고 자산목록표 및 자산관리대장 등에 기재하여 자산에 대한 보호조치 이행 주체를 명확하게 확인할 수 있도록 하여야 한다."
      - "자산별로 지정된 책임자를 확인하기 위해서는 정보시스템 자산(예: 서버, 네트워크 장비, 보안 장비, PC 등)뿐만 아니라, 관리자 및 사용자가 접근 가능한 애플리케이션 형태의 소프트웨어 자산도 확인하여야 한다."
      - "기반시설 중 유닉스 서버가 있다면 해당 서버의 소유자를 지정하여 root 권한을 가진 관리자 및 관리부서(예: 시스템팀), 부서장, 그리고 해당 서버에 설치된 업무용 애플리케이션을 관리하는 관리자 계정을 보유한 관리자 및 관리부서(예:설비 운영팀), 부서장을 확인 할 수 있어야 한다. 또한 자산을 사용하는 내부 인력 및 외부 인력이 있다면 접근가능 한 사용자 모두를 확인하여야 한다."
    considerations:
      - |
        소유자, 관리자, 사용자는 다음과 같이 구분할 수 있다.

        | 기준(예시) | 설명 |
        | --- | --- |
        | 소유자 | 자산의 소유 권한과 관리에 대한 최종 책임을 지며, 자산의 취득, 사용 허가, 처분 또는 폐기 등의 관리권한을 가진 자 |
        | 관리자 | 자산의 보관 및 운영·관리 책임이 있고, 자산의 관리위임을 받은 자 |
        | 사용자 | 정보처리 설비 및 시스템을 활용하여 자산을 실질적으로 사용하는 자 |
      - "자산별 관리(담당)자, 관리부서 및 부서장은 각 자산별로 확인할 수 있도록 자산목록표에 해당 인원의 이름을 기록, 관리 하여야 한다."
      - "자산별로 관리(도입, 변경, 폐기, 반·출입 등)를 책임을 질 수 있는 책임자와 자산을 실제 관리·운영하는 관리자(또는 담당자)를 지정하고 자산 목록표에 기재하여 책임소재를 명확하게 하여야 한다."
      - "자산별 관리(담당)자, 관리부서 및 부서장은 자산 목록표에 해당 인원의 이름을 기록하여 관리한다."
      - "자산별 접근 사용자가 많은 경우는 별도의 문서화가 어렵기 때문에 해당 사용자를 서버 또는 어플리케이션 상에서 확인이 가능하도록 하여야 한다.(예: 사용자 계정별 사용 주체(이름) 목록)"
      - "퇴직, 보직 이동 등 인사정보가 변경되거나 자산에 변경(도입, 변경, 폐기, 반·출입)이 발생하는 경우 자산별 책임자 및 담당자를 파악하여 자산 목록표에 반영 하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무), 제30조(개인정보 처리방침의 수립 및 공개)"
      public:
        - "국가 정보보안 기본지침 제50조(정보시스템 보안책임)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제13조(전산자료 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.1.3 정보자산 관리"
    checklist:
      - "자산별 관리(담당)자, 관리부서, 부서책임자 현황(예: 자산목록표)"
      - "자산별 사용자 현황(예: 사용자 계정 목록)"
      - "(서식 예시 제30호) 자산 목록표"
