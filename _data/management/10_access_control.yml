  - id: "A-48"
    title: "외부 네트워크를 통한 원격작업(재택근무, 장애대응 등)에 대한 책임자 승인, 작업내용 및 범위, 기간 설정, 접근 로그 기록/검토 등이 포함된 정책(절차) 수립·이행"
    domain: "10. 접근통제"
    related_org:
    - "정보보호 부서"
    - "시스템운영 부서"
    description:
      - "서버, 네트워크 장비, 보안 장비, PC 등의 정보시스템 및 내부 업무시스템(Application)에 대해 인터넷 등 외부통신망을 통한 원격접속을 원칙적으로 금지하여야 하나 재택근무, 장애대응 등의 사유로 원격작업을 불가피하게 허용하는 경우 사용자의 접근신청, 책임자 승인 등을 포함하여 원격접속 보안 대책(예: 지침 또는 절차)을 수립하여야 한다."
      - "원격접속 시 통신 구간 암호화, 강화된 사용자 인증 및 안전한 접속수단(예: VPN 등)을 적용하여야 한다."
      - "유지보수 등의 목적으로 인터넷 등 외부에서 대상 시스템에 원격접속이 이루어지는 경우는 상시 접속이 아닌 해당 업무 기간 및 시간에만 접속이 이루어지도록 하여야 한다."
    considerations:
      - "인터넷 등 정보통신망을 통하여 외부에서 기반시설에 접속하려는 경우에는 법적 요구사항에 따라 안전한 인증수단을 적용하여야 한다."
      - "안전한 인증수단 적용이란 개인정보처리시스템에 사용자계정과 비밀번호를 입력하여 정당한 개인정보취급자 여부를 식별·인증하는 절차 이외에 추가적인 인증 수단의 적용을 말함"
      - "안전한 인증수단 예시 : 인증서, 보안토큰, 일회용 비밀번호(OTP) 등"
      - "개인정보취급자가 정보통신망을 통하여 외부에서 개인정보처리시스템 접속 시 인증수단 적용 관련 법적 요구사항 준수"
    laws:
