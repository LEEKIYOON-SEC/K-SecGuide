        - "개인정보의 안전성 확보조치 기준 제6조(접근통제)"
      public:
        - "국가 정보보안 기본지침 제59조(원격근무 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제15조(해킹 등 방지대책)"
      ict:
        - "정보통신망법 제45조(정보통신망의 안정성 확보 등)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.6.6 원격접근 통제"
    checklist:
      - "원격접속에 대한 접근통제 기준 지침 또는 절차"
      - "원격접속수단(예: VPN) 운용 이력"
      - "VPN 운영 현황"
      - "원격접속 제한 또는 예외 허용 시스템(예: 방화벽, VPN 등)"
      - "원격 운영 및 접속에 대한 책임자의 승인(1년 이상 보존)"

  - id: "A-49"
    title: "네트워크를 통해 시스템을 운영하는 경우 원칙적으로 시스템 관리는 내부의 특정 단말기에서만 할 수 있도록 제한"
    domain: "10. 접근통제"
    related_org:
    - "정보보호 부서"
    - "시스템운영 부서"
    description:
      - "정보시스템을 네트워크 상에서 접근하여야 하는 관리자는 내부의 특정 단말기(업무PC)에서만 대상 시스템을 접근할 수 있도록 하는 조치(예: IP주소 및 MAC주소 지정)가 이루어져야 한다."
      - "또한 해당 단말은 인터넷을 차단하여 관리용 단말을 통한 외부 해킹(예: 악성코드 감염 등)을 방지하여야 한다."
      - "정보시스템의 가동기록(접속일시, 접속자 등)은 일정기간(예: 1년 이상) 보관하고 주기적(예: 월 1회 이상)으로 점검하여야 한다."
    considerations:
      - "관리용 단말이란, 해당 단말을 사용하는 직원이 관리대상 시스템에 대한 운영체제 관리권한(예: root, administrator 등)을 통해 대상 시스템의 설정, 정보 등을 변경할 목적으로 사용하는 컴퓨터를 의미한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제6조(접근통제)"
      public:
        - "국가 정보보안 기본지침 제42조(보안·네트워크 장비 보안), 제52조(지정 단말기를 통한 온라인 유지보수)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제12조(단말기 보호대책)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제45조(정보통신망의 안정성 확보 등)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.6.1 네트워크 접근, 2.6.6 원격접근 통제"
    checklist:
      - "정보시스템 보안 정책(또는 지침)"
      - "정보시스템별 관리용 단말 지정 현황"
      - "시스템 관리용 단말(PC) 및 콘솔"
      - "정보시스템 가동기록 점검 내역"

  - id: "A-50"
    title: "외부에서 내부 시스템의 기능을 사용할 수 있다면 VPN 등 안전한 접속 수단 적용"
    domain: "10. 접근통제"
    related_org:
    - "정보보호 부서"
    - "시스템운영 부서"
    description:
      - "인터넷 등 외부에서 내부 시스템에 대한 접근이 이루어지는 경우, 안전한 접속수단(VPN 등)을 사용하여 비인가자의 해킹 등 침해사고를 예방하기 위한 보호조치를 적용하여야 한다."
      - "외부 접속 시 안전한 접속수단(예: VPN, 전용망 등) 적요에 관한 사항을 내부 정책에 명시하고, 이를 위한 장비를 구축하고 운영하여야 한다."
    considerations:
      - "물리적으로 떨어진 IDC, 지사, 대리점, 협력업체, 고객센터 등과의 네트워크 연결 시 전용회선이나 다음과 같이 VPN(가상사설망) 등을 활용하여 안전한 접속환경을 구성하여야 한다."
      - "VPN(Virtual Private Network)은 기업이나 개인이 공중망(인터넷)을 이용하여 경제적이면서도 사설망과 같이 안전하게 통신할 수 있는 보안 솔루션"
      - "통신 상대자들끼리 암호화된 채널을 형성하여 외부에서 데이터 도청 및 변조를 방지"
      - "인증서, OTP(One Time Password) 등 사용자 인증방식을 추가하여 원격접속에 대한 보안 강화 가능"
      - "VPN 접근계정은 업무목적에 필요한 최소한의 기간, 권한만을 할당하고 해당 기간이 만료되면 접근할 수 없도록 설정한다."
      - "VPN의 접근통제(ACL) 설정을 통해 업무상 필요한 내부시스템만 외부에서 접근할 수 있도록 하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제6조(접근통제)"
      public:
        - "국가 정보보안 기본지침 제59조(원격근무 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제15조(해킹 등 방지대책)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제45조(정보통신망의 안정성 확보 등)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.6.1 네트워크 접근, 2.6.6 원격접근 통제"
    checklist:
      - "네트워크 구성도"
      - "VPN 장비의 접근 계정(목록) 및 권한(사용기간, 접속대상 등) 설정"
      - "VPN 접근제어 정책 설정 현황"
      - "VPN 등 사외 접속 신청서"

  - id: "A-51"
    title: "내부망(업무망)과 인터넷망을 분리하여 사용"
    domain: "10. 접근통제"
    related_org:
    - "정보보호 부서"
    - "시스템운영 부서"
    description:
      - "기반시설의 업무망에 대한 외부로부터의 침해 위협을 차단하기 위하여 내부 업무망과 인터넷망은 각각 분리하여 운영하여야 한다. 이 경우 유선은 물론 무선 인터넷 접속까지 차단할 수 있는 조치(예: PC의 무선랜카드 제거, 무선방화벽 운영 등)가 함께 이루어져야 한다."
    considerations:
      - "인터넷망 차단 조치는 물리적 방식(예: 네트워크가 분리된 2대의 PC 구성) 또는 논리적 방식(예: VDI와 같은 가상화 기술 활용)으로 수행할 수 있으며, 분리된 영역 간에는 접근 통제를 적용하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제6조(접근통제)"
      public:
        - "국가 정보보안 기본지침 제40조(내부망·인터넷망 분리)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제15조(해킹 등 방지대책)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제45조(정보통신망의 안정성 확보 등)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.6.7 인터넷 접속 통제"
    checklist:
      - "네트워크 구성도"
      - "인터넷망 접속에 대한 통제 정책"
      - "인터넷망 차단조치 대상자 목록"
      - "인터넷 접속기록 모니터링 이력"

  - id: "A-52"
    title: "망분리 후 안전한 자료전송을 위한 시스템을 도입하여 사용"
    domain: "10. 접근통제"
    related_org:
    - "정보보호 부서"
    - "시스템운영 부서"
    description:
      - "내부 업무망의 인터넷 차단에 따라 외부로 자료 전송이 필요한 경우, 안전한 자료전송을 위한 시스템을 도입(예: 망간 자료전송시스템)하여 보호조치가 이루어져야 한다."
      - "이 경우, 망간 자료전송 시스템의 관리 설정(예: 용량제한, 기간제한, 파일확장자(포맷) 제한 등)을 통해 오용 및 남용을 최대한 방지해야 한다."
      - "망간 자료전송 시스템 이용 시, 결재권자의 사전 또는 사후 승인 절차를 마련하고 이를 준수하여야 한다."
      - "망분리된 환경에서 자료 전송의 안전성을 확보하고 보안사고를 사전에 방지하기 위해 자료전송 로그(비정상적인 트래픽, 전송실패기록, 승인내역 등)를 주기적으로 모니터링하여야 한다."
    considerations:
      - "공공기관은 망간 자료전송시스템을 운영하여야 하며, 전송로그와 원본파일 보관기간은 국가정보원 지침에 규정(원본파일은 3개월 이상, 전송기록은 6개월 이상 유지)을 따라야 한다."
      - "공공기관 이외의 기관은 관계 법규에서 정하는 경우를 제외하고, 자체적인 관리 정책을 설정하여 운영한다."
      - "인터넷망에서 내부망으로 자료 전송이 필요한 경우, 악성프로그램 탐지 등의 조치를 통해 악성코드가 내부망으로 전파되지 않도록 관리한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
      public:
        - "국가 정보보안 기본지침 제40조(내부망·인터넷망 분리)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제15조(해킹 등 방지대책)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제45조(정보통신망의 안정성 확보 등)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.6.7 인터넷 접속 통제"
    checklist:
      - "망간 자료전송시스템의 (정책)관리 설정 내용"
      - "망간 자료전송시스템의 신청·승인내역 및 사용자 이용내역 (정기)검토결과서"
      - "자료 전송 로그 모니터링 내역"

  - id: "A-53"
    title: "인터넷 전화망과 일반 전산망은 분리하여 운용"
    domain: "10. 접근통제"
    related_org:
    - "정보보호 부서"
    - "시스템운영 부서"
    description:
      - "인터넷 전화망(음성 네트워크)을 통한 침해위협으로부터 내부 전산망을 보호하기 위해 인터넷 전화망과 일반 전산망(데이터 네트워크)은 분리하여 운영하여야 한다."
      - "인터넷 전화망을 이용할 경우 제어신호 및 통화내용 암호화와 함께 인터넷 전화 전용 침입차단시스템 등 보안대책을 수립하고 시행하여야 한다."
    considerations:
      - "네트워크 분리는 물리적으로 분리하는 방법도 가능하지만, 경제성 등을 고려할 때 VLAN을 설정하여 네트워크를 논리적으로 분리하여 그룹 내에서만 통신이 가능하도록 설정할 수 있다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
      public:
        - "국가 정보보안 기본지침 제40조(내부망·인터넷망 분리), 제46조(인터넷전화 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제18조(IP주소 관리대책)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제45조(정보통신망의 안정성 확보 등)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.6.7 인터넷 접속 통제"
    checklist:
      - "네트워크 구성도(IP주소 포함)"
      - "방화벽 또는 VLAN이 설정된 네트워크 장비의 해당 접근규칙"
      - "인터넷전화(IP전화)망 IP할당 내역"
      - "제어신호 및 통화내용 암호화"
      - "(참고 자료 제15호) 인터넷 전화망과 전산망의 분리 지침"

  - id: "A-54"
    title: "내부에 상주하는 외부자에 대하여 네트워크를 분리하여 운영"
    domain: "10. 접근통제"
    related_org:
    - "정보보호 부서"
    - "해당 사업 부서"
    description:
      - "내부에 상주하는 외부자가 사용하는 네트워크는 다른 업무망과 분리하여 운영하여야 하며, 기반시설에 접근 가능한 내부망에 해당한다면 인터넷 차단 등의 추가 조치를 하여야 한다."
      - "용역사업 수행 중 사용하는 PC 및 서버는 인터넷 연결을 금지하되, 연결이 필요한 경우 기관의 통제하에 제한적으로 사용하여야 한다."
    considerations:
      - "파견 근로자가 내부 직원과 동일한 사무실에서 업무하는 경우 내부 직원과 동일한 수준의 보안조치를 적용하여야 하고, 용역사업 시 내부에 상주하는 외부 직원에게 별도의 사무공간과 업무망과 분리된 네트워크를 제공하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제6조(접근통제)"
      public:
        - "국가 정보보안 기본지침 제26조(용역업체 보안), 제27조의2(발주기관내 작업장소 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제18조(IP주소 관리대책), 제60조(외부주문등에 대한 기준)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제45조(정보통신망의 안정성 확보 등)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.6.1 네트워크 접근"
    checklist:
      - "네트워크 구성도(외주용역의 업무망 IP주소 포함)"
      - "네트워크 및 방화벽 등의 접근규칙 설정"
      - "네트워크 보안지침"

  - id: "A-55"
    title: "무선네트워크 사용 시 상급기관장의 보안성 검토를 필하거나 안전한 암호화 알고리즘 및 암호키 설정 등의 적절한 보안조치를 적용"
    domain: "10. 접근통제"
    related_org:
    - "정보보호 부서"
    description:
      - "무선AP(Access Point)를 사용하는 경우 정보통신기기(예: 태블릿PC, 스마트폰 등)를 통해 발생할 수 있는 불법접속 및 무선해킹 등의 위협으로부터 자산을 안전하게 보호하기 위하여 무선네트워크 도입 및 보안관리 지침을 수립하여야 한다."
      - "무선네트워크를 신규로 도입·설치할 경우, 관계 법령 등에 따라 보안성검토 또는 승인 절차를 마련하고 무선 네트워크 구축에 따른 보호대책을 적용하여야 한다."
      - "무선네트워크는 운영 전, 사전에 정의된 네트워크 보안지침에 따라 기술적인 보호조치를 적용하여야 한다. 공공기관은 국가 정보보안 기본지침을 적용하고 금융회사는 전자금융감독규정에 따른 기술적 보호조치를 적용하여야 한다."
    considerations:
      - "무선네트워크를 업무적으로 사용하는 경우 무선 AP 및 네트워크 구간 보안을 위하여 인증, 송수신 데이터 암호화 등 다음의 사항을 고려하여 보호대책을 수립·이행한다."
      - "- 무선네트워크 장비(AP 등) 목록 관리"
      - "- 사용자 인증 및 송수신 시 안전한 암호화 기능 설정(WPA2-Enterprise mode, WPA3-Enterprise mode 등)"
      - "- 무선 AP 접속 단말 인증 방안(MAC 인증 등)"
      - "- SSID 숨김 기능 설정"
      - "- 무선네트워크에 대한 ACL 설정"
      - "- 무선 AP의 관리자 접근 통제(IP제한) 등"
      - "금융회사의 경우 전자금융감독규정에 따라 전산실 내에는 무선네트워크를 설치하는 것을 원칙적으로 금지한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제6조(접근통제)"
      public:
        - "국가 정보보안 기본지침 제43조(무선랜 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제11조(전산실 등에 관한 사항), 제15조(해킹 등 방지대책)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제45조(정보통신망의 안정성 확보 등)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.6.5 무선 네트워크 접근"
    checklist:
      - "무선랜(Wi-Fi 등) 운용 현황(예: 네트워크 구성도, 무선AP 목록 등)"
      - "무선네트워크 보안지침 또는 가이드"
      - "보안성검토 이력"
      - "무선AP에 대한 기술적 보호조치 적용 증적(예: 해당 설정화면 캡쳐)"
      - "무선AP·비인가 무선AP 차단시스템"
      - "(서식 예시 제7호) 무선랜 설치 신청서"
      - "(서식 예시 제8호) 무선랜 설치 확인서"
      - "(서식 예시 제10호) 무선랜 AP 관리대장"
      - "(서식 예시 제11호) 무선랜 AP 사용관리대장"

  - id: "A-56"
    title: "인가된 임직원만이 인가된 단말을 이용하여 무선네트워크를 사용할 수 있도록 사용 신청 및 해지 절차를 수립·이행"
    domain: "10. 접근통제"
    related_org:
    - "정보보호 부서"
    description:
      - "인가된 임직원만이 인가된 단말을 이용하여 무선네트워크를 사용할 수 있도록 사용 신청 및 해지 절차(사용자 및 접속 단말 등록 등)를 수립·이행하여야 한다."
      - "퇴직, 기간 만료 등의 사유로 무선네트워크 사용이 필요 없는 경우 접근권한 해지 절차를 통해 지체없이 접근을 차단하고, 불필요한 권한 여부를 주기적으로 검토하여야 한다."
    considerations:
      - "외부인의 접근이 가능한 공공장소에서는 무선네트워크를 사용할 때 내부 임직원이 사용하는 무선네트워크와 분리하여 제공하여야 한다."
    laws:
