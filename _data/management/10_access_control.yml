      - "인터넷 등 내·외부로부터의 침해위협을 차단하기 위하여 침입차단 및 침입탐지 시스템 등의 네트워크 접근통제 시스템을 도입 및 운영하여야 한다."
      - "업무영역에서 제어시스템의 운영 관련 정보가 필요한 경우, 제어망에서 업무망으로 전송이 가능하도록 일방향 전송장비를 설치하여 운영할 수 있으나, 업무망에서 제어망으로의 접근은 원천적 차단으로 보안을 유지하여야 한다."
