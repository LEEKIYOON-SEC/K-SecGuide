domain: "10. 접근통제"
domain_number: 10
category: "관리적 분야"
items:
  - id: "A-43"
    title: "네트워크 접근통제 유지를 위해 접근권한 통제, 원격접속 관리, 네트워크 분리 등의 내용을 포함한 네트워크 운영 보안 정책을 수립·이행"
    domain: "10. 접근통제"
    related_org:
    - "정보보호 부서"
    description:
      - "조직 내 접근할 수 있는 모든 네트워크 경로를 식별하고 네트워크에 대한 비인가 접근과 같은 위험을 효과적으로 예방하고 대응할 수 있도록 네트워크 운영 보안정책을 수립·이행하여야 한다."
      - "네트워크에 대한 운영보안 지침과 절차는 문서화(접근통제 정책, 원격접근 통제, 네트워크 분리 등의 내용 포함)되고 제·개정에 대한 승인절차와 개정이력 관리가 이루어져야 한다. 또한 해당 지침과 절차에 따른 네트워크 운영 보안이 유지되도록 하여야 한다."
      - "해당 지침과 절차의 내용은 관계 법규에서 요구하는 사항을 반영하도록 하여 법적 준거성을 확보할 수 있도록 하고 법규 개정에 따른 지침 및 절차의 개정도 이루어져야 한다."
    considerations:
      - "네트워크 운영보안이란 접근권한 통제, 원격운영 관리, 네트워크 망분리, 네트워크 장비 도입, 성능 및 용량관리, 장애관리, 무선네트워크 보안, 백업관리, 취약점 점검, 정보전송 정책, 저장매체 관리, 패치관리, 로그관리 및 모니터링 등의 네트워크 운영 전반의 보안을 의미한다."
      - "네트워크 운영보안 지침 또는 절차에 해당하는 각각의 운영업무에 대해 보안업무와 관련된 원칙과 절차를 규정하여야 한다."
      - |
        ※ 네트워크 운영업무 별 고려사항

        | 구분 | 설명 | 고려사항 |
        | --- | --- | --- |
        | 네트워크 접근통제 | 네트워크 시스템에 접근이 허용되는 사용자, 접속 위치, 접근 방법 등을 정의하여 보안정책을 수립·이행하여야 한다. | 사용자 계정 및 접근 권한 신청·승인 절차, 계정 사용 현황에 대한 정기적인 검토, 접속자 IP 주소 제한 등 접속 위치 제한, 관리자 등 특수권한에 대한 인증수단(인증서, OTP 등) 고려, SSH, SFTP 등 안전한 접근 수단 적용, 동일 네트워크 영역 내 서버 간 접속에 대한 접근통제 사항 등 |
        | 원격운영 관리 | 외부 네트워크를 통한 서버, 네트워크 장비, 보안 장비 등 시스템의 원격운영은 원칙적으로 금지하여야 한다. 부득이하게 허용하는 경우에는 다음 사항을 고려하여 정책을 수립·이행하여야 한다. | 시스템의 원격운영에 대한 책임자 승인, 안전한 인증수단(인증서, 생체인증 기술, OTP 등) 적용, 안전한 접속수단(VPN 등) 적용, 문서 암호화제품(DRM 등) 문서 보호대책 적용, 원격운영 현황 모니터링, 주기적으로 원격접속 기록 분석 및 보고, 원격운영 관련 보안 교육 및 훈련, 백신, 보안패치 등 접속 단말 보안 적용 등 |
        | 네트워크 망분리 | 내부망과 인터넷 망을 분리하여 운영하고자 할 경우 망분리에 관한 보안대책을 수립·이행하여야 한다. | 침입차단·탐지시스템 설치 등 비인가자 침입 차단 대책, 네트워크 접근관리시스템 설치 등 비인가자 장비 내부망 접속 차단 대책, 내부망 정보시스템 인터넷 접속 차단 대책, 분리된 망간 자료 전송 체계 구축·운영에 관한 사항 및 전송 기록 보관 사항 등 |
        | 보안 장비·네트워크 장비 보안 | 침입차단·탐지시스템, 스위치, 라우터 등 기반시설 전반에 영향을 미치는 보안·네트워크 장비를 안전하게 운용하기 위한 보호대책을 수립·이행하여야 한다. | 물리적으로 안전한 장소에 장비 설치, 장비 관리자 및 지정 단말기로부터 접속·관리 허용 사항, 최초 설치 시 디폴트 계정 삭제·변경, 관리자 계정 별도로 생성·운영, 불필요한 서비스 포트, 개별 사용자 계정 차단·삭제, 장비 취약점을 정기적으로 점검, 최신 버전 유지 |
        | 무선 네트워크 보안 | 무선 네트워크를 구축·운영할 경우 무선 AP 및 네트워크 구간 보안을 위한 보호대책을 수립·이행하여야 한다. | 무선침입방지시스템 설치 등 침입 차단 대책, 무선 네트워크 구성요소 별 분실·탈취·훼손·오용 등에 대비한 관리적·물리적 보안대책, 허용되지 않은 시스템이 해당 무선 네트워크 접속 방지 위한 기술적 보안대책, 무선AP의 관리자 접근 통제, SSID 숨김 기능 설정, IEEE 802.1X, AAA 등 상호인증 위한 인증제품 사용 등 |
    laws:
      common:
        - "정보통신기반보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제6조(접근통제)"
      public:
        - "국가 정보보안 기본지침 제40조(내부망·인터넷망 분리), 제59조(원격근무 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제15조(해킹 등 방지대책), 제18조(IP주소 관리대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.6. 접근통제"
    checklist:
      - "네트워크 구성도"
      - "네트워크 운영 보안 지침 또는 절차"
      - "네트워크 운영 보안 지침 또는 절차 제·개정 승인 이력"

  - id: "A-44"
    title: "시스템의 목적 및 민감도 등에 따라 네트워크를 분리 운영하고 각 영역 간 접근통제를 적용"
    domain: "10. 접근통제"
    related_org:
    - "정보보호 부서"
    description:
      - "시스템의 목적, 자산의 중요도 및 민감도, 법적 요구사항 등에 따라 네트워크 영역을 물리적·논리적으로 분리(DMZ, 서버팜, DB존, 개발존 등)하여 운영하고 각 영역 간 접근통제를 적용하여야 한다."
    considerations:
      - "접근통제 정책에 따라 분리된 네트워크 영역 간에는 방화벽, 네트워크 장비의 ACL 등을 활용하여 네트워크 영역 간 업무수행에 필요한 서비스의 접근만 허용하도록 통제하여야 한다."
      - "기반시설 내 중요시스템을 불가피하게 다른 정보통신망과 연결하여야 하는 경우 외부로부터 침입 및 악성코드 감염을 방지하기 위해 인터넷과 분리하는 방안을 강구하고 불가피한 사유로 인터넷 연결이 필요한 경우 보안성검토 등을 통해 보안성을 확보하여야 한다."
      - "네트워크 대역별 IP주소 부여 기준을 수립하고 주요 시스템이 외부와 연결이 필요없는 경우 사설 IP를 사용하여 외부 접근을 차단하며 IP주소 할당 현황을 최신으로 유지하여야 한다. 이에 대한 사항은 유출되지 않도록 대외비 이상으로 안전하게 관리하여야 한다."
      - "내부망에서의 주소 체계는 사설 IP주소 체계를 사용하고 NAT(Network Address Translation)를 사용하여 내부 주소 체계가 노출되지 않도록 관리한다. 사설 IP주소는 국제표준에 따른 대역을 사용한다."
      - |
        ※ 사설 IP 주소 대역

        | 구분 | 대역 |
        | --- | --- |
        | A class | 10.0.0.1 ~ 10.255.255.255 |
        | B class | 172.16.0.1 ~ 172.31.255.255 |
        | C class | 192.168.0.1 ~ 192.168.255.255 |
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제6조(접근통제)"
      public:
        - "국가 정보보안 기본지침 제40조(내부망·인터넷망 분리)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제18조(IP주소 관리대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.6.1 네트워크 접근"
    checklist:
      - "네트워크 구성도(IP주소 포함)"
      - "IP주소 관리대장"
      - "네트워크 및 방화벽 등의 접근규칙 설정"

  - id: "A-45"
    title: "접근통제 규칙은 관리자의 승인을 거쳐서 설정 또는 변경"
    domain: "10. 접근통제"
    related_org:
    - "정보보호 부서"
    description:
      - "주요 네트워크 장비에 대한 ACL 및 방화벽의 정책(Rule) 변경이 요구될 경우 내부 승인절차에 따라 정책변경이 이루어져야 한다."
      - "특히 방화벽 등의 주요 보안 장비에 대한 정책 변경이 이루어지는 경우는 내·외부 서비스에 대한 영향 및 보안성을 검토하고 방화벽을 운용하는 부서장 등의 승인을 거쳐 변경이 이루어지도록 하여야 한다."
    considerations:
      - "방화벽 이외에도 접근통제 규칙(예: ACL 또는 Rule)을 적용하는 시스템(서버, 네트워크시스템, 보안시스템 등)이 있다면 점검대상에 포함하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제6조(접근통제)"
      public:
        - "국가 정보보안 기본지침 제40조(내부망·인터넷망 분리), 제42조(보안‧네트워크장비 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제15조(해킹 등 방지대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.9.1 변경관리"
    checklist:
      - "네트워크 장비 ACL 변경이력 및 승인 절차"
      - "방화벽 접근규칙(Rule) 변경이력 및 승인절차"
      - "(서식 예시 제38호) 침입차단시스템 서비스포트 허용/차단 요청서"

  - id: "A-46"
    title: "접근통제 정책의 적합성 여부에 대해 주기적 검토"
    domain: "10. 접근통제"
    related_org:
    - "정보보호 부서"
    description:
      - "접근통제 정책을 주기적으로 검토하여 비인가자에 대한 접근통제 정책이 적합한지 확인하여야 한다."
      - "네트워크 장비, 보안 장비에 적용된 접근규칙(Rule)의 적절성을 주기적으로 검토하여 불필요한 접근규칙을 제거하는 등의 조치가 이루어져야 한다."
      - "접근통제 정책에 대한 검토 기준은 내부 기본 접근통제 정책을 토대로 자체적인 검토 기준을 수립하여 시행할 수 있으며, 검토 주기는 검토 대상과 범위에 따라 다를 수 있으나 최소 반기 또는 연간 단위로 정하는 것이 좋다."
      - "이 경우 주요 보안 장비(예: 방화벽)에 대하여 불필요한 관리접근 계정 및 권한 여부를 확인하고 개선하기 위해 관리접근 계정 및 권한의 타당성 검토도 함께 이루어지도록 하여야 한다."
    considerations:
      - "본 점검항목은 접근계정에 대한 권한 검토보다는 네트워크 등의 접근통제 정책에 대한 점검을 요구하는 항목이다. 따라서 다음의 접근통제 규칙(보안 장비 자체의 접근권한 포함) 검토 기준을 참고하여 자체 환경에 적합한 검토 기준을 수립하도록 한다."
      - "- 불필요한 네트워크 접근통제 규칙"
      - "- 기간이 만료된 방화벽 접근통제 규칙"
      - "- 타 정책과 중복되거나 일부 겹치는 네트워크 및 방화벽 접근통제 규칙"
      - "- 기간이 만료된 IP 차단 정책(1년 이상 된 악성코드 경유지 IP 등)"
      - "- 보안 장비 사용자 및 관리자의 불필요한 ID 존재 여부"
