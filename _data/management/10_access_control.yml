  - id: "A-57"
    title: "무선네트워크 무단 사용 여부, 비인가 무선 중계기(AP) 설치 여부, 우회 정보통신망 사용 차단 여부 등을 주기적으로 점검"
    domain: "10. 접근통제"
    related_org:
    - "정보보호 부서"
    description:
      - "무선네트워크를 운영할 경우, 사전 정의된 네트워크 보안지침을 위반하는 사례가 발생할 수 있으므로 무선네트워크 AP에 공식적으로 등록되지 않은 이용자나 사용기간이 만료된 이용자가 있는지 등을 주기적으로 점검하여야 한다."
      - "무선네트워크 AP의 설치 허가를 받지 않고 운영하는 비인가 AP가 있는지 주기적으로 점검하여야 한다. 전문적인 장비가 없어도 노트북의 무선네트워크 카드에 감지되는 AP의 신호 등을 기반으로 인접 공간에 설치된 비인가 AP를 탐색 하여야 한다."
      - "업무PC를 통해 근거리에 위치한 타 건물, 사무실 등에 설치된 AP를 연결할 경우 기관 내부 네트워크를 우회하거나 악성코드 감염 등의 위협이 발생할 수 있으므로, 이를 방지하기 위한 보호대책(예: 업무PC의 무선네트워크 장치 동작 해제)을 고려하여야 한다."
    considerations:
      - "조직 내 허가받지 않은 무선 AP를 탐지하고 차단하기 위해 WIPS(무선침입방지시스템)를 설치·운영할 수 있다. WIPS는 비인가 노드의 무선 네트워크 접근을 차단하는 시스템으로 네트워크 보안을 강화하고 무단 접근 및 잠재적 위협으로부터 자산을 보호하는 기능을 수행한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제6조(접근통제)"
      public:
