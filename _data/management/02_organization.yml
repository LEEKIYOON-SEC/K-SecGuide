domain: "2. 정보보호 조직"
domain_number: 2
category: "관리적 분야"
items:
  - id: "A-8"
    title: "정보보호 활동을 계획, 실행, 검토하는 전담 조직 및 담당자 구성"
    domain: "2. 정보보호 조직"
    related_org:
    - "정보보호 부서"
    description:
      - "정보통신기반 보호법에 따라 주요정보통신기반시설 관리기관은 해당 주요정보통신기반시설의 보호를 총괄하는 정보보호책임자를 지정하여야 한다."
      - "정보보호책임자는 공공분야의 경우 4급·4급 상당 공무원, 5급, 5급 상당 공무원, 국방분야의 경우 영관급 장교, 민간분야의 경우 임원급 관리·운영자 등 주요정보통신기반시설 보호 활동을 효과적으로 추진하기 위해 이를 총괄하여 최종 의사결정을 할 수 있는 관리책임자로 지정한다."
      - "정보보호책임자는 주요정보통신기반시설 보호대책의 수립·시행, 기술적 지원의 요청, 취약점 분석·평가 및 전담반 구성, 주요정보통신기반시설 보호지침 준수 명령의 이행, 침해사고의 통지, 주요정보통신기반시설의 복구 및 보호에 필요한 조치 등 법령에 명시된 업무와 주요정보통신기반시설 보호 업무 전반을 총괄한다."
      - "금융회사 및 정보통신서비스제공자의 경우 전자금융거래법, 정보통신망법 상의 정보보호 최고책임자 지정요건에 따라 정보보호책임자를 지정할 수 있다."
      - "정보보호책임자의 역할 지원 및 조직의 정보보호 활동을 효율적이고 체계적으로 이행하기 위해 정보보호 전문지식을 보유한 적정인력을 확보하여 정보보호 전담조직을 구성·운영하여야 한다."
      - "정보보호 전담조직의 규모는 법적 요건이 존재하는 경우 해당 법적 기준에 따라야 하며 명확한 규정이 존재하지 않을 경우 전사 조직의 규모, 업무 등을 고려하여 구성하여야 한다."
    considerations:
      - "정보보호 전담조직은 정보보호 분야에 대한 이해도가 높거나 다양한 경험으로 전문성을 갖춘 인력으로 구성하여 운영하여야 한다."
      - "정보보호 전담조직의 보안 업무는 타업무와 직무분리 등을 통해 독립성을 보장하여야 한다."
      - "공공기관 정보보호 전담인력은 정보화 인력 대비 10% 이상 운영할 수 있도록 노력하여야 한다."
      - "정보보호책임자와 정보보호 전담조직 및 담당자는 공식화되어야 하므로 인사발령 등의 절차를 통해 공식적으로 지정되어야 하고, 전체 조직도 상에서 정보보호 실무를 담당할 부서를 식별하여야 한다."
      - "공공분야의 경우 정보보호책임자를 정보보안담당관으로 지정하여 겸임할 수 있다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "정보통신기반 보호법 시행령 제9조(정보보호책임자의 지정 등)"
        - "개인정보 보호법 제29조(안전조치의무), 제31조(개인정보 보호책임자의 지정 등)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제5조(정보보안담당관 운영)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융거래법 제21조의2(정보보호최고책임자 지정)"
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제45조의3(정보보호 최고책임자의 지정 등)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 1.1.2 최고책임자의 지정, 1.1.3 조직 구성"
    checklist:
      - "정보보호 조직 구성도"
      - "정보보호책임자 지정 문서(예: 임명장, 승인문서)"
      - "정보보호 전담조직(정보보호 담당자 포함) 지정 문건(예: 인사발령, 조직도)"
      - "정보보호 직무기술서"
      - "(서식 예시 제24호) 직무기술서"

  - id: "A-9"
    title: "정보보호위원회가 구성되어 있으며 위원회의 역할 및 책임을 문서화"
    domain: "2. 정보보호 조직"
    related_org:
    - "정보보호 부서"
    description:
      - "전사 조직의 이해관계를 대변하고 의사결정을 할 수 있도록 실질적인 의사결정 권한이 있는 임직원(예: 경영진, 임원, 정보보호책임자 및 개인정보 보호책임자 등)으로 정보보호위원회를 구성하여야 한다."
      - "정보보호위원회는 조직 전반에 걸친 주요 사안에 대한 검토, 승인 및 의사결정을 수행하는 조직으로 정보보호와 관련된 중요한 결정에 대한 공정성의 확보, 의견 조정 및 다양한 의사의 종합⋅협의⋅조정 등을 위해 설치하여야 한다."
      - "정보보호위원회를 체계적으로 운영하기 위하여 해당 위원회의 정의, 대상, 구성, 역할 및 운영에 관한 절차 등을 명문화하여야 한다."
    considerations:
      - "정보보호위원회(공공기관인 경우, 보안심사위원회와 동일)는 해당 명칭의 위원회가 존재하거나 다른 명칭(예: 경영회의)의 의사결정 모임을 정보보호위원회 형태로 운영할 수 있다."
      - "정보보호위원회의 명칭은 다양하게 표현될 수 있으므로, 단순히 명칭에 의해 파악하기보다는 위원회의 행정작용, 소관 사무, 행정조직 내 지위 등을 고려하여 그 성격과 기능을 파악하여야 한다. 즉, 정보보호위원회와 다른 명칭이더라도 정보보호에 관한 심의 의결하는 형태로 운영하여야 한다."
      - "금융회사 또는 전자금융업자는 전자금융거래법 등 관계 법규에서 정하는 정보보호위원회 구성, 심의·의결 사안, 보고 절차 등의 내용이 포함된 정보보호위원회 운영 규정이 있어야 하며, 관계 법규 및 해당 규정에 따라 위원회를 운영하여야 한다."
      - "위원회를 통해 심의(의사결정)가 이루어져야 하는 안건을 명확히 규정하되, 위원회 운영이 필요한 사안이 불시에 발생하는 경우에도 운영 지침에 따른 위원회 운영과 의사결정이 이루어져야 한다."
      - "정보보호위원회가 보다 효과적으로 운영될 수 있도록 정보보호 및 개인정보보호 담당자, 부서별 담당자로 구성된 실무협의체를 구성하여 운영하는 것을 고려할 수 있다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설의보호대책 수립 등)"
      public:
        - "국가 정보보안 기본지침 제7조(정보보안내규)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제8조의2(정보보호위원회 운영)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 1.1.3 조직 구성"
    checklist:
      - "정보보호위원회 운영 규정(예: 지침, 절차)"
      - "정보보호위원회 운영 규정에 따른 의사결정 이력(예: 회의록 등)"
      - "(서식 제22호) 정보보호위원회 회의록"
      - "(서식 제23호) 정보보호위원회 의견서"
