domain: "13. 사고대응"
domain_number: 13
category: "관리적 분야"
items:
  - id: "A-104"
    title: "침해사고 및 개인정보 유출사고를 예방하고 사고 발생 시 신속하고 효과적으로 대응하기 위한 체계와 절차 수립"
    domain: "13. 사고대응"
    related_org:
    - "정보보호 부서"
    description:
      - "침해사고 및 개인정보 유출 등을 예방하고 사고 발생 시 신속하고 효과적으로 대응할 수 있도록 내·외부 침해시도의 탐지·대응·분석 및 공유를 위한 체계와 절차를 수립하고, 관련 외부기관 및 전문가들과 협조체계를 구축하여야 한다."
      - "침해사고 대응을 위한 조직 구성, 역할, 업무절차 등을 포함하여 정보보호책임자(정보보안담당관)의 공식적인 승인을 통한 침해사고 대응 계획을 문서화하여야 한다."
      - "침해사고의 예방활동은 물론 침해사고의 위기단계에 따른 실무 대응과 사후처리를 수행하는 업무, 인원이 포함되도록 명문화하여야 하며, 전담 인력 및 조직 구성이 어려울 경우 유관 부서(예: 서버운영, 네트워크운영, 개발 등)와 협력하는 형태의 비상설 조직도 가능하다."
    considerations:
      - |
        침해사고 대응을 위한 조직(CERT; Computer Emergency Response Team)를 구성할 시 인프라, 예산, 조직 규모 등에 따라 주요 역할은 다음과 같이 정의할 수 있다.

        | 역할 구분 | 역할 정의 |
        | --- | --- |
        | 모니터링 | 모니터링 대상 주요 서비스와 관련된 URL과 포트(Port)를 점검 |
        | 탐지 | 서비스와 관련되어 있는 모니터링 이벤트 및 사고 이벤트에 대하여 점검 |
        | 분석 | 서버를 점검하고 관련된 로그(Log)를 분석 |
        | 대응 | 보안 장비 점검 및 취약점 분석 등을 통하여 보안 문제점에 대한 해결방법을 수립 |
        | 사후처리 | 보안교육 프로그램을 수립하여 중장기적인 침해사고대응 능력을 강화시키고 사후지원이 요구되는 업무를 정의하여 이를 지원 |
      - |
        침해사고 대응절차는 사고전 준비, 사고탐지, 초기대응, 대응 전략 체계화, 데이터 수집, 데이터분석, 보고서 작성 등의 단계로 수립할 수 있다.

        | 구분 | 내용 |
        | --- | --- |
        | 1단계: 사고 전 준비 | 사고가 발생하기 전 침해사고 대응팀과 조직적인 대응을 준비 |
        | 2단계: 사고 탐지 | 정보보호 및 네트워크 장비에 의한 이상 징후 탐지. 관리자에 의한 침해 사고의 식별 |
        | 3단계: 초기 대응 | 초기 조사 수행, 사고 정황에 대한 기본적인 세부사항 기록, 사고대응팀 신고 및 소집, 침해사고 관련 부서에 통지 |
        | 4단계: 대응 전략 체계화 | 최적의 전략을 결정하고 관리자 승인을 획득, 초기 조사 결과를 참고하여 소송이 필요한 사항인지를 결정하여 사고 조사 과정에 수사기관 공조 여부를 판단 |
        | 5단계: 데이터 수집 | 데이터 분석에 필요한 로그, 파일, 증거 데이터 확보 및 무결성 유지 |
        | 6단계: 데이터 분석 | 의사 결정자가 쉽게 이해할 수 있는 형태로 사고에 대한 정확한 보고서를 작성 |
        | 7단계: 보고서 작성 | 차기 유사 공격을 식별 및 예방하기 위한 보안 정책의 수립, 절차 변경, 사건의 기록, 장기 보안 정책 수립, 기술 수정 계획수립 등을 결정 |
    laws:
      common:
        - "정보통신기반 보호법 제4장(주요정보통신기반시설의 보호 및 침해사고의 대응)"
        - "개인정보 보호법 제29조(안전조치의무), 제34조(개인정보 유출 등의 통지·신고)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립‧시행 및 점검)"
      public: []
      finance:
        - "전자금융거래법 제21조의5(침해사고의 통지 등)"
        - "전자금융감독규정 제37조의6(침해사고대응기관 지정 및 업무범위 등)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제48조의4(침해사고 원인분석 등)"
        - "정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.11.1 사고 예방 및 대응체계 구축"
    checklist:
      - "침해사고 대응 지침·절차·매뉴얼"
      - "침해사고 대응 조직도 및 비상연락망"
      - "침해사고 대응 관련 문서 최고책임자 승인 이력"
      - "보안관제 시스템"

  - id: "A-105"
    title: "침해사고 발생 시 신속한 보안사고 보고를 위한 절차를 문서화하고 있고 이에 따라 신속한 보고 수행"
    domain: "13. 사고대응"
    related_org:
    - "정보보호 부서"
    description:
      - "불법침입, 해킹 프로그램·웜·바이러스 유포 등과 같은 사이버 공격 발생 시 신속한 대응과 피해 확산 방지를 위해 표준화된 침해사고 대응 절차를 마련하고 이를 주기적으로 점검하여 정보시스템 및 정보통신망의 안전한 운영을 유지하여야 한다."
      - "침해사고 대응 업무절차는 신고‧접수, 대응, 복구, 보고 등 4단계의 세분화된 절차로 구분하여 정의한다. 신고‧접수 단계에서는 침해사고의 유형과 심각도를 분류하고, 침해사고의 심각 정도에 따른 대응, 복구, 보고가 이루어지도록 체계를 수립하여야 한다."
    considerations:
      - "기반시설은 정보통신기반 보호법에 따라 침해사실을 인지한 때에 관계 행정기관, 수사기관 또는 한국인터넷진흥원(이하 \"관계기관등\"이라 한다)에 24시간 이내에 침해사고 발생일시 및 시설, 침해사고로 인한 피해 내역, 기타 신속한 대응·복구를 위하여 필요한 사항을 통지하여야 한다."
      - "개인정보가 유출된 경우에는 72시간 이내에 홈페이지 및 서면 등의 방법으로 해당 정보주체에게 통지를 하여야 하고, 신고 요건에 해당될 경우 72시간 이내에 개인정보보호위원회 또는 한국인터넷진흥원 등에 신고하여야 한다."
      - |
        근거 법률: 개인정보 보호법 제34조(개인정보 유출 등의 통지·신고), 신용정보법 제39조의4(개인신용정보 누설통지 등)

        법률간의 관계

        | 구분 | 일반법 | 특별법 |
        | --- | --- | --- |
        | 적용 대상 | 개인정보처리자 | 신용정보회사등에서의 상거래기업 및 법인에 한정 ※ 그 외 신용정보회사등은 금융위원회 신고 |
        | 적용 범위 | 개인정보 유출 등 | 개인신용정보 누설 |
        | 의무 사항 | 통지 및 신고 | 통지 및 신고 |
        | 벌칙 규정 | 3천만원 이하의 과태료 | 3천만원 이하의 과태료 |

        유출통지

        | 항목 | 내용 |
        | --- | --- |
        | 규모 | 1명 이상 |
        | 시점 | 72시간 이내 |
        | 방법 | 홈페이지, 서면 등의 방법으로 개별 통지 |
        | 항목 | 유출 등이 된 개인정보 항목, 유출 등이 된 시점과 그 경위, 유출 등으로 인하여 발생할 수 있는 피해를 최소화하기 위하여 정보주체가 할 수 있는 방법 등에 관한 정보, 개인정보처리자 대응조치 및 피해 구제절차, 피해 신고·상담 부서 및 연락처 등 |

        유출신고

        | 항목 | 내용 |
        | --- | --- |
        | 규모 | 1. 1천명 이상 정보주체의 개인정보 유출 등 2. 민감정보, 고유식별정보 유출 등 3. 외부로부터의 불법적인 접근에 의해 개인정보가 유출 등 (1만명 이상) |
        | 시점 | 72시간 이내 |
        | 기관 | 개인정보보호위원회 또는 한국인터넷진흥원(KISA) |
    laws:
      common:
        - "정보통신기반 보호법 제13조(침해사고의 통지)"
        - "개인정보 보호법 제29조(안전조치의무), 제34조(개인정보 유출 등의 통지ㆍ신고)"
        - "개인정보 보호법 시행령 제39조(개인정보 유출 등의 통지)"
      public: []
      finance:
        - "신용정보법 제39조의4(개인신용정보 누설통지 등)"
        - "전자금융거래법 제21조의5(침해사고의 통지 등)"
        - "전자금융감독규정 제37조의4(침해사고대응기관 지정 및 업무법위 등)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제48조의3(침해사고의 신고 등)"
        - "정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.11.1 사고 예방 및 대응체계 구축"
    checklist:
      - "침해사고 대응 업무절차서"
      - "침해사고 대응을 위한 비상연락망"
      - "침해사고 발생 신고·접수·대응·분석·보고 등의 결과문서"
      - "(참고 자료 제18호) 정보통신 침해사고 신고서"
      - "(참고 자료 제19호) 정보통신 침해사고 결과서"

  - id: "A-106"
    title: "침해사고 시 외부기관 및 전문가들과의 대응협조체계 구축"
    domain: "13. 사고대응"
    related_org:
    - "정보보호 부서"
    description:
      - "침해사고 발생 시 관계 기관 및 외부 전문가(예: 보안컨설팅, 보안관제 등)들과의 협조체계를 통해 정확하고 정밀한 사고분석 및 대응이 이루어질 수 있도록 하여야 한다."
      - "소관 중앙행정기관, 국가정보원, 한국인터넷진흥원 등의 관계 기관과 보안관제, 보안 제품 공급 업체 등 외부 보안업체와의 비상 연락망을 구축하고, 연 1회 이상 정기적으로 업데이트하여 항상 최신 상태를 유지하여 기관, 담당, 연락처 등의 오류가 발생하지 않도록 하여야 한다."
    considerations:
      - "비상연락망에는 주요 정보통신기반시설을 관할하는 행정기관의 관련 부서, 담당자, 연락처뿐만 아니라 보안관제, 보안 장비 유지보수 등을 담당하는 계약업체의 명칭, 담당자, 연락처를 상세히 기재하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제15조(대책본부의 구성등), 제16조(정보공유·분석센터)"
        - "개인정보 보호법 제29조(안전조치의무), 제34조(개인정보 유출 등의 통지ㆍ신고)"
      public: []
      finance:
        - "신용정보의 이용 및 보호에 관한 법률 제45조(감독·검사 등)"
        - "전자금융거래법 제21조의6(침해사고의 대응)"
        - "전자금융감독규정 제37조의6(침해사고대응기관 지정 및 업무범위 등)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제52조(한국인터넷진흥원)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.11.1 사고 예방 및 대응체계 구축"
    checklist:
      - "보안사고 발생 시 비상연락망"
      - "비상연락망의 갱신 이력"
      - "보안관제서비스 계약서(SLA 등)"
      - "보안관제 시스템"

  - id: "A-107"
    title: "사이버위기 ‘주의’ 이상 경보 발령 및 피해발생 등 필요 시 대응할 수 있는 ‘긴급대응반’을 구성"
    domain: "13. 사고대응"
    related_org:
    - "정보보호 부서"
    description:
      - "기반시설은 국가 사이버 비상경보 체계에 따른 대응과 기술적 조치를 수행하여야 한다."
      - |
        국가 사이버 비상경보 체계는 다음과 같이 분류되며 이 중 ‘주의’ 이상의 경보가 발령되면 자체적인 긴급대응반을 구성하고 필요시에 즉시 소집되어 대응과 기술적 조치 업무를 수행할 수 있도록 하여야 한다.

        | 경보 단계 | 정의 |
        | --- | --- |
        | 정상 단계 | - 전 분야 정상적인 활동 - 위험도 낮은 웜·바이러스 발생 - 위험도 낮은 해킹기법·보안취약점 발표 |
        | 관심 단계 | - 웜ㆍ바이러스, 해킹기법 등에 의한 피해 발생 가능성 증가 - 다수기관의 정보유출 등 침해사고 확산 가능성 증가 - 국내외 정치ㆍ군사적 위기발생 등 사이버 안보 위해 가능성 증가 - 상기 유형과 유사한 수준의 사이버 위기 |
        | 주의 단계 | - 다수기관의 정보통신망 및 정보시스템 장애 발생 - 다수기관의 정보유출 등 침해사고 확산 가능성 증가 - 국내외 정치ㆍ군사적 위기발생 등 사이버 안보 위해 가능성 고조 - 상기 유형과 유사한 수준의 사이버 위기 |
        | 경계 단계 | - 복수 ISP망 또는 기간망에 피해 발생 - 대규모 피해 확산 가능성 증대 - 정보유출 등 대규모 침해사고 발생 - 복수분야에서 광범위한 피해가 발생하는 등 대규모 피해로 확대될 가능성이 높아 다수기관의 공조 대응이 필요한 경우 - 상기 유형과 유사한 수준의 사이버 위기 |
        | 심각 단계 | - 전국적인 네트워크 및 정보시스템 사용 불가능 - 주요 핵심기반시설의 피해로 국민혼란 발생 - 정보유출 등 대규모 침해사고가 전국적으로 발생 - 국가적 차원의 평가와 조치가 필요하다고 판단되는 사고 발생 |
    considerations:
