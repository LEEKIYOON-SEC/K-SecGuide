      - "보안사고 발생 시 유사한 사고의 재발을 방지하기 위해 철저한 원인 분석을 바탕으로 효과적인 대책을 수립하고 이를 실행하여야 한다."
      - "실제 보안사고가 발생하여 기록, 보고 및 복구조치까지 이루어진 경우 해당 사고에 대한 재발 방지 대책의 수립뿐만 아니라, 실제 실행 여부를 철저히 점검하여 유사 사고를 예방하여야 한다."
    considerations:
      - "정보시스템에 기술적 요인으로 사고가 발생한 경우 그 경위에 대해 분석하여 개선 사항을 마련하고 재발 방지 대책을 수립하여야 한다. 인적요인(Human Error)으로 발생한 경우 고의성, 타당성 등 사유에 대한 명확한 경계를 나누어 상·벌 규정 등을 수립하고 교육 및 징계 등의 재발 방지 대책을 마련하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제11조(보호조치 명령 등), 제14조(복구조치)"
        - "개인정보 보호법 제29조(안전조치의무)"
      public: []
      finance:
        - "전자금융거래법 제21조의3(전자금융기반시설의 취약점 분석·평가)"
        - "전자금융감독규정 제23조(비상대책 등의 수립·운용)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제47조의4(이용자 정보보호), 제48조의4(침해사고의 원인 분석 등)"
        - "정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.11.5 사고대응 및 복구"
    checklist:
      - "보안사고 대응 및 복구에 관한 규정 또는 지침"
      - "보안사고 재발 방지 대책 및 그 이행 여부"
      - "보안관제 시스템"

