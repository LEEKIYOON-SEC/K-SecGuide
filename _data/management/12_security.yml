  - id: "A-97"
    title: "’사이버보안진단의 날’ 등과 같이 월별 보안 중점점검사항에 대해 매월 보안점검 및 조치활동 수행"
    domain: "12. 보안관리"
    related_org:
    - "정보보호 부서"
    description:
      - "매월 PC 보안점검과 같은 보안점검이 전사적으로 이루어질 수 있도록 월별 보안 중점 점검사항을 정하고 이를 모든 조직이 참여할 수 있도록 정례화(예: 사이버보안진단의 날)하여야 한다."
      - "전사적인 정보보안 강화를 위해 클린데스크, PC 보안점검, 불필요한 정보 파기 등의 이행을 의무화하고, 이를 효과적으로 관리하기 위한 점검 체계를 구축하여야 한다."
      - "공공기관의 경우 각급기관의 장은 해당 기관의 실정에 맞게 매월 세 번째 수요일 ‘사이버 보안진단의 날’에 소속 부서의 정보통신망과 정보시스템의 보안취약 여부 확인 등 보안진단을 실시하여야 한다. 다만, 부득이한 사유로 해당 일에 시행하지 못할 경우 같은 달 다른 날에 시행할 수 있다."
    considerations:
