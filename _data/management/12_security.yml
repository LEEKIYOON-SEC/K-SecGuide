  - id: "A-98"
    title: "네트워크, 메신저 등으로부터의 허가되지 않았거나 불분명한 파일의 다운로드를 금지하고, 부득이하게 다운로드 받을 경우 바이러스 검사 수행"
    domain: "12. 보안관리"
    related_org:
