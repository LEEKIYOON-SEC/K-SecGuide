    description:
      - "악성프로그램 감염 예방을 위해 공식적으로 지정된 전자우편 및 메신저 이외에는 사용할 수 없도록 하여야 한다. 인가된 전자우편 및 메신저를 통해 파일을 다운로드할 경우, 백신 등 보안프로그램을 통해 바이러스 검사가 자동으로 이루어지도록 하여야 한다."
      - "인터넷망의 효율적인 운영관리 및 악성프로그램 유입 차단을 위하여 업무와 관련없는 웹서비스를 이용하지 못하도록 수시로 점검하고 침입차단시스템 등을 활용하여 음란, 도박, P2P 등을 차단하여야 한다."
