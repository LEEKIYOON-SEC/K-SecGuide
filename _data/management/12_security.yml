domain: "12. 보안관리"
domain_number: 12
category: "관리적 분야"
items:
  - id: "A-86"
    title: "침입차단 및 탐지 도구는 조직의 보안 정책과 규칙에 적합하게 설치하여 운영"
    domain: "12. 보안관리"
    related_org:
    - "정보보호 부서"
    - "시스템 운영 부서"
    description:
      - "침입차단 및 탐지를 위한 보안 장비에 설정하는 접근규칙은 조직의 보안 정책과 규칙에 따라 정의하고 운영하여야 한다."
      - "보안 장비는 기본 정책으로 Inbound 및 Outbound 트래픽에 대해 모든 서비스를 차단하되, 보안성 검토(승인 절차 등)를 통해 승인된 IP 및 포트에 대해서만 허용이 이루어지도록 정책을 적용하여야 한다."
      - "외부에서 방화벽을 우회하여 내부망으로 직접 연결되는 경로(예: NAT구성을 통한 리다이렉트 설정)는 존재하지 않도록 하여야 한다."
    considerations:
      - "방화벽(Firewall) 및 IDS, IPS 등 보안시스템의 취약점 점검은 연 1회 이상 실시하여야 하며, 보안시스템에 설정된 정책(Rule)의 타당성은 주기적으로 검토하여 장기 미사용 정책, 중복된 정책, 사용기간 만료 정책 등을 수정하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제6조(접근통제)"
      public:
        - "국가 정보보안 기본지침 제42조(보안ㆍ네트워크 장비 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제15조(해킹 등 방지대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.6.1 네트워크 접근, 2.10.1 보안시스템 운영"
    checklist:
      - "방화벽 등 보안 장비의 기본 접근규칙(Rule)"
      - "취약점 점검 결과서"

  - id: "A-87"
    title: "외부자와 정보 공유, 네트워크 공유 등에 따른 보안위협에 대한 대책 운영"
    domain: "12. 보안관리"
    related_org:
    - "정보보호 부서"
    - "해당 사업 부서"
    description:
      - "타 기업 및 기관이 정보 공유 및 네트워크 공유 연계되는 시스템을 사용하는 경우 인증, 일방향 전송, 전송 구간 암호화, 연계구간 접근통제, 보안성 검토 등의 기술적‧관리적 보호대책을 마련하고 운영하여야 한다."
      - "기술적 보호조치 등을 포함하는 정보전송 협약을 체결하여 양 당사자의 역할과 책임을 명문화한다."
    considerations:
      - "개인정보를 외부에 제공하는 경우에는 정보전송을 협약하고 기술적인 보호조치를 강구하기 전에 제3자에게 개인정보의 제공(전송)이 법률상 가능한지 확인 후 그 여부를 결정하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제12조(보안대책 수립)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제15조(해킹 등 방지대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.10.5 정보전송 보안"
    checklist:
      - "외부 연계시스템 구성도 및 기술적 보호조치 대책"
      - "외부 연계 기관 등과 체결한 정보전송 협약서"
      - "연계시스템 또는 서비스"
      - "용역업체 인수인계대상"

  - id: "A-88"
    title: "정보통신망에 비인가 PC, 노트북 등을 연결 시 차단 및 차단 이력 주기적 검토"
    domain: "12. 보안관리"
    related_org:
    - "정보보호 부서"
    description:
      - "정보통신망에 허가되지 않은 PC, 노트북 등이 연결될 경우, 악성코드 감염이나 정보 유출 등의 침해가 발생할 수 있으므로, 네트워크 접근제어(NAC) 장비 등을 활용하여 비인가 장치의 연결을 차단하고 차단 이력을 주기적으로 검토하여야 한다."
    considerations:
      - "비인가 단말기가 중요 시설에 무단 반입되어 내부망에 임의 연결되지 않도록 단말기 반입·반출 통제(장비 식별 포함)를 고려한 네트워크 연결 승인절차를 수립하여야 한다."
      - "정보통신망에 대한 비인가 단말기의 연결 여부, 예외 정책, 네트워크 연결 승인 및 차단 현황 등 네트워크 접근제어 시스템의 정책 및 차단 이력을 주기적으로 검토하고 필요시 사후조치를 수행한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제6조(접근통제)"
      public:
        - "국가 정보보안 기본지침 제79조(비인가 기기 통제)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제12조(단말기 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.10.6 업무용 단말기기 보안"
    checklist:
      - "비인가 PC, 노트북 등의 단말기 통제 지침(또는 절차)"
      - "단말기 반출입 및 네트워크 연결 승인 문건"
      - "네트워크 접근제어시스템"
      - "(서식 예시 제6호) 단말기 사용 신청서"

  - id: "A-89"
    title: "이동형 장치(노트북, 태블릿, 보조저장매체 등)의 사용 및 반출입에 대한 통제절차 수립‧이행"
    domain: "12. 보안관리"
    related_org:
    - "정보보호 부서"
    description:
      - "이동형 장치(노트북, 태블릿, 보조저장매체 등)를 사용하거나 반입‧반출하는 경우, 정보유출, 악성코드 감염 등 보안사고 예방을 위한 통제 절차를 수립·이행하여야 한다."
      - "모든 이동형 장치는 관리번호를 부여하여 자산관리 시스템에 등록하고, 보호구역으로 지정된 곳에 보관하여야 한다."
      - "또한, 사전 승인을 받은 자만 이동형 장치를 사용할 수 있도록 하고 반출 시에는 반출 요청서를 작성하여 담당자에게 보고한다. 보안 담당자는 반출 요청을 검토하고, 불필요한 데이터를 삭제한 후 반출 등의 이동형 장치 반출‧입 절차를 마련하여야 한다."
    considerations:
      - "보안 담당자는 이동형 장치별로 구분 및 관리하고 수량과 보관 상태를 정기적으로 점검하여야 한다."
      - "공공기관은 국가 정보보안 기본지침에 따라 「USB메모리 등 휴대용 저장매체의 보안관리지침」을 준수하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제10조(물리적 안전조치)"
      public:
        - "국가 정보보안 기본지침 제74조(단말기 보안), 제78조(휴대용 저장매체 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제13조(전산자료 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.4.6 반출입 기기 통제, 2.10.7 보조저장매체 관리"
    checklist:
      - "이동형 저장매체 관리 지침 또는 절차"
      - "이동형 저장매체 및 정보시스템 반출입 지침(또는 절차)"
      - "시스템의 USB 장치 통제 방법 및 통제 여부"
      - "반출입 통제 방법 및 실제 통제 여부"
      - "사무실, 통신실, 서버실 등의 PC, 정보시스템"
      - "보호구역 내 반출입 신청서"
      - "(서식 예시 제4호) 정보시스템 반입, 반출 신청서"

  - id: "A-90"
    title: "이동형 장치(노트북, 태블릿, 이동식저장매체 등)의 반출입 시 통제 절차에 따른 기록 유지 관리하고 절차 준수여부를 확인할수 있도록 반출입 이력을 주기적으로 점검"
    domain: "12. 보안관리"
    related_org:
    - "정보보호 부서"
    description:
      - "이동형 장치(노트북, 태블릿, 보조저장매체 등)의 무단 반출입에 따른 내부자료 유출에 대비하여 통제 절차에 따른 기록을 유지‧관리하고, 절차 준수 여부를 확인할 수 있도록 반출입 이력을 주기적으로 점검하여야 한다."
      - |
        ※ 반출입 관리대장 기록사항(예시)
        - 반출입 일시 및 장소
        - 사용자 정보
        - 기종(모델), 기기식별정보(시리얼번호 등)
        - 반출입 사유
        - 보안 점검 결과
        - 관리자 확인 서명 등
    considerations:
      - "보호구역 내 반출입 이력 점검시에는 반입·반출 미디어 장치 수량 차이 비교 등을 통해 장치 분실 및 오남용에 대한 관점을 고려하여야 한다"
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제10조(물리적 안전조치)"
      public:
        - "국가 정보보안 기본지침 제74조(단말기 보안), 제78조(휴대용 저장매체 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제13조(전산자료 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.4.6 반출입 기기 통제"
    checklist:
      - "보호구역 내 반출입 신청서"
      - "반출입 관리대장"
      - "반출입 이력 검토 결과"
      - "(서식 예시 제31호) 휴대용 저장매체(전산장비 포함) 반출·입 대장"

  - id: "A-91"
    title: "스마트폰·개인휴대단말기(태블릿)·전자제어장비 등 첨단 정보통신기기를 활용하는 경우, 업무자료 등 중요정보 보호 및 안전한 전송을 위한 방안 마련"
    domain: "12. 보안관리"
    related_org:
    - "정보보호 부서"
    description:
      - "스마트폰, 개인휴대단말기(태블릿), 전자제어장비 등 첨단 정보통신기기를 사용하는 경우, 중요 정보의 암호화와 안전한 전송(전송구간 암호화 등) 보호조치를 마련하여야 한다."
      - "관계 법규에 따라 특정 첨단 정보통신기기의 이용이 제한되거나 기술적인 보호조치가 요구될 수 있으므로, 해당 법규가 있는지 확인하여 해당 법규의 요건을 만족하는 보호대책을 적용하여야 한다."
    considerations:
      - "전송구간 암호화는 SSL, VPN 등의 암호화 통신 방식을 적용하며, 모바일의 경우 E2E 암호화 방식을 적용하여 인증 정보를 암호화하여 전송하는 것을 권고한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제6조(접근통제), 제7조(개인정보의 암호화)"
      public:
        - "국가 정보보안 기본지침 제56조(업무용 통신단말기 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제12조(단말기 보호대책), 제13조(전산자료 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.7.1 암호정책 적용, 2.10.6 업무용 단말기기 보안"
    checklist:
