      - "유닉스, 리눅스 등의 서버는 윈도우 서버 대비 악성코드 감염 우려가 낮고 상용 백신프로그램이 부족하여 백신 설치가 어려운 경우 서버의 가용성, 악성코드의 감염 가능성, 기존 보안대책의 적절성 등을 종합적으로 고려하여 백신 프로그램 등 보안프로그램 설치 여부를 결정하여야 한다."
      - "외부 업데이트 서버와의 연결은 보안 위협에 노출될 수 있으므로 방화벽 규칙 설정을 통해 허용 범위를 최소화하고, 주기적인 점검 및 업데이트를 수행하는 등의 조치를 이행한다."
      - "보안프로그램의 패치오류 검증, 무결성 검증 등이 필요하여 보안프로그램의 업데이트를 즉시 적용하기 어려운 등 정당한 사유가 있는 경우에는 보안프로그램의 업데이트에 필요한 조치를 확인한 후 업데이트를 적용한다."
      - |
        악성프로그램 탐지 및 조치를 위한 백신 중앙 관리 서버 등을 구축하는 경우 다음의 관리설정이 필수적으로 적용되어야 한다.
        - 백신프로그램을 임의 삭제하거나 환경설정 변경을 금지
        - 백신프로그램이 설치되지 않은 시스템은 업무시스템 접속을 위한 내부 네트워크로의 접근 차단
      - "악성프로그램 감염 발견 시 악성코드 확산 및 피해를 최소화하기 위해 대응절차를 수립·이행하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반보호대책의 수립 등)"
