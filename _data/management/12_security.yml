  - id: "A-100"
    title: "개인정보의 유출 등을 방지하기 위해 접근 권한의 관리, 접근통제, 암호화, 접속기록의 보관 및 점검 등 개인정보의 안전성 확보에 필요한 조치 이행"
    domain: "12. 보안관리"
    related_org:
    - "정보보호 부서"
    - "DB관리 부서"
    description:
      - "개인정보처리자는 개인정보를 처리함에 있어서 개인정보가 분실·도난·유출·위조·변조 또는 훼손되지 아니하도록 ‘개인정보의 안전성 확보조치 기준’에 따른 기술적‧관리적 및 물리적 안전조치를 이행하여야 한다."
      - |
        ‘개인정보의 안전성 확보조치 기준’에 따른 주요 조치사항은 다음과 같다.

        | 구분 | 주요 조치 사항 |
        | --- | --- |
        | 내부 관리계획의 수립‧시행 및 점검 (제4조) | 내부 의사결정절차를 통한 내부 관리계획의 수립‧시행 및 수정 이력 관리, 개인정보 보호책임자 및 개인정보취급자 대상 차등화된 교육의 정기적 실시, 내부 관리계획 이행 실태의 연1회 이상 점검‧관리 |
        | 접근 권한의 관리 (제5조) | 개인정보처리시스템에 대한 접근권한을 업무수행에 필요한 최소한의 범위로 차등 부여, 개인정보취급자 또는 개인정보취급자 업무 변경시 지체없는 접근 권한 변경 또는 말소, 접근 권한 부여·변경 또는 말소 내역의 기록 및 최소 3년간 보관, 개인정보취급자별 계정 발급 및 공유 금지, 개인정보취급자 또는 정보주체의 인증수단을 안전하게 적용‧관리, 개인정보취급자 또는 정보주체의 인증 실패 횟수 제한 조치 |
        | 접근통제 (제6조) | 정보통신망을 통한 불법적 접근 및 침해사고 방지를 위한 안전조치(접근 제한 조치 및 개인정보 유출시도 탐지‧대응 조치), 외부 접속시 안전한 인증수단 적용, 인터넷 홈페이지·P2P·공유설정 등에 대한 조치, 세션 타임 아웃 조치, 업무용 모바일 기기 비밀번호 설정 등 보호조치, 인터넷망 차단조치 |
        | 개인정보의 암호화 (제7조) | 비밀번호·생체인식정보 등 인증정보 저장 또는 송수신시 암호화(단, 비밀번호는 일방향암호화), 이용자의 고유식별정보·신용카드번호·계좌번호·생체인식정보 저장 시 암호화, 이용자가 아닌 정보주체의 고유식별정보 저장시 암호화, 개인정보를 인터넷망 구간으로 송수신 시 암호화, 컴퓨터·모바일 기기 및 보조저장매체에 고유식별정보 등 저장 시 암호화, 안전한 암호 키 생성·이용·보관·배포 및 파기에 관한 절차 수립‧시행 |
        | 접속기록의 보관 및 점검 (제8조) | 개인정보처리시스템에 대한 개인정보취급자의 접속기록을 1년 이상 또는 2년 이상 보관‧관리, 접속기록의 월 1회 이상 점검 및 다운로드 사유 확인, 접속기록의 안전한 보관 |
        | 악성프로그램 등 방지 (제9조) | 악성프로그램 등을 방지‧치료할 수 있는 보안 프로그램 설치‧운영, 보안프로그램의 자동 업데이트 기능 또는 정당한 사유가 없는 한 일 1회 이상 업데이트 실시, 악성프로그램 경보 발령 또는 보안 업데이트 공지가 있는 경우 정당한 사유가 없는 한 즉시 업데이트 등 실시 |
        | 물리적 안전조치 (제10조) | 전산실·자료보관실 등 개인정보 보관 장소에 대한 출입통제 절차 수립‧운영, 개인정보가 포함된 서류·보조저장매체 등을 잠금장치가 있는 안전한 장소에 보관, 개인정보가 포함된 보조저장매체의 반출‧입 통제를 위한 보안대책 마련 |
        | 재해‧재난 대비 안전조치 (제11조) | 재해‧재난 발생 시 개인정보처리시스템 보호를 위한 위기대응 매뉴얼 등 대응절차 마련 및 정기 점검, 개인정보처리시스템 백업 및 복구를 위한 계획 마련 |
        | 출력‧복사시 안전조치 (제12조) | 개인정보처리시스템에서 개인정보의 출력시(인쇄, 화면표시, 파일생성 등) 용도 특정 및 용도에 따라 출력항목 최소화, 개인정보가 포함된 종이 인쇄물·개인정보가 복사된 외부 저장매체 등 개인정보의 출력‧복사물을 안전하게 관리하기 위해 필요한 안전조치 |
        | 개인정보의 파기 (제13조) | 개인정보 파기시 복원되지 않도록 완전파괴·전용소자장비·초기화 또는 덮어쓰기 수행, 개인정보의 일부만을 파기시 복구 및 재생되지 않도록 관리 및 감독, 기술적 특성으로 완전 파기가 어려운 경우 익명처리 조치 |
        | 공공시스템운영기관 등의 개인정보 안전성 확보조치 (제3장) | 공공시스템운영기관의 안전조치 기준 적용(제14조), 공공시스템운영기관의 내부 관리계획의 수립‧시행(제15조), 공공시스템운영기관의 접근 권한의 관리(제16조), 공공시스템운영기관의 접속기록의 보관 및 점검(제17조) |
    considerations:
      - "개인정보처리자는 처리하는 개인정보의 보유 수, 유형 및 정보주체에 미치는 영향 등을 고려하여 스스로의 환경에 맞는 개인정보 안전성 확보에 필요한 조치를 적용하여야 한다. 다만, ‘개인정보의 안전성 확보조치 기준’에 따른 사항은 최소한의 법적 요건이므로 반드시 준수하여야 한다."
      - "개인정보의 안전성 확보조치 기준의 세부 사항은 개인정보 포털(https://www.privacy.go.kr) 자료실의 개인정보의 안전성 확보조치 기준 안내서를 참고할 수 있다."
      - "금융회사 등이 개인신용정보를 처리하는 경우, 신용정보법 및 신용정보업감독규정 별표3 기술적‧물리적‧관리적 보안대책 마련 기준에 따른 보안대책을 적용하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준"
      public: []
      finance:
        - "신용정보의 이용 및 보호에 관한 법률 제19조(신용정보전산시스템의 안전보호)"
        - "신용정보업감독규정 제20조(기술적·물리적·관리적 보안대책), 별표3 기술적‧물리적‧관리적 보안대책 마련 기준"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 나. 보호대책 요구사항"
    checklist:
      - "개인정보 내부 관리계획"
      - "개인정보처리시스템 현황"
      - "개인정보의 안전성 확보조치 기준 적용 현황"
      - "개인정보 내부 관리계획 이행실태 점검 결과"

  - id: "A-101"
    title: "서비스 거부(DDoS) 공격 방지를 위한 대응방안(그린DDoSZone 등) 수립 및 운영"
    domain: "12. 보안관리"
    related_org:
    - "정보보호 부서"
    - "DB관리 부서"
    description:
      - "DDoS(Distributed Denial of Service) 공격에 대응하기 위해 공격 기법, 목표 시스템, 예상 피해 규모 등 다양한 요소를 고려하여 보안대책을 수립‧운영하여야 한다."
    considerations:
      - "DDoS에 대한 기술적인 대응은 일반적인 네트워크 장비 또는 보안 장비를 통해 할 수 있지만, 정확하고 신속한 대응을 위해서는 DDoS 공격에 특화된 보안대책의 적용을 고려할 필요가 있다."
      - "DDoS 공격에 특화된 보안대책으로는 DDoS 대응 장비, 그린 DDoS Zone 도입(서비스 구독 형태 또는 자체구축) 등이 있다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
      public:
        - "국가 정보보안 기본지침 제54조(공개서버 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보 의무)"
        - "전자금융감독규정 제15조(해킹 등 방지대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.10.1 보안시스템 운영"
    checklist:
      - "DDoS대응 보안시스템 구축, 운영 현황"
      - "DDoS 사이버대피소 운영 또는 이용 현황"

  - id: "A-102"
    title: "주요정보통기반시설과 직·간접적으로 연계된 시스템을 대상으로 모의해킹 수행 및 보안대책 마련"
    domain: "12. 보안관리"
    related_org:
    - "정보보호 부서"
    description:
      - "기반시설과 직·간접적으로 연계된 시스템을 대상으로 모의해킹을 수행하여야 한다."
      - "모의해킹 점검 절차를 수립하고, 정기적인 모의해킹 및 점검 이력을 기록 관리하여 전년도에 도출된 취약점의 재발 여부를 식별하고 이에 대한 보호대책을 마련하여야 한다."
      - "유사한 취약점이 재발되고 있는 경우 근본 원인을 분석하고 재발방지 대책을 마련하여야 한다."
    considerations:
      - "취약점 점검 시 회사의 규모 및 보유하고 있는 정보의 중요도에 따라 모의침투 테스트를 수행하는 것을 고려하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
      public:
        - "국가 정보보안 기본지침 제96조(사이버공격 대응훈련)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무), 제21조의3(전자금융기반시설 취약점 분석·평가)"
        - "전자금융감독규정 제15조(해킹 등 방지 대책), 제37조의2(전자금융기반시설 취약점 분석·평가 주기, 내용 등)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.11.2 취약점 점검 및 조치"
    checklist:
      - "취약점 점검 이력"
      - "모의해킹 계획서/결과보고서"

  - id: "A-103"
    title: "시스템 및 사용 장비에 대한 보안 취약점에 대한 주기적 검토 및 보완 프로세스 운영"
    domain: "12. 보안관리"
    related_org:
    - "정보보호 부서"
    - "시스템운영 부서"
    description:
      - "정보시스템을 대상으로 유형(서버, 네트워크, 보안 장비, DBMS, 웹사이트, PC 등)에 따라 점검항목과 점검방식을 고려하여 연 1회 이상의 기술적인 보안 취약점 점검을 수행하고 그 결과에 따른 개선조치를 수행하여야 한다."
      - "보안취약점 점검은 시스템 유형별, 항목별로 수동 점검(체크리스트 이용, 인터뷰 등)을 하는 방법과 취약점진단 솔루션을 활용하여 자동 점검을 수행하는 방법이 있으며 기관 규모, 인력, 예산을 고려하여 취약점 진단을 수행하여야 한다."
    considerations:
      - "정보시스템 유형별 취약점 점검항목은 기술적 취약점 점검 해설서(한국인터넷진흥원 배포)를 참고하여 해당 시스템 관리자가 직접 점검을 수행하고 조치할 수 있다."
      - "정보시스템 점검은 시스템 가용성을 보장하기 위해 정기적인 점검 시간을 설정하고, 점검 과정에서 발생할 수 있는 시스템 장애에 대한 모니터링 및 복구절차를 마련하여야 한다. 또한, 취약점 점검 계획서를 통해 점검 범위, 방법, 일정 등을 명확히 하고, 관련 부서와의 협의를 통해 점검으로 인한 서비스 중단을 최소화하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립‧시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제97조(정보통신망 보안진단)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무), 제21조의3(전자금융기반시설 취약점 분석·평가)"
        - "전자금융감독규정 제15조(해킹 등 방지대책), 제37조의2(전자금융기반시설 취약점 분석·평가 주기, 내용 등)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.11.2 취약점 점검 및 조치"
    checklist:
      - "정보시스템 취약점 점검 계획서(점검대상 정보시스템 목록 포함)"
      - "점검 대상 시스템 취약점 점검 결과보고서"
      - "점검 완료 시스템 취약점 개선 조치 내역"
      - "취약점 점검도구 또는 시스템"
