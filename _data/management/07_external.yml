domain: "7. 외부자보안"
domain_number: 7
category: "관리적 분야"
items:
  - id: "A-27"
    title: "외부 서비스 이용 및 업무 위탁에 따른 신규 외부자에 대한 보안 서약서 작성"
    domain: "7. 외부자보안"
    related_org:
    - "정보보호 부서"
    - "인사 부서"
    description:
      - "외부자의 상주 여부와 관계없이 기반시설에 접근하는 모든 외부자(임시직원, 외부용역직원 등)에 대하여 해당 서식에 따른 보안서약서 작성이 이루어져야 한다."
    considerations:
      - "용역사업 관련 인원에 대해 정보 누출 방지 조항 및 해당 인력의 자필 서명이 들어간 보안서약서를 징구하여야 한다."
      - "※ 외부자 보안서약서 포함 사항 (예시)"
      - "- 정보보호 책임 및 의무"
      - "- 정보보호 관련 법률 및 내부 규정 준수"
      - "- 업무 수행 관련 취득한 중요정보 유출금지(비밀유지)"
      - "- 보안요구사항 위반 시 처벌, 손해배상 책임"
      - "- 침해사고 발생에 따른 보고 의무 등"
      - "외부자의 업무형태에 따라 상기 사항에서 제시하고 있는 요구사항을 계약서에 반영하지 못하는 경우 타당한 사유가 있어야 한다."
      - "보안서약서의 제출 의무에 대해 외부 인력 채용 절차 중 기본적인 사항으로 인식하고 관리부서를 지정하여 보안서약서를 관리하여야 한다."
      - "관계 법규에 따라서는 외부자에 대한 보안서약서 서식이 정의되어 있을 수 있으며, 해당하는 법규가 없다면 서식 예시 등을 참고하여 적절한 외부자 보안서약서를 수립하여 징구할 수 있도록 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제26조(업무위탁에 따른 개인정보의 처리 제한), 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제26조(용역업체 보안), 제73조(개별사용자 보안), 제150조의2(서약서 징구시 고지 사항)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무), 제40조(외부주문등에 대한 감독 및 검사)"
        - "전자금융감독규정 제60조(외부주문등에 대한 기준)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.2.3 보안서약, 2.3.2 외부자 계약 시 보안"
    checklist:
      - "기반시설 관련 외부 위탁 현황(예: 위탁계약서, 업체 목록, 사업명, 기간, 투입 인원 명단 등)"
      - "(서식 예시 제29호) 외부자 보안서약서"

  - id: "A-28"
    title: "기반시설 범위 내에서 발생하고 있는 외부 서비스 이용 및 업무 위탁 현황을 식별 및 관리"
    domain: "7. 외부자보안"
    related_org:
    - "정보보호 부서"
    - "인사 부서"
    description:
      - "기반시설 범위 내에서 외부 서비스를 이용하거나 업무의 일부를 위탁하는 경우 관련 현황을 파악하고 법적 요구사항 및 외부 조직이나 서비스로부터 발생할 수 있는 위험 요소를 검토하여 필요한 보호대책을 마련하여야 한다."
    considerations:
      - "기반시설 범위 내 업무위탁 및 외부 시설·서비스 이용 현황을 명확히 식별하고 이에 대한 목록을 작성하여 지속적으로 현행화하여야 한다."
      - "※ 업무 위탁 및 외부 시설·서비스 이용현황 목록에 포함되어야 할 사항 (예시)"
      - "- 수탁자 및 외부 시설·서비스 명칭"
      - "- 담당부서 및 담당자 명"
      - "- 위탁하는 업무의 구체적인 내용 및 외부 서비스의 세부사항"
      - "- 개인정보 처리업무 위탁 여부"
      - "- 위탁 및 서비스 이용 기간"
      - "- 계약서 작성 여부, 보안점검 여부 등 관리·감독에 관한 사항 등"
      - "외부 서비스 이용 및 업무 위탁에 따른 법적 요구사항을 고려하여 위험평가를 수행하고 그 결과를 토대로 고위험 외부자에 대해서는 점검주기·점검항목 기준을 달리하여 집중 점검 수행을 하는 등 적절한 보호대책을 마련하여 관리하도록 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제26조(업무위탁에 따른 개인정보의 처리 제한), 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제26조(용역업체 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무), 제40조(외부주문등에 대한 감독 및 검사)"
        - "전자금융감독규정 제60조(외부주문등에 대한 기준)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.3.1 외부자 현황 관리"
    checklist:
      - "외부 위탁 및 외부 시설·서비스 현황"
      - "외부 위탁 계약서"

  - id: "A-29"
    title: "외부 서비스 이용 및 업무 위탁에 따른 정보보호 요구사항을 식별하고 이를 계약서 또는 협정서에 명시"
    domain: "7. 외부자보안"
    related_org:
    - "정보보호 부서"
    - "인사 부서"
    description:
      - "기반시설 내 직원이 아닌 외부 인원을 통한 유지보수, 개인정보취급, 기타 용역업무 수행 시에 기반시설, 정보시스템, 데이터 등의 자산에 접근이 이루어지는 경우 해당 용역 수행주체(예: 외부자 또는 용역사업자)와의 계약 문서에 정보보호 요구사항을 포함시켜야 한다."
      - "계약 문서에 포함되는 정보보호 요구사항은 관계 법규에서 규정하는 내용이 있다면 모두 포함되어야 하고, 관계 법규가 없더라도 다음 사항이 계약 문서(또는 부속서)에 포함되도록 한다."
      - "- 참여인력의 보안관련 준수사항"
      - "- 해당 업무 수행과 관련한 보안교육, 보안점검에 관한 사항"
      - "- 계약 기간 중 참여인원 임의교체 금지에 관한 사항"
      - "- 제공되는 자료에 대한 무단 복사 및 외부반출 등 보안조치에 관한 사항"
      - "- 기반시설 관련 장비 반·출입 시 악성코드 감염여부, 정보누출 등 점검에 관한 사항"
      - "- 소프트웨어 개발보안에 필요한 사항"
      - "- 제안요청서에 포함된 보안 관련 사항"
      - "- 계약 종료시 기반시설 관련 장비 내 저장정보 복구 불가 조치에 관한 사항"
      - "- 계약 종료시 관리적·물리적 권한 회수에 관한 사항"
      - "- 규정 위반 시 손해배상 등 책임에 관한 사항 등"
    considerations:
      - "개인정보처리 업무를 위탁하는 경우는 개인정보 보호법에 따른 필수 사항이 계약 내용에 포함되도록 하여야 한다."
      - "- 위탁업무 수행 목적 외 개인정보의 처리 금지에 관한 사항"
      - "- 개인정보의 기술적ㆍ관리적 보호조치에 관한 사항"
      - "- 위탁업무의 목적 및 범위"
      - "- 재위탁 제한에 관한 사항"
      - "- 개인정보에 대한 접근 제한 등 안전성 확보 조치에 관한 사항"
      - "- 위탁업무와 관련하여 보유하고 있는 개인정보의 관리 현황 점검 등 감독에 관한 사항"
      - "- 수탁자가 준수하여야 할 의무를 위반한 경우의 손해배상 등 책임에 관한 사항"
      - "용역사업에 투입되는 자료·장비 등에 대해 대외보안이 필요한 경우 정보보안의 책임을 명확히 하기 위해 계약서와 별도로 비밀유지계약서를 작성하여야 한다."
      - "용역업체가 해당 업무에 대한 하도급 계약을 체결할 경우 원래 계약 수준의 비밀 유지 조항을 포함하도록 조치하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제26조(업무위탁에 따른 개인정보의 처리 제한)"
      public:
        - "국가 정보보안 기본지침 제26조(용역업체 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무), 제40조(외부주문등에 대한 감독 및 검사)"
        - "전자금융감독규정 제21조(정보처리시스템 구축 및 전자금융거래 관련 계약), 제60조(외부주문등에 대한 기준)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.3.2 외부자 계약 시 보안"
    checklist:
      - "용역사업 계약서 또는 협정서 중 정보보호 요구사항"
      - "기반시설에 대한 외주용역 현황(계약서, 업체명, 사업명, 기간, 투입인원 등)"
      - "(참고 자료 제4호) 외부용역업체 보안관리 준수사항 (예시)"
      - "(서식 예시 제3호) 표준 개인정보처리 위탁계약서"

  - id: "A-30"
    title: "유지보수 등을 위한 외부자 임시 방문 시 정보 및 자산 접근에 대한 보안 규정 사전 고지"
    domain: "7. 외부자보안"
    related_org:
    - "정보보호 부서"
    - "인사 부서"
    description:
      - "유지보수 등을 위해 임시적으로 외부자가 기반시설에 직·간접적으로 접근하는 경우 법적 요건 또는 내부 규정에 따른 비밀유지 의무 준수 및 위반시 처벌내용 등에 대한 사항을 업무 수행 전에 고지하여야 한다."
      - "유지보수 등을 위해 외부인력과 계약시 보안서약서 등에 외부 관계자가 준수하여야 하는 관계 법규와 발주기관의 규정 사항을 고지하여야 한다."
      - "사전 고지 시점은 외주용역사업의 발주 시점에 이루어지도록 하고 준수하여야 하는 법규 사항은 해당 발주서(RFP)에 포함시킬 수 있도록 한다."
      - "통보하여야 하는 내용에는 관계 법규 목록(정보통신기반보호법은 필수 기재) 및 발주서의 붙임 형태로 제공하는 외주용역 보안관리 기준을 포함하여야 한다."
    considerations:
      - "공공기관, 금융회사 등은 관계 법규에서 규정하는 외주용역 보안관리 기준을 준용하도록 한다."
      - "보안서약서 등에 명시하는 것 외에도 업무 수행 전 해당 내용에 대한 보안교육을 실시하여 내부 규정 및 관련 정보보호 책임에 대하여 사전에 안내하여야 한다."
      - "사전에 관련 법규 준수, 책임 및 의무, 누출금지 대상정보, 업무 종료 시 모든 권한 및 제공 자료 회수, 정보 노출 시 책임 및 처벌에 관한 사항 등을 고지하여야 한다."
      - "보안서약서 등 관련 규정사항을 안내할 때는 다음 사항을 포함하여 안내·교육하여야 한다."
      - "- 외주용역업체 작업장소에 대한 보안요구사항"
      - "- 지정된 장소에서 설치된 지정된 단말기에서만 접속"
      - "- 지정된 단말기로 업무 목적 외에 인터넷 접속 차단"
      - "- 접속기록 1년이상 보관에 관한 사항"
      - "- 해당 업무 담당자 보안통제 하에 시설·서비스 이용"
      - "- 누출금지 대상정보 목록"
      - "- 정보누출 및 문제 발생 시 법적 책임 사항"
      - "- 누출금지 정보 외 산출물을 제3자에게 제공할 경우 발주자의 승인절차 등"
      - "※ 누출금지 대상정보 (예시)"
      - "- 기반시설 내·외부 IP주소 현황"
      - "- 시스템 구성 현황 및 정보통신망 구성도"
      - "- 정보시스템 접근권한 정보"
      - "- 정보통신망 또는 정보시스템 취약점 분석·평가 결과물"
      - "- 산출물 및 관련 프로그램 소스코드(외부 유출 시 국가안보 등 피해가 우려되는 중요 용역사업인 경우)"
      - "- 암호가 주기능인 제품 및 정보보호시스템 도입·운용 현황"
      - "- 정보보호시스템 및 네트워크 장비 설정 정보"
      - "- 비공개 대상 정보로 분류된 해당 기관의 내부 문서"
      - "- 개인정보"
      - "- 비밀 및 대외비 등"
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제26조(업무위탁에 따른 개인정보의 처리 제한)"
      public:
        - "국가 정보보안 기본지침 제12조(보안대책 수립), 제13조(제안요청서 기재사항), 제26조(용역업체 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무), 제40조(외부주문등에 대한 감독 및 검사)"
        - "전자금융감독규정 제60조(외부주문등에 대한 기준)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.3.2 외부자 계약 시 보안, 2.4.5 보호구역 내 작업"
    checklist:
      - "외주용역 보안관리 요구사항 (예: 발주서 표기 및 사업 착수 전 통지)"
      - "(참고 자료 제4호) 외부 용역업체 보안관리 준수사항"

  - id: "A-31"
    title: "외부자가 계약서, 협정서, 내부정책에 명시된 정보보호 요구사항을 준수하고 있는지 주기적으로 점검 또는 감사를 수행"
    domain: "7. 외부자보안"
    related_org:
    - "정보보호 부서"
    - "인사 부서"
    description:
      - "기반시설에 접근하는 외주용역 등의 외부자에 대해 계약서, 협정서, 내부정책에 명시된 정보보호 요구사항에 따라 보안관리가 이루어지는지 주기적으로 점검 및 감사를 수행하고 그 결과를 보고하여야 한다."
      - "외주용역은 정보화 사업 이외에도 기반시설에 대한 공사, 유지보수 등의 사업도 포함되어야 한다."
      - "외주용역 보안관리 기준은 관계 법규에서 정하는 기준을 따르되 만약 해당 기준이 정의되어 있지 않다면 참고 자료 등을 활용하여 자체적인 외주용역 보안관리 기준을 수립하고 이를 바탕으로 점검을 수행할 수 있다."
    considerations:
      - "정보보호 요구사항 준수여부 확인 시 다음 사항을 고려하여 주기적으로 점검 또는 감사를 수행하여야 한다."
      - "- 계약서에 명시된 요건 및 계약 시 작성한 보안서약서에 따른 보안 요구사항 준수 여부"
      - "- 중요정보 및 누출금지 대상정보 외부 유출 여부 확인"
      - "- 외부자의 정보보호 역량, 자체 시스템 보유 여부, 처리하는 정보의 수량 및 민감도 등을 고려하여 점검 주기 및 방법 결정"
      - "- 업무 시작 전, 업무 수행 중, 계약 및 업무 종료 시점에 외부자에 대한 점검 및 감사를 진행하되 필요한 경우 수시로 진행 가능"
      - "외부인력이 자체적으로 정보보호 책임자를 지정하여 점검을 수행한 경우 그 결과를 주기적으로 보고받아야 한다."
      - "공공기관, 금융회사 등은 관련 법규에서 규정하는 외주용역 보안관리 기준을 준용하도록 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제26조(업무위탁에 따른 개인정보의 처리 제한)"
      public:
        - "국가 정보보안 기본지침 제26조(용역업체 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무), 제40조(외부주문등에 대한 감독 및 검사)"
        - "전자금융감독규정 제60조(외부주문등에 대한 기준)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.3.3 외부자 보안 이행 관리"
    checklist:
      - "외주용역 보안관리 기준(예: 지침 또는 절차)"
      - "정보통신 기반시설에 대한 외주용역 현황(계약서, 업체목록, 사업명, 기간, 투입인원명단 등)"
      - "외주용역에 대한 사업자 자체 보안점검 결과"
      - "발주기관이 직접 외주용역에 대하여 수행한 보안점검 결과"
      - "(서식 예시 제27호) 수탁자 대상, 보안 점검표"
      - "(서식 예시 제28호) 중요정보 파기 확인서"

  - id: "A-32"
    title: "외부자의 보안 관련 사항 위반이나 침해사고 발생 시, 이에 따른 조치 수행"
    domain: "7. 외부자보안"
    related_org:
    - "정보보호 부서"
    - "인사 부서"
    description:
      - "외부자가 법령과 규제 및 내부정책에 따른 정보보호 책임과 의무를 위반한 경우에 대한 처벌 규정을 수립하여야 한다."
      - "정보보호에 관한 책임사항, 책임범위, 보안대책, 위반 시 손해배상 책임, 누출금지 대상정보 등을 계약서에 기록하고, 보안 위반 사항 적발 또는 침해사고 발생 시, 경위 확인 후 위규처리 기준에 따라 조치한 뒤 재발방지 대책을 요구하여야 한다."
    considerations:
      - "외부자에 대한 점검 또는 감사 결과를 공유하고 발견된 문제점에 대하여 개선계획 및 재발방지 대책을 수립·이행하고 개선 조치 완료 여부에 대한 이행점검을 수행하여야 한다."
      - "위반 사항이 적발된 경우 내부 절차에 따른 조치를 수행하고 필요한 경우 전사 공지 또는 교육 사례로 활용할 수 있다."
      - "위반사항이나 침해사고 결과가 중대하다고 판단되는 경우 외부자의 해당 업체 경영진에게 관련 사실을 통보하고 계약 제한 등의 제재를 조치하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제26조(업무위탁에 따른 개인정보의 처리 제한)"
      public:
        - "국가 정보보안 기본지침 제26조(용역업체 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무), 제40조(외부주문등에 대한 감독 및 검사)"
        - "전자금융감독규정 제8조의2(정보보호위원회 운영), 제60조(외부주문등에 대한 기준)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.3.3 외부자 보안 이행 관리"
    checklist:
      - "용역수행 주체에 대한 벌칙 사항 문건(예: 입찰 공고서, 계약 문서, 자체 규정 등)"
      - "위반 또는 침해사고에 따른 벌칙 적용 공문"
      - "(참고 자료 제5호) 사업자 보안위규 처리기준 (예시)"
      - "(참고 자료 제6호) 사업자 보안위약금 부과 기준 (예시)"

  - id: "A-33"
    title: "외부자의 계약만료, 업무 종료, 담당자 변경 시 자산 반납, 접근권한 삭제 및 비밀유지 확약서 작성 등이 이루어질 수 있도록 보안대책을 수립·이행"
    domain: "7. 외부자보안"
    related_org:
    - "정보보호 부서"
    - "인사 부서"
    description:
      - "외부자 계약만료, 업무 종료, 담당자 변경 시 공식적인 절차에 따른 자산 반납, 정보시스템 접근권한 삭제, 중요정보 파기, 비밀유지 확약서 징구 등이 적시에 이루어질 수 있도록 보안대책을 수립·이행하여야 한다."
    considerations:
      - "담당조직이 외부자 계약만료, 업무 종료, 담당자 변경이 발생하였음을 신속하게 인지할 수 있도록 정보공유 방안 마련 방안을 마련하여야 한다."
      - "외부자 계약 만료 시 위탁 업무와 관련하여 외부자가 중요정보 및 개인정보를 보유하고 있는지 확인하고 이를 회수·파기할 수 있도록 절차를 수립·이행하여야 한다."
      - "업무 종료 후 최종 산출물 등 대외보안이 요구되는 자료는 대외비 이상으로 작성하여 관리하고 불필요한 자료는 삭제 및 폐기하여야 한다."
      - "외부자에게 제공한 자료, 장비, 산출물, 접근권한 등 용역과 관련된 모든 자료 및 물리적·기술적 권한은 전량 회수하고 업체에 복사본 등으로 별도 보관하는 것을 금지하여야 한다."
      - "업무 및 계약 종료 후 기반시설 관련 노트북·휴대용 저장매체 등 전자기록 저장매체는 복원이 불가능한 방법으로 완전 삭제 후 반출하여야 한다."
      - "관련자료 회수 및 삭제조치 후 관련 자료를 보유하고 있지 않다는 대표자 명의의 확약서 등을 징구 받아야 한다."
    laws:
      common:
        - "정보통신 기반시설 제10조(보호지침)"
        - "개인정보 보호법 제26조(업무위탁에 따른 개인정보의 처리 제한), 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제26조(용역업체 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무), 제40조(외부주문등에 대한 감독 및 검사)"
        - "전자금융감독규정 제60조(외부주문등에 대한 기준)"
      ict:
        - "정보통신망 이용촉진 및 정보보호 등에 관한 법률 제50조의3(영리목적의 광고성 정보 전송의 위탁 등)"
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.3.4 외부자 계약 변경 및 만료 시 보안"
    checklist:
      - "위탁 보안관리 지침, 체크리스트 등"
      - "외부자 계약종료 및 변경 절차서"
      - "계약 종료 및 변경 시 자산 및 계정 반납관리대장"
      - "외부자 정보보호 및 개인정보보호 서약서"
      - "외부자 비밀유지 확약서"
      - "파기 확인서"
      - "(서식 예시 제29호) 외부자 보안서약서"
