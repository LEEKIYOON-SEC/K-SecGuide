domain: "6. 인적보안"
domain_number: 6
category: "관리적 분야"
items:
  - id: "A-21"
    title: "정보보호 관련 직무자의 책임과 역할을 명확히 정의하여 문서화"
    domain: "6. 인적보안"
    related_org:
    - "정보보호 부서"
    - "인사 부서"
    description:
      - "업무 수행과 관련된 조직의 특성을 고려하여 관련 책임자와 담당자의 역할 및 책임을 구체적으로 정의하여 명시하여야 한다."
      - "정보보호관리자 및 부서별 담당자의 역할 등에 따라 정보보호 실무 인원이 구분되는 경우는 해당 직무에 대한 정의와 담당자의 자격 요건 등에 대해 문서화하여야 한다."
      - "정보보호 관련 업무를 실무적으로 지원·이행할 수 있도록 해당 직무에 대한 직무기술서 등을 통하여 책임 및 역할을 명시하여야 한다."
      - "외부 인력이 정보보호 담당자로 포함되는 경우 외부 인력의 책임과 역할 등을 구체적으로 정의하여 문서화하여야 한다."
    considerations:
      - "정보보호 전담 인원, 시스템 관리자, 정보보호 시스템 관리자, 개발보안 담당자, 개인정보보호 담당자, 시설보안 담당자, 부서별 보안담당자 등과 같은 정보보호 실무영역에 대한 직무를 구분하여 명문화하여야 한다."
      - "전사 인원에 대한 직무기술서가 아닌 정보보호 실무조직에 대한 직무기술서에 대해 구비하여야 한다."
      - "조직의 각 구성원에게 정보보호와 개인정보보호 관련 역할 및 책임을 할당하고, 그 활동을 평가할 수 있는 체계와 조직 구성원 간 상호 의사소통할 수 있는 체계를 수립하여 운영하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무), 제31조(개인정보 보호책임자의 지정)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제4조(책무), 제11조(보안책임), 제73조(개별사용자 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무), 제21조의2(정보보호최고책임자 지정)"
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.1.2 조직의 유지관리"
    checklist:
      - "직무기술서"
      - "정보보호 조직도"
      - "정보보호 인력 업무 분장표"
      - "의사소통 수행 이력(예 : 주간보고, 내부공지 등)"
      - "(서식 예시 제24호) 직무기술서"

  - id: "A-22"
    title: "기반시설 업무 담당자 지정 시 신원, 업무능력, 교육정도, 경력 등에 대한 적격심사 수행"
    domain: "6. 인적보안"
    related_org:
    - "인사 부서"
    description:
      - "기반시설 업무 담당자 지정 혹은 채용 시에는 신원 확인에 필요한 최소한의 개인정보, 자격증, 교육 이력, 업무 경력에 대한 사항을 확인하는 등의 적격심사를 거쳐야 한다."
      - "적격심사 승인 절차가 완료된 후에만 계정·권한을 부여하며, 이력을 기록·보관한다."
      - "관계 법규에 따른 절차가 있는 경우를 제외하고는 근로기준법 및 자체적으로 정하는 규정 등에 따라 적격심사를 수행할 수 있다."
    considerations:
      - "적격심사는 법적 근거와 동의를 전제로 최소 수집·보관 원칙을 지키고, 적격심사 기준은 직무와 관련된 요소로만 구성한다."
    laws:
      common: []
      public:
        - "국가 정보보안 기본지침 제73조(개별사용자 보안)"
      finance: []
      ict: []
    checklist:
      - "적격심사 근거"
      - "적격심사 수행이력"

  - id: "A-23"
    title: "기반시설 업무 담당자 지정 시 보안 서약서나 비밀유지 확약서 작성"
    domain: "6. 인적보안"
    related_org:
    - "정보보호 부서"
    - "인사 부서"
    description:
      - "채용 및 보직 이동으로 인한 기반시설 담당업무 부여 시 정보보호 및 개인정보보호 책임, 관련 법규 준수, 비밀 유지 의무 등에 대하여 명시된 보안서약서나 비밀유지 확약서를 작성하여야 한다."
      - "작성자는 소관 업무의 수행에 있어 보안 관련 규정을 준수하고, 직무상 알게 된 비밀을 재직 중 및 퇴직 후에도 누설하거나 유출하지 않으며, 이를 위반할 경우 처벌을 감수할 것을 서약하여야 한다."
    considerations:
      - "기반시설 업무 담당 신규 채용 및 보직 변경 등 변동 사항이 발생하는 경우 비밀유지 의무, 법률 준수 여부 확인, 손해배상 책임 등이 포함된 별도의 보안 서약서를 징구하도록 한다."
      - "보안서약서 및 비밀유지각서는 법적 분쟁 발생 시 법률적 책임에 대한 증거자료로 사용할 수 있도록 잠금장치가 있는 캐비닛 또는 출입통제가 적용된 문서고 등에 안전하게 보관하여, 필요시 쉽게 찾아볼 수 있도록 관리한다."
      - "업무의 중요도 및 민감도 등에 따라 필요 시 보안서약서를 연 1회 이상 재작성하는 등 주기적으로 갱신하는 방안을 고려할 수 있다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보보호법 제28조(개인정보취급자에 대한 감독), 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제51조(정보시스템 유지보수), 제59조(원격근무 보안), 제73조(개별사용자 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.2.3 보안 서약"
    checklist:
      - "서약서 징구·관리 절차"
      - "보안서약서 또는 비밀유지각서(최초 또는 갱신)"

  - id: "A-24"
    title: "기반시설 업무 담당자 지정 해제 시 별도의 비밀유지 확약서 작성"
    domain: "6. 인적보안"
    related_org:
    - "정보보호 부서"
    - "인사 부서"
    description:
      - "기반시설 업무 담당자 퇴직 시 업무 중 알게 된 조직의 중요 정보를 유출하지 않도록 별도의 비밀유지 확약서를 받아야하며 정보유출 시 그에 따르는 법적 책임이 있음을 명확히 고지하여야 한다."
      - "보직 이동 등 고용 조건에 변화가 발생할 경우, 이전 직무에서 습득한 중요 정보를 유출하지 않고 새로운 직무 수행과 관련하여 정보보호 책임을 준수하도록 비밀유지 확약서를 작성하는 등의 조치를 수행하여야 한다."
    considerations:
      - "기반시설 업무 담당자 퇴직 시 정보유출 발생 시 그에 따르는 법적 책임이 있음을 명확히 인식시킬 수 있도록 별도의 비밀유지 확약서를 작성하도록 한다."
      - "특별히 중요하게 관리되어야 하는 회사 비밀정보는 회사 내부 규정 등에 기재할 수 있으며 비밀정보의 특성을 고려하여 기타 목적이나 사용에 관련되는 다양한 금지유형들을 규정할 필요가 있다."
      - "작성된 비밀유지 확약서는 필요시 법적 증거자료로 활용할 수 있도록 안전하게 보관하고 관리하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제73조(개별사용자 보안)"
      finance:
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.2.3 보안 서약"
    checklist:
      - "비밀유지 확약서"
      - "정보보호 및 개인정보보호 서약서"
      - "(서식 제26호) 퇴직자 보안 서약서"

  - id: "A-25"
    title: "기반시설 업무 담당자 지정 해제 시 지체 없는 정보자산 반납, 접근권한 회수·조정, 결과 확인 등의 절차 수립·이행"
    domain: "6. 인적보안"
    related_org:
    - "정보보호 부서"
    - "인사 부서"
    description:
      - "기반시설 업무 담당자(임직원, 임시직원, 외주용역직원 등)의 퇴사 및 직무변경 시 지체없이 해당 인원에게 제공 및 부여된 물리적, 기술적 권한을 모두 회수하는 등 절차를 수립·이행하여야 한다. 이를 위해서는 최종 퇴사 및 직무변경을 마무리하기 전에 지급된 자산과 부여된 접근권한 등을 식별하고 이를 회수했는지 확인하는 절차를 수립할 필요가 있다."
      - "퇴직, 계약 만료, 보직이동 시 해당 인력이 중요정보 및 개인정보를 보유하고 있는지 확인하고 이를 회수·파기할 수 있도록 절차를 수립·이행하여야 한다."
    considerations:
      - "업무 담당자의 퇴직 및 보직 이동 시 다음 사항을 고려하여 절차를 수립할 수 있다. 해당 사용자 계정 삭제·사용 중지, 공동사용 계정 변경 및 비밀번호 변경, 시스템·단말기 등 자산에 대한 접근권한 회수·재조정, 제공된 데이터 및 문서 반납 또는 파기·삭제, 단말기 내 저장매체 데이터 삭제, 출입카드 반납, 비밀유지 서약서 작성, 자산·계정·접근권한 회수 등 절차 이행여부에 대한 점검 등"
      - "퇴직, 직무변경, 부서이동, 휴직 등 인사변경 사항 발생 시 인사 부서, 정보보호 부서, 개인정보보호 부서, 시스템 운영부서 등 관련 부서 간 신속히 공유되도록 한다."
      - "퇴직 및 계약 만료 등의 해당 인력이 보유한 조직의 중요한 정보 등을 파기할 때에는 해당 정보가 복구·재생되지 않도록 안전한 방법으로 파기하여야 한다."
      - "정보시스템과 담당자 PC뿐만 아니라, 메일 송수신함 등 해당 정보가 저장되어 있는 모든 장치 및 매체에 대한 삭제 조치를 하여야 한다."
      - "직무변경자 혹은 퇴직자와 불가피하게 정보시스템 및 정보보호시스템 계정(root 계정 등)을 공유하여 사용한 경우 해당 계정의 비밀번호를 즉시 변경하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제5조(접근 권한의 관리)"
      public:
        - "국가 정보보안 기본지침 제73조(개별사용자 보안), 제75조(계정 관리)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산), 제13조(전산자료 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.2.5 퇴직 및 직무변경 관리"
    checklist:
      - "서류상 또는 전산화된 퇴직 절차(예: 절차 및 서식, 그룹웨어 등)(서식 예시 제25호) 퇴직자 권한 회수 및 서약집행)"
      - "최근 1년 이내 퇴사한 직원 현황(명단)과 해당 직원에 대한 퇴직 절차 이행 근거(서식 예시 제26호) 퇴직자 보안 서약서)"
      - "(해당하는 경우) 인사업무를 처리하는 그룹웨어"
      - "해당 인원에게 지급된 접근권한(출입, 시스템 계정 등)이 적용된 시스템"
      - "퇴직 시 자산 및 계정 반납관리대장"
      - "퇴직자 보안점검 체크리스트 및 점검 내역"
      - "정보 및 개인정보 파기 확약서"

  - id: "A-26"
    title: "기반시설 업무 관련자가 정보보호  정책을 위반할 경우 이에 대한 징계와 관련된 사항을 규정에 명시"
    domain: "6. 인적보안"
    related_org:
    - "정보보호 부서"
    - "인사 부서"
    description:
      - "기반시설 업무 관련자가 법령과 규제 및 정보보호 정책에 따른 책임과 의무를 위반하는 경우 이에 대한 징계 규정을 수립하여야 한다."
      - "취업규칙, 징계규정 등 사내 규정을 통해 규정 위반에 대한 징계 기준을 명시할 수 있으나, 문서화된 별도의 징계 규정이 없는 경우에는 정보보호 정책 또는 인사 관련 규정에 징계 조항을 포함시켜야 한다."
    considerations:
      - "정보보호 및 개인정보보호 의무 위반에 대한 엄중한 책임을 묻기 위해 파면, 해임, 정직 등의 징계 규정을 마련하고, 실제 위반 행위에 대해서는 내부 절차에 따른 조치를 수행하여야 한다."
      - "공공기관의 경우 각급기관의 장은 ｢국가공무원 복무ㆍ징계 관련 예규｣ (인사혁신처) 중 \"비밀 엄수의 의무 위반 처리\" 등을 참고하여 정보보호 위규자에 대한 처리기준을 마련하도록 한다."
      - "금융회사 또는 전자금융업자는 전자금융감독규정에 따라 임직원이 정보보안 관련 법규를 위반하는 경우 그 제재에 관한 세부기준 및 절차를 명시적으로 마련하여야 한다."
      - "기반시설의 정보보호 책임 및 관련 법규 준수 등을 충실히 이행하였을 때의 보상 방안도 고려하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제27조(비밀유지의무)"
      public:
        - "국가 정보보안 기본지침 제80조(위규자 처리)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.2.6 보안 위반 시 조치"
    checklist:
      - "정보보호 규정 등 위반 시 징계 규정"
      - "규정 위반자 징계 이력(내용은 비공개 가능)"
      - "(참고 자료 제5호) 사업자 보안위규 처리기준 (예시)"
