domain: "5. 감사"
domain_number: 5
category: "관리적 분야"
items:
  - id: "A-18"
    title: "법적 요구사항의 준수여부를 연 1회 이상 정기적 검토"
    domain: "5. 감사"
    related_org:
    - "정보보호 부서"
    - "준법 감시 부서"
    description:
      - "조직이 준수하여야 할 관련 법적 요구사항을 주기적으로 파악하고, 준수 여부를 연 1회 이상 정기적으로 검토하여 문제점 발견 시 신속하게 조치하여야 한다."
      - "특허권 및 저작권법 등 관련 법규를 준수하여 크랙되거나 불법 복제된 소프트웨어의 사용 금지 등의 조치를 수행하는 등 업무용 PC에서 불법 소프트웨어 사용을 금지하는 대책(예: 교육, 점검, 기술적인 차단 등)을 강구 하여야 한다."
      - "또한, 예산 및 운용 인력 여부에 따라서 불법 소프트웨어를 탐지하고 설치하지 못하도록 하는 기술적인 조치(예: 업무용 PC에 관련 에이전트 설치)를 함께 고려 하여야 한다."
    considerations:
      - "법적 요구사항의 준수 여부를 주기적으로 검토할 수 있는 절차(검토 대상, 주기, 담당자, 방법 등)를 수립하여야 한다."
      - "관련 법규의 제·개정 현황을 지속적으로 모니터링하여 중대한 변경사항이 발생한 경우, 조직에 미치는 영향을 분석하여 반영하고 내부 정책, 지침 등을 최신의 상태로 유지하여야 한다."
      - "불법 소프트웨어는 저작권자의 동의 없이 복제하여 무단으로 이용 중인 소프트웨어를 말하며 기업용 라이선스가 아닌 개인용 라이선스가 적용되는 소프트웨어도 포함된다."
      - "불법 소프트웨어는 사용자 주의와 관리적·기술적인 강제 조치가 함께 병행될 필요가 있다. 따라서 사용자(임직원 및 외부자)에 대한 교육은 반드시 이루어져야 하고 주기적인(연 1회) 자체 점검(예: 매월 불법 소프트웨어 실태점검) 등의 관리적 조치가 시행되어야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가정보보안지침 제14조(검토 시기 및 절차)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 1.4.1 법적 요구사항 준수 검토"
    checklist:
      - "식별된 법적 요구사항 목록"
      - "법적 준거성 검토 내역·결과(예: 점검 체크리스트)"
      - "불법 소프트웨어 사용 금지조치 이행 내역"

  - id: "A-19"
    title: "주기적으로 정보보호 감사 계획 수립·이행"
    domain: "5. 감사"
    related_org:
    - "정보보호 부서"
    - "감사 부서"
    description:
      - "정보보호 정책/지침 및 법적 요구사항 등에 따라 정보보호 활동이 수행되고 있는지 여부 등을 점검할 수 있도록 연 1회 이상 정보보호 감사계획을 수립하고 시행하여야 한다."
      - "정보보호 감사는 관계 법규에 따른 규정 요구사항을 포함하여 감사의 전문성, 독립성 및 중립성을 보장할 수 있는 감사 조직을 구성하고 감사의 주기, 기준, 범위, 방법 등을 포함하는 연간 보안 감사계획을 수립하여야 한다."
    considerations:
      - "정보보호 부서가 감사 대상부서에 해당하면 독립성의 문제가 발생할 수 있으므로, 감사 수행의 주체를 별도로 정하고 정보보호 부서는 감사업무를 지원하는 부서가 될 필요가 있다. 다만, 감사 주관부서의 전문성 문제가 우려된다면 외부 감사인(예: 보안컨설턴트, 정보보호인증심사원(예: ISMS-P 심사원))을 포함시켜, 전문성을 확보할 수 있다."
      - "보안 감사 점검 인력은 객관성과 전문성을 보유한 인력이 지정될 수 있도록 자격요건을 정의하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제8조(정보보안감사 등)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제58조(금융회사의 정보기술부문 실태평가 등)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 1.4.2 관리체계 점검"
    checklist:
      - "연간 보안 감사 계획서(감사 조직 포함)"
      - "연간 보안 감사 결과보고서"

  - id: "A-20"
    title: "감사결과를 경영진에게 보고하여 적정한 사후관리를 시행"
    domain: "5. 감사"
    related_org:
    - "정보보호 부서"
    - "감사 부서"
    description:
      - "보안 감사 결과 보완이 필요한 사항이 발견된 경우, 해당 사항에 대한 조치계획을 수립하여 이행하여야 한다."
      - "개선사항 및 사후관리를 포함한 감사 결과를 경영진에게 보고하여 지적사항에 대한 개선조치가 수행되도록 관리하여야 한다."
    considerations:
      - "보안 감사 결과 보완이 필요한 경우 보안 조치계획을 수립 및 이행하여 조치완료 여부를 확인하여야 한다."
      - "보안 감사 결과는 감사 수행 직후에 문제점에 대한 해당 부서의 개선계획이 포함된 감사 결과서를 작성하여 정보보호책임자에게 보고하고, 일정 기간 후 사후조치 실태를 확인하여 그 결과를 다시 정보보호 책임자에게 보고하여야 한다. 이를 통해 개선조치 책임이 있는 유관 부서의 적극적인 개선 노력을 이끌어 낼 수 있도록 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제8조(정보보안감사)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 1.4.2 관리체계 점검, 1.4.3 관리체계 개선"
    checklist:
      - "보안 감사 계획서(사후조치 경과 포함 또는 별도 문건)"
      - "보안 감사 결과보고서"
      - "경영진에게 감사 결과 보고 이력"
      - "보안 감사 이행조치 결과보고서"
