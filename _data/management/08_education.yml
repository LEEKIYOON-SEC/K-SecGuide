domain: "8. 교육 및 훈련"
domain_number: 8
category: "관리적 분야"
items:
  - id: "A-34"
    title: "정보보호 인식제고를 위한 교육 및 훈련 계획을 종합적으로 수립하여 정기적으로 실시"
    domain: "8. 교육 및 훈련"
    related_org:
    - "정보보호 부서"
    description:
      - "정보보호 교육 대상(예: 임직원 및 외주용역인원 포함)에 대하여 연 1회 이상 교육훈련을 위한 연간 계획을 수립하여야 한다. 이 경우 개인정보 보호교육과 같은 법정 교육 또한 해당 연간 계획에 포함한다."
      - "연간 정보보호 교육 계획은 교육의 시기, 기간, 대상, 내용, 방법 등의 내용을 구체적으로 포함하여 교육 계획을 수립하고 경영진의 승인을 받아야 한다."
    considerations:
      - "정보보호 인식제고를 위한 연간 정보보호 교육 계획서의 내용에는 다음 사항을 고려할 수 있다."
      - "※ 연간 정보보호 교육 계획서 고려사항 (예시)"
      - "- 근거 법규 : 정보통신기반보호법 및 관계 법규"
      - "- 교육 대상 : 임직원, 관련 외부자"
      - "- 교육 내용 : 정보보호 인식제고, 주요직무자 및 수탁자 교육 등"
      - "- 교육 시기 : 최소 연 1회 이상"
      - "- 교육 방법 : 집합식 교육, 온라인 동영상 및 실시간 교육 등"
      - "- 기타 사항 : 불참자에 대해 추가 교육 및 온라인 교육 시행, 외부인력 자체 교육 시행 등"
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제26조(업무위탁에 따른 개인정보의 처리 제한), 제28조(개인정보취급자에 대한 감독), 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제9조(정보보안교육)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.2.4 인식제고 및 교육훈련"
    checklist:
      - "연간 정보보호 교육계획서"
      - "정보보호 교육 결과 보고서(예: 교육대상, 참석증적 등)"
      - "(서식 예시 제5호) 정보보호 교육 참가자 명단"

  - id: "A-35"
    title: "전체 임직원 및 외부자에 대하여 정보보호 교육 및 훈련 수행"
    domain: "8. 교육 및 훈련"
    related_org:
    - "정보보호 부서"
    description:
      - "정보보호 교육에 대한 연간 교육 계획 수립, 교육 대상과 이수 시간 등은 관계 법규에 따르며 정보보호 교육 대상에 대하여 연 1회 이상 교육훈련을 수행하여야 한다."
      - "정보보호 교육내용은 정보보호 중요성, 보안사고사례 및 대응방안, 관련 법률, 내부 보안규정 및 절차에 따른 역할과 책임, 법적 책임 등 필요한 내용을 모두 포함하여야 한다."
      - "정보보호 교육방법은 집합식, 서면, 온라인 등의 방법 중 적절한 방법을 정하여 교육 참여여부를 확인할 수 있는 증적(예: 참석자 서명, 온라인교육 로그, 수료증 등)을 교육시행 근거로 확보하여야 한다."
    considerations:
      - "임직원을 채용하거나 외부자와 신규 계약 시 업무 수행 전에 정보보호 교육을 시행하여 조직 정책, 정보보호 책임, 규정 위반 시 법적 책임 등에 대한 내용을 숙지할 수 있도록 하여야 한다."
      - "관련 법규 및 내부 규정의 중대한 변경 시 이에 대해 전체 임직원 및 외부자가 알 수 있도록 추가적으로 교육을 수행하여야 한다. 다만, 사안이 중요하지 않을 경우에는 게시판 공지, 이메일 안내, 책자 배포 등으로 모든 임직원 및 관련 인력들이 변경 사항을 쉽게 알 수 있도록 안내할 수 있다."
      - "교육 대상으로는 자산에 직·간접적으로 접근하는 임직원, 임시직원, 외주용역업체 직원 등 모든 인력을 포함하여야 한다."
      - "개인정보보호 교육의 경우 개인정보 배움터 (https://edu.privacy.go.kr/)에서 제공하는 개인정보보호 온라인 교육을 활용할 수 있다."
      - "교육에 참석하지 못한 인력에 대해서는 불참자 대상 추가 교육, 온라인 교육, 전달 교육 등 방안을 마련하고 외부 인력이나 파견된 직원인 경우 해당 업체가 직접 교육을 수행하게 하거나 자체적으로 교육 수행할 수 있도록 교육 자료를 공유하고 시행 여부를 관리·감독하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제26조(업무위탁에 따른 개인정보의 처리 제한), 제28조(개인정보취급자에 대한 감독), 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제9조(정보보안교육)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제19조의2(인력, 조직 및 예산)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.2.4 인식제고 및 교육훈련"
    checklist:
      - "연간 정보보호 교육계획서"
      - "정보보호 교육 수행 자료"
      - "정보보호 교육 시행 결과(예: 교육대상, 참석증적 등)"
      - "(서식 예시 제5호) 정보보호 교육 참가자 명단"

  - id: "A-36"
    title: "교육 및 훈련은 대상자의 직위 및 업무 특성에 따라 차등화하여 실시"
    domain: "8. 교육 및 훈련"
    related_org:
    - "정보보호 부서"
    description:
      - "조직 내 전체 임직원 및 관련 직무자들의 직위 및 업무특성을 파악하여 교육내용, 교육 유형, 교육 방법 등을 차등화하여 교육 및 훈련을 시행하여야 한다."
    considerations:
      - "기반시설 업무와 관련하여 정보보호책임자, 정보보호업무 담당자, 정보보호 실무자, 개발자, 일반직원 등 직무 및 업무 특성을 고려하여 차등화된 교육을 시행할 필요가 있다."
      - |
        ※ 직위 및 업무 특성별 교육 계획·시행 (예시)

        | 대상자 | 교육과정(예시) |
        | --- | --- |
        | 공통 | 정보보호의 이해, 개인정보보호의 이해 |
        | 정보보호책임자 | 정보보호 전략 수립, 정보보호 거버넌스 |
        | 정보보호업무 담당자 | 정보보호 수준진단 |
        | 정보보호 실무자 | 윈도우, 리눅스, 모바일 보안, 웹해킹과 대응 |
        | 개인정보 취급자 | 개인정보보호법 실무 |
        | 개발자 | 가명정보 처리의 이해, 소프트웨어 개발 보안 |
        | 일반 직원 | 해킹메일 대응 |
      - "기반시설 업무와 관련하여 직무별 전문성 제고를 위해 관련 콘퍼런스·세미나·워크숍 참가, 전문 교육기관 위탁 교육, 전문 강사 초빙 등을 통해 별도의 교육을 받을 수 있도록 하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제26조(업무위탁에 따른 개인정보의 처리 제한), 제28조(개인정보취급자에 대한 감독), 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제9조(정보보안교육)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.2.4 인식제고 및 교육훈련"
    checklist:
      - "연간 정보보호 교육 계획 중 교육대상별 교육방안"
      - "교육대상별 교육 실시 이력"
      - "직무별 교육 수행 자료"
      - "(서식 예시 제5호) 정보보호 교육 참가자 명단"

  - id: "A-37"
    title: "교육 및 훈련의 효과가 측정, 분석되어 차기 교육 및 훈련에 반영"
    domain: "8. 교육 및 훈련"
    related_org:
    - "정보보호 부서"
    description:
      - "교육 수행 후 그 효과 여부에 대한 측정(예: 설문, 시험 등)을 실시하여 발견된 문제점이 차기 교육에서 재발하지 않도록 하여야 한다."
      - "이를 위해, 정보보호 인식교육은 교육 후 설문평가 등을 통해 교육효과를 측정하고 그 결과를 분석해서 차기 교육계획을 수립하는데 활용하여야 한다."
    considerations:
      - "교육시행 후 교육 공지, 교육자료, 교육 참석자 목록 등과 같은 기록을 남기고, 미리 마련된 평가기준에 따라 설문 또는 테스트 등을 통해 교육 내용 및 방법이 각 직무별 보안기준 준수 역량 제고에 적합하고 효과적이었는지 평가하여야 한다."
      - "교육평가 결과 내용에서 도출된 문제점에 대한 대책을 마련하고 차기 교육 계획 수립 시 반영하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제26조(업무위탁에 따른 개인정보의 처리 제한), 제28조(개인정보취급자에 대한 감독), 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제9조(정보보안교육)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.2.4 인식제고 및 교육훈련"
    checklist:
      - "정보보호 교육 평가 서식(예: 설문지)"
      - "정보보호 교육 수행 설문결과(예: 설문지 원문, 설문분석 결과)"
      - "교육결과(미흡사항 있는 경우 그 내용 포함) 보고 문건"
      - "정보보호 교육 개선사항 포함 여부"
      - "(서식 예시 제35호) 보안교육 설문지"
      - "(서식 예시 제36호) 보안교육 설문분석도구 (Excel)"

  - id: "A-38"
    title: "유관기관에서 공유한 보안공지·권고문 등에 대한 내용을 임직원 및 외부자에게 공유하고 조치요령을 안내"
    domain: "8. 교육 및 훈련"
    related_org:
    - "정보보호 부서"
    description:
      - "정보보호 환경 변화에 따라 심각한 또는 주의가 요구되는 보안권고, 보안패치, 취약점조치 등이 관계 기관 및 보안기관을 통해 전파되면 해당 내용을 관계자에게 관련 보안공지를 전달하여야 한다."
      - "한국인터넷진흥원 및 관리기관 등을 통해 보안공지가 전달된 경우, 지체없이 관계 직원에게 해당 내용을 전달하여 심각한 보안패치, 취약점 등이 신속히 조치될 수 있도록 한다."
    considerations:
      - "관계 기관, 보안기관에서 직접 보안권고 사항을 보내주지 않더라도 한국인터넷진흥원이 운영하는 KISA 보호나라&KrCERT/CC(https://www.krcert.or.kr), 국가정보원이 운영하는 국가사이버안보센터 (www.ncsc.go.kr)의 보안권고문을 직접 확인할 수 있으므로 이를 활용하여 공지한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제26조(용역업체보안), 제36조(취약점 조치), 제74조(단말기 보안)"
      finance:
