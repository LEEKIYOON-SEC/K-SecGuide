domain: "4. 위험관리"
domain_number: 4
category: "관리적 분야"
items:
  - id: "A-15"
    title: "주요정보통신기반시설의 서비스 현황을 식별하고 업무 절차와 흐름을 파악하여 문서화"
    domain: "4. 위험관리"
    related_org:
    - "정보보호 부서"
    description:
      - "기반시설의 관리체계 전 영역에 대한 정보서비스 현황을 식별하고, 업무 절차와 흐름을 파악하여 문서화하여야 한다."
      - "문서화된 정보서비스 흐름도는 서비스 및 업무, 자산 등의 변화를 반영할 수 있도록 주기적으로(최소 연 1회 이상) 검토하고, 최신성이 유지되도록 관리하여야 한다."
    considerations:
      - "정보서비스 흐름도는 조직의 업무 절차, 정보보호 요구사항, 보안통제의 상호연계를 도식화한 자료로써 기관의 정보보호 현황을 이해하고 위험을 관리하기 위한 핵심 자료로 구비 하여야 한다."
      - "현황 및 흐름 분석을 위해 자료 분석, 현장실사, 담당자 인터뷰 등을 수행하며 인터뷰 대상자로는 시스템 운영자, 개발자, 정보보호 담당자 등을 포함하여야 한다."
      - "정보서비스 흐름도는 개발자, 운영자 등 담당 업무별로 상세하게 나누어 작성하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제81조(보호대책 수립)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제15조(해킹 등 방지대책), 제23조(비상대책 등의 수립·운용)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 1.2.2 현황 및 흐름분석"
    checklist:
      - "정보서비스 현황표"
      - "정보서비스 업무흐름도"

  - id: "A-16"
    title: "연 1회 이상 정기적으로 위험 평가 수행"
    domain: "4. 위험관리"
    related_org:
    - "정보보호 부서"
    description:
      - "법적·관리적·기술적·물리적 분야 등 다방면에서 발생할 수 있는 정보보호 관련 위험을 식별·평가하기 위해 위험평가 방법을 선정하고 문서화하여야 한다."
      - "위험관리 방법 및 절차를 구체화하여 위험관리계획을 수립하고 이에 따라 위험평가를 연 1회 이상 정기적으로 수행하거나 중요한 사유(예: 신규 시스템 도입, 조직의 변화 등) 발생 시에는 정기적 평가 외에 별도로 위험평가를 수행하여야 한다."
    considerations:
      - "기관의 특성 및 최신 취약점 및 위협동향 등을 반영하여 유형별 위협정보를 수집하고 조직에 적합한 위험평가 방법(예: 베이스라인 접근법, 상세위험 분석법, 복합 접근법, 위협 및 시나리오 기반 등)을 선정하여 연 1회 이상 위험을 평가하여야 한다."
      - "사전에 수립된 위험관리 방법 및 계획에 따라 체계적으로 수행하며 수용할 수 있는 위험은 경영진의 승인을 받도록 하여야 한다."
      - "위험평가 방법론은 조직의 특성에 맞게 적용하도록 하고, 다양한 위험 요인에 대해 측정 및 예측할 수 있도록 위험을 모델링하여 분석하여야 한다."
      - "위험평가는 정기적으로 수행하되 조직의 변화, 신규시스템 도입 등 중요한 사유가 발생한 경우 별도 위험평가 수행하여야 한다."
      - "최신 법률 개정사항 반영 등 정보보호 관련 법적 요구사항 준수 여부를 확인하고, 운영(현황)관리 문서에 변경된 자산, 서비스, 흐름도 등을 반영하여야 한다."
      - "각종 위험이 조직에 미치는 영향(발생가능성, 심각도 등)을 고려하여 위험도를 산정한다."
      - "기관에서 수용가능한 목표 위험수준(DoA, Degree of Assurance)을 정하여 그 수준을 초과하는 위험을 식별하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등), 제9조(취약점의 분석·평가)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제85조(취약점 분석·평가 결과물 관리)"
      finance:
        - "전자금융거래법 제21조의3(전자금융기반시설의 취약점 분석·평가)"
        - "전자금융감독규정 제37조의2(전자금융기반시설의 취약점 분석·평가 주기, 내용 등)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 1.2.3 위험 평가"
    checklist:
      - "위험관리 지침·매뉴얼·가이드"
      - "위험관리 계획서"
      - "위험평가 결과보고서"

  - id: "A-17"
    title: "위험평가에 따른 연간 보호대책 이행계획 수립 및 경영진 보고"
    domain: "4. 위험관리"
    related_org:
    - "정보보호 부서"
    description:
      - "위험평가 결과에 따라 식별된 위험을 처리하기 위하여 조직에 적합한 보호대책을 선정하고, 보호대책의 우선순위와 일정·담당자·예산 등을 포함한 이행계획을 수립하여 경영진에 보고하여야 한다."
      - "수립된 연도별 정보보호 업무 계획 등의 중요한 정보보호 사안은 정보보호책임자 이상의 최고경영자(또는 기관장)까지 보고하여 경영층의 책임과 관리 아래 보호대책이 시행하여야 한다."
      - "연간 정보보호 업무 계획 이외에도 최상위 정보보호 정책의 제·개정, 정보유출 등과 같은 중요한 정보보호 사안이 발생하면 최고경영자(또는 기관장)까지 보고하여 신속한 의사결정이 이루어지도록 한다."
    considerations:
      - "위험 식별 및 평가 결과에 따른 연간 보호대책 계획은 정보보호책임자, 개인정보 보호책임자 등 경영진이 이해하기 쉽게 작성하여 보고하도록 한다."
      - "식별된 위험은 이해관계자에게 내용을 공유하여 논의하고 보호대책의 우선순위를 고려하여 일정, 담당 부서,담당자, 예산 등의 항목을 포함하여 보호대책 이행계획을 수립한다."
      - "위험 발생가능성 및 심각도 등을 고려하여 위험도 산정기준을 마련하여, 식별 위험에 대하여 위험도를 산출하여야 한다. 수용 가능한 목표 위험수준(DoA : Degree of Assurance)은 정보보호 책임자 및 경영진의 승인 하에 결정하고 식별된 위험에 대한 처리 전략(감소, 회피, 전가, 수용 등)을 수립하여 위험을 관리한다."
    laws:
      common:
        - "정보통신기반 보호법 제6조(주요정보통신기반시설보호계획의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제81조(보호대책 수립)"
      finance:
        - "전자금융거래법 제21조의3(전자금융기반시설의 취약점 분석·평가)"
        - "전자금융감독규정 제37조의2(전자금융기반시설의 취약점 분석·평가 주기, 내용 등)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 1.2.4 보호대책 선정"
    checklist:
      - "정보보호 위험관리계획서"
      - "정보보호 대책서"
      - "당해 연도(또는 전년도) 위험관리 보호대책에 대한 최고경영자(기관장) 보고 문건"
