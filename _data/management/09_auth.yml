domain: "9. 인증 및 권한관리"
domain_number: 9
category: "관리적 분야"
items:
  - id: "A-39"
    title: "담당업무에 따라 시스템에 접근할 수 있는 사용자 계정 및 접근권한 부여 방법과 범위 등을 정의 및 이행"
    domain: "9. 인증 및 권한관리"
    related_org:
    - "정보보호 부서"
    description:
      - "기반시설에 접근할 수 있는 사용자의 직무 및 담당업무에 따라 계정 및 접근권한 부여를 달리하고 접근권한의 범위를 결정할 수 있는 방법 등을 정의하여 지침 또는 절차 형태로 문서화하여야 한다."
      - "사용자 계정 및 접근권한의 관리 범위는 기반시설 관련 모든 내부 시스템(예: 서버, 네트워크 장비, 보안 장비 등), 서비스(예: 업무시스템(Application), 홈페이지 등), 모바일기기(예: 스마트폰, 태블릿PC 등), PC(노트북 포함)와 내부망에 대한 유·무선 네트워크 접근통제를 포함하여야 한다."
    considerations:
      - "기반시설에 접근이 가능한 사용자에 대해 분류하고 각 사용자의 직무 및 담당업무에 따라 접근권한, 접근 범위를 부여할 수 있도록 정의하여야 한다."
      - "※ 접근권한 범위 분류 (예시)"
      - "- 사용자 계정별"
      - "- 직무 및 업무 형태별(인사 담당자, 정보보호 담당자, 시스템 관리자, 경영진, 외부자, 임시직원 등)"
      - "- 시스템 기능별(관리 기능, 서비스 기능, 조회 기능, 보안 기능 등)"
      - "기반시설 관련 중요정보에 대한 접근권한은 알 필요(need-to-know), 할 필요(need-to-do)의 원칙에 따라 업무상 반드시 필요한 범위에 한하여 최소한의 권한만을 차등 부여하여야 한다."
      - "불필요하거나 과도하게 권한이 부여되지 않도록 직무별 접근권한을 세분화하여야 한다."
      - "사용자 계정을 등록·변경·삭제하는 경우 공식적인 절차를 수립하여야 하며 다음 절차들을 포함하여야 한다."
      - "- 계정 발급에 대한 타당성 검토 절차"
      - "- 관리자 또는 특수권한 사용자의 계정 발급 및 변경에 대한 타당성 검토 절차"
      - "- 발급된 계정의 접근 범위 및 권한 등에 대한 사항 검토 절차"
      - "- 퇴사, 직무이동 등 인사정보 변경 시 계정 삭제에 대한 절차"
      - "- 접근권한 부여·변경·말소 기록에 대한 보관 절차"
      - "- 계정 및 접근권한 등록·변경·삭제 절차에 관한 책임자의 승인 절차"
      - "- 외부자 및 임시 사용자에 대한 임시 계정 발급 절차"
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제5조(접근 권한의 관리), 제6조(접근통제)"
      public:
        - "국가 정보보안 기본지침 제53조(서버 보안), 제75조(계정 관리)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제13조(전산자료 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.5.1 사용자 계정 관리, 2.5.5 특수 계정 및 권한 관리"
    checklist:
      - "사용자 계정 및 접근 권한 관리 지침"
      - "사용자 계정 및 권한 관리대장"
      - "정보시스템별 접근권한 분류표"
      - "사용자 계정 및 권한 신청서"
      - "(서식 예시 제39호) 계정등록(변경·삭제) 신청서"

  - id: "A-40"
    title: "내·외부에서 시스템 접근 시 안전한 사용자 인증 방법을 사용하고 이에 따라 이행"
    domain: "9. 인증 및 권한관리"
    related_org:
    - "정보보호 부서"
    description:
      - "서버 등의 정보시스템에 대한 관리자 및 사용자에 대한 안전한 로그인 및 비밀번호 규칙, 단말기 접속 위치 제한, 1인 1계정 사용 등 사용자 식별 및 인증수단의 안전한 적용 관리 정책을 마련하고 이에 따라 이행하여야 한다."
    considerations:
      - "관계 법규에 따라 ID, 비밀번호 이외의 강화된 사용자 인증방식(예: 인증서, OTP, I-PIN, 휴대폰인증 등)을 요구하는 경우 정보시스템에 따라서 강화된 사용자 인증방식을 적용하여야 한다."
      - "※ 사용자 인증방식 (예시)"
      - "- Type1. 지식기반 인증방식 : 비밀번호 등"
      - "- Type2. 소유기반 인증방식 : 인증서(PKI), 일회용 비밀번호(OTP), 스마트 카드, 보안토큰 등"
      - "- Type3. 생체기반 인증방식 : 지문·홍채·얼굴 인식, FIDO(Fast Identity Online) 등"
      - "- 기타 인증 방식 : IP주소·MAC주소·단말기 시리얼 번호·위치정보기반 등으로 사용자 인증 보완통제 적용"
      - "- 생체기반 인증방식 사용 시 생체인증정보는 안전하게 보관"
      - "싱글사인온 등 다양한 시스템에 대한 사용자 인증을 용이하게 하는 시스템을 운영하는 경우 병목 및 침투(인증 도용 등) 시 피해 확대 가능성이 있으므로 별도의 보안대책(주요 시스템 재인증, 강화된 인증 적용 등)을 마련하여야 한다."
      - "사용자 인증수단만을 적용하는 경우 통신 보안을 위한 암호화 기술의 추가 적용이 필요할 수 있으므로 보안성 강화를 위하여 필요 시 안전한 접속수단(VPN 또는 전용선 등)도 고려하여야 한다."
      - |
        안전한 사용자 인증 체계를 구축하기 위해 다음 사항을 참고하여 계정 도용 및 불법적인 인증 시도를 방지하는 방안을 마련하여야 한다.

        | 구분 | 설명 | 비고 |
        | --- | --- | --- |
        | 인증 실패 횟수 제한 | 일정 횟수 이상 인증 실패 시 접속 중단 | 사용자 계정 잠금 등의 조치를 취하거나 추가적인 인증수단을 적용하여 정당한 접근 권한자인지 확인. 다시 접속하고자 할 때에도 최초의 로그인과 동일한 방법으로 접속 |
        | 접속 유지시간 제한 | 접속 후 일정시간 이상 업무처리를 하지 않은 경우 자동 접속 차단 | 업무용 PC의 화면 보호기 등은 접속차단에 해당하지 않음 |
        | 동시 접속 제한 | 동일 계정으로 동시 접속 시 접속 차단 또는 알림 | - |
        | 불법 로그인 시도 경고 | 비정상적인 로그인 시도 시 접속 차단 및 알림 발송 | 미등록 IP 주소 및 새로운 기기에서 접속 시 차단하거나 추가 인증을 요구할 수 있음. 다중 로그인 시도 시 관리자에게 알림. 주말 및 야간 접속, 관리자 등 특수 권한 사용자 로그인 시 이메일 및 문자 알림 |
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제5조(접근 권한의 관리), 제6조(접근통제)"
      public:
        - "국가 정보보안 기본지침 제75조(계정 관리), 제76조(비밀번호 관리)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제14조(정보처리시스템 보호대책), 제15조(해킹 등 방지대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.5.3 사용자 인증"
    checklist:
      - "시스템 로그인 화면"
      - "로그인 실패 횟수 제한 및 로그인 실패 메시지 화면"
      - "정보시스템 계정 생성·변경·삭제 승인 절차"

  - id: "A-41"
    title: "시스템에 대한 안전한 사용자 비밀번호 관리 절차 및 작성규칙 수립·이행"
    domain: "9. 인증 및 권한관리"
    related_org:
    - "정보보호 부서"
    description:
      - "기반시설 내 정보시스템 사용자의 안전한 비밀번호 관리를 위한 관리절차 및 작성규칙을 수립하여 적용하여야 한다."
    considerations:
      - |
        안전한 비밀번호는 제3자가 쉽게 알아내기 어려운 조합으로 구성되어야 하며, 비밀번호 작성 규칙은 하단의 예시를 참고하되, 서비스의 특성 및 위험도 등을 고려하여 적절한 수준으로 적용하여야 한다.

        | 기준(예시) | 설명 |
        | --- | --- |
        | 조합 규칙 적용 | 알파벳 대문자와 소문자, 숫자, 특수문자 중 3종류 이상을 조합하여 최소 8자리 이상. 1종류의 문자로만 구성한 경우 최소 10자리 이상. ※단, 숫자로만 구성할 경우 취약할 수 있음 |
        | 변경 주기 설정 | 비밀번호 유효기간을 설정하여 주기적으로 변경. ※단, 주기적 변경 여부 및 변경 주기는 위험평가 결과 등을 고려하여 자체적으로 결정. ※비밀번호가 제3자에게 노출되었을 경우에는 지체없이 변경하여야함 |
        | 추측하기 쉬운 비밀번호 설정 제한 | 동일한 문자 또는 숫자 반복, 키보드 상에서 나란히 있는 문자열, 일련번호, 연속적인 숫자, 생일, 전화번호 등 추측하기 쉬운 개인정보 및 아이디와 비슷한 비밀번호 사용 제한 |
        | 동일한 비밀번호 재사용 제한 | 비밀번호 변경 시 이전에 사용한 비밀번호 재사용 제한 |
        | 비밀번호 공유 제한 | 동일한 비밀번호를 여러 사람이 공유하여 작성·사용하는 것 제한 |
      - "※ 비밀번호 관리절차 (예시)"
      - "- 비밀번호 작성규칙 수립"
      - "- 주기적으로 비밀번호 변경 및 점검"
      - "- 시스템 도입 시 설정된 초기 및 임시 비밀번호 변경 후 사용"
      - "- 비밀번호 입력 시 마스킹('****' 또는 '●●●●' 표시 등) 처리"
      - "- 종이, 파일, 기기 등에 비밀번호 기록을 제한하고 필요한 경우에는 암호화 등의 보호대책 적용"
      - "- 침해사고 발생 또는 노출 의심 시 지체없이 비밀번호 변경"
      - "- 비밀번호 변경 시 본인확인 절차 수행"
      - "- 관리자 및 특수권한 계정의 비밀번호는 비밀등급에 준하여 관리 등"
      - "비밀번호 외의 인증수단을 사용할 경우 해당 인증수단이 비인가자에게 탈취되거나 도용되지 않도록 보호대책을 적용하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제5조(접근 권한의 관리)"
      public:
        - "국가 정보보안 기본지침 제76조(비밀번호 관리)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제19조의2(사용자 인증수단 관리), 제34조의2(이용자 비밀번호 관리)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.5.5 비밀번호 관리"
    checklist:
      - "비밀번호 관리 절차 및 정책"
      - "정보시스템에 설정된 비밀번호 규칙"
      - "정보시스템 및 홈페이지 비밀번호 설정 화면"

  - id: "A-42"
    title: "시스템에 대한 사용자 계정 및 접근권한의 적정성 검토 기준, 검토 주체, 검토 방법, 주기 등을 수립하여 정기적 검토를 이행"
    domain: "9. 인증 및 권한관리"
    related_org:
    - "정보보호 부서"
    description:
      - "기반시설 정보시스템에 등록된 사용자 계정이나 접근권한이 적절하게 할당되었는지 검토 기준, 검토주체, 검토방법, 주기 등을 수립하여 정기적으로 검토하여야 한다."
      - "정보시스템과 중요정보에 대한 사용자 계정 및 접근권한의 생성·할당·이용·변경·제거·말소 등 이력을 문서화하고 보관하여야 한다."
      - "사용자 계정 및 접근권한 검토 결과 인사정보에 변경사항이 있거나 불필요한 계정 및 접근권한 등의 사항이 발견된 경우 재조정하기 위한 절차를 수립하고 이행하여야 한다."
    considerations:
      - "사용자 계정 및 접근권한에 대한 신청정보(신청자, 신청일시, 사용기간 등), 승인정보(승인자, 승인·거부 사유 등), 등록정보(등록일, 등록방법 등), 관리정보(대상 시스템, 권한명, 권한내역 등) 등 필요한 사항을 모두 포함하여 책임추적성을 확보할 수 있도록 기록하여야 한다."
      - "접근권한 기록은 법적 요구사항 등을 반영하여 최소 3년간 보관하여야 한다."
      - "사용자 계정 및 접근권한의 적정성 검토 기준, 검토주체, 검토방법, 주기 등을 수립하여 정기적 검토를 이행하여야 하며 검토주기는 반기 1회 이상 수행하는 것을 권고한다."
      - "※ 계정 및 접근권한 검토 시 고려사항 (예시)"
      - "- 기반시설의 환경변화 반영 여부"
      - "- 퇴직, 직무변경, 휴직 등 인사 변경 여부"
      - "- 인사변경 여부에 따라 계정 및 접근권한 회수, 재조정 사항"
      - "- 직무변경 시 기존 권한 회수 및 신규 업무 권한 부여 절차 여부"
      - "- 외부 인력에 발급·할당된 계정 현황"
      - "- 임시 계정 발급·할당·회수 절차 관리 여부"
      - "- 업무 수행에 필요한 최소한의 권한 부여에 관한 사항"
      - "- 계정 및 접근권한 할당 시 절차 준수 여부"
      - "- 계정 및 접근권한 관리대장과 실 시스템 계정 및 권한 일치 여부"
      - "- 장기간 미사용 계정(3개월 이하 권고)에 대한 현황 조사 및 조치 여부"
      - "검토 결과 권한의 과다 부여, 절차 위반, 권한 오·남용 등 문제가 발견된 경우 소명요청 및 원인분석 및 소명요청, 보완대책 마련, 보고체계 등 포함한 절차를 마련하고 시행하여야 한다."
      - "계정 및 접근권한 검토 후 변경사항에 대해서는 사용자 및 관리자 등에게 통지하고 문제의 근본 원인을 분석하여 재발 방지 대책을 수립하여야 한다."
    laws:
