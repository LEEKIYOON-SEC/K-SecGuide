  - id: "A-72"
    title: "전자기록 보관을 위한 별도의 방법(아카이빙)을 마련하고, 이를 통해 관리"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    - "시스템 운영 부서"
    description:
      - "전자기록을 안전하게 보관하기 위하여 별도의 방법(아카이빙)에 따른 절차를 마련하고 이를 통제 전자기록을 저장‧관리하여야 한다."
      - "전자기록 보관에 대한 내부 절차는 아카이빙 백업 대상, 주기, 방법, 절차 등을 포함하여 계획을 수립하여야 한다."
      - "데이터 백업본은 원본 정보시스템과는 별도의 위치(예: 백업 스토리지, 원격지 백업 등)에 저장되어야 하며, 분실 위험이 있는 저장매체(예: 백업테잎(DAT), CD, 외장HDD 등)는 지정된 안전한 장소(예: 시건된 캐비넷)에 보관하여야 한다."
    considerations:
      - "아카이빙(Archiving)은 데이터를 원래 위치에서 다른 곳으로 이동하여 장기간 보관하는 것을 의미하며, 데이터 아카이빙을 통하여 현재 운영 시스템에서 사용 빈도가 낮은 데이터를 장기간 보관할 수 있는 특수 아카이브 스토리지 시스템으로 이동하여 관리한다."
      - "별도의 장소, 공간에 데이터의 백업 매체를 보관(수 km에서 수백 km 이상 거리에 백업 데이터를 보관하는 데이터 백업 소산을 의미하는 것이 아님)하고, 백업 매체가 훼손, 변경, 분실되지 않도록 안전한 보관 방법을 마련하여야 한다."
      - |
        아카이빙과 백업 개념의 차이점은 다음과 같다.

        | 구분 | 아카이빙(Archicing) | 백업(Backup) |
        | --- | --- | --- |
        | 목적 | 데이터 장기 보관 및 접근 | 데이터 복원 |
        | 용도 | 필요시 데이터 참조 및 증명 | 데이터 손실 또는 장애 발생 시 신속한 복구 |
        | 접근성 | 접근성이 낮음 | 접근성이 높음 |
        | 복구시간 | 느린 데이터 복구 | 신속한 데이터 복구 |
        | 저장주기 | 조직의 설정한 정책 주기를 따름 | 일별, 주별, 월별 등 주기적 저장 |
        | 데이터상태 | 원본 상태 그대로 저장 | 특정 시점의 복사본으로 저장 |
        | 저장위치 | 클라우드, 테이프 등 저렴한 스토리지 | 디스크, 클라우드 등 백업 전용 장비 |
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보 보호법 시행령 제30조(개인정보의 안전성 확보조치)"
      public:
        - "국가 정보보안 기본지침 제92조(재난 방지대책)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제13조(전산자료 보호대책), 제14조(정보처리시스템 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.9.3 백업 및 복구관리"
    checklist:
      - "데이터 보안 및 저장 관리지침(아카이빙 방안 포함)"
      - "데이터 백업 절차서"
      - "백업 매체 또는 백업 스토리지가 위치한 장소"
      - "백업 매체"

  - id: "A-73"
    title: "시스템 및 정보보호시스템 접근기록(로그 등)을 생성‧보관하고, 이에 대한 비인가 열람, 훼손 등을 방지하기 위한 보호대책 운영"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    - "시스템 운영 부서"
    description:
      - "서버, 응용프로그램, 네트워크 장비, 보안 장비(정보보호시스템)에 대해 사용자 및 관리자 등의 접근기록(로그 등)이 생성되도록 하며, 이러한 접근기록은 비인가자의 무단 열람이나 위·변조를 방지하기 위해 접근통제 등을 적용하여 안전하게 보관하여야 한다."
      - "시스템 접근기록은 공격자 및 유지보수 운영자에 의해 훼손될 우려가 있으므로, 로그 서버 운영 또는 백업매체를 통해 별도로 보관하여야 한다. 또한, 로그서버 관리자 또는 백업 관리자를 지정하여 보안을 강화하여야 한다."
      - "시스템 및 정보보호시스템 접근기록은 최소 1년 이상 보관하여야 한다"
      - "관계 법규에 따라 시스템의 접속기록 보관기간(예: 개인정보처리시스템의 경우 최소 1년 이상 또는 최소 2년 이상) 등이 정해져 있는 경우가 존재하므로, 보관하여야 하는 접속기록의 대상과 기간 등에 유의하여야 한다."
    considerations:
      - "시스템 및 정보보호시스템 관리자는 접근기록의 정확성을 확보하기 위해 시간 동기화 프로토콜(NTP)을 적용하여야 한다."
      - |
        개인정보처리시스템에 접속한 사용자가 수행한 업무 내역은 식별자, 접속 일시, 접속지 정보, 처리한 정보주체 정보, 수행 업무 등을 포함하여 전자적으로 기록하여야 하며 접속기록 보존기간은 다음과 같다.

        | 보존 기간 | 구분 |
        | --- | --- |
        | 최소 1년 이상 | 일반적 보존기간 |
        | 최소 2년 이상 | 5만명 이상의 정보주체에 관한 개인정보를 처리하는 개인정보처리시스템 |
        | | 고유식별정보 또는 민감정보를 처리하는 개인정보처리시스템 |
        | | 개인정보처리자로서 「전기통신사업법」 제6조 제1항에 따라 등록된 기간통신사업자 |
      - "WORM(Write Once Read Many) 스토리지 등 덮어쓰기 방지 매체에 접근기록을 저장할 경우 위‧변조, 훼손 등을 방지할 수 있다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제8조(접속기록의 보관 및 점검)"
      public:
        - "국가 정보보안 기본지침 제55조(로그기록 유지)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제12조(단말기 보호대책), 제13조(전산자료 보호대책), 제15조(해킹 등 방지대책), 제18조(IP주소 관리대책)"
      ict:
