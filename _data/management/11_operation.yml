        - "전자금융감독규정 제14조(정보처리시스템 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.9.5 로그 및 접속기록 점검, 2.11.3(이상행위 분석 및 모니터링)"
    checklist:
