domain: "11. 운영관리"
domain_number: 11
category: "관리적 분야"
items:
  - id: "A-58"
    title: "자산 및 시스템을 신규 도입·개발 또는 변경하는 경우 법, 규제, 계약상의 요구사항을 정의하여 문서화"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    - "운영관리 부서"
    description:
      - "자산 및 시스템을 신규 도입·개발 또는 변경 시 내부 점검 기준으로 정보보호 규제 준수를 점검하기 위해 관계 법규 또는 계약상의 보안 요구사항을 정의하여 문서화하여야 한다. (예: 보안성 검토, 보안 적합성 검증)"
      - "특히 관계 법규(예: 기반시설의 관리·물리 (기본)점검항목, 기타 법규(예: 공공기관, 금융, 개인정보의 안전성 확보조치 기준) 등)에서 요구하는 주요 사항을 목록화하여 문서화하고 이를 자체 점검하는데 활용할 수 있도록 한다."
    considerations:
      - "관계 법규의 제·개정에 따라 법적 요구사항을 반영하여 수립된 내부 정책·지침 등이 변경될 수 있으므로, 보안점검 체크리스트는 수시 또는 주기적으로 재검토 하도록 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
      public:
        - "국가 정보보안 기본지침 제20조(정보통신제품 도입), 제26조(용역업체 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.8.1 보안 요구사항 정의"
    checklist:
      - "자산 및 시스템 도입·개발·변경 시 법적 보안 요구사항 목록"
      - "자산 및 시스템 도입·개발·변경 관련 내부 보안점검 목록(예: 보안점검 체크리스트)"

  - id: "A-59"
    title: "자산 및 시스템을 신규 도입·개발 또는 변경하는 경우 보안성 검토 및 호환성 검토 수행하고 보안책임자는 이를 확인 및 승인"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    description:
      - "서버, 네트워크 장비, 보안 장비 등 자산 도입 및 개발 또는 변경 시 발생 가능한 보안 위협을 최소화하기 위하여 사전 보안성 검토 및 호환성 검토 절차를 거치도록 하여야 한다."
      - "보안성 검토를 위해서는 시스템이 충족하여야 하는 보안요구사항을 사전에 정의하고, 이를 만족하는지 검토한 후 그 결과에 따라 도입‧개발 또는 변경 여부를 결정한다."
      - "보안성 및 호환성 검토 결과는 수립된 절차에 따라 정보보호책임자 등에게 보고하고 승인을 받아야 한다."
    considerations:
      - "보안성 검토 시 보안취약점이 도출되거나 보안대책이 필요한 경우 개선 및 보완 조치 완료 후 시스템을 도입하도록 한다."
      - "공공기관은 국가 정보보안 기본지침에 따라 보안성 검토를 공식적이고 규제적인 절차에 따라 진행하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
      public:
        - "국가 정보보안 기본지침 제20조(정보통신제품 도입), 제27조(소프트웨어 개발보안), 제50조(정보시스템 보안책임)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제36조(자체 보안성심의)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.8.2 보안 요구사항 검토 및 심의"
    checklist:
      - "자산 및 시스템 도입 시 보안성 검토 절차(예: 명문화된 업무 지침)"
      - "보안성 검토 수행 이력 및 관리책임자의 승인 이력"
      - "시스템 구매 예정 시 또는 구매 결정 시에 보안성 검토를 거쳐 도입이 결정된 사례"
      - "(서식 예시 제12호 - 시스템 조사표)"
      - "(서식 예식 제13호 - 정보보호시스템 도입 시 확인사항)"
      - "(서식 예식 제14호 - 네트워크 장비 도입 시 보안요구사항)"
      - "(서식 예식 제15호 - 정보보호시스템 도입 시 보안요구사항)"
      - "(서식 예식 제16호 - 시스템 운영 전 보안요구사항)"

  - id: "A-60"
    title: "시스템의 변경관리 절차 수립·이행"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    - "시스템운영 부서"
    description:
      - "서버, 네트워크, 보안 장비 등 정보시스템에 대한 변경(예: 접근권한, 설정, 패치 등)은 사전에 정의된 업무 절차 (예: 지침 및 절차, 그룹웨어 등)에 따라 검토 및 승인을 받고, 변경관리가 이루어져야 한다."
      - "시스템 변경작업 시에는 작업계획 수립, 검토 및 승인 등의 절차를 마련하고, 업무 이력을 기록 및 관리하여야 한다. ITSM(IT Service Management) 업무시스템을 구축한 경우 해당 업무시스템의 요청, 검토, 승인 절차를 따라야 하며, 이력은 관련 로그(Log) 형태로 보관하여야 한다."
      - "시스템 변경에 따른 영향을 분석하여 영향을 최소화할 수 있도록 하여야 하며, 큰 영향을 미치는 변경에 대해서는 사전에 변경내용, 일시, 시스템 변경으로 인한 영향 등을 관련자에게 공지하여야 한다."
    considerations:
      - "ITSM(IT Service Management)은 국제표준 ITIL(IT Infrastructure Library)에 기반하여 각종 IT 자산의 운영 전반을 관리하는 업무체계 또는 업무시스템을 의미한다."
      - "자동화된 업무시스템을 사용하지 않는 경우, 시스템에 대한 작업 신청, 검토 및 승인을 통해 변경관리를 진행하는 것으로 볼 수 있다. 주요 시스템의 작업의 경우 상세 작업계획서 작성 후 검토 및 승인 이후 변경 작업을 진행한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제50조(정보시스템 보안책임)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제14조(정보처리시스템 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.9.1 변경관리"
    checklist:
      - "시스템 변경 관리 절차"
      - "시스템 변경 검토 및 승인 내역"
      - "시스템 변경에 따른 영향 분석 결과"
      - "ITSM 등의 업무시스템"
      - "(서식 예시 제40호) 네트워크 변경내용 신청서"

  - id: "A-61"
    title: "정보보호시스템은 국내용 CC인증을 받았거나, 보안적합성 검증 수행"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    description:
      - "기반시설에 사용되는 정보보호시스템은 안전성 검증필 제품(국내용 CC인증 및 보안기능 확인서 등) 또는 보안적합성 검증 수행 제품을 사용하여야 한다."
    considerations:
      - "제품 유형별 도입기준 및 안전성 검증필 제품은 국가사이버안보센터 홈페이지 (https://www.nis.go.kr/ 참고)를 통해 확인할 수 있으며, 별도 보안적합성 검증을 수행할 시에도 홈페이지에 명시된 절차를 참고하여 도입을 진행하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
      public:
        - "국가 정보보안 기본지침 제20조(정보통신제품 도입)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제15조(해킹 등 방지대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.8.2 보안 요구사항 검토 및 시험"
    checklist:
      - "정보시스템 도입 현황 (예: 정보시스템 장비 목록)"
      - "정보보호시스템 도입확인서"
      - "도입된 정보보호시스템에 대한 국내 CC인증 여부"
      - "(참고 자료 제12호) 정보보호시스템 도입 요건 (공공기관 사전인증 제품 도입 시)"

  - id: "A-62"
    title: "제품 및 서비스에서 계약 등으로 협의된 사항 이외 이상행위가 발생하는지 모니터링"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    description:
      - "제품 및 서비스 계약 이행과정에서 협의 사항 이외 악용 가능 행위를 인지할 수 있도록 로그 검토 주기, 대상, 방법을 포함하여 모니터링 절차를 수립·이행하여야 한다."
      - "주기적으로 로그 검토 및 모니터링 결과를 책임자에게 보고하고, 이상행위가 감지되었을 때 신속하게 대응할 수 있도록 경고 및 알림 정책을 수립하여야 한다."
      - "이상행위를 판단하기 위한 기준과 임계치를 정의하고 정보시스템, 보안시스템, 응용프로그램, 네트워크 장비 등의 로그를 실시간으로 모니터링하여 신속하게 이상행위를 탐지하고 식별할 수 있는 체계를 갖추어야 한다."
      - "계약 시 계약서나 협약서 등을 통하여 보안 요구사항을 명확하게 명시하여야 한다."
    considerations:
      - "이상행위 발생 모니터링 체계를 수립할 때에는 이벤트 로그를 수집하거나 모니터링 하여야 할 대상 및 범위, 모니터링 방법, 담당자 및 책임자, 분석 및 모니터링 결과 보고 체계, 이상행위 발생 시 대응 절차 등을 고려하여야 한다."
      - "이상행위가 확인된 경우 규정에 따라 긴급 대응, 소명 요청, 원인 조사 등 사후조치를 수행하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제8조(접속기록의 보관 및 점검)"
      public: []
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제14조(정보처리시스템 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.11.3 이상행위 분석 및 모니터링"
    checklist:
      - "제품 및 서비스 표준 계약서(보안 요구사항 명시)"
      - "로그 검토 및 모니터링 절차"
      - "로그 검토 및 모니터링 결과"
      - "이상행위 분석 및 모니터링 내역"
      - "이상행위 발견 시 대응 증적"

  - id: "A-63"
    title: "개발 및 테스트 설비는 실제 운영설비와 분리하여 운영"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    - "개발 부서"
    description:
      - "정보시스템 개발 및 테스트 설비는 원칙적으로 실제 운영설비와 물리적으로 분리하여 운영하여야 한다."
      - "개발 및 테스트를 수행하는 정보시스템과 실제 운영 중인 정보시스템은 비인가 접근 및 변경의 위험을 줄이기 위해 원칙적으로 물리적으로 분리하고, 서로 다른 네트워크 대역에 위치하도록 한다."
    considerations:
      - "네트워크 대역을 서로 분리할 때 물리적인 분리 또는 논리적인 분리 모두 가능하다."
      - "VLAN 설정을 통해 개발 및 테스트망과 운영망을 분리하는 경우, ACL(Access Control List) 설정 등으로 상호 접근을 통제하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
      public:
