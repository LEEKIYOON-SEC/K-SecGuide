      public:
        - "국가 정보보안 기본지침 제55조(로그기록 유지)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제14조(정보처리시스템 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.9.5 로그 및 접속기록 점검"
    checklist:
      - "로그 검토 및 모니터링 절차"
      - "로그 검토 및 모니터링 결과(검토 내역, 보고서 등)"
