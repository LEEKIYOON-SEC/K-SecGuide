      - "장애관리 지침은 장애처리 및 관리를 위한 업무시스템의 변경에 따라 개정될 수 있으므로 주기적인 제·개정에 대한 관리를 하여야 한다."
    considerations:
      - "장애관리 지침에는 장애유형 및 심각도 정의, 장애유형 및 심각도별 보고 절차, 장애유형별 탐지 방법 , 장애 대응 및 복구에 관한 책임과 역할 정의, 장애기록 및 분석, 대고객 서비스인 경우 고객 안내 절차, 비상연락체계(유지보수업체, 정보시스템 제조사) 등을 포함한다."
      - "정보시스템의 장애를 사전에 예방하고 장애 발생 징후를 신속히 탐지할 수 있도록 성능 및 용량을 지속적으로 모니터링하는 방안을 고려할 필요가 있다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
      public:
        - "국가 정보보안 기본지침 제51조(정보시스템 유지보수), 제92조(재난 방지대책)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제14조(정보처리시스템 보호대책), 제25조(정보처리시스템 성능관리)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.9.2 성능 및 장애관리"
    checklist:
      - "장애 처리 및 관리를 위한 지침(또는 절차)"
      - "심각도 높은 장애 처리 및 관리를 위한 지침(또는 절차)(예: 업무연속성관리(비상계획) 지침)"
      - "장애 처리 및 관리를 위한 업무시스템(예: 장애관리시스템, 그룹웨어 등)"

  - id: "A-70"
    title: "백업 대상, 주기, 방법, 보관 장소, 보관기간, 소산 등을 포함한 백업 절차 수립·이행"
