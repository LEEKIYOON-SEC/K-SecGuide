  - id: "A-76"
    title: "정보나 매체가 용도 폐기되기 위한 폐기 방법 수립‧이행"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    description:
      - "정보나 매체의 용도 폐기 사유가 발생한 경우, 복구나 재생이 불가능하도록 안전한 폐기 절차를 수립하고 이행하여야 한다."
      - "종이 등의 기록물, 인쇄물, 복사물 등은 파쇄 또는 소각하여 폐기하고, 전산자료는 전용 소자 장비(예: 이레이저 또는 디가우저)를 이용하여 데이터가 복원되지 않도록 파기하여야 한다."
      - "자체적으로 정보 및 매체를 폐기할 경우, 관리대장을 통해 폐기 이력(폐기일자, 폐기 담당자 및 책임자 서명, 폐기방법, 폐기확인증적 등)을 기록하여야 한다."
      - "외부업체를 통하여 정보 및 매체를 폐기할 경우, 폐기 절차와 관련된 내용을 계약서에 명시하고, 폐기 절차가 제대로 이행되는지 감독하여야 한다. 또한, 완전한 폐기를 증명하는 증적(예: 사진, 동영상 등)을 보관하여야 한다."
    considerations:
      - |
        이레이저(Eraser)와 디가우저(Degausser)의 개념의 차이점은 다음과 같다.

        | 구분 | 이레이저(Eraser) | 디가우저(Degausser) |
        | --- | --- | --- |
        | 정의 | 저장매체의 데이터를 수회 삭제 및 덮어쓰기를 반복하면서 원 데이터를 복원 불가능한 수준으로 완전삭제하는 장비(또는 S/W)를 의미 | 강력한 자기장을 이용하여 하드디스크 등의 저장 장치에 기록된 데이터를 파괴하는 장비를 의미 |
        | 목적 | 재사용 목적 | 폐기(재사용 불가) 목적 |
      - |
        저장매체를 폐기할 때는 물리적 및 전자적으로 완전히 파괴하고, 재사용할 때는 완전 포맷을 통해 모든 정보를 삭제하여야 한다. 저장매체별·자료별 차별화된 삭제 방법을 다음 분류에 따른 기준 이상으로 적용하여야 한다.

        | 저장매체\저장자료 | 공개자료 | 비공개 자료 | 대외비 자료 | 비밀 자료 |
        | --- | --- | --- | --- | --- |
        | 자기테이프 플로피디스크 | 자체 판단 | 물리적 파괴 | 물리적 파괴 | 물리적 파괴 |
        | 광디스크(CDㆍDVD 등) | 자체 판단 | 물리적 파괴 | 물리적 파괴 | 물리적 파괴 |
        | 반도체메모리(SSDㆍUSB 등) | 포맷 또는 삭제 | 완전삭제 제품 | 물리적 파괴 | 물리적 파괴 |
        | 하드디스크 | 포맷 또는 삭제 | 디가우징 또는 완전삭제 제품 | 물리적 파괴 | 물리적 파괴 |
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제21조(개인정보의 파기), 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제13조(개인정보의 파기)"
      public:
        - "국가 정보보안 기본지침 제61조(저장매체 불용처리)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제13조(전산자료 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.9.7 자산의 재사용 및 폐기"
    checklist:
      - "정보 또는 저장매체의 폐기 방법 및 지침"
      - "종이 또는 저장매체에 대한 폐기 기록 및 증빙(예: 요청, 승인, 수행 이력)"
      - "(해당하는 경우) 보안 폐기 외주용역 계약서, 폐기 확인서"

  - id: "A-77"
    title: "보안규정의 이행여부를 확인하는 주기적인 보안점검 및 불시 보안점검 수행"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    description:
      - "보안규정의 이행여부를 확인하기 위해 연 1회 이상 주기적으로 보안점검을 수행하여야 한다."
      - "보안규정에 따른 임직원 보안업무 생활화 이행여부를 확인하기 위해 불시 보안점검(생활보안 점검)을 수행하여야 한다."
      - "연 1회 이상 수행하는 보안점검은 내부 보안규정과 관리적·물리적 취약점 점검항목을 고려하여 수행하고, 발견된 문제점은 정보보호책임자(정보보안담당관)에게 보고하여야 한다."
      - "보안점검 완료 후, 보완이 필요한 사항에 대해 조치계획을 수립하고, 조치 완료 여부를 점검하여야 한다."
    considerations:
      - "정보보호 및 개인정보보호 관리체계(ISMS-P) 인증과 같은 대외 보안인증을 유지하는 경우, 해당 인증기준에 주요정보통신기반시설 보호지침에 따른 관리적·물리적 취약점 점검항목(보안인증 기준에 따른 내부 보안감사도 주기적인 보안점검으로 인정)을 포함하여 수행할 필요가 있다."
      - "보안규정의 이행여부를 확인하기 위하여 점검기준, 범위, 점검인력, 자격요건 등 점검계획을 수립하고 정보보호책임자에게 보고하여야 한다."
      - "점검기준 : 조직내부에서 수립한 보안 규정"
      - "점검범위 : 전사 또는 기반시설 범위 포함"
      - "점검주기 : 최소 연 1회 이상 수행 필요"
      - "점검인력 자격요건 : 점검의 객관성, 독립성 및 전문성을 확보할 수 있도록 자격 요건 정의"
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제4조(내부 관리계획의 수립·시행 및 점검)"
      public:
        - "국가 정보보안 기본지침 제8조(정보보안감사 등)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제8조(인력, 조직, 교육 및 예산))"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 1.4.2 관리체계 점검"
    checklist:
      - "당해 연도(또는 전년도) 보안실태점검 계획서·결과서"
      - "보안실태점검 이행조치 결과서"
      - "(참고 자료 제11호) 정보보안 점검항목 (예시)"

  - id: "A-78"
    title: "비밀(대외비 포함)을 비밀관리기록부 등에 등재하여 관리"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    - "비밀관리 부서"
    description:
      - "공공기관일 경우, 비밀 정보(I급, II급, III급)는 행정안전부의 ‘비밀기록물 관리 실무지침’을 참고하여 비밀관리기록부에 등재하고, 이의 열람, 파기 등의 이력을 철저히 관리하고, 안전하게 보관하여야 한다."
      - "민간 기업의 경우 대외 공개가 제한되는 문서를 대외비(Confidential)로 분류하고, 모든 문서에 보안등급 (각 등급 별로 보안 관리와 보호가 필요함을 의미)을 적용하여 각 등급에 따라 관리하여야 한다."
    considerations:
      - "공공기관의 비밀관리 절차는 법제처 웹사이트에서 보안업무규정 및 보안업무규정 시행규칙을 참고하여 관련 기준, 비밀표기 방법, 생산부터 폐기까지의 이력관리, 보관 등의 상세한 내용을 확인하여 적용하여야 한다."
      - "공공기관은 비밀등급 문서를 관리할 때, 비밀취급인가증을 소지한 인원만이 생산부터 폐기까지 모든 관리 권한을 보유한다. 비밀의 등록관리에 중점을 두며, 관련 법규에 따라 비밀취급인가에 관련된 사항을 적용하여야 한다."
      - "비밀 문서를 전사적으로 처리하고자 할 경우 안전한 암호 모듈을 사용하여 위조·변조·훼손 및 유출을 방지한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
      public:
        - "국가 정보보안 기본지침 제63조(비밀관리시스템 운용)"
        - "보안업무규정 제22조(비밀관리기록부)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제13조(전산자료 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.1.3 정보자산 관리"
    checklist:
      - "비밀 문건 관리 기준 지침 또는 절차"
      - "비밀관리기록부"
      - "(서식 예시 제17호) 비밀관리기록부"

  - id: "A-79"
    title: "출력된 비밀문서의 경우 잠금 장치가 있는 캐비넷 등에 안전하게 보관"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    description:
      - "출력된 비밀문서(또는 전산자료가 보관된 CD, USB메모리, HDD)는 보관 관리주체(예: 총무부서)와 보관장소(예: 이중시건 캐비넷)를 정하여 일원화된 관리가 이루어지도록 하여야 한다."
      - "비밀문서는 출입이 엄격하게 통제된 장소에 보관하여야 하므로 통제구역 수준의 장소에 보관하는 것이 필요하며, 비밀문서의 규모가 크지 않아 사물함, 캐비넷 등에 보관하여야 한다면 이중시건이 가능한 장치를 설치하여 보관하여야 한다. 또한 화재 등으로부터 소실될 우려가 있다면 내화금고에 비밀문서를 보관한다."
    considerations:
      - "출력된 비밀문서를 안전하게 관리하기 위해 집적된 비밀문서는 통제구역으로 지정된 장소에 보관하거나 이중시건 캐비넷 등의 보호조치를 적용하여야 한다."
      - "공공기관의 비밀 보안등급에 따라 다음과 같이 보관 기준을 다르게 마련할 수 있다."
      - "I급 비밀은 반드시 금고에 보관하고, 다른 비밀과 혼합하여 보관하지 않는다."
      - "II급 비밀 및 III급 비밀은 금고 또는 이중시건 캐비넷 등 잠금장치가 있는 장소에 보관하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제10조(물리적 안전조치), 제12조(출력ㆍ복사시 안전조치)"
      public:
        - "국가 정보보안 기본지침 제62조(비밀의 전자적 처리)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제13조(전산자료 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.4.7 업무환경 보안"
    checklist:
      - "비밀문서 보관 통제구역"
      - "이중시건 캐비넷"

  - id: "A-80"
    title: "비밀 등 중요정보의 안전한 처리를 위한 보호대책을 마련하거나 시스템을 도입하여 사용"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    description:
      - "비밀 등 중요 정보의 생성, 분류, 저장, 접근, 전송, 삭제에 관한 보호대책을 마련한다."
      - "비밀 등 중요 정보를 정보통신망을 통해 처리하는 경우 저장, 전송 시에 암호화가 이루어지도록 하는 등의 시스템화된 보호대책을 적용하여야 한다."
      - "비밀 등 중요 정보는 사용자에게 보호대책를 맡기는 관리적인 대책보다는 시스템 솔루션 등을 사용하여 보다 확실한 기술적 대책 마련을 강구하여야 한다."
      - "공공기관은 비밀 등급 자료에 대한 비밀관리시스템 등을 도입하여 안전한 정보 처리를 하여야 한다."
    considerations:
      - "보호대책 마련시 비밀 등 표시 방법, 처리 기록의 보관 및 관리, 비밀을 관리하기 위한 각종 대장 등 양식, 암호화‧접근통제 등 기술적 보호대책 등을 고려하여야 한다."
      - "비밀 등 중요 정보를 안전하게 처리하기 위해 다음과 같은 기능을 구현한 시스템을 자체 개발하거나 그 기능을 갖춘 보안시스템을 도입하는 방법으로 보호대책을 적용하여야 한다."
      - "메일서버에 보안(비밀)메일 발송(예: 암호화 전송) 및 관리(예: 발송이력 확인) 기능을 포함하여 운영"
      - "암호화 대상 중요 정보(예: 고유식별정보)를 DB암호화하는 시스템 운영"
      - "중요 정보(DB)에 접근하는 기록을 모니터링하고 불법적인 접근행위를 탐지하는 시스템 운영"
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
      public:
        - "국가 정보보안 기본지침 제62조(비밀의 전자적 처리), 제63조(비밀관리시스템 운용)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제13조(전산자료 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.1.3 정보자산 관리"
    checklist:
      - "시스템 운영(사용) 계획"
      - "시스템 운영(사용) 현황"
      - "중요 문서 접근 통제 보호 대책"

  - id: "A-81"
    title: "정보통신망 세부 구성현황(IP 정보 등)등을 대외비 이상으로 관리"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    - "시스템 운영 부서"
    description:
      - "정보통신망의 세부 구성현황(네트워크 구조, 장비 정보, IP 주소 등)은 정보의 유출 시 해킹, 정보 유출, 서비스 마비, 법적 책임 등 심각한 위험을 초래할 수 있으므로 외부에 유출되지 않도록 하여야 한다. 공공기관은 비공개 업무자료 이상, 민간기업은 대외비 이상 수준의 보안으로 안전하게 관리하여야 한다."
      - "관계 법규에서 엄격한 관리를 요구하는 중요정보에 대하여 적절한 보안수준으로 분류하여 관리하여야 한다. 특히 정보통신망에 대한 세부 구성현황(예: 네트워크 세부 구성도, IP 할당 현황, 정보시스템 상세 현황(목록), 중요(민감) 정보화 사업 상세 현황 등)은 반드시 비공개 업무자료 및 대외비 자료로 관리하여야 한다."
    considerations:
      - "정보시스템(서버/네트워크/애플리케이션) 구성도, IP 관리대장 등 전자 문서의 경우 문서 암호화, 워터마킹, 접근통제 등의 보호대책을 적용하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
      public:
        - "국가 정보보안 기본지침 제71조(정보통신망 현황자료 관리)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제18조(IP주소 관리대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.1.3 정보자산 관리"
    checklist:
      - "네트워크 구성도 및 IP자산대장 대외비 분류 현황"
      - "해당 대외비 보관 장소"

  - id: "A-82"
    title: "중요 데이터와 일반 데이터를 다른 서버에 분리 보관"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    - "DB 운영 부서"
    description:
      - "대외 유출이 엄격히 제한되는 중요 데이터는 일반 데이터와 구분하여 별도의 서버에 보관하여 유출 위험을 완화하여야 한다."
      - "DB는 다른 용도의 서버와 함께 운영하지 않고 분리 운영하여야 하며, DB서버 용도로 구축된 전용 시스템에 보관(웹서버와 DB서버는 동일한 시스템에 구축 제한 등)하여야 한다."
    considerations:
      - "개인정보 및 중요정보의 정의 및 분류 기준은 조직에 따라 상이하므로 해당 기관의 규정을 준수하여 분류하여야 한다."
      - "분리 보관되는 개인정보 및 중요정보는 업무 목적상 필요한 최소 인원에게만 최소한의 접근권한을 부여하는 등 접근통제 방안을 적용하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
      public:
        - "국가 정보보안 기본지침 제53조(서버 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제13조(전산자료 보호대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.6.4 데이터베이스 접근"
    checklist:
      - "중요정보에 대한 분류 정의(예: 규정 또는 지침)"
      - "중요 정보시스템(예: DB 서버)"
      - "네트워크 구성도(서버 분리 구성 여부 표시 등)"

  - id: "A-83"
    title: "홈페이지 게시 자료에 대해 게시 절차를 마련하고 시행"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    - "서비스 운영 부서"
    description:
      - "홈페이지에 공식적인 자료 게시 절차가 없을 경우, 중요정보 및 개인정보 등 비공개 정보가 의도치 않게 노출될 가능성이 존재하므로, 이러한 위험에 대응할 수 있도록 게시 담당자 지정 및 책임자 승인 등의 절차를 수립‧이행하여야 한다."
    considerations:
      - "홈페이지에 비공개 정보가 무단 게시되었는지 여부를 정기적으로 점검하여야 한다."
      - "금융회사 또는 전자금융업자는 홈페이지(공개용 서버)에 자료를 게시하는 경우, 다음의 절차를 준수하는 절차를 마련하여야 한다."
      - "게시자료에 대한 사전 내부 통제"
      - "익명, 가명에 의한 게시 금지"
      - "홈페이지 게시 전 사전 검토 및 승인"
      - "개인정보 유출 및 위ㆍ변조 방지를 위한 보호조치"
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제6조(접근통제)"
      public:
        - "국가 정보보안 기본지침 제70조(홈페이지 등 게시자료 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제17조(홈페이지 등 공개용 웹서버 관리대책)"
      ict:
        - "정보보호 및 개인정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.10.3 공개서버 보안"
    checklist:
      - "홈페이지 게시물 관리 지침 또는 절차(담당자 지정 여부 포함)"
      - "중대외 홈페이지의 게시물 등록 메뉴(예: 공지사항, 질의응답) 및 등록된 게시물"
      - "해당 홈페이지"

  - id: "A-84"
    title: "개인정보 및 주요정보의 보호를 위하여 법적 요구사항을 반영한 암호화 대상, 암호강도, 암호사용, 암호키 관리 등이 포함된 암호정책 수립·이행"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    - "개발 부서"
    description:
      - "개인정보 및 주요정보의 보호를 위하여 법적 요구사항을 반영한 암호화 정책을 수립하여야 하며, 이 정책에는 암호화 대상, 암호강도, 암호키 관리 등이 포함되어야 한다."
      - "암호키는 접근통제가 적용된 장소에 보관되어야 하며, 물리적 또는 논리적으로 접근통제를 적용하여야 한다."
      - "공개키 및 개인키의 유효기간은 최대 2년으로 정하고 유효기간을 초과한 경우 폐기하도록 하는 내용을 지침(암호키 관리서식 포함)에 반영하여야 한다."
      - "암호정책은 정기적으로 검토하고 업데이트하여 최신 보안 기준을 반영하도록 하여야 하며, 암호화 방법의 적절성과 보안성을 지속적으로 점검하여야 한다."
    considerations:
      - |
        암호정책에 따라 개인정보 및 중요정보의 저장, 전송, 전달 시 암호화 위치, 시스템 특성 등을 고려하여 다음과 같이 암호화 방식을 선정 및 적용하여 암호화를 수행하여야 한다.

        | 구분 | 암호화 방식 |
        | --- | --- |
        | 정보통신망을 통한 송·수신 시 | 1. 웹서버에 SSL(Secure Socket Layer) 인증서를 설치하여 전송하는 정보를 암호화 송수신 2. 웹서버에 암호화 응용프로그램을 설치하여 전송하는 정보를 암호화하여 송수신 3. 그 밖에 암호화 기술 활용 : VPN, PGP 등 |
        | 개인정보처리시스템 등 저장 시 | 1. 응용프로그램 자체 암호화(API 방식) 2. 데이터베이스 서버 암호화(Plug-in 방식) 3. DBMS 자체 암호화(TDE 방식) 4. DBMS 암호화 기능 호출 5. 운영체제 암호화(파일암호화 등) 6. 그 밖의 암호화 기술 활용 |
        | 업무용 컴퓨터 및 모바일 기기 저장 시 | 1. 문서도구 자체 암호화(오피스 등에서 제공하는 암호 설정 기능 활용) 2. 암호 유틸리티를 이용한 암호화 3. DRM(Digital Right Management) 기술 적용 등 |
        | 보조저장매체 저장 시 | 1. 암호화 기능을 제공하는 보안 저장매체 이용(보안USB 등) 2. 해당 정보를 암호화한 후 보조저장매체에 저장 등 |
      - |
        개인정보 및 주요정보의 보호를 위하여 다음과 같이 법적 요구사항을 반영한 암호화 대상, 암호강도, 암호사용 등이 포함된 암호정책을 수립하여야 한다.

        | 구분 | 세부 구분 | 이용자가 아닌 정보주체의 개인정보 | 이용자의 개인정보 |
        | --- | --- | --- | --- |
        | 정보통신망을 통한 송·수신 시 | 정보통신망 | 인증정보(비밀번호, 생체인식정보 등) ※ 내부망 포함 | |
        | 정보통신망을 통한 송·수신 시 | 인터넷망 | 개인정보 | |
        | 저장 시 | 저장 위치 무관 | 인증정보(비밀번호, 생체인식정보 등) ※ 단, 비밀번호는 일방향암호화 | |
        | 저장 시 | 저장 위치 무관 | 주민등록번호 ※ 법 제24조의2 제2항에 따라 암호화 | |
        | 저장 시 | 인터넷구간, DMZ | 고유식별정보 ※ 단, 주민등록번호 외의 고유식별정보를 내부망에 저장하는 경우에는 개인정보 영향평가의 결과 또는 위험도 분석에 따른 결과에 따라 암호화의 적용여부 및 적용범위를 정하여 시행 가능 | 주민등록번호, 여권번호, 운전면허번호, 외국인등록번호, 신용카드번호, 계좌번호, 생체인식정보 ※ 저장 위치 무관 |
        | 저장 시 | 내부망 | | |
        | 개인정보취급자 컴퓨터, 모바일기기, 보조저장매체 등에 저장 시 | | 고유식별정보, 생체인식정보 | 개인정보 |
      - |
        암호키 관리를 위한 지침을 수립하는 경우 다음 내용을 참고한다. 단, 처리속도 등 기술발전에 따라 사용 권고 암호 알고리즘 등은 달라질 수 있으므로, 암호화 적용 시 국내외 암호관련 연구기관에서 제시하는 최신 정보 확인이 필요하다.

        | 구분 | 지침 |
        | --- | --- |
        | 암호키 생성 | 암호키는 중요정보를 암호화할 경우 보안강도가 높은 키길이를 갖는 안전한 알고리즘(예: AES-128 등)을 적용하여 보안담당자의 승인을 받아 생성하고 '암호키 관리대장'에 기록한다. (일방향 암호화의 경우는 SHA-256에 해당하는 해시를 적용) |
        | 암호키 사용(보관) | 암호키는 비인가된 사용자가 접근하지 못하도록 가장 강력한 접근통제를 적용하여야 하며, 인가된 사용자 외에는 절대 노출되지 않도록 철저히 관리하여야 한다. 또한 암호키는 노출 위험을 최소화하기 위해 최대 2년마다 변경하여야 한다. 암호키의 생성, 사용 및 폐기 '암호화 관리대장'에 기록하고, 이 대장에 대한 접근은 보안담당자가 관리한다. 암호키는 내화금고 등 안전한 장소에 보관되어야 한다. |
        | 암호키 폐기 | 암호키는 사용 용도가 끝났거나 사용주기가 경과한 경우, 폐기하여야 한다. 암호키의 폐기는 지정된 보안담당자가 수행하며, 폐기 과정과 결과는 '암호키 관리대장'에 정확히 기록하여야 한다. 또한, 폐기된 암호키는 완전히 삭제하거나 물리적으로 파괴하여 복구가 불가능하도록 하여야 한다. |
      - |
        암호화 알고리즘은 암호화 방식(예: 일방향-해시, 양방향-대칭키) 및 강도에 따라 다르다. 안전한 보안을 위한 보안 강도는 다음과 같이 KISA(참고: 암호 알고리즘 및 키 길이 이용 안내서)에서 권하는 기준을 참고한다.

        | 보안강도 | 대칭키 암호 알고리즘(보안강도) | 해시함수(보안강도) | 인수분해(비트) | 이산대수 공개키(비트) | 이산대수 개인키(비트) | 타원곡선 암호(비트) | 안전성 유지기간 |
        | --- | --- | --- | --- | --- | --- | --- | --- |
        | 112 비트 | 112 | 112 | 2048 | 2048 | 224 | 224 | 2011에서 2030년까지 |
        | 128 비트 | 128 | 128 | 3072 | 3072 | 256 | 256 | 2011에서 2030년까지 |
        | 192 비트 | 192 | 192 | 7680 | 7680 | 384 | 384 | 2030년 이후 |
        | 256 비트 | 256 | 256 | 15360 | 512 | 512 | 512 | 2030년 이후 |
      - |
        암호키의 사용 유효기간은 미국 국립표준기술원(NIST)에서 권하는 다음 기준을 참고한다.

        | 구분 | 알고리즘 명칭 | 사용 유효기간 송신자 사용기간 | 사용 유효기간 수신자 사용기간 |
        | --- | --- | --- | --- |
        | 대칭키 암호 알고리즘 | 비밀키 | 최대 2년 | 최대 5년 |
        | 공개키 암호 알고리즘 | 암호화 공개키 | 최대 2년 | - |
        | 공개키 암호 알고리즘 | 복호화 개인키 | 최대 2년 | - |
        | 공개키 암호 알고리즘 | 검증용 공개키 | 최소 2년 | - |
        | 공개키 암호 알고리즘 | 서명용 개인키 | 최대 2년 | - |
      - |
        법적 요구사항 등을 고려하여 안전한 암호화 알고리즘 및 보안 강도를 선택한다.

        | 구분 | 알고리즘 명칭 |
        | --- | --- |
        | 대칭키 암호 알고리즘 | SEED, ARIA-128/192/256, AES-128/192/256, HIGHT, LEA 등 |
        | 공개키 암호 알고리즘 | RSAES-OAEP 등 |
        | 일방향 암호 알고리즘 | SHA-256/384/512 등 |
    laws:
      common:
        - "정보통신기반 보호법 제10조(보호지침)"
        - "개인정보 보호법 제24조의2(주민등록번호 처리의 제한), 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제7조(개인정보의 암호화)"
      public:
