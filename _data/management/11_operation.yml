      finance:
        - "신용정보의 이용 및 보호에 관한 법률 제19조(신용정보전산시스템의 안전보호)"
        - "신용정보업감독규정 제20조(기술적·물리적·관리적 보안대책), [별표 3] 기술적·물리적·관리적 보안대책 마련기준 Ⅱ기술적·물리적 보안대책, 3. 개인신용정보의 암호화"
        - "전자금융거래법 제21조(안전성 확보의무)"
        - "전자금융감독규정 제17조(홈페이지 등 공개용 웹서버 관리대책), 제19조(암호프로그램 및 키 관리 통제), 제29조의2(사용자 인증수단 관리), 제34조(전자금융거래 시 준수사항), 제34조의3(이용자 비밀번호 관리), 제60조(외부주문등에 대한 기준)"
      ict:
