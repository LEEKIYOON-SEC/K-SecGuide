      - "개인정보 다운로드 시 사유 확인 기준 및 결과"

  - id: "A-74"
    title: "시스템과 네트워크의 오류, 오·남용(비인가접속, 과다조회 등), 부정행위 등 이상징후를 인지할 수 있도록 로그 검토 주기, 대상, 방법 등을 포함한 로그 검토 및 모니터링 절차 수립 및 이행"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    - "시스템 운영 부서"
    description:
      - "시스템 및 네트워크의 오류, 오·남용(비인가접속, 과다조회 등), 부정행위 등 이상징후를 인지할 수 있도록 로그 검토 주기, 대상, 방법 등을 포함한 로그 검토 및 모니터링 절차를 수립·이행하여야 한다."
      - "서버에 대한 성능 및 용량을 관리하는 시스템(SMS; Server Management System), 네트워크에 대한 모니터링을 수행하는 시스템(NMS; Network Management System)을 이용하여 이상징후에 대한 지속적인 모니터링하여야 한다."
    considerations:
      - "개인정보 보호법에서는 개인정보처리시스템의 접속기록을 월1회 이상 점검하도록 요구하고 있으므로, 관계 법규에 따른 법적 준거성을 고려하여 접속기록 검토 절차를 수립·이행하여야 한다."
      - "내·외부에 의한 침해시도, 개인정보유출 시도, 부정행위 등 이상행위를 효과적으로 탐지할 수 있도록 각종 개별 보안솔루션 및 통합보안 모니터링 솔루션 등을 통해 이상징후에 대한 지속적인 모니터링 방안을 마련할 필요가 있다."
    laws:
