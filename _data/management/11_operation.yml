  - id: "A-65"
    title: "업무용 시스템(ERP, 그룹웨어 등)의 소스코드 접근권한을 차등 부여하고 별도 저장장치에 보관"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    - "개발 부서"
    description:
      - "업무용 시스템(ERP, 그룹웨어 등) 소스코드에 대한 비인가자의 접근을 통제하는 절차를 수립‧이행하고, 업무 수행 목적에 따라 소스코드 접근권한을 최소한의 범위로 차등 부여하여야 한다."
      - "소스코드는 인가된 사용자만이 접근할 수 있도록 관리하고, 운영환경에는 보관하지 않는 것을 원칙으로 하여야 한다."
      - "개발업무를 수행하는 조직은 형상관리시스템을 활용하여 개발 변경승인과 변경이력을 시스템에서 관리하고, 소스코드의 최종본이 안전하게 유지되도록 하여야 한다."
      - "소스코드는 장애 등 비상시를 대비하여 별도의 저장장치에 백업하고, 백업된 소스코드는 인가된 관리담당자만 접근할 수 있도록 접근통제를 수행하여야 한다."
    considerations:
      - "형상관리시스템에서 관리하는 구성요소는 소스코드 및 각종 문서(개발/설계/프로젝트 관리 등)와 사용자 요구사항, 참여 인원, 예산, 일정 등 개발 프로젝트의 모든 요소를 포함한다."
      - "형상관리시스템에 저장되어 있는 소스코드에 업무 연관성이 없는 개발자 등 사용자의 접근을 제한하여야 하며,변경(수정, 삭제 등)에 대한 이력 관리를 수행하여야 한다."
      - "업무적으로 불필요하거나 과도한 접근을 방지하기 위해 권한을 세분화하고, 접근 권한 부여 또는 변경 시 승인절차 등을 통해 적절성을 검토하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
      public:
        - "국가 정보보안 기본지침 제73조(개별사용자 보안)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제29조(프로그램 통제)"
      ict:
