      - "로그 검토 및 모니터링 절차"
      - "로그 검토 및 모니터링 결과(검토 내역, 보고서 등)"
      - "이상징후 발견 시 대응 증적"

  - id: "A-75"
    title: "로그 및 모니터링 결과를 월 1회 이상 책임자에게 보고"
    domain: "11. 운영관리"
    related_org:
    - "정보보호 부서"
    - "시스템 운영 부서"
    description:
      - "기반시설의 정보시스템을 대상으로 로그 검토 및 모니터링을 정기적으로 수행하고 점검결과를 월 1회 이상 책임자에게 보고하여야 한다. 또한, 점검결과 비인가자의 접속시도, 자료 위변조, 정보 유출 등 의심스러운 정황이나 위반사실이 발견되면 즉시 책임자에게 보고하여야 한다."
      - "개인정보의 접속기록은 오ㆍ남용, 분실ㆍ도난ㆍ유출ㆍ위조ㆍ변조 또는 훼손 등에 대응하기 위하여 관련 법령에서 정한 기준에 따라 월 1회 이상 점검하여 책임자에게 보고하여야 한다."
    considerations:
      - "정보시스템에 비인가자 혹은 근무 시간 외 다운로드 등 이상징후가 확인된 경우, 로그검토 기준에 따라 사유를 확인하고, 그 결과를 책임자에게 보고하여야 한다."
      - "기반시설의 개인정보처리시스템에서 개인정보의 다운로드가 확인된 경우, 내부 관리계획 등 기준에 따라 사유를 확인하고, 그 결과를 책임자에게 보고하여야 한다. 개인정보의 오·남용이나 유출 목적으로 다운로드 한 것이 확인되었다면 관계 법령에 따라 유출 신고, 정보주체 통지 등을 이행하여야 하며, 개인정보를 회수하는 등 조치를 취하여야 한다."
    laws:
