domain: "14. 업무연속성"
domain_number: 14
category: "관리적 분야"
items:
  - id: "A-114"
    title: "기반시설의 서비스(업무) 연속성을 위협할 수 있는 IT 재해 유형을 식별하고 유형별 피해규모 및 업무에 미치는 영향을 분석하여 핵심 IT 서비스(업무) 및 시스템을 식별"
    domain: "14. 업무연속성"
    related_org:
    - "정보보호 부서"
    description:
      - "기반시설의 서비스(업무)는 IT 재해가 발생하더라도 서비스(업무)가 중단되지 않도록 핵심 IT 서비스 및 시스템을 식별하기 위해 업무영향분석(BIA)를 수행하여야 한다."
      - "기반시설의 서비스(업무) 연속성을 위협할 수 있는 IT 재해 유형을 식별하여 장애 발생 시 피해규모 및 업무에 미치는 영향을 분석하고, 분석 결과를 바탕으로 기반시설 핵심 IT 서비스(업무) 및 시스템을 식별한다."
    considerations:
      - |
        IT 재해 유형을 식별할 때 다음과 같은 원인 등을 고려한다.

        | 기준(예시) | 설명 |
        | --- | --- |
        | 자연적 | 화재, 지진, 홍수, 태풍 등 |
        | 인위적 - 내부요인 | 인재, 관리적 오류, 파업 등 |
        | 인위적 - 외부요인 | 해킹, 사이버 테러, 시스템 결함, 네트워크 장애 등 |
      - |
        피해규모 및 업무에 미치는 영향을 분석할 때 다음과 같은 사항 등을 고려한다.
        - 업무 중요도: 중요도가 높은 서비스(업무)의 중요도
        - 복구 시간: 복구에 걸리는 시간
        - 보안성: 보안성이 높은지 여부
        - 연계성: 다른 시스템과 연계 정도
        - 파급 효과: 대내ㆍ외 파급효과 영향
        - 대체 가능성: 다른 시스템 및 서비스로 대체할 수 있는지 여부
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제11조(재해·재난 대비 안전조치)"
      public:
        - "국가 정보보안 기본지침 제92조(재난 방지대책)"
      finance:
        - "전자금융거래법 제 21조(안전성의 확보의무)"
        - "전자금융감독규정 제23조(비상대책 등의 수립ㆍ운용)"
      ict:
        - "정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.12.2 재해 복구 시험 및 개선"
    checklist:
      - "업무영향분석평가(BIA) 결과보고서"
      - "IT 재해 복구 지침 또는 절차"
      - "업무연속성 관리 지침"

  - id: "A-115"
    title: "핵심 IT서비스(업무) 및 시스템의 특성에 따른 복구 목표시간, 복구 목표시점을 정의"
    domain: "14. 업무연속성"
    related_org:
    - "정보보호 부서"
    - "서비스관리 부서"
    - "시스템운영 부서"
    description:
      - "업무영향분석평가(BIA)를 통해 도출된 핵심 IT 서비스(업무) 및 시스템에 대하여 중요도 및 특성에 따른 복구 목표시간(RTO: Recovery Time Objective) 및 복구 목표시점(RPO: Recovery Point Objective)을 정의한다."
      - "핵심 IT 서비스(업무) 및 시스템의 중요도와 복구 우선순위를 설정하여 효율적인 복구가 이루어지도록  한다."
      - "법적 요건에 따라 금융회사의 경우 핵심업무의 복구 목표시간을 3시간 이내로 설정하여야 하며, 다만 보험회사의 핵심업무인 경우에는 24시간 이내로 설정하여야 한다."
    considerations:
      - "IT재해복구전략을 수립할 때는 서비스관리 부서, 시스템운영 부서 등과 함께 복구 목표 시간(RTO) 및 복구 목표 시점(RPO), 복구를 위한 방법 등을 결정하여 수립 한다."
      - "복구 목표 시간(RTO) 및 복구 목표 시점(RPO)를 고려하여 백업 및 소산 방안, 백업센터 구축 운영 방안 등 업무연속성을 위한 전략을 수립하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제11조(재해·재난 대비 안전조치)"
      public:
        - "국가 정보보안 기본지침 제92조(재난 방지대책)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제23조(비상대책 등의 수립ㆍ운용)"
      ict:
        - "정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.12.1 재해 재난 대비 안전조치"
    checklist:
      - "IT 재해 복구지침"
      - "IT 재해복구 계획(RTO, RPO 정의 포함)"
      - "소산백업 장소 또는 백업센터"

  - id: "A-116"
    title: "재해 및 재난 발생 시에도 기반시설 서비스 및 시스템의 연속성을 보장할 수 있도록 복구 전략 및 대책, 비상시 복구 조직, 비상연락체계, 복구 절차 등 재해 복구 계획 수립‧이행"
    domain: "14. 업무연속성"
    related_org:
    - "정보보호 부서"
    - "시스템 운영 부서"
    description:
      - "재해·재난 발생 시에도 핵심 IT 서비스(업무) 및 시스템의 연속성을 보장할 수 있도록 복구 전략 및 대책, 비상시 복구 조직, 비상연락체계, 복구 절차 등 재해 복구 계획을 수립·이행하여야 한다."
      - "IT 재해 발생 시 사전 정의한 서비스 및 시스템 복구 목표시간(RTO) 및 복구 목표시점(RPO)을 달성할 수 있도록 단계별로 수행할 복구 절차를 체계적으로 수립하여야 한다."
      - "관련 법률에 따라 개인정보처리자의 경우 재해·재난 발생 시 개인정보처리시스템 보호를 위한 위기대응 매뉴얼 등 대응절차를 마련하여 정기적으로 점검하고, 개인정보처리시스템 백업 및 복구를 위한 계획을 마련하여야 한다."
    considerations:
      - "비상시 복구 조직을 구성할 때는 역할과 책임을 명확히 하고 재해 발생 시 즉각적으로 연락할 수 있는 연락망을 구축하여 정기적으로 비상 연락처 정보를 갱신하여야 한다."
      - "자연재해, 통신·전력 장애, 해킹 등 조직의 핵심 서비스 및 시스템의 운영 연속성을 위협할 수 있는 재해 유형을 식별하고, 유형별 예상 피해규모 및 영향을 분석하여야 한다."
      - "복구 목표시간, 복구 목표시점을 정의하고 복구 전략 및 대책, 비상시 복구 조직, 비상연락체계, 복구 절차 등 재해 복구체계를 구축하여야 한다."
      - |
        IT 재해 발생 시 신속한 복구가 가능하도록 다음 내용을 포함한 IT 재해 복구 체계를 구축하여야 한다.

        | 단계 | 설명 |
        | --- | --- |
        | 재해 시 복구조직 및 역할 정의 | IT 재해 발생 시 복구를 위한 관련부서 및 담당자 역할과 책임 부여 |
        | 비상연락체계 | 조직 내 관련 부서 담당자, 유지보수 업체 등 복구 조직상 연락체계 구축 |
        | 복구 전략 및 대책 수립방법론 | 업무영향분석, 복구 목표시간 및 복구 목표시점 정의, 핵심 IT 서비스 |
        | 복구 순서 정의 | 복구 목표 시간별로 정보시스템의 복구 순서 정의 |

        | 단계 | 복구 절차 |
        | --- | --- |
        | 1단계 | 사고 인지 및 비상 상황 선언 |
        | 2단계 | 초기 조치 및 비상 대응 |
        | 3단계 | 복구 환경 전환 |
        | 4단계 | 데이터 복구 |
        | 5단계 | 서비스 복구 |
        | 6단계 | 정상 운영 검증 |
        | 7단계 | 복구 종료 및 사후 관리 |
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제11조(재해·재난 대비 안전조치)"
      public:
        - "국가 정보보안 기본지침 제92조(재난 방지대책)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제23조(비상대책 등의 수립ㆍ운용)"
      ict:
        - "정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.12.1 재해 재난 대비 안전조치"
    checklist:
      - "IT 재해 복구 지침 또는 절차"
      - "IT 재해 복구 계획(RTO, RPO 정의 포함)"
      - "비상연락망"

  - id: "A-117"
    title: "보안중요성이 높은 등급의 시스템들은 이중화하여 관리"
    domain: "14. 업무연속성"
    related_org:
    - "정보보호 부서"
    - "시스템 운영 부서"
    description:
      - "기반시설의 핵심 IT 서비스(업무)는 보안중요성이 높은 등급의 시스템들을 이중화하여 관리함으로써, IT 재해 발생 시에도 서비스 연속성을 보장하여야 한다."
      - "IT 재해 복구계획에 따른 복구목표 우선 순위가 높은 시스템은 이중화하여 관리한다. 특히 고가용성이 요구되는 보안시스템, 네트워크 장비, 웹서버 등의 주요 시스템은 이중화 대상으로 고려할 필요가 있다."
    considerations:
      - "이중화 대상에는 예산, 자체 기준(예: IT 재해 복구 전략)을 고려하여 이중화 여부와 대상을 결정할 수 있다."
      - "이중화가 시스템 성능에 미치는 영향을 고려하고, 부하 분산과 성능 최적화를 계획하여야 한다."
    laws:
      common:
        - "정보통신기반 보호법 제5조(주요정보통신기반시설보호대책의 수립 등)"
        - "개인정보 보호법 제29조(안전조치의무)"
        - "개인정보의 안전성 확보조치 기준 제11조(재해·재난 대비 안전조치)"
      public:
        - "국가 정보보안 기본지침 제92조(재난 방지대책)"
      finance:
        - "전자금융거래법 제21조(안전성의 확보의무)"
        - "전자금융감독규정 제23조(비상대책 등의 수립ㆍ운용)"
      ict:
        - "정보보호 관리체계 인증 등에 관한 고시 [별표7] 2.12.1 재해 재난 대비 안전조치"
    checklist:
      - "업무영향분석평가(BIA) 결과보고서"
      - "IT 재해 복구 전략(복구목표 우선순위 포함)"
      - "네트워크 구성도(이중화 시스템 현황 포함)"
      - "이중화된 정보시스템"

  - id: "A-118"
    title: "모의 훈련 등을 통해 업무 연속성을 지속적으로 검토 및 관리하고, 조직 내의 변경이 있을 경우 이에 대한 사항을 반영"
    domain: "14. 업무연속성"
    related_org:
    - "정보보호 부서"
    - "시스템 운영 부서"
    description:
      - "기반시설의 서비스(업무)는 모의 훈련을 통해 업무 연속성을 지속적으로 검토 및 관리하고, 재해 발생 시 적절히 대응할 수 있는 능력을 강화하여야 한다."
      - "정기적인 모의 훈련을 통하여 복구절차 및 계획이 실제 상황에서도 효과적으로 작동하는지 확인하고 개선점을 도출하여야 한다."
      - "모의훈련 시나리오를 수립하며, 관계 비상조직과 함께 모의훈련을 수행하는 내용을 포함하는 IT 재해 복구 모의훈련계획을 수립하고 모의훈련 결과를 문서화하여야 한다."
      - "모의 훈련 결과에 따라 IT 재해 복구 전략을 보완 및 개정하여, 최신 상태로 유지 및 지속적인 개선관리가 되도록 한다."
    considerations:
      - "IT 재해 복구 전략을 지속적으로 현행화하여 조직 내의 변경, 업무환경과 요구사항의 변화에 대응할 수 있도록 하여야 한다."
      - "IT 재해 복구 전략에 따라 효과적인 복구(예: OO시스템(또는 서비스)은 2시간 이내에 복구)가 가능한 지 IT 재해 복구 모의훈련을 실시하여야 한다. 다만 매년 동일한 수준의 훈련(예: 일부 관계자가 모여서 회의방식으로 상황 시나리오별 역할과 대응시간만 확인)만 이루어지면 복구대상/목표 및 대책(예: 이중화, 소산백업, 유휴장비 비치, 백업센터 운영 등)의 적절성 판단이 어려울 수 있다."
      - "1년 차는 IT 재해 복구 모의훈련을 계획서를 작성하고, 2년 차에는 도상훈련(시나리오 중 일부는 실 훈련), 3년 차에는 실 훈련이 가능한 시나리오 기반의 모의훈련을 수행(예: 훈련을 위한 별도 서버를 구축하는 것을 전제로, 웹사이트 장애 신고를 받고 그 원인을 확인 결과, DB서버의 디스크 오류로 확인되어 DB서버를 복구하고 웹사이트 서비스가 정상적으로 제공되는 것을 확인)하는 등 단계적으로 모의훈련 강도를 높여 실현 가능한 목표를 수립·이행하는 것을 고려할 수 있다."
      - "전자금융감독규정에 따른 요건에 해당하는 금융회사 및 전자금융업자는 매년 1회 이상 재해복구센터로 실제 전환하는 재해복구전환 훈련을 실시하여야 한다."
