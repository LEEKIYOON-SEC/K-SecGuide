    description:
      check_content: "웹 애플리케이션 내 중요 정보(개인정보, 금융 정보 등) 및 불필요한 정보(주석 내 디버깅 정보, 초기 샘플페이지, 백업 파일 등)의 노출 여부 점검"
      check_purpose: "웹 애플리케이션 내 중요 정보(개인정보, 금융 정보 등)에 대해 마스킹 처리를 하고, 서비스 제공 중 불필요한 정보(주석 내 디버깅 정보, 초기 샘플 페이지, 백업 파일 등)를 삭제하여 민감한 정보와 내부 시스템 정보의 노출을 차단하기 위함"
      threat: "웹 애플리케이션 운영 시 중요 정보(개인정보, 금융 정보 등)가 평문으로 노출될 경우, 개인정보 유출, 신원 도용, 피싱 공격 등의 위협이 발생할 수 있으며, 서버나 WAS의 초기 샘플 페이지, 백업 파일, 압축 파일 등이 노출될 경우, 공격자가 시스템 구조를 파악하고 보안 설정 및 접근 제어 정책을 유출하여 2차 공격에 활용할 수 있음"
      reference:
        - "※ 중요 정보: 고유식별정보(주민등록번호), 비밀번호(로그인 비밀번호, 계좌 비밀번호, 공인인증서 비밀번호 등), 신용정보(보안카드번호, 카드번호 등) 등"
        - "※ 중요 정보 노출(일회성 노출)이 반드시 필요한 서비스의 경우 본인인증 절차 적용 시 예외 처리"
        - "※ 소스코드 및 취약점 점검 필요"
    target: "웹 애플리케이션 소스코드, 웹 애플리케이션 서버"
    criteria:
      good: "중요 정보가 마스킹 처리되어 있으며, 서비스 운영 및 서버 사이드의 구조를 파악할 수 있는 불필요한 정보가 노출되지 않는 경우"
      vulnerable: "중요 정보가 평문으로 노출되거나, 서비스 운영 및 서버 사이드의 구조를 파악할 수 있는 과도한 정보가 노출되는 경우"
    action: "중요 정보를 마스킹 처리하고, 샘플 페이지나 불필요한 정보를 제공하는 요소를 삭제하여 과도한 정보 노출을 최소화함으로써 민감 정보와 내부 시스템 구조의 노출을 방지함"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "공통"
        content: |
          **■ 점검 방법**

          Step 1) 웹 애플리케이션 내 중요 정보(개인정보, 금융정보 등)의 평문 노출 여부 점검

          [ 페이지 내 중요 정보 평문 노출 ]

          Step 2) 서버나 WAS의 초기 샘플 페이지, 백업파일 등 불필요한 정보의 노출 유무 점검

          [ 초기 샘플 페이지 내 중요 정보 노출 ]

          Step 3) HTML 소스코드 내 중요 정보가 코드 및 주석을 통한 노출 여부 점검

          [ HTML 주석 내 중요 정보 노출 ]

          **■ 조치 방법**

          1. robots.txt, web.config, nginx.conf 파일 작성을 통해 검색 차단할 디렉터리, 확장자, 페이지 등을 지정할 수 있으며 HTML 태그 내에 META 태그를 추가하여 검색엔진의 인덱싱을 차단함
          2. 웹 디렉터리 내 삭제해야 할 파일 태그 확장자에 포함된 백업 파일을 모두 삭제하고, *.txt 확장자와 같이 작업 중 생성된 일반 텍스트 파일이나 이미지 파일 등 불필요한 파일에 대하여 제거
          3. 웹 서버 설정 후 초기 페이지와 초기 디렉터리 및 배너를 삭제하여 Banner Grab에 의한 시스템 정보 유출을 차단함
          4. 아래 개인정보 마스킹 기준 예시를 참고하여 개인정보 항목의 일부를 마스킹해야 함
          5. 개발 중 작성된 주석 문자, 디버그 정보, 시스템 구조 관련 정보 등이 외부에 노출되지 않게 제거

          **※ 삭제 권고 파일 확장자 예시**

          | | | | | | |
          |---|---|---|---|---|---|
          | \*.bak | \*.backup | \*.org | \*.old | \*.zip | \*.log |
          | \*.sql | \*.new | \*.txt | \*.tmp | \*.temp | \*.! |

          **※ 개인정보 마스킹 기준 예시** (참고 문서 : 개인정보보호위원회_홈페이지 개인정보 노출방지 안내서)

          | 개인정보 | 설명 | 예시 |
          |----------|------|------|
          | 성명 | 성명 중 한 글자 이상 | 홍\*동 |
          | 주민등록번호 | 뒤에서부터 6자리 | 901231-1\*\*\*\*\*\* |
          | 여권번호 | 뒤에서부터 4자리 | 12345\*\*\*\* |
          | 연락처 | 전화번호 또는 휴대폰 뒤 4자리 | 010-1234-\*\*\*\* |
          | 카드번호 | 7번째에서 12번째자리 | 9430-82\*\*-\*\*\*\*-2393 |
          | 계좌번호 | 뒤에서부터 5자리 | 430-20-1\*\*\*\*\* |

  - id: "XS"
    title: "크로스사이트 스크립트"
    domain: ""
    severity: "상"
    description:
      check_content: "웹 애플리케이션 내 악성 스크립트가 다른 사용자의 브라우저에서 실행되는 취약점 존재 여부 점검"
      check_purpose: "사용자 입력값에 대한 검증을 실시하여, 사용자 세션 탈취, 악성 코드 삽입 등의 악의적인 스크립트 실행을 차단하기 위함"
      threat: "사용자 입력값에 대한 필터링이 할 경우, 공격자는 사용자 입력값 내 악의적인 스크립트(JavaScript, VBScript, ActiveX, Flash 등)를 삽입하여 사용자의 쿠키(세션)를 탈취하거나 피싱 사이트로 유도하는 등의 악의적인 공격을 수행할 수 있음"
      reference:
        - "※ 크로스사이트 스크립팅: 악의적인 스크립트를 웹 페이지에 삽입하여 사용자 세션 탈취, 키로깅, 피싱 공격 등을 유발하는 기법으로, 크게 저장형(Stored)과 반사형(Reflected), DOM 기반 공격 방식으로 나뉨"
        - "※ 소스코드 및 취약점 점검 필요"
    target: "웹 애플리케이션 소스코드, 웹 방화벽"
    criteria:
      good: "사용자 입력값에 대해 검증 및 필터링이 이루어져, 악의적인 스크립트가 실행되지 않는 경우"
      vulnerable: "사용자 입력값에 대한 검증 및 필터링이 이루어지지 않으며, HTML 코드가 입력 및 실행되는 경우"
    action: "특수문자에 대해 필터링 처리와 출력값 인코딩(HTML 엔티티, 이스케이프 등)을 적용하여 악성 스크립트 실행을 방지하며, 부득이하게 HTML 코드를 사용해야 하는 경우 화이트리스트 방식을 적용해 허용된 HTML 코드만 처리하도록 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "공통"
        content: |
          **■ 점검 방법**

          Step 1) 사용자 입력값을 전달받아 HTML 상에 렌더링되는 애플리케이션(게시판, 검색 등)에 스크립트 구문 삽입 후 실행되는지 확인

          ▪ 게시글 작성 시 스크립트 구문을 삽입하여 글 열람 시 스크립트가 동작하는 경우(Stored XSS)

          [ Stored(저장형) XSS 취약점 점검 ]

          ▪ 입력값이 HTML 상에 렌더링되어 스크립트가 삽입된 URL 접근 시 스크립트가 동작하는 경우(Reflected XSS)

          [ Reflected(반사형) XSS 취약점 점검 ]

          **■ 조치 방법**

          1. 크로스사이트 스크립팅 공격에 사용되는 특수문자에 대하여 입력값 검증 및 필터링(HTML 엔티티, 이스케이프 등)처리 로직을 서버 사이드에서 구현
          2. 부득이하게 HTML 코드를 사용해야 하는 경우 화이트리스트 방식을 적용하여 허용된 HTML 코드만 처리
          3. 웹 방화벽에서 웹 태그 및 스크립트 관련 특수문자 필터링 룰셋을 적용하여 추가적인 방어 확보
          4. 세션 탈취 방지를 위해 쿠키에 HttpOnly, Secure, SameSite 옵션을 설정하여 노출되지 않도록 보호

          **※ 특수문자 필터링 예시**

          | 구분 | 필터링 예시 | | | | | | |
          |------|---|---|---|---|---|---|---|
          | 변경 전 | < | > | " | ( | ) | # | & |
          | 변경 후 | &amp;lt; | &amp;gt; | &amp;quot; | &amp;#40; | &amp;#41; | &amp;#35; | &amp;amp; |

      - os: "Java"
        content: |
          ▪ 입력 문자열 내 특수 문자를 HTML Entity로 변환하는 예시

          **사용자 입력값 HTML Entity 처리 로직 예시**

          ```
          ...
          public static String sanitizeInput(String input) {
              if (input == null) return null;
              return input.replaceAll("&", "&amp;")
                          .replaceAll("<", "&lt;")
                          .replaceAll(">", "&gt;")
                          .replaceAll("\"", "&quot;")
                          .replaceAll("'", "&#39;");
              /* 필터링 문자 추가*/
          }
          ...
          ```

      - os: "ASP.NET"
        content: |
          ▪ 입력 문자열 내 특수 문자를 HTML Entity로 변환하는 예시

          **사용자 입력값 HTML Entity 처리 로직 예시**

          ```
          StringBuilder sb = new StringBuilder();
          foreach (char c in input)
          {
              switch (c)
              {
                  case '<':
                      sb.Append("&lt;");
                      break;
                  ...
                  /* 필터링 문자 추가*/
                  ...
                  default:
                      sb.Append(c);
                      break;
              }
          }
          return sb.ToString();
          ...
          ```

      - os: "PHP"
        content: |
          ▪ 입력 문자열 내 특수 문자를 HTML Entity로 변환하는 예시

          **사용자 입력값 HTML Entity 처리 로직 예시**

          ```
          function escapeHtml($input) {
              return htmlspecialchars($input, ENT_QUOTES | ENT_HTML5, 'UTF-8', false);
          }

          // 추가적인 문자열 필터링이 필요한 경우
          function escapeHtmlExtended($input) {
              $escaped = htmlspecialchars($input, ENT_QUOTES | ENT_HTML5, 'UTF-8', false);
              $additionalEscapes = [
                  '\\' => '&#92;',
                  '(' => '&#40;',
                  ')' => '&#41;',
                  '#' => '&#35;'
              ];
              return strtr($escaped, $additionalEscapes);
          }
          ```

  - id: "CF"
    title: "크로스사이트 요청 위조(CSRF)"
    domain: ""
    severity: "상"
    description:
      check_content: "웹 애플리케이션 내 사용자의 인증 세션을 악용하여 의도하지 않은 위조 요청 가능 여부 점검"
      check_purpose: "사용자가 인증된 세션을 가진 상태에서 공격자가 의도한 위조 요청이 전송‧처리되지 않도록 하여 비정상적인 상태 변경을 방지하기 위함"
      threat: "CSRF 취약점이 존재할 경우, 공격자는 사용자가 로그인된 세션을 악용하여 인증정보 없이도 위조된 요청을 전송할 수 있음. 이로 인해 사용자의 의도와 무관하게 비밀번호 변경, 계좌 이체, 게시글 삭제, 개인정보 수정 등 권한 있는 사용자가 수행할 수 있는 행위가 공격자에 의해 실행될 수 있음"
      reference:
        - "※ CSRF(Cross Site Request Forgery): 사용자가 자신의 의지와 무관하게 공격자가 의도한 행위(수정, 삭제, 등록 등)를 특정 웹사이트에 요청하게 하는 공격 유형으로, 사용자의 인증된 세션을 악용하여 비인가된 행위 수행 가능"
        - "※ 소스코드 및 취약점 점검 필요"
    target: "웹 애플리케이션 소스코드, 웹 방화벽"
    criteria:
      good: "중요한 요청(비밀번호 변경, 송금 등)에 대해 CSRF 방어 토큰이 적용되어 있으며, 토큰 검증이 정상적으로 수행되는 경우"
      vulnerable: "중요한 요청에 대해 CSRF 토큰이 없거나, 토큰 검증을 수행하지 않아 인증된 사용자의 요청 위조가 가능한 경우"
    action: "중요한 요청에는 CSRF 방어 토큰을 포함하고, 서버 측에서 해당 토큰의 유효성을 검증하도록 설정하며, Referer/Origin 헤더 검증 및 SameSite 쿠키 옵션을 활용하여 불필요한 외부 도메인 요청이 차단되도록 구성"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "공통"
        content: |
          **■ 점검 방법**

          Step 1) 크로스사이트 스크립팅(XSS) 취약점 존재 여부 확인 후 데이터 수정 기능(게시글 등록, 비밀번호 변경 등)이 존재하는 요청(Request) 정보를 분석하여 임의의 명령을 수행하는 스크립트 삽입 후 해당 게시글을 타 사용자가 열람하였을 경우 타 사용자의 권한으로 해당 스크립트의 실행 유무 확인

          [ CSRF 취약점 점검 ]

          **■ 조치 방법**

          1. 주요 변경 요청(비밀번호 변경, 송금, 개인정보 수정 등)에 대해 CSRF 토큰을 발급하고 요청 시 토큰을 반드시 포함하도록 구현
          2. 서버 측에서 CSRF 토큰의 유효성을 검증하여 토큰이 누락되거나 위조된 요청은 차단하도록 설정
          3. Referer 및 Origin 헤더 검증을 통해 외부 사이트에서 발생한 요청 차단
          4. SameSite 쿠키 옵션을 적용하여 외부 사이트에서 인증 쿠키가 자동 전송되지 않도록 설정
          5. HTTPS 환경에서 쿠키에 Secure, HttpOnly 속성을 적용하여 세션 탈취 및 악용 가능성 최소화

          **※CSRF Token**

          ▪ CSRF Token은 서버에서 생성한 고유하고 예측 불가능한 값으로 각 사용자 세션 또는 요청마다 생성되며 생성된 Token은 클라이언트의 요청에 포함되어 서버로 전송되고 서버는 이를 검증하여 요청의 정상 여부 판단

          **CSRF Token 생성 예시**

          ```
          // Java
          ...
          // CSRF Token 생성 및 세션 저장
          public String index(Model model, HttpServletRequest request) {
              HttpSession session = request.getSession();
              String csrfToken = generateCsrfToken();
              session.setAttribute("csrfToken", csrfToken);
              model.addAttribute("csrfToken", csrfToken);
              model.addAttribute("inputs", inputs);
              return "index";
          }

          // CSRF Token 생성 함수
          private String generateCsrfToken() {
              SecureRandom secureRandom = new SecureRandom();
              byte[] token = new byte[16];
              secureRandom.nextBytes(token);
              return Base64.getUrlEncoder().encodeToString(token);
          }

          // CSRF Token 검증
          @PostMapping("/submit")
          public String submit(@RequestParam("input") String input,
                               @RequestParam("csrfToken") String csrfToken,
                               HttpServletRequest request,
                               Model model) {
              HttpSession session = request.getSession();
              String sessionToken = (String) session.getAttribute("csrfToken");

              if (sessionToken == null || !sessionToken.equals(csrfToken)) {
                  throw new IllegalStateException("Invalid CSRF token");
              }
              String sanitizedInput = sanitizeInput(input);
              inputs.add(sanitizedInput);
              model.addAttribute("inputs", inputs);
              return "index";
          }

          // index.html
          <form action="/submit" method="post">
              <input type="hidden" name="csrfToken" th:value="${csrfToken}" />
              <label for="input">Enter text:</label>
              <input type="text" id="input" name="input">
              <button type="submit">Add</button>
          </form>
          ...
          ```

  - id: "SF"
    title: "서버사이드 요청 위조(SSRF)"
    severity: "상"
