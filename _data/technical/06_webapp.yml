          Options Indexes FollowSymLinks
          # Indexes 옵션 제거
          Options FollowSymLinks
          </Directory>
          ```

      - os: "Tomcat"
        content: |
          **■ 조치 방법**

          ▪ web.xml 파일 내 아래 지시자 수정 후 서버 재기동

          **Tomcat 서버 설정 예시**

          ```
          <init-param>
          <param-name>listings</param-name>
          <param-value>false</param-value>
          </init-param>
          ```

      - os: "IIS"
        content: |
          **■ 조치 방법**

          **(6.0 이하)**

          ▪ 인터넷 정보 서비스 → 등록 정보 → 홈 디렉터리 → 디렉터리 검색 해제

          [ 디렉터리 검색 옵션 해제 설정 ]

          **(7.0 이상)**

          ▪ IIS 관리자 → 디렉터리 검색 → 사용 안 함

          [ 디렉터리 검색 기능 사용 안함 설정 ]

      - os: "Nginx"
        content: |
