          Step 2) 최대 로그 크기 → 10240KB
          최대 로그 크기에 도달할 때: 다음보다 오래된 이벤트 덮어쓰기 → 90일
          ※ Windows 2008, 2012, 2016, 2019 서버의 경우 덮어쓰기 날짜 지정 불가능

