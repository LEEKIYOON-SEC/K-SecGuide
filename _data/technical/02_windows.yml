          Step 2) "장치: 사용자가 프린터 드라이버를 설치할 수 없게 함" 정책을 "사용"으로 설정

  - id: "W-56"
    title: "SMB 세션 중단 관리 설정"
    domain: "5. 보안 관리"
    severity: "중"
    description:
      check_content: "Session 연결 중단 시 유휴 시간 설정 여부 점검"
      check_purpose: "Session이 중단되기 전에 SMB(서버 메시지 블록) Session에서 보내야 하는 연속 유휴 시간을 결정하여 서비스 거부 공격 등에 악용되지 않도록 하기 위함"
      threat: "SMB Session에서는 서버 리소스를 사용하며, NULL Session 수가 많으면 서버 속도가 느려지거나 서버에 오류를 발생시킬 수 있으므로 공격자는 이를 악용하여 SMB Session을 반복 설정하여 서버의 SMB 서비스가 느려지거나 응답하지 않게 하여 서비스 거부 공격을 실행할 위험이 존재함"
      reference:
        - "Administrator는 해당 정책을 활성화하여 컴퓨터가 비활성 SMB Session을 중단하는 시점을 제어할 수 있으며, 클라이언트를 다시 시작하면 해당 Session은 자동으로 다시 연결됨. 해당 정책의 값을 0으로 설정하면 가능한 한 빨리 유휴 Session 연결은 끊어지며, 최댓값은 99999(208일)로 사실상 정책 설정 해제를 의미함"
        - "SMB(서버 메시지 블록): LAN이나 컴퓨터 간의 통신에서 데이터 송수신을 하기 위한 프로토콜"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "\"로그온 시간이 만료되면 클라이언트 연결 끊기\" 정책을 \"사용\"으로, \"세션 연결을 중단하기 전에 필요한 유휴 시간\" 정책을 \"15분\" 이하로 설정한 경우"
      vulnerable: "\"로그온 시간이 만료되면 클라이언트 연결 끊기\" 정책이 \"사용 안 함\" 또는 \"세션 연결을 중단하기 전에 필요한 유휴 시간\" 정책이 \"15분\" 초과로 설정한 경우"
    action: "\"로그인 시간이 만료되면 클라이언트 연결 끊기\" 정책 \"사용\" 설정, \"세션 연결을 중단하기 전에 필요한 유휴 시간\" 정책 \"15분\" 이하로 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT, 2000"
        content: |
          Step 1) 시작 > 실행 > SECPOL.MSC > 로컬 정책 > 보안 옵션
          Step 2) "로그인 시간이 만료되면 클라이언트 연결 끊기" 정책 "사용" 설정
          "세션 연결을 중단하기 전에 필요한 유휴 시간" 정책 "15분" 이하로 설정
      - os: "Windows 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 로컬 정책 > 보안 옵션
          Step 2) "Microsoft 네트워크 서버: 로그온 시간이 만료되면 클라이언트 연결 끊기" 정책 "사용" 설정
          "Microsoft 네트워크 서버: 세션 연결을 중단하기 전에 필요한 유휴 시간" 정책 "15분" 이하로 설정

  - id: "W-57"
    title: "로그온 시 경고 메시지 설정"
    domain: "5. 보안 관리"
    severity: "하"
    description:
      check_content: "로그온 시 경고 메시지 출력 여부 점검"
      check_purpose: "로그온 시 경고 메시지를 설정하여 시스템에 로그온을 시도하는 사용자들에게 관리자는 시스템의 불법적인 사용에 대하여 경고 창을 띄움으로써 경각심을 주기 위함"
      threat: "로그온 경고 메시지가 없는 경우 악의적인 사용자에게 관리자가 적절한 보안 수준으로 시스템을 보호하고 있으며, 공격자의 활동을 주시하고 있다는 생각을 상기시킬 수 없어 간접적인 공격 기회를 제공할 위험이 존재함"
      reference: []
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "로그인 경고 메시지 제목 및 내용이 설정된 경우"
      vulnerable: "로그인 경고 메시지 제목 및 내용이 설정되어 있지 않은 경우"
    action: "로그인 메시지 제목 및 메시지 내용에 경고 문구 삽입"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 레지스트리 편집기
          HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\WindowsNT\CurrentVersion\Winlogon
          Step 2) LegalNoticeCaption: 제목
          Step 3) LegalNoticeText: 메시지 내용
          ※ 변경된 레지스트리 키의 내용은 시스템을 로그오프 한 후 반영됨
      - os: "Windows 2000"
        content: |
          Step 1) 시작 > 실행 > SECPOL.MSC > 로컬 정책 > 보안 옵션
          Step 2) 로그온 시도하는 사용자에 대한 메시지 제목: 배너 제목 입력
          Step 3) 로그온 시도하는 사용자에 대한 메시지 텍스트: 배너 내용 입력
      - os: "Windows 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 로컬 정책 > 보안 옵션
          Step 2) 대화형 로그온: 로그온 시도하는 사용자에 대한 메시지 제목: 배너 제목 입력
          Step 3) 대화형 로그온: 로그온 시도하는 사용자에 대한 메시지 텍스트: 배너 내용 입력

  - id: "W-58"
    title: "사용자별 홈 디렉터리 권한 설정"
    domain: "5. 보안 관리"
    severity: "중"
    description:
      check_content: "사용자 홈 디렉터리 권한 적절성 점검"
      check_purpose: "사용자 홈 디렉터리에 적절한 권한을 부여하여 비인가 사용자에 의한 불필요한 정보 노출을 방지하기 위함"
      threat: "사용자 계정별 홈 디렉터리의 권한이 제한되어 있지 않으면 임의의 사용자나 다른 사용자의 홈 디렉터리에 악의적인 목적으로 접근할 수 있으며, 접근 후 의도 또는, 의도하지 않은 행위로 시스템에 악영향을 미칠 위험이 존재함"
      reference: []
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "홈 디렉터리에 Everyone 권한이 없는 경우 (All Users, Default User 디렉터리 제외)"
      vulnerable: "홈 디렉터리에 Everyone 권한이 있는 경우"
    action: "Everyone 권한 제거"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT"
        content: |
          Step 1) Windows NT: C:\WinNT\Profiles\사용자 홈 디렉터리 > 등록 정보 > 보안
          Step 2) Everyone 권한 제거(All Users, Default User 디렉터리는 제외)
      - os: "Windows 2000, 2003"
        content: |
          Step 1) C:\Documents and Settings\사용자 홈 디렉터리 > 속성 > 보안
          Step 2) Everyone 권한 제거(All Users, Default User 디렉터리는 제외)
      - os: "Windows 2008"
        content: |
          Step 1) C:\사용자\<사용자 계정>
          Step 2) 해당 사용자에 대한 권한 외 일반 계정 삭제
      - os: "Windows 2012, 2016, 2019, 2022"
        content: |
          Step 1) C:\사용자\<사용자 계정>
          Step 2) 해당 사용자에 대한 권한 외 일반 계정 삭제

  - id: "W-59"
    title: "LAN Manager 인증 수준"
    domain: "5. 보안 관리"
    severity: "중"
    description:
      check_content: "LAN Manager 인증 수준 적절성 점검"
      check_purpose: "LAN Manager 인증 수준 설정을 통해 네트워크 로그온에 사용할 Challenge/ Response 인증 프로토콜을 결정하며, 안전한 인증 절차를 적용하기 위함"
      threat: "안전하지 않은 LAN Manager 인증 수준을 사용하는 경우 인증 트래픽을 가로채기를 통해 악의적인 계정 정보 노출 위험이 존재함"
      reference:
        - "LAN Manager는 네트워크를 통한 파일 및 프린터 공유 등과 같은 작업 시 인증을 담당. NTLMv2는 Windows 2000, 2003, XP 이상에서 지원되며, Windows 98, NT 버전과 통신하면 패치를 설치해야 함"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "\"LAN Manager 인증 수준\" 정책에 \"NTLMv2 응답만 보냄\"이 설정되어 있는 경우"
      vulnerable: "\"LAN Manager 인증 수준\" 정책에 \"LM\" 및 \"NTLM\"인증이 설정되어 있는 경우"
    action: "LAN Manager 인증 수준을 NTLMv2 응답만 보내기로 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT, 2000"
        content: |
          Step 1) 시작 > 실행 > SECPOL.MSC > 로컬 정책 > 보안 옵션
          Step 2) "LAN Manager 인증 수준" 정책에 "NTLMv2 응답만 보내기" 설정
      - os: "Windows 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 로컬 정책 > 보안 옵션
          Step 2) "네트워크 보안: LAN Manager 인증 수준" 정책에 NTLMv2 응답만 보내기" 설정

  - id: "W-60"
    title: "보안 채널 데이터 디지털 암호화 또는 서명"
    domain: "5. 보안 관리"
    severity: "중"
    description:
      check_content: "'보안 채널 데이터 디지털 암호화 또는 서명' 정책 적절성 점검"
      check_purpose: "해당 정책을 활성화하여 보안 채널의 서명 또는 암호화를 협상하지 않는 한 보안 채널을 확립하지 않기 위함"
      threat: "보안 채널이 암호화되지 않으면 인증 트래픽 끼어들기 공격, 반복 공격 및 기타 유형의 네트워크 공격 등의 위험이 존재함"
      reference: []
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "아래 3가지 정책 모두 \"사용\"으로 되어있는 경우: 도메인 구성원: 보안 채널 데이터를 디지털 암호화 또는 서명(항상), 도메인 구성원: 보안 채널 데이터를 디지털 암호화(가능한 경우), 도메인 구성원: 보안 채널 데이터 디지털 서명(가능한 경우)"
      vulnerable: "아래 3가지 정책 중 일부가 \"사용 안 함\"으로 되어있는 경우: 도메인 구성원: 보안 채널 데이터를 디지털 암호화 또는 서명(항상), 도메인 구성원: 보안 채널 데이터를 디지털 암호화(가능한 경우), 도메인 구성원: 보안 채널 데이터 디지털 서명(가능한 경우)"
    action: "보안 채널 데이터를 디지털 암호화·서명 관련 3개 정책 → 사용"
    impact: "도메인 구성원만 해당하며, Windows 98/NT와 파일 및 프린터 공유 등의 작업하지 않는 경우 일반적으로 영향 없음"
    examples:
      - os: "Windows NT, 2000"
        content: |
          Step 1) 시작 > 실행 > SECPOL.MSC > 로컬 정책 > 보안 옵션
          Step 2) 아래 3가지 정책을 모두 "사용"으로 설정
          • 도메인 구성원: 보안 채널 데이터를 디지털 암호화 또는 서명 (항상)
          • 도메인 구성원: 보안 채널 데이터 디지털 서명 (가능한 경우)
          • 도메인 구성원: 보안 채널 데이터를 디지털 암호화 (가능한 경우)
      - os: "Windows 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 로컬 정책 > 보안 옵션
          Step 2) 아래 3가지 정책을 모두 "사용"으로 설정
          • 도메인 구성원: 보안 채널 데이터를 디지털 암호화 또는 서명 (항상)
          • 도메인 구성원: 보안 채널 데이터 디지털 서명 (가능한 경우)
          • 도메인 구성원: 보안 채널 데이터를 디지털 암호화 (가능한 경우)

  - id: "W-61"
    title: "파일 및 디렉토리 보호"
    domain: "5. 보안 관리"
    severity: "중"
    description:
      check_content: "NTFS 파일 시스템 사용 여부 점검"
      check_purpose: "FAT 파일 시스템에 비해 더 강화된 보안 기능을 제공하는 파일 시스템을 사용하기 위함 (파일과 디렉터리에 소유권과 사용 권한 설정이 가능하고 ACL(접근통제 목록)을 제공)"
      threat: "FAT 파일 시스템 사용 시 사용자별 접근통제를 적용할 수 없어 중요 정보에 대한 책임 추적성 확보가 어려운 위험이 존재함"
      reference:
        - "기존에 FAT 파일 시스템을 사용하다가 NTFS로 변환하기 위해서는 convert.exe 명령을 사용할 수 있지만, FAT 파일 시스템으로 운영 중 변환해야 하는 경우 Default ACL이 적용되지 않으므로 가능한 초기 설치 시 NTFS 파일 시스템을 선택하는 것을 권장함"
        - "최근 운영체제 버전에서는 FAT32 파일 시스템을 지원하지 않으나 기존 FAT32에서 NTFS 변환 가능"
        - "NTFS, FAT 파일 시스템 비교: FAT32에는 NTFS가 제공하는 보안 기능이 없으므로 컴퓨터에 FAT32 파티션 또는, 볼륨이 있는 경우 컴퓨터에 액세스 가능한 모든 사용자가 파일을 읽을 수 있으며 FAT32에는 크기 제한이 있음"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "NTFS 파일 시스템을 사용하는 경우"
      vulnerable: "FAT 파일 시스템을 사용하는 경우"
    action: "FAT 파일 시스템을 사용 시 가능한 NTFS 파일 시스템 변환 설정"
    impact: "파일 시스템을 변환할 경우 기존 파일 시스템에 영향을 줄 수 있음"
    examples:
      - os: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 실행 > CMD > fsutil fsinfo volumeinfo (해당 드라이브)
          Step 2) FAT 파일 시스템 사용 시 아래 명령으로 NTFS 변환
          시작 > 실행 > CMD > convert 드라이브명: /fs:ntfs
          (예) convert F: /fs/ntfs라고 입력 시 F 드라이브는 NTFS 형식으로 변환됨

  - id: "W-62"
    title: "시작 프로그램 목록 분석"
    domain: "5. 보안 관리"
    severity: "중"
    description:
      check_content: "시작 프로그램 목록 내 불필요한 항목 존재 여부 점검"
      check_purpose: "불필요한 시작 프로그램을 삭제하거나 비활성화하여 악의적인 공격을 차단하기 위함"
      threat: "Windows 시작 시 너무 많은 시작 프로그램이 동시에 실행되면 속도가 저하되는 문제가 발생하며, 공격자가 심어놓은 악성 프로그램이나 해킹 도구가 실행되어 시스템에 피해를 줄 위험이 존재함"
      reference: []
    target: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "시작 프로그램 목록을 정기적으로 검사하고 불필요한 서비스를 비활성화한 경우"
      vulnerable: "시작 프로그램 목록을 정기적으로 검사하지 않고, 부팅 시 불필요한 서비스도 실행되고 있는 경우"
    action: "시작 프로그램 목록의 정기적인 검사 실시 및 불필요한 서비스 비활성화 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows 2000, 2003, 2008"
        content: |
          Step 1) 시작 > 검색 > msconfig
          Step 2) 시작 프로그램 탭 클릭 > 시작 프로그램 목록 중 불필요하거나 의심스러운 항목 체크 표시 해제
      - os: "Windows 2012, 2016, 2019, 2022"
        content: |
          Step 1) Windows 2012 서버 이후 버전의 경우 시작 프로그램 목록 편집이 불가능하며 별도의 편집이나 등록을 위해서는 배치파일이나 레지스트리 값 추가를 이용해서 개인화를 통해 사용할 수 있으나 보안상 권장하지 않음

  - id: "W-63"
    title: "도메인 컨트롤러-사용자의 시간 동기화"
