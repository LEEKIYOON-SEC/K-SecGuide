platform: "2. Windows 서버"
platform_number: 2
category: "기술적 분야"
items:
  - id: "W-01"
    title: "Administrator 계정 이름 변경 등 보안성 강화"
    domain: "1. 계정 관리"
    severity: "상"
    description:
      check_content: "윈도우 최상위 관리자 계정인 Administrator의 계정명 변경 또는 보안을 고려한 비밀번호 설정 여부 점검"
      check_purpose: "윈도우 기본 관리자 계정인 Administrator의 이름을 변경 또는 보안을 고려한, 잘 알려진 계정을 통한 악의적인 패스워드 추측 공격을 차단하기 위함"
      threat: "일반적으로 관리자 계정으로 잘 알려진 Administrator를 변경하지 않는 경우 악의적인 사용자의 패스워드 추측 공격을 통해 사용 권한 상승의 위험이 있으며, 관리자를 유인하여 침입자의 액세스를 허용하는 악성코드를 실행할 위험이 존재함\n윈도우 최상위 관리자 계정인 Administrator는 기본적으로 삭제하거나 잠글 수 없어 악의적인 사용자의 목표가 될 위험이 존재함"
      reference:
        - "※ 윈도우 서버는 Administrator 계정을 비활성화할 수 있으나 안전 모드로 컴퓨터를 시작할 경우 본 계정은 자동으로 활성화됨"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "Administrator 기본 계정 이름을 변경하거나 강화된 비밀번호를 적용한 경우"
      vulnerable: "Administrator 기본 계정 이름을 변경하지 않거나 단순 비밀번호를 적용한 경우"
    action: "Administrator 기본 계정 이름 변경 및 보안성이 있는 비밀번호 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 관리 보안 정책 > 로컬 정책 > 보안 옵션
          Step 2) "계정: Administrator 계정 이름 바꾸기"를 유추하기 어려운 계정 이름으로 변경

  - id: "W-02"
    title: "Guest 계정 비활성화"
    domain: "1. 계정 관리"
    severity: "상"
    description:
      check_content: "Guest 계정 비활성화 여부 점검"
      check_purpose: "Guest 계정을 비활성화하여 불특정 다수의 임시적인 시스템 접근을 차단하기 위함"
      threat: "Guest 계정은 시스템에 임시로 액세스해야 하는 사용자용 계정으로, 해당 계정을 사용하여 권한 없는 사용자가 시스템에 익명으로 액세스할 수 있으므로 비인가자 접근, 정보 유출 등 보안 위험이 존재함"
      reference:
        - "※ Windows Guest 계정은 삭제 불가능한 built-in 계정으로 보안 강화 목적으로 반드시 비활성화 처리해야 함"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "Guest 계정이 비활성화되어 있는 경우"
      vulnerable: "Guest 계정이 활성화되어 있는 경우"
    action: "Guest 계정 비활성화"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT"
        content: |
          Step 1) 시작 > 프로그램 > 관리 도구 > 도메인 사용자 관리 > Guest 계정 선택 > 등록정보
          Step 2) "계정 사용 안 함" 설정
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 로컬 정책 > 보안 옵션 > 계정: Guest 계정 상태
          Step 2) 계정 "사용 안 함" 설정

  - id: "W-03"
    title: "불필요한 계정 제거"
    domain: "1. 계정 관리"
    severity: "상"
    description:
      check_content: "시스템 내 불필요한 계정 및 의심스러운 계정의 존재 여부를 점검"
      check_purpose: "퇴직, 전직, 휴직 등의 이유로 사용하지 않는 계정, 불필요한 계정 및 의심스러운 계정을 삭제하여, 일반적으로 로그인이 필요치 않은 해당 계정들을 통한 로그인을 차단하고, 계정의 패스워드 추측 공격 시도를 차단하기 위함"
      threat: "관리되지 않은 불필요한 계정은 장기간 비밀번호가 변경되지 않아 무차별 대입 공격(Brute Force Attack)이나 비밀번호 추측 공격(Password Guessing Attack)의 가능성이 존재하며, 또한 이런 공격으로 계정정보가 유출되어도 유출 사실을 인지하기 어려워 초기 대응이 불가능한 위험이 존재함"
      reference:
        - "※ 무차별 대입 공격(Brute Force Attack): 특정 암호를 해독하기 위해 가능한 모든 값을 대입하는 공격 방법"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "불필요한 계정이 존재하지 않는 경우"
      vulnerable: "불필요한 계정이 존재하는 경우"
    action: "현재 계정 현황 확인 후 불필요한 계정 삭제"
    impact: "명확하게 파악되지 않은 계정을 삭제하는 경우 해당 계정과 관련한 업무에 장애 발생 가능성이 존재함"
    examples:
      - os: "Windows NT"
        content: |
          Step 1) 시작 > 프로그램 > 관리 도구 > 도메인 사용자 관리> 계정 선택> 등록 정보
          Step 2) "계정 사용 안 함" 설정 또는 계정 삭제
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 컴퓨터 관리 > 로컬 사용자 및 그룹 > 사용자
          Step 2) 등록된 계정 중 불필요한 사용자 선택 > 속성 > "계정 사용 안 함" 설정 또는 계정 삭제

  - id: "W-04"
    title: "계정 잠금 임계값 설정"
    domain: "1. 계정 관리"
    severity: "상"
    description:
      check_content: "계정 잠금 임계값의 설정 여부 점검"
      check_purpose: "계정 잠금 임계값을 설정하여 공격자의 자유로운 자동화 암호 유추 공격을 차단하기 위함"
      threat: "공격자는 시스템의 계정 잠금 임계값이 설정되지 않는 경우, 자동화된 방법을 이용하여 모든 사용자 계정에 대해 암호 조합 공격을 자유롭게 시도할 수 있으므로 사용자 계정 정보의 노출 위험이 존재함"
      reference:
        - "※ 계정 잠금 임계값 설정은 사용자 계정이 잠기는 로그온 실패 횟수를 결정하며 잠긴 계정은 관리자가 재설정하거나 해당 계정의 잠금 유지 시간이 만료되어야 사용할 수 있음"
        - "※ 계정 잠금 정책: 해당 계정이 시스템으로부터 잠기는 환경과 시간을 결정하는 정책으로 '계정 잠금 기간', '계정 잠금 임계값', '다음 시간 후 계정 잠금 수를 원래대로 설정'의 세 가지 하위 정책을 가짐"
        - "※ 관련 점검 항목: W-08(중)"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "계정 잠금 임계값이 5 이하의 값으로 설정된 경우"
      vulnerable: "계정 잠금 임계값이 5 초과의 값으로 설정된 경우"
    action: "계정 잠금 임계값을 5 이하의 값으로 설정"
    impact: "Administrator 계정은 잠기지 않으며, 일반 계정의 경우 5회 패스워드 입력 실패 시 잠김"
    examples:
      - os: "Windows NT"
        content: |
          Step 1) 시작 > 프로그램 > 관리 도구 > 도메인 사용자 관리자 > 정책 > 계정 정책
          Step 2) "계정 잠금" 선택 후 "잠금"에 "5" 이하의 값 설정
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 계정 정책 > 계정 잠금 정책
          Step 2) "계정 잠금 임계값"을 "5" 이하의 값으로 설정

  - id: "W-05"
    title: "해독 가능한 암호화를 사용하여 암호 저장 해제"
    domain: "1. 계정 관리"
    severity: "상"
    description:
      check_content: "해독 가능한 암호화 사용 여부 점검"
      check_purpose: "\"해독 가능한 암호화를 사용하여 암호 저장\" 정책이 설정되어 사용자 계정 비밀번호가 해독 가능한 텍스트 형태로 저장되는 것을 차단하기 위함"
      threat: "위 정책이 설정된 경우 운영체제에서 사용자 계정, 비밀번호를 입력받아 인증을 진행하는 응용 프로그램 프로토콜 지원 시 운영체제는 사용자의 비밀번호를 해독 가능한 방식으로 저장하기 때문에, 노출된 계정에 대해 공격자가 비밀번호 복호화 공격으로 비밀번호를 획득하여 네트워크 리소스에 접근할 위험이 존재함"
      reference:
        - "※ \"해독 가능한 암호화를 사용하여 암호 저장\" 정책은 암호를 암호화하지 않은 상태로 저장하여 일반 텍스트 버전의 암호를 저장하는 것과 같으나 시스템에서 기본적으로 동작하지는 않음"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "\"해독 가능한 암호화를 사용하여 암호 저장\" 정책이 \"사용 안 함\"으로 설정된 경우"
      vulnerable: "\"해독 가능한 암호화를 사용하여 암호 저장\" 정책이 \"사용\"으로 설정된 경우"
    action: "\"해독 가능한 암호화를 사용하여 암호 저장\"을 \"사용 안 함\"으로 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 계정 정책 > 암호 정책
          Step 2) "해독 가능한 암호화를 사용하여 암호 저장"을 "사용 안 함"으로 설정

  - id: "W-06"
    title: "관리자 그룹에 최소한의 사용자 포함"
    domain: "1. 계정 관리"
    severity: "상"
    description:
      check_content: "관리자 그룹에 불필요한 사용자의 포함 여부 점검"
      check_purpose: "관리자 그룹 구성원에 불필요한 사용자의 포함 여부를 점검하여, 관리 권한 사용자를 최소화하고자 함"
      threat: "Administrators와 같은 관리자 그룹에 속한 구성원은 컴퓨터 시스템에 대한 완전하고 제한 없는 액세스 권한을 가지므로, 사용자를 관리자 그룹에 포함하면 비인가 사용자에 대한 과도한 관리 권한이 부여되어 내부 정보 유출 위험이 존재함"
      reference:
        - "※ 관리 권한의 오남용으로 인한 시스템 피해를 줄이기 위해서 관리 업무를 위한 계정과 일반 업무를 위한 계정을 분리하여 사용하는 것이 바람직함"
        - "※ 시스템 관리를 위해서 관리 권한 계정과 일반 권한 계정을 분리하여 운영하는 것을 권고"
        - "※ 시스템 관리자는 원칙적으로 1명 이하로 유지하고, 부득이하게 2명 이상의 관리 권한자를 유지해야 할 경우, 관리자 그룹에는 최소한의 사용자만 포함하도록 해야 함"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "Administrators 그룹의 구성원을 1명 이하로 유지하거나, 불필요한 관리자 계정이 존재하지 않는 경우"
      vulnerable: "Administrators 그룹에 불필요한 관리자 계정이 존재하는 경우"
    action: "Administrators 그룹에 포함된 불필요한 계정 제거"
    impact: "Administrator 그룹에 있는 계정을 잘못 삭제하는 경우 해당 업무에 장애 발생 가능성이 있음"
    examples:
      - os: "Windows NT"
        content: |
          Step 1) 시작 > 프로그램 > 관리 도구 > 도메인 사용자 관리 > Administrators 그룹 > 등록 정보
          Step 2) Administrator 그룹에서 불필요한 계정 제거 후 그룹 변경
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 컴퓨터 관리 > 로컬 사용자 및 그룹 > 그룹 > Administrators > 속성
          Step 2) Administrators 그룹에서 불필요한 계정 제거 후 그룹 변경

  - id: "W-07"
    title: "Everyone 사용 권한을 익명 사용자에 적용"
    domain: "1. 계정 관리"
    severity: "중"
    description:
      check_content: "\"Everyone 사용 권한을 익명 사용자에 적용\" 정책의 설정 여부 점검"
      check_purpose: "익명 사용자가 Everyone 그룹으로 사용 권한을 준 모든 리소스에 접근하는 것을 차단하여 비인가자에 의한 접근 가능성을 제한하기 위함"
      threat: "해당 정책이 \"사용\"으로 설정될 경우 권한이 없는 사용자가 익명으로 계정 이름 및 공유 리소스를 나열하고 이 정보를 사용하여 암호를 추측하거나 DoS(Denial of Service) 공격을 실행할 위험이 존재함"
      reference:
        - "※ DoS(Denial of Service): 관리자 권한 없이도 특정 서버에 처리할 수 없을 정도로 대량의 접속 신호를 한꺼번에 보내 해당 서버가 마비되도록 하는 해킹 기법"
    target: "Windows 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "\"Everyone 사용 권한을 익명 사용자에게 적용\" 정책이 \"사용 안 함\"으로 되어 있는 경우"
      vulnerable: "\"Everyone 사용 권한을 익명 사용자에게 적용\" 정책이 \"사용\"으로 되어 있는 경우"
    action: "\"Everyone 사용 권한을 익명 사용자에게 적용\" 정책을 \"사용 안 함\"으로 설정"
    impact: "응용프로그램이나 Backup 용도로 Everyone 공유를 사용하지 않는지 확인 필요"
    examples:
      - os: "Windows 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 로컬 정책 > 보안 옵션
          Step 2) "Everyone 사용 권한을 익명 사용자에게 적용"을 "사용 안 함"으로 설정

  - id: "W-08"
    title: "계정 잠금 기간 설정"
    domain: "1. 계정 관리"
    severity: "중"
    description:
      check_content: "사용자 계정 잠금 기간 정책 설정 여부 점검"
      check_purpose: "로그인 실패 임계값 초과 시 일정 시간 동안 계정 잠금을 실시하여 공격자의 자유로운 비밀번호 유추 공격을 차단하기 위함"
      threat: "로그인 실패 시 일정 시간 동안 계정 잠금을 하지 않은 경우, 공격자의 자동화된 비밀번호 추측 공격이 가능하여, 사용자 계정의 비밀번호 정보가 유출될 위험이 존재함"
      reference:
        - "※ 계정 잠금 기간 설정은 계정 잠금 임계값을 초과한 사용자 계정이 잠기는 시간을 결정함. 잠긴 계정은 관리자가 재설정하거나 해당 계정의 잠금 유지 시간이 만료되어야 사용할 수 있음"
        - "※ 계정 잠금 기간 설정을 사용하면 해당 기간 잠긴 계정은 사용할 수 없으며, 계정 잠금이 해제될 때까지 접근할 수 없음"
        - "※ 계정 잠금 정책: 해당 계정이 시스템으로부터 잠기는 환경과 시간을 결정하는 정책으로 '계정 잠금 기간', '계정 잠금 임계값', '다음 시간 후 계정 잠금 수를 원래대로 설정'의 세 가지 하위 정책을 가짐"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "\"계정 잠금 기간\" 및 \"계정 잠금 기간 원래대로 설정 기간\"이 60분 이상으로 설정된 경우"
      vulnerable: "\"계정 잠금 기간\" 및 \"잠금 기간 원래대로 설정 기간\"이 설정되지 않거나 60분 미만으로 설정된 경우"
    action: "\"계정 잠금 기간\" 및 \"잠금 기간 원래대로 설정 기간\" 60분 이상으로 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT"
        content: |
          Step 1) 시작 > 프로그램 > 관리 도구 > 도메인 사용자 관리자 > 정책 > 계정 정책
          Step 2) "횟수 다시 설정"을 "60분"으로 설정, "잠금 유지 기간"의 "시간제한"을 "60분"으로 설정
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 계정 정책 > 계정 잠금 정책
          Step 2) "계정 잠금 기간", "다음 시간 후 계정 잠금 수를 원래대로 설정"에 대해 각각 "60분" 설정

  - id: "W-09"
    title: "비밀번호 관리 정책 설정"
    domain: "1. 계정 관리"
    severity: "상"
    description:
      check_content: "계정 비밀번호 관리 정책 설정 여부 점검"
      check_purpose: "비밀번호 설정 시 복잡성, 최소 비밀번호 길이, 최대/최소 사용 기간을 만족하도록 함"
      threat: "사용자 비밀번호 관리 정책 설정을 만족하지 못하면 무차별 대입 공격(Brute Force Attack)이나 비밀번호 추측 공격(Password Guessing Attack)에 쉽게 크랙 될 위험이 존재함"
      reference: []
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "계정 비밀번호 관리 정책이 모두 적용된 경우"
      vulnerable: "계정 비밀번호 관리 정책이 모두 적용되어 있지 않은 경우"
    action: "비밀번호 복잡성, 최소 비밀번호 길이, 최대/최소 사용 기간을 기준에 맞게 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT"
        content: |
          Step 1) 시작 > 프로그램 > 관리 도구 > 도메인 사용자 관리자 > 정책 > 계정
          Step 2) "최소 암호 길이"에 "최소"를 "8문자"로 설정
          Step 3) "최대 암호 사용 기간"의 "사용 기간"을 "90일"로 설정
          Step 4) "최소 암호 사용 기간"에서 "사용 기간"을 "1일"로 설정
          Step 5) "암호 유일성"에서 "기억"을 "4개"로 설정
      - os: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 계정 정책 > 암호 정책
          Step 2) "암호는 복잡성을 만족해야 함"을 "사용"으로 설정
          Step 3) "최근 암호 기억"을 "4개 암호 기억됨"으로 설정
          Step 4) "최대 암호 사용 기간"의 다음 이후 암호 만료 기간을 "90일"로 설정
          Step 5) "최소 암호 길이"를 "8문자"로 설정
          Step 6) "최소 암호 사용 기간"을 "1일"로 설정
          ※ 해당 정책 설정은 비밀번호를 변경하거나 새로운 비밀번호 생성 시 아래와 같은 일련의 규정을 만족하는지 결정함. 영문, 숫자, 특수문자 중 2종류 이상을 조합하여 최소 10자리 이상 또는 3종류 이상을 조합하여 최소 8자리 이상의 길이로 구성
          가. 영문 대문자(26개)
          나. 영문 소문자(26개)
          다. 숫자(10개)
          라. 특수문자(32개)

  - id: "W-10"
    title: "마지막 사용자 이름 표시 안 함"
    domain: "1. 계정 관리"
    severity: "중"
    description:
      check_content: "로그인 화면에 마지막 로그온 사용자 이름을 표시하지 않도록 설정되었는지를 점검"
      check_purpose: "Windows 로그인 화면에 마지막 로그온한 사용자 이름이 표시되지 않도록 하여 악의적인 사용자에게 계정 정보가 노출되는 것을 차단하고자 함"
      threat: "마지막으로 로그온한 사용자의 이름이 로그온 대화상자에 표시될 경우 공격자는 이를 획득하여 비밀번호를 추측하거나 무작위 공격을 시도할 위험이 존재함"
      reference:
        - "※ Windows 로그인 화면에 마지막 로그온한 사용자 이름이 표시될 경우 주로 콘솔 사용자 및 터미널 서비스 이용자에게 시스템에 존재하는 사용자 계정 정보를 노출함"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "\"마지막 사용자 이름 표시 안 함\"이 \"사용\"으로 설정된 경우"
      vulnerable: "\"마지막 사용자 이름 표시 안 함\"이 \"사용 안 함\"으로 설정된 경우"
    action: "Windows NT: 마지막으로 로그온한 사용자 이름 표시 안 함 설정\nWindows 2000: 로그온 스크린에 마지막 사용자 이름 표시 안 함 사용 설정\nWindows 2003, 2008, 2012, 2016, 2019, 2022: 대화형 로그온: 마지막 사용자 이름 표시 안 함 사용 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT"
        content: |
          Step 1) 시작 > 프로그램 > 관리 도구 > 시스템 정책 편집기 > 파일 > 레지스트리 열기 > 로컬 컴퓨터 > 편집 > 등록 정보 > Windows NT 시스템 > 로그온 > "마지막으로 로그온한 사용자 이름 표시 안 함"을 설정한 후 저장
      - os: "Windows 2000"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 로컬 정책 > 보안 옵션
          Step 2) "로그온 스크린에 마지막 사용자 이름 표시 안 함"을 "사용"으로 설정
      - os: "Windows 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 로컬 정책 > 보안 옵션
          Step 2) "대화형 로그온: 마지막 사용자 이름 표시 안 함"을 "사용"으로 설정

  - id: "W-11"
    title: "로컬 로그온 허용"
    domain: "1. 계정 관리"
    severity: "중"
    description:
      check_content: "불필요한 계정의 로컬 로그온을 허용 여부 점검"
      check_purpose: "불필요한 계정에 로컬 로그온이 허용될 경우를 찾아 비인가자의 불법적인 시스템 로컬 접근을 차단하고자 함"
      threat: "불필요한 사용자에게 로컬 로그온이 허용될 경우 비인가자를 통한 권한 상승을 위한 악성 코드 실행 위험이 존재함"
      reference:
        - "※ \"로컬로 로그온 허용\" 권한은 시스템 콘솔에 로그인을 허용하는 권한으로 반드시 콘솔 접근이 필요한 사용자 계정에만 해당 권한을 부여해야 함"
        - "※ IIS 서비스를 사용할 경우 이 권한에 IUSR_<ComputerName> 계정을 할당함"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "로컬 로그온 허용 정책에 Administrators, IUSR_ 만 존재하는 경우"
      vulnerable: "로컬 로그온 허용 정책에 Administrators, IUSR_ 외 다른 계정 및 그룹이 존재하는 경우"
    action: "Administrators, IUSR_ 외 다른 계정 및 그룹의 로컬 로그온 제한"
    impact: "Administrators, IUSR_ 계정 외 로컬에서 접속이 필요한 계정 삭제 시 사용 중인 서비스에 장애를 줄 수 있음"
    examples:
      - os: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 로컬 정책 > 사용자 권한 할당
          Step 2) "로컬 로그온 허용(또는, 로컬 로그온)" 정책에 "Adminstrators", "IUSR_" 외 다른 계정 및 그룹 제거

  - id: "W-12"
    title: "익명 SID/이름 변환 허용 해제"
    domain: "1. 계정 관리"
    severity: "중"
    description:
      check_content: "익명 SID/이름 변환 정책 적용 여부 점검"
      check_purpose: "익명 SID/이름 변환 정책을 \"사용 안 함\"으로 설정하여, SID(보안 식별자)를 사용하여 관리자 이름을 찾을 수 없도록 하기 위함"
      threat: "해당 정책이 \"사용함\"으로 설정될 경우 로컬 접근 권한이 있는 사용자가 잘 알려진 Administrator SID를 사용하여 Administrator 계정의 실제 이름을 알아낼 수 있으며 암호 추측 공격 위험이 존재함"
      reference:
        - "※ 해당 정책이 설정될 경우 익명 사용자가 다른 사용자의 SID(보안 식별자) 특성을 요청할 수 있음"
        - "※ \"사용 안 함\"으로 정책을 설정할 경우 Windows NT 도메인 환경에서 통신 불가능하게 될 수 있음"
    target: "Windows 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "\"익명 SID/이름 변환 허용\" 정책이 \"사용 안 함\"으로 설정된 경우"
      vulnerable: "\"익명 SID/이름 변환 허용\" 정책이 \"사용\"으로 설정된 경우"
    action: "\"네트워크 액세스: 익명 SID/이름 변환 허용\" 정책 \"사용 안 함\" 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 로컬 정책 > 보안 옵션
          Step 2) "네트워크 액세스: 익명 SID/이름 변환 허용" 정책이 "사용 안 함"으로 설정
          ※ Windows Server 2000 이하 버전 해당 사항 없음

  - id: "W-13"
    title: "콘솔 로그온 시 로컬 계정에서 빈 암호 사용 제한"
    domain: "1. 계정 관리"
    severity: "중"
    description:
      check_content: "콘솔 로그인 시 빈 비밀번호 사용 가능 여부 점검"
      check_purpose: "빈 비밀번호를 가진 계정의 콘솔 및 네트워크 서비스 접근을 차단하기 위함"
      threat: "해당 정책이 \"사용 안 함\"으로 설정될 경우 빈 비밀번호를 가진 로컬 계정에 대하여 터미널 서비스(원격 데스크톱 서비스), Telnet 및 FTP와 같은 네트워크 서비스의 원격 대화형 로그온이 가능하여, 시스템 내부 정보 유출 위험이 존재함"
      reference:
        - "※ 윈도우 원격 제어(mstsc)는 보안상 계정에 비밀번호가 걸린 계정만 접속하도록 하고 있으나 해당 정책을 활성화하면 계정에 비밀번호가 걸려 있지 않아도 원격 제어가 가능함"
    target: "Windows 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "\"콘솔 로그온 시 로컬 계정에서 빈 암호 사용 제한\" 정책이 \"사용\"인 경우"
      vulnerable: "\"콘솔 로그온 시 로컬 계정에서 빈 암호 사용 제한\" 정책이 \"사용 안 함\"인 경우"
    action: "\"계정: 콘솔 로그온 시 로컬 계정에서 빈 암호 사용 제한\" 정책을 \"사용\"으로 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 로컬 정책 > 보안 옵션
          Step 2) "계정: 콘솔 로그온 시 로컬 계정에서 빈 암호 사용 제한" 정책을 "사용"으로 설정

  - id: "W-14"
    title: "원격터미널 접속 가능한 사용자 그룹 제한"
