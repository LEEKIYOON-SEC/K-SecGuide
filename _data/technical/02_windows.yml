      reference:
        - "레지스트리: Windows를 실행하는데 필요한 모든 환경설정 데이터를 모아 두는 중앙 저장소"
        - "원격 레지스트리 서비스: 원격지에 있는 컴퓨터를 한곳에서 집중적으로 관리하기 위한 목적으로 원격 컴퓨터의 레지스트리에 접근할 수 있도록 하는 서비스"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
