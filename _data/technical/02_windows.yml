  - id: "W-47"
    title: "화면 보호기 설정"
    domain: "5. 보안 관리"
    severity: "하"
    description:
      check_content: "시스템 화면보호기 설정 여부 점검"
      check_purpose: "사용자가 일정 시간 동안 아무런 작업을 수행하지 않으면 자동으로 로그오프 되거나 워크스테이션이 잠기도록 설정하여, 유휴 시간 내 불법적인 시스템 접근을 차단하기 위함"
      threat: "화면보호기 설정을 하지 않으면 사용자가 자리를 비운 사이에 임의의 사용자가 해당 시스템에 접근하여 중요 정보를 유출하거나, 악의적인 행위를 통해 시스템 운영에 악영향을 미칠 위험이 존재함"
      reference: []
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "화면 보호기를 설정하고 대기 시간이 10분 이하의 값으로 설정되어 있으며, 화면 보호기 해제를 위한 암호를 사용하는 경우"
      vulnerable: "화면 보호기가 설정되지 않았거나 암호를 사용하지 않거나, 화면 보호기 대기 시간이 10분을 초과한 값으로 설정된 경우"
    action: "화면 보호기 사용, 대기 시간 10분 이하, 해제를 위한 암호 사용"
