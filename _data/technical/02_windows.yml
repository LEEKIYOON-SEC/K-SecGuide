      vulnerable: "컴퓨터 시계 동기화 최대 허용 오차값이 5분 초과인 경우"
    action: "Kerberos 사용 시 컴퓨터 시계 동기화 최대 허용 오차값 5분 이하로 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 계정 정책 > Kerberos 정책
          컴퓨터 시계 동기화 최대 허용 오차 5분으로 설정

  - id: "W-64"
    title: "윈도우 방화벽 설정"
    domain: "5. 보안 관리"
    severity: "중"
    description:
      check_content: "시스템의 방화벽 기능이 활성화되어 있는지 점검"
      check_purpose: "방화벽 기능 활성화 여부를 점검하여 시스템에서 외부망의 비인가 접근 및 외부망으로 통신을 시도하는 프로그램에 대해 통제하고 있는지 확인하기 위함"
      threat: "방화벽 기능이 비활성화되어 있으면, 외부 및 내부의 접근통제가 되지 않아 유해 정보가 유입되거나 시스템 사용자의 파일이나 폴더가 외부로 유출될 위험이 존재함"
      reference:
        - "방화벽: 인터넷 또는 외부 네트워크에서 유입되는 트래픽을 통제하는 솔루션으로써 외부의 불법 침입으로부터 내부의 정보 자산을 보호하고 외부로부터 유해 정보 유입을 차단하기 위한 정책과 이를 지원하는 하드웨어와 소프트웨어를 총칭함"
    target: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "Windows 방화벽 \"사용\"으로 설정된 경우"
      vulnerable: "Windows 방화벽 \"사용 안 함\"으로 설정된 경우"
    action: "Windows 방화벽 \"사용\"으로 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > Windows Defender 방화벽 > Windows 방화벽 설정 또는 해제
          (또는 시작 > 실행 > "firewall.cpl" 입력)
          Step 2) Windows Defender 방화벽 "사용" 설정
