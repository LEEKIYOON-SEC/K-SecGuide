      vulnerable: "(관리자 계정을 제외한) 원격 접속이 가능한 별도의 계정이 존재하지 않는 경우"
    action: "관리자 계정과 이외의 계정을 생성, 권한을 제한 사용 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows 2003"
        content: |
          Step 1) 제어판 > 사용자 계정 > 관리자 계정 이외의 계정 생성한 후
          Step 2) 제어판 > 시스템 > [원격] 탭 > [원격] 탭 메뉴에서 "사용자가 이 컴퓨터에 원격으로 연결할 수 있음"에 체크 > "원격 사용자 선택"에서 원격 사용자 지정 후 확인
      - os: "Windows 2008"
        content: |
          Step 1) 제어판 > 사용자 계정 > 관리자 계정 이외의 계정 생성한 후
          Step 2) 제어판 > 시스템 > 원격 설정 > [원격] 탭 > [원격 데스크톱] 메뉴 > "모든 버전의 원격 데스크톱을 실행 중인 컴퓨터에서 연결 허용(보안 수준 낮음)" 또는 "네트워크 수준 인증을 사용하여 원격 데스크톱을 실행하는 컴퓨터에서만 연결 허용(보안 수준 높음)" 중 하나에 체크 > "사용자 선택"에서 원격 사용자 지정 후 확인
      - os: "Windows 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 사용자 계정 > 계정 관리 > 관리자 계정 이외의 계정 생성
          Step 2) 시작 > 제어판 > 시스템 > 원격 설정 > [원격] 탭 > [원격 데스크톱] 메뉴 > "이 컴퓨터에 대한 원격 연결 허용" 에 체크 > "사용자 선택"에서 원격 사용자 지정 후 확인

  - id: "W-15"
    title: "사용자 개인키 사용 시 암호 입력"
    domain: "2. 서비스 관리"
    severity: "상"
    description:
      check_content: "사용자 개인 키 사용 시 비밀번호 입력 여부 점검"
      check_purpose: "디지털 인증서 소유자와 발급 기관 모두 컴퓨터, 저장 장치 또는 개인 키를 보관 사용하는 보호 해야 함"
      threat: "사용자 개인 키 암호 입력을 사용하지 않을 경우, 공격자는 해당 키를 사용하여 네트워크 인프라에 액세스해 데이터 유출 등의 위험이 존재함"
      reference:
        - "※ PKI의 초석은 정보를 암호화하거나 디지털 서명하는 데 사용되는 개인 키로 도난당하게 되면 공격자가 개인 키를 사용하여 문서에 디지털 서명하고 인증된 사용자인 것처럼 가장할 수 있으므로 PKI를 통해 얻은 인증 및 부인 방지가 손상됨"
    target: "Windows 2016, 2019, 2022"
    criteria:
      good: "사용자 개인 키를 사용할 때마다 암호 입력을 받는 경우"
      vulnerable: "사용자 개인 키를 사용할 때마다 암호 입력을 받지 않는 경우"
    action: "\"시스템 암호화: 컴퓨터에 저장된 사용자 키에 대해 강력한 키 보호 사용\" 정책을 \"키를 사용할 때마다 암호를 매 번 입력해야 함\"으로 적용"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 로컬 정책 > 보안 옵션
          Step 2) "시스템 암호화: 컴퓨터에 저장된 사용자 키에 대해 강력한 키 보호 사용" 정책을 "키를 사용할 때마다 암호를 매 번 입력해야 함"으로 적용

  - id: "W-16"
    title: "공유 권한 및 사용자 그룹 설정"
    domain: "2. 서비스 관리"
    severity: "상"
    description:
      check_content: "공유 디렉터리 내 Everyone 권한 존재 여부 점검"
      check_purpose: "기본 공유인 C$, D$, Admin$, IPC$ 등을 제외한 공유 폴더에 Everyone 그룹으로 공유되는 것을 금지하여 익명 사용자의 접근을 차단하기 위함"
      threat: "Everyone이 공유계정에 포함되어 있으면 익명 사용자의 접근이 가능하여 내부 정보 유출 및 악성 코드 감염 위험이 존재함"
      reference: []
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "일반 공유 디렉터리가 없거나 공유 디렉터리 접근 권한에 Everyone 권한이 없는 경우"
      vulnerable: "일반 공유 디렉터리의 접근 권한에 Everyone 권한이 있는 경우"
    action: "공유 디렉터리 접근 권한에서 Everyone 권한 제거 후 필요한 계정 추가"
    impact: "응용프로그램이나 Backup 용도로 Everyone 공유를 사용하는 경우 해당 작업에 영향 가능"
    examples:
      - os: "Windows NT"
        content: |
          Step 1) 프로그램 > 관리 도구 > 서버 관리자 > 컴퓨터 > 공유 디렉터리 > 등록 정보 > 사용 권한에서 Everyone으로 설정된 공유를 제거하고 접근이 필요한 계정에 적절한 권한 추가
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 실행 > FSMGMT.MSC > 공유
          Step 2) 사용 권한에서 Everyone으로 된 공유를 제거하고 접근이 필요한 계정의 적절한 권한 추가

  - id: "W-17"
    title: "하드디스크 기본 공유 제거"
    domain: "2. 서비스 관리"
    severity: "상"
    description:
      check_content: "하드디스크 기본 공유 제거 여부 점검"
      check_purpose: "하드디스크 기본 공유를 제거하여 시스템 정보 노출을 차단하고자 함"
      threat: "Windows는 프로그램 및 서비스를 네트워크나 컴퓨터 환경에서 관리하기 위해 시스템 기본 공유 항목을 자동으로 생성함. 이를 제거하지 않으면 비인가자가 모든 시스템 자원에 접근할 수 있는 위험한 상황이 발생할 수 있으며 이러한 공유 기능의 경로를 이용하여 바이러스가 침투 위험이 존재함"
      reference:
        - "※ 기본 공유: 관리 목적으로 자동 생성되는 공유 드라이브(Administrative share). 이러한 드라이브들은 C$, D$, E$ 등과 같이 이름 뒤에 $가 붙어서 숨겨진 공유로 처리되며, Windows 2000, XP에서는 관리자 ID와 Password를 알고 있으면 네트워크를 통해 이러한 공유 드라이브들에 자유롭게 접근할 수 있음. 그러나 이후 버전 Windows에서는 보안상의 이유로 로컬 시스템의 관리자가 네트워크를 통해 시스템을 관리하지 못하도록 기본적으로 차단됨"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "레지스트리의 AutoShareServer (WinNT: AutoShareWks)가 0이며 기본 공유가 존재하지 않는 경우"
      vulnerable: "레지스트리의 AutoShareServer (WinNT: AutoShareWks)가 1이거나 기본 공유가 존재하는 경우"
    action: "기본 공유 중지 후 레지스트리 값 설정(IPC$, 일반 공유 제외)"
    impact: "Active Directory, Clustered system에서 적용 시 영향 있음\nActive Directory: 중앙 집중화된 자원 관리를 위한 계층적 디렉터리 서비스\nClustered system: 여러 개의 시스템을 결합하여 사용함"
    examples:
      - os: "Windows NT"
        content: |
          Step 1) 프로그램 > 관리도구 > 서버 관리자 > 컴퓨터 > 공유 디렉터리 > 공유 > 공유 중지
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 실행 > FSMGMT.MSC > 공유 > 기본 공유(Default share) 선택 > 마우스 우클릭 > 공유 중지
          Step 2) 시작 > 제어판 > 관리 도구 > 레지스트리 편집기
          아래 레지스트리 값을 0으로 수정(키 값이 없을 경우 새로 생성)
          "HKLM\SYSTEM\CurrentControlSet\Services\lanmanserver\parameters\"
          Step 3) AutoShareServer(Windows NT: AutoShareWks)을 "0"으로 수정
          ※ 방화벽과 라우터에서 135~139(TCP/UDP) Port를 차단하여 외부로부터의 위험을 제거함으로써 보안성을 높일 수 있음

  - id: "W-18"
    title: "불필요한 서비스 제거"
    domain: "2. 서비스 관리"
    severity: "상"
    description:
      check_content: "불필요한 서비스 가동 여부 점검"
      check_purpose: "사용자 환경에 필요하지 않은 서비스 및 실행 파일을 제거하거나 비활성화 처리하여 이를 통한 악의적인 공격을 차단하기 위함"
      threat: "시스템에 기본적으로 설치되는 불필요한 취약 서비스들이 제거되지 않은 경우, 해당 서비스의 취약점으로 인한 공격이 가능하며, 네트워크 서비스의 경우 열린 Port를 통한 외부 침입 위험이 존재함"
      reference:
        - "※ OS 버전에 따라 '일반적으로 불필요한 서비스' 목록에 나열된 서비스가 제공되지 않을 수 있음"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "일반적으로 불필요한 서비스(아래 목록 참조)가 중지된 경우"
      vulnerable: "일반적으로 불필요한 서비스(아래 목록 참조)가 구동 중인 경우"
    action: "서비스 중지 후 \"사용 안 함\" 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT"
        content: |
          Step 1) 시작 > 설정 > 제어판 > 서비스를 선택하여 불필요한 서비스를 중지하고, 시작 옵션에서 "시작 유형"을 "사용 안 함"으로 수정
          Step 2) 해당 서비스를 선택하고 오른쪽 메뉴에서 "시작 옵션"을 클릭하면 시스템이 시작할 때에 해당 서비스의 시작 유형을 선택할 수 있음. 만약, 시스템 시작 시 자동으로 시작되게 하려면 [자동], 수동으로 서비스를 시작하려면 [수동], 서비스 자체를 사용하지 않으려면 [사용 안 함]을 선택한 후 [확인]을 클릭함
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 서비스 > "해당 서비스" 선택 > 속성
          Step 2) 시작 유형 -> 사용 안 함
          Step 3) 서비스 상태 -> 중지 설정
          ※ 일반적으로 불필요한 서비스: Alerter, Automatic Updates, Clipbook, Computer Browser, Cryptographic Services, DHCP Client, Distributed Link Tracking Client/Server, DNS Client, Error reporting Service, Human Interface Device Access, IMAPI CD-Burning COM Service, Infrared Monitor, Messenger, NetMeeting Remote Desktop Sharing, Portable Media Serial Number, Print Spooler, Remote Registry, Simple TCP/IP Services, Universal Plug and Play Device Host, Wireless Zero Configuration

  - id: "W-19"
    title: "불필요한 IIS 서비스 구동 점검"
    domain: "2. 서비스 관리"
    severity: "상"
    description:
      check_content: "불필요한 IIS 서비스 구동 여부 점검"
      check_purpose: "불필요한 IIS 서비스가 구동 상태인지를 점검하여 제거하고, 해당 서비스가 취약점이 제거되지 않은 상태로 외부 위협에 노출되지 않도록 하기 위함"
      threat: "IIS 서비스의 WEB, FTP 등 기능이 보편적으로 사용되나, 프로파일링, 서비스 거부, 불법적인 접근, 임의의 코드 실행, 정보 공개, 바이러스, 웜, 트로이목마 등의 공격 위험이 존재함"
      reference: []
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "IIS 서비스를 사용하지 않는 경우 또는 필요에 의해 IIS 서비스를 사용하는 경우"
      vulnerable: "IIS 서비스를 불필요하게 사용하는 경우"
    action: "IIS 서비스가 불필요한 경우 IIS 서비스 중지"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 서비스 > World Wide Web Publishing 서비스(IISADMIN) > 속성 > "시작 유형"을 "사용 안 함" 설정 후 중지
          ※ IIS 미설치 시 SERVICES.MSC 에 출력되지 않음

  - id: "W-20"
    title: "NetBIOS 바인딩 서비스 구동 점검"
    domain: "2. 서비스 관리"
    severity: "상"
    description:
      check_content: "NetBIOS 바인딩 서비스 구동 여부 점검"
      check_purpose: "NetBIOS와 TCP/IP 바인딩을 제거하여 TCP/IP를 거치게 되는 파일 공유 서비스를 제공하지 못하도록 하고, 인터넷에서의 공유자원에 대한 접근시도를 방지하고자 함"
      threat: "인터넷에 직접 연결된 윈도우 시스템에서 NetBIOS TCP/IP 바인딩이 활성화되어 있으면 공격자가 네트워크 공유자원을 사용할 위험이 존재함"
      reference:
        - "※ NetBIOS(Network Basic Input/Output System)는 별개의 컴퓨터상에 있는 응용프로그램들이 근거리통신망 내에서 서로 통신할 수 있게 해주는 API. 이름 서비스, 세션 서비스, 데이터그램 서비스를 제공하며, 주로 네트워크 장치 간의 통신을 지원"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "TCP/IP와 NetBIOS 간의 바인딩이 제거되어 있는 경우"
      vulnerable: "TCP/IP와 NetBIOS 간의 바인딩이 제거되어 있지 않은 경우"
    action: "네트워크 제어판을 이용하여 TCP/IP와 NetBIOS 간의 바인딩(binding) 제거"
    impact: "TCP/IP을 거치게 되는 파일 공유 서비스가 제공되지 않음\n인터넷에서의 공유자원에 대한 접근시도가 불가능함\n(라우터를 거치지 않은 내부 네트워크에서는 가능함)"
    examples:
      - os: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 네트워크 및 공유 센터 > 어댑터 설정 변경 > 로컬 영역 연결 > 속성 > TCP/IP > [일반] 탭에서 [고급] 클릭
          Step 2) [WINS] 탭에서 TCP/IP에서 "NetBIOS 사용 안 함" 또는, "NetBIOS over TCP/IP 사용 안 함" 선택

  - id: "W-21"
    title: "암호화되지 않는 FTP 서비스 비활성화"
    domain: "2. 서비스 관리"
    severity: "상"
    description:
      check_content: "시스템 내 FTP 서비스 구동 여부 점검"
      check_purpose: "인증정보가 기본적으로 평문 전송되는 취약한 프로토콜인 FTP의 사용을 제한하기 위함"
      threat: "OS에서 제공하는 기본적인 FTP 서비스를 사용할 경우 계정과 패스워드가 암호화되지 않은 채로 전송되어 Sniffer에 의한 계정정보의 노출 위험이 존재함"
      reference:
        - "※ Sniffer: 네트워크 트래픽을 감시하고 분석하는 프로그램"
        - "※ 관련 점검항목: W-22(상), W-23(상), W-24(상)"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "FTP 서비스를 사용하지 않는 경우 또는 Secure FTP 서비스를 사용하는 경우"
      vulnerable: "암호화되지 않는 FTP 서비스를 사용하는 경우"
    action: "FTP 서비스가 필요하지 않다면 서비스 중지 또는 Secure FTP 응용 프로그램 사용"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 실행 > SERVICES.MSC > FTP Publishing Service(Windows 2012 이상: Microsoft FTP Service) > 속성
          Step 2) 시작 유형을 "사용 안 함"으로 설정한 후, FTP 서비스 중지

  - id: "W-22"
    title: "FTP 디렉토리 접근권한 설정"
    domain: "2. 서비스 관리"
    severity: "상"
    description:
      check_content: "FTP 홈 디렉터리의 접근 권한 적절성 점검"
      check_purpose: "FTP 서비스 디렉터리의 접근 권한을 적절하게 설정하여 의도치 않은 정보 유출을 방지하기 위함"
      threat: "FTP 홈 디렉터리에 과도한 권한(예. Everyone Full Control)이 부여된 경우 임의의 사용자가 쓰기, 수정이 가능하여 정보 유출, 파일 위·변조 등의 위험이 존재함"
      reference:
        - "※ 기반시설 시스템은 FTP 서비스를 사용하지 않는 것이 원칙이나, 조직 내에서 해당 서비스를 부득이 사용해야 하는 경우 관련 보호 대책을 수립 및 적용하여 활용해야 함"
        - "※ 관련 점검항목: W-21(상), W-23(상), W-24(상)"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "FTP 홈 디렉터리에 Everyone 권한이 없는 경우"
      vulnerable: "FTP 홈 디렉터리에 Everyone 권한이 있는 경우"
    action: "FTP 홈 디렉터리에서 Everyone 권한 삭제, 각 사용자에게 적절한 권한 부여"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT(IIS 4.0), 2000(IIS 5.0), 2003(IIS 6.0)"
        content: |
          Step 1) 인터넷 정보 서비스(IIS) 관리 > FTP 사이트 > 해당 FTP 사이트 > 속성 > [홈 디렉터리] 탭에서 FTP 홈 디렉터리 확인
          Step 2) 탐색기 > 홈 디렉터리 > 속성 > [보안] 탭에서 Everyone 권한 제거
      - os: "Windows 2008(IIS 7.0), 2012(IIS 8.0), 2016, 2019, 2022(IIS 10.0)"
        content: |
          Step 1) 제어판 > 관리 도구 > 인터넷 정보 서비스(IIS) 관리 > 사이트 > 해당 FTP 사이트 > FTP 권한 부여 규칙 선택
          Step 2) 허용 권한 부여 규칙에서 "지정한 사용자" 지정

  - id: "W-23"
    title: "공유 서비스에 대한 익명 접근 제한 설정"
    domain: "2. 서비스 관리"
    severity: "상"
    description:
      check_content: "공유 서비스의 익명(Anonymous) 접속 허용 여부 점검"
      check_purpose: "공유 익명 접속을 제한하여, 중요 정보의 불법 유출을 차단하기 함"
      threat: "공유 익명 접속이 허용되면 핵심 기밀 자료나 내부 정보의 불법 유출 위험이 존재함"
      reference:
        - "※ 만약 익명 접속이 허용된 공유 서버에 익명 사용자에 관해 쓰기 권한이 부여된 경우, 정상적으로 업로드한 파일들의 변조가 가능하므로 공개한 디렉터리 내 중요 데이터가 보관되어 있는지를 추가로 확인해야 함"
        - "※ 공유 서비스: FTP, SMB, NFS, TFTP 등"
        - "※ 관련 점검항목: W-21(상), W-22(상), W-24(상)"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "공유 서비스를 사용하지 않거나, 익명 인증 사용 안 함으로 설정된 경우"
      vulnerable: "공유 서비스를 사용하거나, 익명 인증 사용함으로 설정된 경우"
    action: "공유 서비스를 사용하지 않는 경우 서비스 중지, 사용할 경우 익명 인증 사용 안 함 설정 적용"
    impact: "응용프로그램에서 익명 연결을 사용할 경우를 제외하고, 일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT(IIS 4.0), 2000(IIS 5.0), 2003(IIS 6.0)"
        content: |
          Step 1) 인터넷 정보 서비스(IIS) 관리 > FTP 사이트 > 속성 > [보안 계정] 탭에서 "익명 연결 허용" 체크박스 해제 (만약 개별 FTP 사이트에 적용할 경우 해당 사이트에만 설정이 적용되고, 기본 설정은 적용받지 않음)
      - os: "Windows 2008(IIS 7.0), 2012(IIS 8.0), 2016, 2019, 2022(IIS 10.0)"
        content: |
          Step 1) 제어판 > 관리 도구 > 인터넷 정보 서비스(IIS) 관리 > 해당 FTP 사이트 > FTP 인증 선택
          Step 2) FTP 인증 화면에서 익명 인증 사용 안 함 설정

  - id: "W-24"
    title: "FTP 접근 제어 설정"
    domain: "2. 서비스 관리"
    severity: "상"
    description:
      check_content: "FTP 접속 가능한 IP주소 지정 여부 점검"
      check_purpose: "FTP 접근 시 특정 IP주소에 대해 콘텐츠 접근을 허용하여 서비스 보안성을 강화하기 위함"
      threat: "FTP 프로토콜은 로그온 시 지정된 자격 증명이나 데이터 자체가 암호화되지 않고 모든 자격 증명을 일반 텍스트로 네트워크를 통해 전송되는 특성상 서버 클라이언트 간 트래픽 스니핑을 통해 인증 정보가 쉽게 노출될 위험이 존재함"
      reference:
        - "※ 기반시설 시스템은 FTP 서비스를 사용하지 않는 것이 원칙이나, 조직 내에서 해당 서비스를 부득이 사용해야 하는 경우 관련 보호 대책을 수립 및 적용하여 활용해야 함"
        - "※ 관련 점검항목: W-21(상), W-22(상), W-23(상)"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "특정 IP주소에서만 FTP 서버에 접속하도록 접근 제어 설정을 적용한 경우"
      vulnerable: "특정 IP주소에서만 FTP 서버에 접속하도록 접근 제어 설정을 적용하지 않는 경우"
    action: "특정 IP주소에서만 FTP 서버에 접속하도록 접근 제어 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT(IIS 4.0), 2000(IIS 5.0), 2003(IIS 6.0)"
        content: |
          Step 1) 인터넷 정보 서비스(IIS) 관리 > FTP 사이트 > 속성 > [디렉터리 보안] 탭에서 "액세스 거부" 선택 후 접근 가능 IP주소 추가 (만약 개별 FTP 사이트에 적용할 경우 해당 사이트에만 설정이 적용되고, 기본 설정은 적용받지 않음)
          ※ 액세스 허가: 모든 액세스를 허용 후 액세스를 거부할 컴퓨터, 그룹, 도메인 추가
          액세스 거부: 모든 액세스를 거부 후 액세스를 허용할 컴퓨터, 그룹, 도메인 추가
      - os: "Windows 2008(IIS 7.0), 2012(IIS 8.0), 2016, 2019, 2022(IIS 10.0)"
        content: |
          Step 1) 제어판 > 관리 도구 > 인터넷 정보 서비스(IIS) 관리 > 해당 FTP 사이트 > FTP IPv4 주소 및 도메인 제한
          Step 2) [작업]의 허용 항목 추가에서 FTP 접속을 허용할 IP 입력
          Step 3) [작업]의 기능 설정 편집에서 지정되지 않은 클라이언트에 대한 액세스를 거부 선택

  - id: "W-25"
    title: "DNS Zone Transfer 설정"
    domain: "2. 서비스 관리"
    severity: "상"
    description:
      check_content: "DNS Zone Transfer 차단 설정 여부 점검"
      check_purpose: "DNS Zone Transfer 차단 설정을 적용하여 도메인 정보의 불법 외부 유출을 방지하기 위함"
      threat: "DNS Zone Transfer 차단 설정이 적용되지 않는 경우 DNS 서버에 저장된 도메인 정보를 승인된 DNS 서버가 아닌 외부로 유출 위험이 존재함"
      reference:
        - "※ Zone Transfer: 영역(zone) 전송이라고 하며 master와 slave 간에 또는 primary와 secondary DNS 간에 zone 파일을 동기화하기 위한 용도로 사용되는 기술"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "아래 기준에 해당하는 경우\n1. DNS 서비스가 비활성화인 경우\n2. 영역 전송 허용을 하지 않는 경우\n3. 특정 서버로만 설정이 되어있는 경우"
      vulnerable: "위 3개 기준 중 하나라도 해당하지 않는 경우"
    action: "불필요 시 서비스 중지/사용 안 함 설정, 사용하는 경우 영역 전송을 특정 서버로 제한하거나 \"영역 전송 허용\"에 체크 해제"
    impact: "영역 전송 시 서버를 지정할 경우 영향 없음"
    examples:
      - os: "Windows NT"
        content: |
          Step 1) 시작 > 프로그램 > 관리 도구 > DNS 관리자 > 각 조회 영역 > 해당 영역 > 등록 정보 > 알림
          Step 2) "알림 목록에 있는 보조 영역에서만 액세스 허용" 선택 후 서버 IP 추가
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > DNS > 각 조회 영역 > 해당 영역 > 속성 > 영역 전송
          Step 2) "다음 서버로만" 선택 후 전송할 서버 IP 추가
          Step 3) 불필요 시 해당 서비스 중지
          시작 > 실행 > SERVICES.MSC > DNS 서버 > 속성 [일반] 탭에서 "시작 유형"을 "사용 안 함"으로 설정한 후, DNS 서비스 중지

  - id: "W-26"
    title: "RDS(Remote Data Services)제거"
    domain: "2. 서비스 관리"
    severity: "상"
    description:
      check_content: "RDS(Remote Data Services) 비활성화 여부 점검"
      check_purpose: "취약한 RDS 서비스를 제거하여 불법적인 원격 공격을 차단하기 위함"
      threat: "취약한 플랫폼의 RDS가 사용되는 경우 서비스 거부 공격이나 원격에서 관리자 권한으로 임의의 명령을 실행할 수 있는 위험이 존재함"
      reference:
        - "※ MDAC 2.7 미만의 버전에서 웹 서버와 웹 클라이언트 모두 취약점으로 인해 위험해질 수 있으므로 RDS가 불필요할 경우 제거하는 것이 안전함"
        - "※ RDS(Remote Data Services): MDAC(Microsoft Data Access Components)의 한 컴포넌트로 클라이언트에 있는 데이터를 다룰 수 있도록 하는 서비스"
    target: "Windows NT, 2000, 2003"
    criteria:
      good: "다음 중 한 가지라도 해당하는 경우\n1. IIS를 사용하지 않는 경우\n2. Windows 2008 이상 버전을 사용하는 경우\n3. Windows 2000 서비스팩 4, Windows 2003 서비스팩 2 이상 설치된 경우\n4. 기본 웹 사이트에 MSADC 가상 디렉터리가 존재하지 않는 경우\n5. 해당 레지스트리 값이 존재하지 않는 경우"
      vulnerable: "양호 기준에 한 가지도 해당하지 않는 경우"
    action: "사용하지 않는 경우 IIS 서비스 중지/사용 안 함, 사용할 경우 레지스트리 키 값 제거 또는 관련 패치 적용"
    impact: "WAS와 연동될 경우 일부 RDS를 사용할 수가 있으며 사용할 경우 레지스트리 키 값 제거가 요구됨"
    examples:
      - os: "Windows NT, 2000, 2003"
        content: |
          Step 1) 시작 > 실행 > INETMGR > 웹 사이트 선택 후 디렉터리에서 msadc 제거
          Step 2) 다음의 레지스트리 키/디렉터리 제거
          HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\W3SVC\Parameters\ADCLaunch
          1. RDSServer.DataFactory
          2. AdvancedDataFactory
          3. VbBusObj.VbBusObjCls

  - id: "W-27"
    title: "최신 Windows OS Build 버전 적용"
    domain: "2. 서비스 관리"
    severity: "상"
    description:
      check_content: "최신 Build 적용 여부 점검"
      check_purpose: "시스템을 최신 버전으로 유지하여 새로운 위협 및 진행 중인 위협으로부터 중요 정보와 시스템을 보호하기 위함"
      threat: "보안 업데이트를 적용하지 않으면 시스템 및 응용 프로그램의 취약성으로 인해 권한 상승, 원격 코드 실행, 보안 기능 우회 등의 위험이 존재함"
      reference:
        - "※ Build: Windows 패치 버전"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "최신 Build가 설치되어 있으며 적용 절차 및 방법이 수립된 경우"
      vulnerable: "최신 Build가 설치되지 않거나, 적용 절차 및 방법이 수립되지 않은 경우"
    action: "설치에 따른 영향도 확인 후 최신 Build 설치(설치 후 시스템 재시작 필요)"
    impact: "설치 후 시스템 재시작이 필요하며 설치에 따른 시스템 영향 정도를 확인해야 함"
    examples:
      - os: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 실행 > Winver
          Step 2) Build 버전 확인 후 최신 Build 다운로드 후 설치 또는 자동업데이트 활용
          ※ 인터넷 웜(Worm)이 Windows의 취약점을 이용하여 공격하기 때문에 최신 패치 설치 시에는 네트워크와 분리된 상태에서 설치할 것을 권장

  - id: "W-28"
    title: "터미널 서비스 암호화 수준 설정"
    domain: "2. 서비스 관리"
    severity: "중"
    description:
      check_content: "원격 데스크톱 서비스 암호화 수준 적절성 점검"
      check_purpose: "원격 데스크톱 서비스 암호화 설정으로 데이터를 암호화하여 클라이언트와 서버 간의 통신에서 전송되는 데이터를 보호하기 위함"
      threat: "서버 접속 시에 낮은 암호화 수준을 적용할 경우 악의적인 사용자에 의해 서버와 클라이언트 간 주고받는 정보가 노출될 위험이 존재함"
      reference:
        - "※ 기반시설 시스템은 원격 데스크톱 서비스의 사용을 원칙적으로 금지하나, 부득이 해당 서비스를 사용해야 하는 경우 클라이언트 서버 간의 데이터 전송 시 암호화하여 보호해야 함"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "원격 데스크톱 서비스를 사용하지 않거나 사용 시 암호화 수준을 \"클라이언트와 호환 가능(중간)\" 이상으로 설정한 경우"
      vulnerable: "원격 데스크톱 서비스를 사용하고 암호화 수준이 \"낮음\"으로 설정한 경우"
    action: "원격 데스크톱 서비스의 가동을 '중지' 및 '사용 안 함' 설정을 하거나, 부득이하게 사용할 경우 암호화 수준 설정 적용"
    impact: "암호화 수준 변경 시 일반적으로 영향 없음"
    examples:
      - os: "Windows NT"
        content: |
          Step 1) 시작 > 실행 > regedit
          Step 2) HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp\MinEncryptionLevel 값을 2(중간) 이상으로 설정
      - os: "Windows 2000"
        content: |
          Step 1) 시작 > 실행 > TSCC.MSC > "해당 서비스" 선택 > 속성
          Step 2) 암호화 수준 → 중간(Windows 2000) 이상으로 설정
      - os: "Windows 2003"
        content: |
          Step 1) 시작 > 실행 > TSCC.MSC > "해당 서비스" 선택 > 속성
          Step 2) [일반] 탭에서 암호화 수준 설정 → 클라이언트 호환 가능
      - os: "Windows 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 실행 > GPEDIT.MSC(로컬 그룹 정책 편집기)
          Step 2) 컴퓨터 구성 > 관리 템플릿 > 터미널 서비스 > 원격 데스크톱 세션 호스트 > 보안
          Step 3) [클라이언트 연결 암호화 수준 설정] > [암호화 수준]을 클라이언트 호환 가능으로 설정
          ※ 원격 데스크톱 서비스가 필요한 경우 추가 보완 대책
          1. 관리자 이외의 일반 사용자의 터미널 서비스 접속을 허용하지 않음
          2. 방화벽에서 원격 데스크톱 서비스 포트의 사용을 관리자 컴퓨터의 IP로 제한

  - id: "W-29"
    title: "불필요한 SNMP 서비스 구동 점검"
    domain: "2. 서비스 관리"
    severity: "중"
    description:
      check_content: "SNMP 서비스 구동 여부 점검"
      check_purpose: "취약한 SNMP 서비스를 비활성화하여 시스템의 주요 정보 유출 및 불법 수정을 방지하기 위함"
      threat: "취약한 SNMP 서비스를 사용하는 경우 서비스 거부 공격(DoS, DDoS), 버퍼 오버플로우, 비인가 접속 등의 공격 위험이 존재함"
      reference:
        - "※ SNMP: SNMP(Simple Network Management Protocol)는 MIB(Management Information Base)에 기반을 둔 네트워크망을 관리하기 위한 목적으로 만들어진 프로토콜로, 간단한 명령으로 원격 시스템의 CPU 정보에서부터, 인터페이스별 트래픽량 등 여러 가지 정보를 확인 가능"
        - "※ 관련 점검항목: W-30(중), W-31(중)"
    target: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "SNMP 서비스를 사용하지 않는 경우 또는 Community String을 설정하여 SNMP 서비스를 사용하는 경우"
      vulnerable: "불필요하게 SNMP 서비스를 사용하는 경우"
    action: "불필요 시 서비스 중지/사용 안 함"
    impact: "NMS 또는, 별도의 툴에서 SNMP 서비스를 이용하여 서버를 모니터링 하는 경우, 통신하고자 하는 Server/Client에 모두 같은 Community String을 사용해야 함(서비스 > SNMP > 등록 정보 > 종속성 참고)\nNMS(Network Management System): 네트워크 관리 시스템"
    examples:
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 불필요 시 해당 서비스 중지
          시작 > 제어판 > 관리 도구 > 서비스 > SNMP Service(또는, SNMP 서비스) > 속성에서 "시작 유형"을 "사용 안 함"으로 설정한 후, SNMP 서비스 중지

  - id: "W-30"
    title: "SNMP Community String 복잡성 설정"
    domain: "2. 서비스 관리"
    severity: "중"
    description:
      check_content: "SNMP 서비스 Community String 적절성 점검"
      check_purpose: "SNMP에서 일종의 비밀번호로 사용하는 Community String을 유추할 수 없는 복잡한 값으로 변경하여 불필요한 시스템 정보 노출을 차단하기 위함"
      threat: "Community String을 변경하지 않고 public, private 등 기본 설정값으로 사용하는 경우, 기본 Community String 값을 통한 시스템의 주요 정보 및 설정 상태가 비인가자에게 노출될 수 있는 위험이 존재함"
      reference:
        - "※ 관련 점검항목: W-29(중), W-31(중)"
    target: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "SNMP 서비스를 사용하지 않거나 Community String이 public, private 이 아닌 경우"
      vulnerable: "SNMP 서비스를 사용하며, Community String이 public, private인 경우"
    action: "불필요 시 서비스 중지/사용 안 함, 사용 시 기본 Community String 변경"
    impact: "NMS 또는, 별도의 도구에서 SNMP 서비스를 이용하여 서버를 모니터링하는 경우, 통신하고자 하는 Server/Client에 모두 같은 Community String을 사용해야 함. (서비스 > SNMP > 등록 정보 > 종속성 참고)"
    examples:
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 서비스 > SNMP Service(또는, SNMP 서비스) > 속성 > 보안 > [인증 트랩 보내기] > [추가]
          Step 2) Community String을 읽기 전용으로 설정 후 public/private이 아닌 이름을 추가
          Step 3) 불필요 시 해당 서비스 중지
          시작 > 실행 > SERVICES.MSC > SNMP Service(또는, SNMP 서비스) > 속성 [일반] 탭에서 "시작 유형"을 "사용 안 함"으로 설정한 후, SNMP 서비스 중지

  - id: "W-31"
    title: "SNMP Access Control 설정"
    domain: "2. 서비스 관리"
    severity: "중"
    description:
      check_content: "SNMP 패킷 Access Control(접근 제어) 설정 여부 점검"
      check_purpose: "SNMP 트래픽에 대한 Access Control 설정을 적용하여 내부 네트워크로부터의 악의적인 공격을 차단하기 위함"
      threat: "SNMP Access Control 설정을 적용하지 않아 인증되지 않은 내부 서버로부터의 SNMP 트래픽을 차단하지 않을 경우, 장치 구성 변경, 라우팅 테이블 조작, 악의적인 TFTP 서버 구동 등의 SNMP 공격에 노출될 위험이 존재함"
      reference:
        - "※ 관련 점검항목: W-29(중), W-30(중)"
    target: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "SNMP 서비스를 사용하지 않거나 특정 호스트로부터 SNMP 패킷 받아들이기가 설정된 경우"
      vulnerable: "모든 호스트로부터 SNMP 패킷 받아들이기가 설정된 경우"
    action: "불필요 시 서비스 중지/사용 안 함, 사용 시 SNMP 패킷 수령 호스트 지정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 서비스 > SNMP Service(또는, SNMP 서비스) > 속성 > 보안
          Step 2) "인증 트랩 보내기" 및 "다음 호스트로부터 SNMP 패킷 받아들이기" 선택
          Step 3) SNMP 호스트 등록

  - id: "W-32"
    title: "DNS 서비스 구동 점검"
    domain: "2. 서비스 관리"
    severity: "중"
    description:
      check_content: "DNS 서비스의 동적 업데이트 설정 여부 점검"
      check_purpose: "DNS 동적 업데이트를 비활성화함으로 신뢰할 수 없는 원본으로부터 업데이트를 받아들이는 위험을 차단하기 위함"
      threat: "DNS 서버에서 동적 업데이트를 사용할 경우 악의적인 사용자에 의해 신뢰할 수 없는 데이터가 받아들여질 위험이 존재함"
      reference:
        - "※ 동적 업데이트: DNS 정보에 변경 사항이 있을 때마다 DNS 클라이언트 컴퓨터가 자신의 리소스 레코드(zone 파일)를 DNS 서버에 자동으로 업데이트하는 기능으로 영역 레코드 수동 관리 작업을 줄일 수 있음"
    target: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "DNS 서비스를 사용하지 않거나 동적 업데이트 \"없음(아니오)\"으로 설정된 경우"
      vulnerable: "서비스를 사용하며 동적 업데이트가 설정된 경우"
    action: "DNS 서비스의 동적 업데이트 비활성화 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > DNS > 각 조회 영역 > 해당 영역 > 속성 > 일반
          Step 2) 동적 업데이트 → 없음 (또는 아니오) 선택
          Step 3) 불필요 시 해당 서비스 중지
          시작 > 제어판 > 관리 도구 > 서비스 > DNS Server > 속성 [일반] 탭에서 "시작 유형"을 "사용 안 함"으로 설정한 후, DNS Server 서비스 중지

  - id: "W-33"
    title: "HTTP/FTP/SMTP 배너 차단"
    domain: "2. 서비스 관리"
    severity: "하"
    description:
      check_content: "HTTP/FTP/SMTP 서비스 배너 차단 적용 여부 점검"
      check_purpose: "HTTP/FTP/SMTP 서비스 접속 배너를 통한 불필요한 정보 노출을 방지하기 위함"
      threat: "서비스 접속 배너가 차단되지 않는 경우 임의의 사용자가 HTTP, FTP, SMTP 접속 시도 시 노출되는 접속 배너 정보를 수집하여 악의적인 공격에 이용할 위험이 존재함"
      reference: []
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "HTTP, FTP, SMTP 접속 시 배너 정보가 보이지 않는 경우"
      vulnerable: "HTTP, FTP, SMTP 접속 시 배너 정보가 보이는 경우"
    action: "사용하지 않는 경우 IIS 서비스 중지/사용 안 함, 사용 시 속성값 수정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "HTTP"
        content: |
          [Server 헤더 제거]
          Step 1) Microsoft 다운로드 센터에서 URL Rewrite 다운로드 후 설치
          https://www.iis.net/downloads/microsoft/url-rewrite
          Step 2) 제어판 > 관리 도구 > IIS(인터넷 정보 서비스) 관리자 > 해당 웹 사이트 > [URL 재작성]
          Step 3) 작업 탭 > [서버 값 관리 – 서버 변수 보기...] > 서버 변수 이름 추가
          Step 4) [URL 재작성] > 작업 탭 > [규칙 추가...] > 아웃바운드 규칙 > 빈 규칙 > 다음 사항 적용
          - 이름(N): Remove Server
          - 검색 범위: 서버 변수
          - 서버 변수 이름: RESPONSE_SERVER
          - 패턴(T): .*

          [X-Powered-By 헤더 제거]
          Step 1) 제어판 > 관리 도구 > IIS(인터넷 정보 서비스) 관리자 > 해당 웹 사이트 > [HTTP 응답 헤더]
          Step 2) [X-Powered-By] 설정 제거
      - os: "FTP"
        content: |
          Step 1) IIS(인터넷 정보 서비스) 관리자 > FTP 메시지 > 기본 배너 숨기기 설정
      - os: "SMTP"
        content: |
          Step 1) 시작 > 실행 > cmd > adsutil.vbs 파일이 있는 디렉터리로 이동
          - 명령어: cd C:\inetpub\AdminScripts
          - adsutil.vbs를 사용하기 위해 서버 관리자에서 역할 추가 필요 → "웹 서버(IIS) > 관리 도구 > IIS 6 관리 호환성 > IIS 6 스크립팅 도구" 설치 필요
          Step 2) IIS에서 서비스 중인 SMTP 서비스 목록 확인
          - 명령어: cscript adsutil.vbs enum /p smtpsvc
          Step 3) SMTP 서비스에 connectresponse 속성 값에서 배너 문구 수정
          - 명령어: cscript adsutil.vbs set smtpsvc/1/connectresponse "Banner Text"
          Step 4) SMTP 서비스 재시작
          - 명령어: net stop smtpsvc (중지)
          - 명령어: net start smtpsvc (시작)

  - id: "W-34"
    title: "Telnet 서비스 비활성화"
    domain: "2. 서비스 관리"
    severity: "중"
    description:
      check_content: "Telnet 서비스 활성화 및 취약한 인증 사용 여부 점검"
      check_purpose: "취약 프로토콜인 Telnet 서비스의 사용을 원칙적으로 금지하고, 부득이 이용할 경우 네트워크상으로 비밀번호를 전송하지 않는 NTLM 인증을 사용하도록 하여 인증 정보의 노출을 차단하기 위함"
      threat: "Telnet 서비스는 평문으로 데이터를 송수신하기 때문에 비밀번호 방식으로 인증을 수행할 경우 ID 및 비밀번호가 외부로 노출될 위험이 존재함"
      reference:
        - "※ Windows 서버의 Telnet 서비스의 두 가지 인증 방법\nNTLM 인증: 암호를 전송하지 않고 negotiate/challenge/response 절차로 인증 수행\nPassword 인증: 관리자 및 Telnet Clients 그룹에 포함된 ID/PW로 인증 수행"
        - "※ Windows 2016 이상 버전에서는 보안상 이슈로 인해 Telnet 서버 설치 제공하지 않음"
    target: "Windows NT, 2000, 2003, 2008, 2012"
    criteria:
      good: "Telnet 서비스가 구동되어 있지 않거나 인증 방법이 NTLM인 경우"
      vulnerable: "Telnet 서비스가 구동되어 있으며 인증 방법이 NTLM이 아닌 경우"
    action: "불필요 시 서비스 중지/사용 안 함 설정, 사용 시 인증 방법으로 NTLM만 사용"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT, 2000"
        content: |
          Step 1) 시작 > 설정 > 제어판 > 관리 도구 > 텔넷 서버 설정
          Step 2) NTLM 인증 방식만 사용
      - os: "Windows 2003, 2008, 2012"
        content: |
          Step 1) 시작 > 실행 > cmd > tlntadmn config
          Step 2) tlntadmn config sec = +NTLM -passwd (passwd 인증 방식을 제외하고 NTLM 방식만 사용)
          Step 3) 불필요 시 해당 서비스 중지
          시작 > 실행 > SERVICES.MSC > Telnet > 속성 [일반] 탭에서 "시작 유형"을 "사용 안 함"으로 설정한 후 Telnet 서비스 중지

  - id: "W-35"
    title: "불필요한 ODBC/OLE-DB 데이터 소스와 드라이브 제거"
    domain: "2. 서비스 관리"
    severity: "중"
    description:
      check_content: "불필요한 ODBC/OLE-DB 데이터 소스와 드라이브 제거 여부 점검"
      check_purpose: "불필요한 데이터 소스 및 드라이버를 ODBC 데이터 소스 관리자 도구를 이용해 제거하여 비인가자에 의한 데이터베이스 접속 및 자료 유출을 차단하기 위함"
      threat: "불필요한 ODBC/OLE-DB 데이터 소스를 통한 비인가자에 의한 데이터베이스 접속 및 자료 유출이 존재함"
      reference:
        - "※ 특정 샘플 응용프로그램은 샘플 데이터베이스를 위해 ODBC 데이터 소스를 설치하거나 불필요한 ODBC/OLE-DB 데이터베이스 드라이버를 설치하므로 불필요한 데이터 소스나 드라이버는 ODBC 데이터 소스 관리자 도구를 이용해서 제거하는 것이 바람직함"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "시스템 DSN 부분의 데이터 소스를 현재 사용하고 있는 경우"
      vulnerable: "시스템 DSN 부분의 데이터 소스를 현재 사용하고 있지 않은 경우"
    action: "사용하지 않는 불필요한 ODBC 데이터 소스 제거"
    impact: "응용프로그램에서 사용할 경우 양호"
    examples:
      - os: "Windows NT"
        content: |
          Step 1) 시작 > 설정 > 제어판 > 데이터 원본(ODBC) > 시스템 DSN > 해당 드라이브 클릭
          Step 2) 사용하지 않은 데이터 소스 제거
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > ODBC 데이터 원본 > 시스템 DSN > 해당 드라이브 클릭
          Step 2) 사용하지 않는 데이터 소스 제거

  - id: "W-36"
    title: "원격터미널 접속 타임아웃 설정"
    domain: "2. 서비스 관리"
    severity: "중"
    description:
      check_content: "원격터미널 접속 Timeout 설정 여부 점검"
      check_purpose: "조직에서 부득이 원격터미널 접속을 허용해야 할 경우, 원격터미널 접속 후 일정 시간 동안 이벤트가 발생하지 않은 호스트의 접속을 차단하여 비인가자의 불필요한 접근을 차단하고 정보의 노출을 방지하기 위함"
      threat: "접속 Timeout 값이 설정되지 않으면 유휴 시간 내 비인가자의 시스템 접근으로 인해 불필요한 내부 정보의 노출 위험이 존재함"
      reference:
        - "※ 기반시설 시스템에서 원격터미널 서비스의 이용은 원칙적으로 금지하나, 부득이하게 해당 기능을 활용해야 하는 경우 접속 Timeout 설정 등의 보안 설정을 적용해야 함"
    target: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "원격 제어 시 Timeout 제어 설정을 30분 이하로 설정한 경우"
      vulnerable: "원격 제어 시 Timeout 제어 설정을 적용하지 않거나 30분 초과로 설정한 경우"
    action: "Timeout 제어 설정 적용"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows 2000, 2003, 2008"
        content: |
          Step 1) 시작 > 실행 > 열기 > TSCC.MSC 실행(Windows 2008은 TSCONFIG.MC)
          Step 2) RDP-Tcp connection에서 우클릭 > 속성 실행
          Step 3) [세션] 탭에서 사용자 설정 무시(Override user settings)를 적용하고 유휴 시 세션이 끊어지도록 "유휴 세션 제한 시간"을 "30분" 이하로 설정
      - os: "Windows 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 실행 > GPEDIT.MSC(로컬 그룹 정책 편집기)
          Step 2) 컴퓨터 구성 > 관리 템플릿 > 터미널 서비스 > 원격 데스크톱 세션 호스트 > 세션 시간 제한
          Step 3) [활성 상태지만 유휴 터미널 서비스 세션에 시간 제한 설정] > [유휴 세션 제한]을 30분 이하로 설정

  - id: "W-37"
    title: "예약된 작업에 의심스러운 명령이 등록되어 있는지 점검"
    domain: "2. 서비스 관리"
    severity: "중"
    description:
      check_content: "예약된 작업에 의심스러운 명령의 등록 여부 점검"
      check_purpose: "외부 무단 침입 시 설정될 수 있는 불필요한 예약 작업의 등록 여부를 확인하기 위함"
      threat: "일정 시간마다 미리 설정해둔 프로그램을 실행할 수 있는 예약된 작업은 시작 프로그램과 더불어서 해킹과 트로이목마, 백도어를 설치하여 공격하기 좋은 경로로 사용될 위험이 존재함"
      reference: []
    target: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "불필요한 명령어나 파일 등 주기적인 예약 작업의 존재 여부를 주기적으로 점검하고 제거한 경우"
      vulnerable: "불필요한 명령어나 파일 등 주기적인 예약 작업의 존재 여부를 주기적으로 점검하지 않거나, 불필요한 작업을 제거하지 않은 경우"
    action: "예약 작업에 대한 주기적인 확인"
    impact: "예약 작업을 잘못 삭제하는 경우 관련된 작업이 실행되지 않을 수 있음"
    examples:
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 설정 > 제어판 > 예약된 작업 확인
          Step 2) 등록된 예약 작업을 선택하여 상세 내역 확인
          Step 3) 불필요한 작업 존재 시 삭제
          ※ 2008, 2012, 2016, 2019 는 제어판 > 관리 도구 > 작업 스케줄러에서 확인

  - id: "W-38"
    title: "주기적 보안 패치 및 벤더 권고사항 적용"
    domain: "3. 패치 관리"
    severity: "상"
    description:
      check_content: "최신 보안 패치 적용 여부 점검"
      check_purpose: "최신 보안 패치를 설치하여 시스템 및 응용프로그램의 취약성을 제거하기 위함"
      threat: "최신 보안 패치가 즉시 적용되지 않으면 알려진 취약성으로 인한 시스템 공격 위험이 존재함"
      reference:
        - "※ 보안 패치보다 취약성을 이용한 공격 도구가 먼저 출현할 수 있으므로 보안 패치는 발표 후 가능한 한 빨리 설치할 것을 권장함"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "패치 절차를 수립하여 주기적으로 패치를 확인 및 설치하는 경우"
      vulnerable: "패치 절차가 수립되어 있지 않거나 주기적으로 패치를 설치하지 않는 경우"
    action: "주기적인 보안 패치 확인 및 설치 적용"
    impact: "설치 후 시스템 재시작이 필요한 경우가 존재하며 설치에 따른 영향도 검사가 필요함"
    examples:
      - os: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          [수동 HOT FIX 적용]
          Step 1) 패치 리스트를 조회하여, 서버에 필요한 패치를 선별하여 수동으로 설치함.
          https://technet.microsoft.com/ko-kr/security/
          https://msrc.microsoft.com/update-guide

          [자동 HOT FIX 적용]
          Step 1) Windows 자동업데이트 기능을 이용한 설치
          제어판 > windows update

  - id: "W-39"
    title: "백신 프로그램 업데이트"
    domain: "3. 패치 관리"
    severity: "상"
    description:
      check_content: "사용 백신 프로그램의 최신 업데이트 여부 점검"
      check_purpose: "백신 프로그램의 최신 업데이트 상태를 유지하기 위함"
      threat: "백신 프로그램이 지속적, 주기적으로 업데이트되지 않으면 계속되는 신종 바이러스의 출현으로 인한 시스템 공격 위험이 존재함"
      reference:
        - "※ 네트워크망이 격리된 기반 보호 시설의 경우, 시스템에 설치된 백신 프로그램의 최신 업데이트 상태 유지를 위해 적절한 업데이트 절차 및 적용 방법 수립이 필요함"
        - "※ 관련 점검항목: W-45(상)"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "바이러스 백신 프로그램의 최신 엔진 업데이트가 설치되어 있거나, 망 격리 환경의 경우 백신 업데이트를 위한 절차 및 적용 방법이 수립된 경우"
      vulnerable: "바이러스 백신 프로그램의 최신 엔진 업데이트가 설치되어 있지 않거나, 망 격리 환경의 경우 백신 업데이트를 위한 절차 및 적용 방법이 수립되지 않은 경우"
    action: "백신 프로그램 환경설정 메뉴를 통해 DB 및 엔진의 최신 업데이트를 하도록 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 긴급한 경우 수시로 업데이트 진행
          (백신 프로그램 종류마다 다소 차이는 있으나 매주 업데이트가 진행됨)
          Step 2) 정기적인 업데이트를 통해 검색엔진을 최신 버전으로 유지하고, 백신 프로그램 제조사에서 발표하는 경보 주시
          Step 3) 백신 프로그램의 자동 업데이트 기능 이용 시 온라인을 통해 변동 사항을 자동으로 업데이트하여 알 수 있음

  - id: "W-40"
    title: "정책에 따른 시스템 로깅 설정"
    domain: "4. 로그 관리"
    severity: "중"
    description:
      check_content: "시스템 로깅 설정 여부 및 적절성 점검"
      check_purpose: "적절한 로깅 설정으로 유사시 책임 추적을 위한 로그를 확보하기 위함"
      threat: "감사 설정이 구성되어 있지 않거나 감사 설정 수준이 너무 낮은 경우 보안 관련 문제 발생 시 원인을 파악하기 어려우며 법적 대응을 위한 충분한 증거 확보가 어려운 위험이 존재함"
      reference:
        - "※ 감사 정책을 과도하게 설정할 경우, 보안 로그에 불필요한 항목이 많이 기록되므로 중요한 감사 항목 식별이 어려울 수 있으며, 시스템 성능에도 심각한 영향을 줄 수 있으므로 법적 요구 사항과 조직의 정책에 따라 꼭 필요한 로그를 남기도록 설정해야 함"
        - "※ Windows 시스템은 보안 로그가 가득 차게 되는 경우 가장 오래된 감사 항목이 덮어 씌워짐"
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "감사 정책 권고 기준에 따라 감사 설정이 되어 있는 경우"
      vulnerable: "감사 정책 권고 기준에 따라 감사 설정이 되어 있지 않은 경우"
    action: "이벤트에 대한 감사 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows NT"
        content: |
          Step 1) 시작 > 프로그램 > 관리 도구 > 도메인 사용자 관리자 > 정책 > 감사
          - 로그온 및 로그오프, 보안 정책 바꾸기: 성공/실패 감사
          - 사용자 권한 사용, 사용자 및 그룹 관리: 실패 감사
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          Step 1) 시작 > 제어판 > 관리 도구 > 로컬 보안 정책 > 로컬 정책 > 감사 정책
          <감사 정책 권고 기준>
          - 계정 관리: 실패 감사
          - 계정 로그온 이벤트: 성공/실패 감사
          - 권한 사용: 성공/실패 감사
          - 디렉터리 서비스 액세스: 실패 감사
          - 로그온 이벤트: 성공/실패 감사
          - 정책 변경: 성공/실패 감사

  - id: "W-41"
    title: "NTP 및 시각 동기화 설정"
    domain: "4. 로그 관리"
    severity: "중"
    description:
      check_content: "NTP 및 시각 동기화 설정 여부 점검"
      check_purpose: "안전하고 승인된 Windows 시간 서비스 또는 자체 구축한 NTP 서버와 동기화하여 인증 및 감사하기 위함"
      threat: "시스템 간 시각 동기화 미흡으로 보안 사고 및 장애 발생 시 초기 대응이 불가한 위험이 존재함"
      reference: []
    target: "Windows NT, 2000, 2003, 2008, 2012, 2016, 2019, 2022"
    criteria:
      good: "NTP 및 시각 동기화를 설정한 경우"
      vulnerable: "NTP 및 시각 동기화를 설정하지 않은 경우"
    action: "NTP 및 시각 동기화 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "Windows 2000, 2003, 2008, 2012, 2016, 2019, 2022"
        content: |
          [인터넷 동기화 설정 시]
          Step 1) 제어판 > 시계 및 국가 > 날짜 및 시간 > 인터넷 시간 > 설정 변경 > 인터넷 시간 서버와 동기화
          Step 2) 신뢰할 수 있는 NTP 서버 입력 후 적용

          [내부 NTP 서버 사용 시]
          Step 1) 시간 동기화 정보 확인 (Client)
          CMD > w32tm /dumpreg /subkey:parameters
          Step 2) 내부 NTP서버로 시간동기화 설정 (Client)
          (설정) CMD > w32tm /config /syncfromflags:manual /manualpeerlist:{NTP서버 IP or 도메인} /update
          (적용 확인) CMD > w32tm /dumpreg /subkey:parameters
          ※ Client에서 동기화 설정 후 'SpecialPollInterval' 'MaxPosPhaseCorrection' 설정에 따라 주기적으로 자동으로 동기화가 적용되지만 NTP Server에서 다음 명령어로 즉시 적용 가능함.
          CMD > w32tm /resync
          Step 3) 동기화 시간차 확인
          CMD > w32tm /stripchart /dataonly /computer:{NTP서버 IP or 도메인}

  - id: "W-42"
    title: "이벤트 로그 관리 설정"
    domain: "4. 로그 관리"
    severity: "하"
    description:
      check_content: "이벤트 로그 파일 용량 및 보관 기간 설정 점검"
      check_purpose: "유사시 책임추적을 위해 주요 이벤트가 누락 되지 않도록 이벤트 로그 파일의 크기 및 보관 기간을 적절하게 유지하기 위함"
      threat: "이벤트 로그 파일의 크기가 충분하지 않으면 중요 로그가 저장되지 않을 위험이 있으며, 최대 보존 크기를 초과하는 경우 자동으로 덮어씀으로써 중요 로그의 손실 위험이 존재함"
