      - os: "Windows 2016, 2019, 2022"
        content: |
          Step 1) 설정 > 개인 설정 > 잠금 화면 > 화면 보호기 설정
          Step 2) "다시 시작할 때 로그온 화면 표시" 설정 및 대기 시간 "10분" 이하로 설정

