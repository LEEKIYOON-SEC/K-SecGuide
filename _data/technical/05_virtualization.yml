platform: "11. 가상화 장비"
platform_number: 11
category: "기술적 분야"
items:
  - id: "HV-01"
    title: "계정 로그오프/세션 관리"
    domain: "1. 계정 관리"
    severity: "상"
    description:
      check_content: "웹 콘솔 및 사용자 Shell Session Timeout 설정 여부 점검"
      check_purpose: "Session Timeout 기능을 구현하여 공격자가 만료되지 않은 세션 활용을 방지하기 위함"
      threat: "세션의 만료 기간을 정하지 않거나, 만료기한이 너무 길게 설정된 경우 악의적인 사용자가 만료되지 않은 세션을 활용하여 불법적인 접근을 시도할 수 있는 위험이 존재함"
      reference: []
    target: "VMware ESXi, vCenter, XenServer, KVM, Nutanix"
    criteria:
      good: "웹 콘솔 및 사용자 Shell Session Timeout 설정이 600초(10분) 이하로 설정된 경우"
      vulnerable: "웹 콘솔 및 사용자 Shell Session Timeout 설정이 600초(10분)를 초과하여 설정된 경우"
    action: "600초(10분) 동안 입력이 없을 경우 접속된 클라이언트 세션을 끊도록 설정"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "VMware ESXi, vCenter"
        content: |
          [웹 콘솔 Session Timeout 설정]
          Step 1) Web 콘솔 페이지 접속
          https://<VMware ESXi IP>
          Step 2) 호스트 > 관리 > 시스템 > 고급 설정으로 이동
          Step 3) UserVars.HostClientSessionTimeout 설정이 600초(10분)로 설정되어 있는지 확인
          Step 4) 600초(10분) 이하로 설정되어 있지 않은 경우 [옵션 편집]을 클릭하여 수정
      - os: "XenServer, KVM"
        content: |
          [사용자 Shell Session Timeout 설정]
          Step 1) 호스트에 접속
          Step 2) echo $TMOUT 명령어를 이용하여 사용자 Shell Session Timeout 설정 확인
          $ echo $TMOUT
          9000
          Step 3) Session Timeout 10분을 초과하는 경우 아래 두 라인 추가
          $ vi /etc/profile
          readonly TMOUT=600;
          export TMOUT
          Step 4) 변경된 설정 적용
          $ source /etc/profile
      - os: "Nutanix"
        content: |
          [사용자 Shell Session Timeout 설정]
          Step 1) Controller VM에 접속하여 User Shell Session Timeout 설정 확인
          sudo cat /etc/profile.d/os-security.sh
          readonly TMOUT=9000 2> /dev/null || echo "TMOUT already set."
          readonly HISTFILE
          mesg n 2>/dev/null
          Step 2) vi 편집기를 이용하여 User Shell Session Timeout을 10분으로 설정
          sudo vi /srv/salt/security/CVM/shellCVM.sls
          ossecuritycreate:
            file:
              - managed
              - name: /etc/profile.d/os-security.sh
              - mode: 644
              - user: root
              - group: root
              - contents: |
                 readonly TMOUT=600 2> /dev/null || echo "TMOUT already set."
          Step 3) 변경된 설정 적용
          sudo salt-call state.sls security/CVM/shellCVM
          [SSH Idle Timeout 설정]
          Step 1) Controller VM에 접속하여 SSH Idle Timeout 설정 확인
          sudo cat /etc/ssh/sshd_config | grep "ClientAliveInterval"
          Step 2) vi 편집기를 이용하여 SSH Idle Timeout을 10분으로 설정
          sudo vi /srv/salt/security/CVM/sshd/sshdconfCVM
          ClientAliveInterval 600
          Step 3) 변경 설정 적용
          sudo salt-call state.sls security/CVM/sshdCVM
          [관리 웹 콘솔 Session Timeout 설정]
          Step 1) 관리 웹 콘솔 접속
          https://<Nutanix 웹 콘솔 IP:9440>
          Step 2) Session Timeout 설정 적용
          Settings > UI Settings > Security Setting의 SESSION TIMTOUT 설정을 10분으로 설정

  - id: "HV-02"
    title: "가상화 장비 외부접속 차단"
    domain: "1. 계정 관리"
    severity: "상"
    description:
      check_content: "허용할 호스트에 대한 접속 IP 제한 설정 여부 점검"
      check_purpose: "허용한 호스트만 서비스를 사용하게 하여 비인가자의 무단 접근 시도를 예방하기 위함"
      threat: "호스트에서 실행되는 서비스에 대한 접근을 제한하지 않으면 비인가자의 무단 접근에 노출되어 가상화 시스템 침해사고의 위험이 존재함"
      reference:
        - "※ TCP Wrapper: 호스트 기반의 네트워킹 ACL(Access Control List) 시스템"
        - "※ IPTables: 리눅스 커널 방화벽이 제공하는 테이블들과 그것을 저장하는 체인, 규칙들을 구성할 수 있게 해주는 서비스"
        - "※ FirewallD: Linux 운영체제를 위한 방화벽 관리 도구"
    target: "VMware ESXi, vCenter, XenServer, KVM, Nutanix"
    criteria:
      good: "허용된 IP에서만 관리 콘솔 및 원격 접속이 가능하도록 제한된 경우"
      vulnerable: "허용된 IP에서만 관리 콘솔 및 원격 접속이 가능하도록 제한되지 않은 경우"
    action: "호스트에서 제공하는 방화벽 애플리케이션을 이용하여 서비스 접속 허용 IP 등록 설정"
    impact: "IPTables의 기본 정책을 Drop으로 변경하는 경우에는 애플리케이션 간의 연결 현황을 확인 후 변경이 필요함"
    examples:
      - os: "VMware ESXi, vCenter"
        content: |
          [웹 콘솔 접속 IP 제한 설정]
          Step 1) Web 콘솔 페이지 접속
          https://<VMware ESXi IP>
          Step 2) 네트워킹 > 방화벽 규칙으로 이동
          Step 3) [ESXi] SSH 서버 "허용된 IP주소" 확인
          Step 4) [vSphere] 웹 클라이언트 "허용된 IP주소" 확인
          Step 5) IP 제한 설정이 적용되어 있지 않은 경우 vSphere Web Client(SSH 서버) > 설정 편집 > 다음 네트워크의 연결만 허용 선택
          Step 6) 접속 허용 IP 입력
      - os: "XenServer, KVM"
        content: |
          [IPTables를 통한 접근 통제]
          Step 1) 호스트 접속
          $ iptables -nL --line-number
          Step 2) IPTables 정책 목록을 통해 접속 IP 제한 설정 확인
          Step 3) SSH 원격 접속을 허용된 IP로만 제한
          $ iptables -I RH-Firewall-1-INPUT 1 -p tcp -s <허용 IP> --dport 22 -j ACCEPT
          $ iptables -I RH-Firewall-1-INPUT 2 -p tcp -s 0.0.0.0/0 --dport 22 -j DROP
          Step 4) IPTables의 변경된 정책 저장 및 서비스 재시작
          $ service iptables save
          $ service iptables restart
      - os: "Nutanix"
        content: |
          Step 1) Controller VM에 접속하여 설정 확인
          sudo cat /etc/hosts.allow | grep –v "^#"
          Step 2) vi 편집기를 이용하여 hosts.allow 파일에 ssh 접속이 필요한 IP만 접속을 허용 하도록 설정
          sudo vi /srv/salt/security/CVM/network/hosts.allow
          sshd: 192.168.100.1 : ALLOW
          Step 3) 변경 설정 적용
          sudo salt-call state.sls security/CVM/networkCVM

  - id: "HV-03"
    title: "가상화 장비 루트계정 관리"
    domain: "1. 계정 관리"
    severity: "상"
    description:
      check_content: "별도의 관리자 계정을 생성하여 관리 여부 점검"
      check_purpose: "허용한 호스트만 서비스를 사용하게 하여 비인가자의 무단 접근 시도를 예방하기 위함"
      threat: "루트 계정은 누구나 알 수 있는 계정이기 때문에 비인가자의 접속 시도 및 비밀번호 무차별 대입 공격에 노출될 위험이 존재함"
      reference:
        - "※ 무차별 대입 공격(Brute-force Attack): 특정한 암호를 풀기 위해 가능한 모든 값을 대입하는 것"
    target: "VMware ESXi, vCenter"
    criteria:
      good: "별도의 관리자 계정을 생성하여 가상화 장비가 관리된 경우"
      vulnerable: "루트 계정으로 가상화 장비가 관리된 경우"
    action: "별도의 계정을 생성하여 관리자 권한을 부여하고 루트 계정의 권한은 제거하거나 비활성화"
    impact: "일반적인 경우 영향 없음"
    examples:
      - os: "VMware ESXi"
        content: |
          Step 1) Web 콘솔 페이지 접속
          https://<VMware ESXi IP>
          Step 2) 호스트 > 작업 > 사용 권한으로 이동
          Step 3) root 계정의 관리자 권한이 제거되고 별도의 관리자 권한이 존재하는지 확인
          Step 4) root 계정 이외에 관리자 권한이 부여된 계정이 없는 경우 별도의 계정 생성
          호스트 > 관리 > 보안 및 사용자 > 사용자 추가
          Step 5) 별도로 생성한 계정에 관리자 권한 부여
          호스트 > 작업 > 사용 권한 > 사용자 추가
          Step 6) root 계정의 관리자 권한 제거

  - id: "HV-04"
    title: "가상화 장비 계정 권한 관리"
    domain: "1. 계정 관리"
    severity: "상"
    description:
      check_content: "공용 계정 등 불필요한 계정이 존재하는지 여부 점검"
      check_purpose: "사용하지 않는 불필요한 계정을 관리함으로써 관리되지 않는 계정을 통한 비인가자의 무단 접속 또는 공격을 차단하기 위함"
      threat: "시스템에 등록되어 있는 불필요한 계정을 관리하지 않을 경우 비인가자의 무단 접근이 가능하며, 공용 계정 및 퇴사자 계정이 존재할 경우 해당 계정을 통한 침해사고 발생 시 사후 추적이 어려울 수 있는 위험이 존재함"
      reference:
        - "※ 1인 1계정 사용을 원칙으로 운영해야 하며, 공용 계정은 가급적 사용을 지양해야 함"
    target: "VMware ESXi, vCenter, XenServer, KVM, Nutanix"
    criteria:
      good: "불필요한 공용 계정 및 퇴사자 계정이 존재하지 않은 경우"
      vulnerable: "불필요한 공용 계정 및 퇴사자 계정이 존재하는 경우"
    action: "불필요한 공용 계정 및 퇴사자 계정 제거"
    impact: "애플리케이션에서 사용하는 계정의 경우 삭제 시 서비스 가용성에 영향을 줄 수 있음"
    examples:
      - os: "VMware ESXi"
        content: |
          Step 1) Web 콘솔 페이지 접속
          https://<VMware ESXi IP>
          Step 2) 호스트 > 관리 > 보안 및 사용자 > 사용자로 이동
          Step 3) 불필요한 계정이 존재하는 경우 해당 계정 삭제
      - os: "XenServer, KVM"
        content: |
          Step 1) 호스트 접속
          Step 2) 등록되어 있는 계정 확인
          $ grep /bin/bash /etc/passwd | cut -f1 -d:
          root
          user1
          Step 3) 불필요한 계정이 존재하는 경우 해당 계정 삭제
          $ userdel -r <계정명>
      - os: "Nutanix"
        content: |
          Step 1) Nutanix Web 콘솔 페이지 접속
          https://<Nutanix 웹 콘솔 IP>:9440 접속
          Step 2) Settings > Users an Roles > Local User Management를 선택하고 불필요한 계정이 존재하는 경우 해당 계정 삭제

  - id: "HV-05"
    title: "가상화 장비 사용자 인증 강화"
    domain: "1. 계정 관리"
    severity: "상"
    description:
      check_content: "사용자 계정별 적절한 권한이 부여 여부 점검"
      check_purpose: "가상화 시스템에 등록한 계정들에 용도별 권한을 부여함으로써 권한 없는 사용자의 설정 변경으로 인한 시스템 침입 경로 유출 위험을 줄이고 관리자 계정이 아닌 일반 계정이 공격자에게 탈취되었을 때 가상화 시스템을 장악하지 못하도록 하기 위함"
      threat: "가상화 시스템에 등록된 계정이 모두 관리자 권한으로 부여된 경우 권한 없는 사용자의 의도하지 않은 설정 변경을 통하여 공격자에게 가상화 시스템 침입 경로 제공 위험이 존재함"
      reference:
        - "※ 최고 관리자 권한은 최소한의 계정에만 부여"
    target: "VMware ESXi, vCenter, XenServer, KVM, Nutanix"
    criteria:
      good: "계정별 불필요한 권한이 부여되지 않은 경우"
      vulnerable: "계정별 불필요한 권한이 부여된 경우"
    action: "불필요한 권한이 부여된 계정에 대한 권한 제거"
    impact: "일반적 경우 영향 없음"
    examples:
      - os: "VMware ESXi"
        content: |
          Step 1) Web 콘솔 페이지 접속
          https://<VMware ESXi IP>
          Step 2) 호스트 > 작업 > 사용 권한으로 이동
          Step 3) 등록된 계정별 사용 권한 확인
          Step 4) 불필요한 권한이 부여되어 있는 경우 해당 계정 선택
          Step 5) 역할에 맞는 권한으로 변경
      - os: "XenServer"
        content: |
          [Active Directory에 가입되어 있지 않은 경우]
          Step 1) 호스트에 접속
          Step 2) bash 사용자 목록 확인
          $ grep /bin/bash /etc/passwd | cut -f1 -d:
          root
          user1
          Step 3) 불필요한 계정 제거
          $ gpasswd -d user1 users
          [Active Directory에 가입되어 있는 경우]
          Step 4) 호스트에 접속
          Step 5) 계정별 부여된 권한 확인
          $ xe subject-list
          Step 6) 부적절한 권한이 있는 경우 기존의 역할을 제거하고 새로운 역할을 추가
          $ xe subject-role-remove uuid=<subject uuid> role-name=<role_name_to_remove>
          $ xe subject-role-add uuid=<subject uuid > role-name=<role_name_to_add>
      - os: "KVM"
        content: |
          Step 1) 호스트에 접속
          Step 2) bash 계정 목록 확인
          $ grep /bin/bash /etc/passwd | cut -f1 -d:
          root
          user1
          Step 3) 불필요한 계정 제거
          $ gpasswd -d user1 users
      - os: "Nutanix"
        content: |
          Step 1) 웹 콘솔에 접속하여 등록된 사용자 계정 및 권한 확인
          https://<Nutanix 웹 콘솔 IP>:9440 접속
          Settings > Users an Roles > Local User Management 선택
          Step 2) 불필요한 권한이 부여되어 있는 경우 해당 계정 선택
          Step 3) 불필요한 권한 제거

  - id: "HV-06"
    title: "비밀번호 관리정책 설정"
    domain: "1. 계정 관리"
    severity: "상"
    description:
      check_content: "로그인 계정에 대한 비밀번호 관리 정책 설정 여부 점검"
      check_purpose: "로그인 계정 비밀번호에 대한 관리 정책 미흡으로 인한 계정 탈취를 방지하기 위함"
      threat: "가상화 시스템에 등록된 계정이 유추하기 쉬운 비밀번호 설정 등 미흡한 비밀번호 관리 정책이 적용되어 있으면 무차별 대입 공격을 통한 계정 탈취로 인한 공격자에게 가상화 시스템 침입 경로 제공 위험이 존재함"
      reference:
        - "※ 정책 기준: 영문 숫자 특수문자 2개 조합 시 10자리 이상, 3개 조합 시 8자리 이상, 비밀번호 변경 기간 90일 이하"
    target: "VMware ESXi, vCenter, XenServer, KVM, Nutanix"
    criteria:
      good: "로그인 계정 비밀번호 관리 정책이 적용된 경우"
      vulnerable: "로그인 계정 비밀번호 관리 정책이 적용되지 않은 경우"
    action: "로그인 계정 비밀번호를 관리 정책에 맞게 설정"
    impact: "일반적 경우 영향 없음"
    examples:
      - os: "VMware ESXi"
        content: |
          Step 1) WEB 콘솔 페이지 접속
          https://<VMware ESXi IP>
          Step 2) 호스트> 관리 > 시스템 > 고급 설정으로 이동
          Step 3) Security.PasswordQualityControl 설정값 확인
          Step 4) min = N0, N1, N2, N3, N4 중 N3, N4의 값이 8 미만일 경우 [옵션 편집]을 클릭하여 수정
          Step 5) Security.PasswordMaxDays 설정값 확인
          Step 6) 90일 이하로 설정되어 있지 않은 경우 [옵션 편집]을 클릭하여 수정
          ※ (예시) retry = M min = N0, N1, N2, N3, N4
          M : 암호 변경 시, 조건을 불만족하는 암호 입력 시 다시 암호를 되묻는 횟수
          N0 : 문자 종류(대문자, 소문자, 숫자, 특수문자) 중 한 가지만 사용해 구성된 암호에 허용되는 최소 암호 글자 수
          N1 : 문자 종류(대문자, 소문자, 숫자, 특수문자) 중 두 가지를 사용해 구성된 암호에 허용되는 최소 비밀번호 길이
          N2 : 암호 문구 사용 시, 허용되는 최소 비밀번호 길이
          N3 : 문자 종류(대문자, 소문자, 숫자, 특수문자) 중 세 가지를 사용해 구성된 암호에 허용되는 최소 비밀번호 길이
          N4 : 문자 종류(대문자, 소문자, 숫자, 특수문자) 중 네 가지를 사용해 구성된 암호에 허용되는 최소 비밀번호 길이
          disabled : 길이에 관계 없이 해당 종류의 암호를 사용하지 않음
          암호의 첫 문자로 사용되는 대문자와 마지막 문자로 사용되는 숫자는 문자 종류의 수로 포함되지 않음
      - os: "VMware vCenter"
        content: |
          Step 1) vSphere Client 접속 후, 다음 메뉴에 접근하여 확인(vSphere Client 버전에 따라, 메뉴 명칭은 달라질 수 있음)
          Step 2) (vCenter6.5) "관리" > "Single Sign On" > "구성" > "Policies" > "암호 정책" > 비밀번호 정책 확인
          Step 3) (vCenter8) "관리" > "Single Sign On" > "구성" > "로컬 계정" > "암호 정책" > 비밀번호 정책 확인
          Step 4) 비밀번호 정책 설정 적용
      - os: "XenServer"
        content: |
          Step 1) XenServer 접속 > Local Command Shell 실행
          Step 2) 아래 명령어를 통해 비밀번호 설정 확인
          # cat /etc/login.defs | grep –i "PASS_MAX_DAYS"
          # cat /etc/login.defs | grep –i "PASS_MIN_DAYS"
          # cat /etc/login.defs | grep -i "PASS_MIN_LEN"
          Step 3) 아래 명령어 적용
          # vi /etc/login.defs
          PASS_MIN_LEN 8
          PASS_MAX_DAYS 90
          PASS_MIN_DAYS 7
      - os: "KVM"
        content: |
          [RHEL 8 이후 버전 기반 리눅스]
          Step 1) 아래 경로 설정 파일 확인
          /etc/security/faillock.conf
          /etc/security/pwquality.conf
          Step 2) 비밀번호 정책 설정이 되어 있지 않으면 적용 설정
          비밀번호 정책 설정 예시(UNIX 기반)
          예시)password requisite pam_cracklib.so try_first_pass retry=3 minlen=8 lcredit=-1 ucredit=-1 dcredit=-1 ocredit=-1
      - os: "Nutanix"
        content: |
          Step 1) Controller VM에 접속하여 비밀번호 최소 사용 기간 확인
          sudo cat /etc/login.defs | grep –v "^#" | grep "PASS_MAX_DAYS"
          Step 2) Controller VM에 접속하여 비밀번호 최소 사용 기간을 90일로 설정
          sudo vi /srv/salt/security/CVM/pamCVM.sls
          passmaxdays:
            file:
              - replace
              - name: /etc/login.defs
              - pattern: '^PASS_MAX_DAYS.*'
              - repl: 'PASS_MAX_DAYS   90'
          Step 3) 변경된 설정을 /etc/login.defs 파일에 적용
          sudo salt-call state.sls security/CVM/pamCVM
          Step 4) checkusergroupsCVM.sls 파일에서 admin, nutanix 계정의 비밀번호 최대 사용기간 설정 변경
          sudo vi /srv/salt/security/CVM/checkusergroupsCVM.sls
          Step 5) 변경한 설정 적용
          sudo salt-call state.sls security/CVM/checkusergroupsCVM
          Step 6) Controller VM에 접속하여 비밀번호 최소길이 설정 확인
          cat /etc/login.defs | grep -v "^#" | grep "PASS_MIN_LEN"
          Step 7) 비밀번호 최소 길이를 8자리 이상으로 변경
          sudo vi /srv/salt/security/CVM/pamCVM.sls
          passminlendef:
            file:
              - replace
              - name: /etc/login.defs
              - pattern: '^PASS_MIN_LEN.*'
              - repl: 'PASS_MIN_LEN    9'
          Step 8) 변경한 설정 적용
          sudo salt-call state.sls security/CVM/pamCVM
          ※ 영문, 숫자, 특수문자 2개 조합 시 10자리 이상, 3개 조합 시 8자리 이상 설정 권고
          ※ 비밀번호 최대 사용 기간을 90일(3개월) 이하로 설정할 것을 권고.
          ※ 비밀번호 최소 사용 기간을 7일(1주) 이상으로 설정할 것을 권고.

  - id: "HV-07"
    title: "계정 잠금 임계값 설정"
    domain: "1. 계정 관리"
    severity: "상"
    description:
      check_content: "로그인 계정에 대한 비밀번호 관리 정책 설정 여부 점검"
      check_purpose: "잘못된 비밀번호 입력을 제한하지 않으면 무차별 대입 공격을 통한 계정 탈취 위협이 발생할 수 있어 실패 횟수 설정을 통해 가상화 장비 내부 침입을 방지하기 위함"
      threat: "잘못된 비밀번호 입력을 제한하지 않으면 무차별 대입 공격을 통한 계정 탈취로 공격자에게 가상화 시스템 침입 경로 제공 위험이 존재함"
      reference: []
    target: "VMware ESXi, vCenter, KVM"
    criteria:
      good: "로그인 시도 실패 횟수에 따른 계정 잠금 설정이 적용된 경우"
      vulnerable: "로그인 시도 실패 횟수에 따른 계정 잠금 설정이 적용되지 않은 경우"
    action: "로그인 시도 실패 횟수 제한 설정"
    impact: "일반적 경우 영향 없음"
    examples:
      - os: "VMware ESXi"
        content: |
          Step 1) Web 콘솔 페이지 접속
          https://<VMware ESXi IP>
          Step 2) 관리 > 설정 > 시스템 > 고급 설정으로 이동
          Step 3) Security.AccountLockFailures 설정이 5 이하로 설정되어 있는지 확인
          Step 4) 5 이하로 설정되어 있지 않은 경우 [옵션 편집]을 클릭하여 수정
          Step 5) Security.AccountUnlockTime 설정이 600초(10분) 이상으로 설정되어 있는지 확인
          Step 6) 600초(10분) 이상으로 설정되어 있지 않은 경우 [옵션 편집]을 클릭하여 수정
          ※ 시스템이 관련 기능을 지원하지 않을 경우, 내부 정책 확인
      - os: "VMware vCenter"
        content: |
          Step 1) vSphere Client 접속 후, 다음 메뉴에 접근하여 확인(vSphere Client 버전에 따라, 메뉴 명칭은 달라질 수 있음)
          (vCenter6.5) "관리" > "Single Sign On" > "구성" > "Policies" > "잠금정책(Lockout Policy)" > 접속제한 관련 설정(실패한 최대 로그인 시도 횟수, 실패 시간 간격, 잠금 해제 시간)을 확인
          (vCenter8) "관리" > "Single Sign On" > "구성" > "로컬 계정" > "잠금정책(Lockout Policy)" > 접속제한 관련 설정(실패한 최대 로그인 시도 횟수, 실패 시간 간격, 잠금 해제 시간)을 확인
      - os: "KVM"
        content: |
          Step 1) 예시) RHEL 8 이후 버전 기반 리눅스
          아래 경로 설정 파일 확인
          /etc/security/faillock.conf
          /etc/security/pwquality.conf
          Step 2) 비밀번호 정책 설정이 되어있지 않으면 적용 설정
          비밀번호 정책 설정 예시
          # vi /etc/pam.d/system-auth
          auth required /lib/security/pam_tally.so deny=5 unlock_time=120 no_magic_root
          account required /lib/security/pam_tally.so no_magic_root reset

  - id: "HV-08"
    title: "시스템 사용 주의사항 출력 설정"
    domain: "2. 시스템 서비스 관리"
    severity: "중"
    description:
      check_content: "원격 로그인 시 시스템 사용 주의사항 출력 여부 점검"
      check_purpose: "원격 로그인 시 시스템 사용 주의사항을 안내해 사용자가 시스템에 접근 시 보안 정책을 인식하도록 하기 위함"
      threat: "사용자가 시스템에 접근 시 보안 정책을 인식하지 못해 인위적인 공격 또는 데이터 유출 등의 보안 위험이 존재함"
      reference: []
    target: "VMware ESXi, vCenter, XenServer, KVM, Nutanix"
    criteria:
      good: "시스템 사용 주의사항이 출력된 경우"
      vulnerable: "시스템 사용 주의사항 미출력 또는 표시 문구 내에 시스템 버전 정보가 노출된 경우"
    action: "시스템 사용 주의사항 출력 설정"
    impact: "일반적 경우 해당 없음"
    examples:
      - os: "VMware ESXi"
        content: |
          Step 1) Web 콘솔 페이지 접속
          https://<VMware ESXi IP>
          Step 2) 호스트 > 관리 > 시스템 > 고급 설정으로 이동
          Step 3) Annotaions.WelcomeMessage 설정 값 확인
          Step 4) 시스템 사용 주의사항 문구가 설정되어 있지 않은 경우 [옵션 편집]을 클릭하여 문구 입력
          - 다음의 파일들에 메시지 설정 존재 여부 확인
          1. /etc/motd 에 시스템 사용 주의사항 설정
          2. /etc/issue 파일에 로그인 경고 메시지 설정
          3. /etc/ssh/sshd_config 배너 값 설정
      - os: "VMware vCenter"
        content: |
          Step 1) vSphere Client 접속 후, 다음 메뉴에 접근하여 확인(vSphere Client 버전에 따라, 메뉴 명칭은 달라질 수 있음)
          (vCenter6.5) "관리" > "Single Sign On" > "구성" > "로그인 배너" > 로그인 배너 설정 여부를 확인
          (vCenter8) "관리" > "Single Sign On" > "구성" > "로그인 메시지" > 로그인 배너 설정 여부를 확인
      - os: "KVM"
        content: |
          Step 1) 배너 설정 여부 확인
          # cat /etc/ssh/sshd_config | grep "Banner"
          Step 2) /etc/sshd/sshd_config 파일에 배너 내용 삽입
          # vi /etc/sshd/sshd_config
          Banner /etc/issue.net
          (예시) This system is for the use of authorized users only.
      - os: "XenServer"
        content: |
          Step 1) 배너 설정 여부 확인
          # cat /etc/ssh/sshd_config | grep "Banner"
          Step 2) /etc/sshd/sshd_config 파일에 배너 내용 삽입
          # vi /etc/sshd/sshd_config
          Banner /etc/issue.net
          (예시) This system is for the use of authorized users only.
      - os: "Nutanix"
        content: |
          [관리 웹 콘솔 배너 설정]
          Step 1) 웹 콘솔에 접속
          https://<Nutanix 관리 Web IP>:9440 접속
          Step 2) Settings > Apperance > Welcome Banner 메뉴 선택 > 배너 입력 > Enable Banner 체크 > Save 버튼 클릭
          [SSH 배너 설정]
          ■ SSH 설정 파일 직접 변경
          Step 1) AHV, Controller VM에 각각 SSH 접속
          Step 2) 배너 파일 내용 입력
          sudo vi /etc/issue
          Step 3) ssh 설정 파일에서 배너 파일 경로 설정
          sudo vi /etc/ssh/sshd_config
          Banner /etc/issue
          Step 4) ssh 데몬 재시작
          systemctl restart sshd
          ■ DoD 배너 설정
          Step 1) Controller VM 접속하여 DoD 배너 비활성화
          ncli cluster edit-hypervisor-security-params enable-banner=false
          nutanix@cvm$ ncli cluster edit-cvm-security-params enable-banner=false
          Step 2) AHV 접속하여 DoD 배너 파일 백업
          [root@AHV-host ~]# cp -a /etc/puppet/modules/kvm/files/issue.DoD /etc/puppet/modules/kvm/files/issue.DoD.bak
          Step 3) AHV의 DoD 배너 파일 수정
          [root@AHV-host ~]# vi /etc/issue.DoD
          Step 4) Controller VM의 DoD 배너 파일 백업
          nutanix@cvm$ sudo cp -a /srv/salt/security/CVM/sshd/DODbanner /srv/salt/security/CVM/sshd/DODbannerbak
          Step 5) Controller VM의 DoD 배너 파일 수정
          nutanix@cvm$ sudo vi /srv/salt/security/CVM/sshd/DODbanner
          Step 6) AHV 및 Controller VM의 DoD 배너 활성화
          nutanix@cvm$ ncli cluster edit-hypervisor-security-params enable-banner=true
          nutanix@cvm$ ncli cluster edit-cvm-security-params enable-banner=true

  - id: "HV-09"
    title: "NTP 및 시각 동기화 설정"
    domain: "2. 시스템 서비스 관리"
    severity: "중"
    description:
      check_content: "NTP 설정을 통한 시간 동기화 여부 점검"
      check_purpose: "시스템이 NTP를 통한 시간 동기화를 적용해 가상화 장비 침해, 장애 등의 위협 발생 시 원활한 로그 분석 수행이 가능하도록 하기 위함"
      threat: "시스템이 NTP를 통한 시간 동기화가 되지 않을 경우 가상화 장비 침해, 장애 등의 위협 발생 시 로그 분석을 통한 침입 경로 파악이 어려워 초기 대응 불가 위험이 존재함"
      reference: []
    target: "VMware ESXi, vCenter, XenServer, KVM, Nutanix"
    criteria:
      good: "NTP서버와 시간 동기화 설정을 적용한 경우"
      vulnerable: "NTP 서버와 시간 동기화 설정을 적용하지 않은 경우"
    action: "NTP 설정 및 시각 동기화 설정"
    impact: "일반적 경우 영향 없음"
    examples:
      - os: "VMware ESXi"
        content: |
          Step 1) Web 콘솔 페이지 접속
          https://<VMware ESXi IP>
          Step 2) 호스트 > 관리 > 시스템 > 시간 및 날짜로 이동
          Step 3) NTP 설정 확인
          Step 4) NTP 서버가 설정되어 있지 않은 경우, [NTP 설정 편집]을 클릭하여 NTP 서버 정보 입력
      - os: "VMware vCenter"
        content: |
          Step 1) vCenter Server 관리 페이지(https://<주소>:5480/) 접속 후, 다음 메뉴에 접근하여 확인(vCenter 버전에 따라, 메뉴 명칭은 달라질 수 있음)
          # "시간" > "시간 동기화" > NTP 설정 여부를 확인
      - os: "KVM"
        content: |
          Step 1) PHC 사용 여부 확인
          Step 2) 사용하지 않으면 활성화 적용
          # echo ptp_kvm > /etc/modules-load.d/ptp_kvm.conf
          Step 3) /dev/ptp0 시계를 chrony 구성에 대한 참조로 추가 설정
          # echo "refclock PHC /dev/ptp0 poll 2" >> /etc/chrony.conf
          Step 4) chrony 데몬 다시 시작
          # systemctl restart chronyd
      - os: "XenServer"
        content: |
          Step 1) XenServer 접속 > Network and Management Interface > Network Time (NTP) > Provide NTP Servers Manually > 별도 NTP 서버 지정 설정 적용
      - os: "Nutanix"
        content: |
          Step 1) 웹 콘솔에 접속
          https://<Nutanix 웹 콘솔 IP:9440>
          Step 2) Settings > NTP Servers 선택하여 NTP 서버가 설정되어 있는지 확인
          Step 3) 설정되어 있지 않은 경우 NTP 서버를 입력하고 Add 버튼을 클릭
          Step 4) Controller VM에 접속하여 타임존 설정
          ncli cluster set-timezone timezone="Asia/Seoul"
          Step 5) Controller VM에 접속하여 Nutanix 호스트 타임존 설정
          hostssh "date; mv /etc/localtime /etc/localtime.bak; ln -s /usr/share/zoneinfo/Asia/Seoul /etc/localtime; date"
          ※ Nutanix를 처음 설치하면 타임존이 UTC로 설정되어 있어 실제 시간과 차이가 발생

  - id: "HV-10"
    title: "SNMP Community String 복잡성 적용"
    domain: "2. 시스템 서비스 관리"
    severity: "중"
    description:
      check_content: "SNMP Community String 복잡성 적용 여부 점검"
      check_purpose: "SNMP Community String이 유추하기 어려운 문자열로 구성해 비인가자가 SNMP 서비스 무단 접근을 방지하기 위함"
      threat: "SNMP Community String이 유추하기 쉬운 문자열로 구성되어 있는 경우 비인가자가 SNMP 서비스에 무단 접근이 가능한 위험이 존재함"
      reference:
        - "※ SNMP v3 사용 우선 권고"
    target: "VMware ESXi, vCenter, XenServer, KVM, Nutanix"
    criteria:
      good: "SNMP Community String이 복잡도를 만족하는 경우"
      vulnerable: "SNMP Community String이 복잡도를 만족하지 않는 경우"
    action: "SNMP Community String을 복잡도를 만족하는 값으로 설정"
    impact: "일반적 경우 영향 없음"
    examples:
      - os: "VMware ESXi"
        content: |
          Step 1) SSH를 통해 ESXi 호스트 서버 접속 후, 다음 명령어 실행
          $ esxcli system snmp get
          Step 2) 다음 명령어를 사용해 Community String 값 설정 변경
          $ esxcli system snmp set --communities <변경 값>
      - os: "VMware vCenter"
        content: |
          Step 1) SNMP 사용 확인
          if [[ $(vim-cmd proxysvc/service_list | grep 'TSM') ]]; then
          echo "SNMP service is running on vcenter"
          else
          echo "SNMP service is not running on vcenter"
          fi
          cat /etc/vmware/snmp.xml | grep community | awk -F '"' '{print $4}'
          Step 2) SNMP Community String 설정 확인
          # /etc/snmpd.conf 파일에서 Community String 확인
      - os: "KVM"
        content: |
          Step 1) SNMP 파일에서 Community String 값 확인
          sudo vi /etc/snmp/snmpd.conf
          Step 2) Community String 설정 후 snmp 서비스 재시작
          sudo systemctl enable snmpd
          sudo systemctl start snmpd
      - os: "XenServer"
        content: |
          Step 1) XenCenter 접속
          Step 2) 해당 서버 설정 > SNMP
          Step 3) SNMP 활성화 여부 확인
          Step 4) 활성화 또는 필요에 의해 사용 시 Community String 값 확인
      - os: "Nutanix"
        content: |
          [불필요한 경우 SNMP 서비스 비활성화]
          Step 1) Nutanix 관리 웹 콘솔 접속
          https://<Nutanix 웹 콘솔>:9440
          Step 2) Settings > SNMP 선택
          Step 3) Enable for Nutanix objects 체크 해제
          [SNMP Trap 설정이 필요한 경우 v3 사용]
          Step 1) Nutanix 관리 웹 콘솔 접속
          https://<Nutanix 웹 콘솔>:9440
          Step 2) Settings > SNMP > Users > New User 클릭
          Step 3) SNMP User 생성
          Step 4) Traps > New Trap receiver 클릭
          Step 5) Receiver Name 및 Trap 수신 IP 설정
          [v2c를 사용해야 하는 경우 Community String 복잡도 설정]
          Step 1) Nutanix 관리 웹 콘솔 접속
          https://<Nutanix 웹 콘솔>:9440
          Step 2) Settings > SNMP > Traps > 편집 버튼
          Step 3) SNMP Community String이 복잡도를 만족하도록 설정

  - id: "HV-11"
    title: "MOB(Managed Object Browser) 서비스 비활성화"
    domain: "2. 시스템 서비스 관리"
    severity: "상"
    description:
      check_content: "MOB 서비스 비활성화 여부 점검"
      check_purpose: "MOB(Managed Object Browser) 서비스를 통해 시스템 정보 수집, 가상 머신 제어, 시스템 설정 변경 등의 기능이 존재해 비인가자가 해당 기능을 사용하지 못하게 하기 위함"
      threat: "MOB(Managed Object Browser) 서비스가 활성화되어 있을 경우, 해당 인터페이스를 통해 시스템 정보 수집, 가상 머신 제어, 시스템 설정 변경 등의 위험이 존재함"
      reference:
        - "※ ESXi의 경우 기본적으로 비활성화"
        - "※ vCenter의 경우 기본적으로 활성화"
    target: "VMware ESXi, vCenter"
    criteria:
      good: "MOB(Managed Object Browser)가 비활성화된 경우"
      vulnerable: "MOB(Managed Object Browser)가 활성화된 경우"
    action: "MOB(Managed Object Browser)서비스 비활성화 설정"
    impact: "일반적 경우 영향 없음"
    examples:
      - os: "VMware ESXi"
        content: |
          Step 1) Web 콘솔 페이지 접속
          https://<VMware ESXi IP>
          Step 2) 호스트 > 관리 > 시스템 > 고급 설정으로 이동
          Step 3) Config,HostAgent.plugins.solo.enableMob 설정값 확인
          Step 4) 활성화(true)되어 있을 시, 해당 값을 false로 설정
      - os: "VMware vCenter"
        content: |
          Step 1) vSphere Client 접속 후, 다음 메뉴에 접근하여 확인(vSphere Client 버전에 따라, 메뉴 명칭은 달라질 수 있음)
          # (vCenter6.5) "호스트 및 클러스터" > [vCenter 서버] > "구성" > "설정" > "고급 설정" > "config.vpxd.enableDebugBrowse" 확인
          # (vCenter8) "호스트 및 클러스터" > [vCenter 서버] > "구성" > "설정" > "고급 설정" > "config.vpxd.enableDebugBrowse" 확인

  - id: "HV-12"
    title: "ESXi Shell 비활성화"
    domain: "2. 시스템 서비스 관리"
    severity: "상"
    description:
      check_content: "ESXi Shell(TSM, TSM-SSH) 비활성화 여부 점검"
      check_purpose: "감사기록에 대한 관리에 어려움이 발생할 수 있는 ESXi Shell(TSM, TSM-SSH) 사용 행위를 방지해 플랫폼(vCenter)과 동기화하기 위함"
      threat: "ESXi Shell(TSM, TSM-SSH)에서 이루어지는 행위는 관리 플랫폼(vCenter)과 동기화되지 않을 수 있어 감사기록 관리가 불가능해지는 위험이 존재함"
      reference:
        - "※ TSM(Tech Support Mode): 문제 해결 및 진단을 위해 ESXi 호스트에 물리적으로 접근하여 사용할 수 있는 텍스트 기반 명령 인터페이스"
        - "※ TSM-SSH(Tech Support Mode via SSH): SSH 프로토콜을 통해 원격에서 TSM의 기능을 사용할 수 있게 하는 서비스"
    target: "VMware ESXi"
    criteria:
      good: "ESXi Shell(TSM, TSM-SSH) 서비스가 비활성화된 경우"
      vulnerable: "ESXi Shell(TSM, TSM-SSH) 서비스가 활성화된 경우"
    action: "ESXi Shell(TSM, TSM-SSH) 서비스가 비활성화 설정"
    impact: "일반적 경우 영향 없음"
    examples:
      - os: "VMware ESXi"
        content: |
          Step 1) Web 콘솔 페이지 접속 > https://<VMware ESXi IP>
          Step 2) 호스트 > 관리 > 서비스로 이동
          Step 3) TSM, TSM-SSH 서비스 활성화 여부 확인
          Step 4) TSM, TSM-SSH 서비스가 활성화되어 있는 경우, [중지] 클릭하여 서비스 중지

  - id: "HV-13"
    title: "ESXi Shell 세션 종료 시간 설정"
    domain: "2. 시스템 서비스 관리"
    severity: "상"
    description:
      check_content: "ESXi Shell(TSM, TSM-SSH)의 Session Timeout(로그인 후 일정 시간 사용하지 않을 경우 세션 종료) 설정의 적정성 여부 점검"
      check_purpose: "비인가자에 의한 시스템 무단 사용 방지 목적으로 Session Timeout 설정을 적용하기 위함"
      threat: "ESXi Shell(TSM, TSM-SSH)의 Session Timeout(로그인 후 일정 시간 사용하지 않을 경우 세션 종료) 설정이 적용되어 있지 않으면, 비인가자에 의한 시스템 무단 사용 위험이 존재함"
      reference:
        - "※ TSM(Tech Support Mode): 문제 해결 및 진단을 위해 ESXi 호스트에 물리적으로 접근하여 사용할 수 있는 텍스트 기반 명령 인터페이스"
        - "※ TSM-SSH(Tech Support Mode via SSH): SSH 프로토콜을 통해 원격에서 TSM의 기능을 사용할 수 있게 하는 서비스"
        - "※ 기본값: 0(제한 없음)"
        - "※ 기본적으로 ESXi Shell은 비활성화(HV-12)하여야하며, 해당 설정은 필요 시 ESXi Shell을 사용할 경우에 대비한 설정"
    target: "VMware ESXi"
    criteria:
      good: "Session Timeout 값(ESXiShellInteractiveTimeOut)이 600 이하로 설정된 경우"
      vulnerable: "Session Timeout 값(ESXiShellInteractiveTimeOut)이 0이거나, 600초과로 설정된 경우"
    action: "Session Timeout 값(ESXiShellInteractiveTimeOut)이 900 이하 설정"
    impact: "일반적 경우 영향 없음"
    examples:
      - os: "VMware ESXi"
        content: |
          Step 1) Web 콘솔 페이지 접속 > https://<VMware ESXi IP>
          Step 2) 관리 > 설정 > 시스템 > 고급 설정으로 이동
          Step 3) UserVars.ESXiShellInteractiveTimeOut 설정값 확인
          Step 4) 0 또는 600초(10분) 초과로 설정되어 있을 경우 [옵션 편집]을 클릭하여 900 이하로 설정 적용

  - id: "HV-14"
    title: "원격 로그 서버 이용"
    domain: "2. 시스템 서비스 관리"
    severity: "중"
    description:
      check_content: "원격 로그 서버를 이용한 로그 저장 여부 점검"
      check_purpose: "원격 로그 서버를 이용하여 로그 관리를 수행하여 시스템 가용성 저하, 침해에 따른 로그 유실을 방지하기 위함"
      threat: "원격 로그 서버를 이용하여 로그 관리를 하지 않을 경우, 시스템 가용성 저하, 침해에 따른 로그 유실 등의 위험이 존재함"
      reference: []
    target: "VMware ESXi, vCenter, XenServer, KVM, Nutanix"
    criteria:
      good: "원격 로그 서버 또는 스토리지가 연동 설정된 경우"
      vulnerable: "원격 로그 서버 또는 스토리지가 연동 설정되지 않은 경우"
    action: "원격 로그 서버 또는 스토리지 연동 설정"
    impact: "일반적 경우 영향 없음"
    examples:
      - os: "VMware ESXi"
        content: |
          Step 1) Web 콘솔 페이지 접속
          https://<VMware ESXi IP>
          Step 2) 호스트 > 관리 > 시스템 > 고급 설정으로 이동
          Step 3) Syslog.global.logHost 설정값 확인
          Step 4) [옵션 편집]을 클릭한 후 아래와 같은 양식으로 원격 로그 서버 또는 스토리지 입력
          protocol://hostname|ipv4|'['ipv6']'[:port]
          ※ syslog 설정 예시
          - tcp://10.0.1.10:3555 : TCP 및 Port 3555를 사용하여 Syslog 메시지를 10.0.1.10으로 전송
          - tcp://[2001:db8:85a3:8d3:1319:8a2e:370:7348] : TCP 및 Port 1514를 사용하여 Syslog 메시지를 IPv6 주소로 전송
          - udp://10.0.1.10 : UDP 및 Port 514를 사용하여 Syslog 메시지를 10.0.1.10으로 전송
          - ssl://syslog.com : SSL(TLS) 및 Port 514를 사용하여 Syslog 메시지를 syslog.com으로 전송
      - os: "VMware vCenter"
        content: |
          Step 1) Syslog 설정 여부를 확인
          Step 2) vCenter Server 관리 페이지(https://<주소>:5480/) 접속 후, 다음 메뉴에 접근하여 확인(vCenter 버전에 따라, 메뉴 명칭은 달라질 수 있음)
          # "Syslog" > Syslog 설정 여부를 확인
      - os: "KVM"
        content: |
          Step 1) 원격 로그 서버 사용 확인
          Step 2) (호스트 서버) /etc/rsyslog.conf 파일 확인
          Step 3) 원격 로그 서버 전송 지시어 확인
          Step 4) logger 명령어를 통해 전송 여부 확인
      - os: "XenServer"
        content: |
          Step 1) Remote Log 서버 사용 유무 확인
          Step 2) udp514 Port 확인
          # netstat -an | grep "udp" 또는 # netstat -an | grep " udp" | egrep "514"
          Step 3) Syslog.conf 파일 수정("/etc/sysconfig/syslog" 파일에 "SYSLOGD_OPTIONS"의 "-r" 옵션 삭제)
          # vi /etc/sysconfig/syslog  SYSLOGD_OPTIONS="-m 0"
      - os: "Nutanix"
        content: |
          Step 1) Controller VM에 접속하여 원격 로깅 서버가 설정되어 있는지 확인
          ncli rsyslog-config list
          Step 2) 원격 로깅 서버가 설정되어 있지 않으면 설정 적용
          ncli rsyslog-config add-server name=<alias of log server> ip-address=<원격 로그 서버 IP> port=<원격 로그 서버 포트> network-protocol=tcp relp-enabled=no
          Step 3) 로그 레벨 설정
          ncli rsyslog-config add-module module-name=syslog_module level=info server-name=<alias of log server>

  - id: "HV-15"
    title: "시스템 주요 이벤트 로그 설정"
    domain: "2. 시스템 서비스 관리"
    severity: "상"
    description:
      check_content: "시스템 주요 이벤트 로그가 설정 여부 점검"
      check_purpose: "시스템 주요 이벤트 로그를 설정해 시스템 문제 발생 시 보안, 성능 등의 이슈를 파악하기 위함"
      threat: "시스템 주요 이벤트 로그가 설정되어 있지 않으면 시스템 문제 발생 시 보안, 성능 등의 이슈를 파악할 수 없는 위험이 존재함"
      reference: []
    target: "VMware ESXi, vCenter, KVM"
    criteria:
      good: "로그 기록 정책이 내부 정책에 부합하게 설정된 경우"
      vulnerable: "로그 기록 정책이 내부 정책에 부합하게 설정되지 않은 경우"
    action: "로그 기록 정책을 내부 정책에 부합하게 설정"
    impact: "일반적 경우 영향 없음"
    examples:
      - os: "VMware ESXi"
        content: |
          Step 1) Web 콘솔 페이지 접속 > https://<VMware ESXi IP>
          Step 2) 호스트 > 관리 > 시스템 > 고급 설정으로 이동
          Step 3) Config.HostAgent.log.level 설정값 확인
          Step 4) 로그 기록 정책 확인 후, [옵션 편집]을 클릭해 내부 정책에 맞게 설정
          ※ log.level 설정값
          - None: 로그 기록하지 않음
          - Quiet: 최소한의 로그 항목을 기록함
          - Panic: 패닉 로그(장애 발생 시 기록되는 메시지) 항목만 기록함
          - Error: 패닉 및 에러 로그 항목만 기록함
          - Warning: 패닉, 에러 및 경고 로그 항목만 기록함
          - Information: 패닉, 에러, 경고 및 정보 로그 항목을 기록함
          - Verbose: 패닉, 에러, 경고, 정보 및 세부 정보를 표시하는 로그 항목을 기록함
          - Trivia: 패닉, 에러, 경고, 정보, 세부 정보 표시 및 기타 정보를 표시하는 로그 항목을 기록함
      - os: "VMware vCenter"
        content: |
          Step 1) 로그 설정 레벨 확인
          Step 2) vSphere Client 접속 후, 다음 메뉴에 접근하여 확인(vSphere Client 버전에 따라, 메뉴 명칭은 달라질 수 있음)
          # (vCenter6.5) "호스트 및 클러스터" > [vCenter 서버] > "구성" > "설정" > "고급 설정" > "config.log.level" 확인
          # (vCenter8) "호스트 및 클러스터" > [vCenter 서버] > "구성" > "설정" > "고급 설정" > "config.log.level" 확인
      - os: "KVM"
        content: |
          Step 1) 호스트에 접속
          Step 2) libvirt 설정파일을 확인하여 로그 레벨 확인
          $ cat /etc/libvirt/libvirtd.conf
          Step 3) libvirt 설정파일의 log_level 설정 구문 수정
          $ log_level =
          Step 4) 변경 사항 적용을 위해 libvirt 데몬 재시작
          $ systemctl restart libvirtd.service
          ※ log.level 설정값
          - 4(ERROR): 오류 메시지만 기록함
          - 3(WARNING): 경고 및 오류를 기록함
          - 2(INFO): 디버그 항목이 아닌 모든 항목을 기록함
          - 1(DEBUG): 디버그 항목 및 모든 항목을 기록함

  - id: "HV-16"
    title: "비휘발성 경로 내 로그 파일 저장"
    domain: "2. 시스템 서비스 관리"
    severity: "상"
    description:
      check_content: "비휘발성 경로에 로그파일 저장 여부 점검"
      check_purpose: "비휘발성 경로에 로그파일 저장하여 로그 상실을 방지하기 위함"
      threat: "휘발성 경로에 로그 파일이 저장될 경우, 일정시간이 지나거나 시스템 재시작 시 저장된 로그를 상실해 로그 분석이 불가능해지는 위험이 존재함"
      reference:
        - "※ ESXi의 경우 기본적으로 /scratch 경로에 로그가 저장되며, 해당 로그는 시스템 재시작 시 또는 하루가 지나면 삭제"
        - "※ 원격 로그 서버 이용(HV-14) 시에도 일부 시스템 로그(vmksummary.log, dvs.log, vmkwarnning.log, fdm.log 등)는 전달되지 않으므로 비휘발성 경로에 로그파일 저장 필요"
        - "※ 휘발성 경로: /scratch/, /tmp, /var/tmp, /run, /dev/shm, /dev/pts 등"
    target: "VMware ESXi"
    criteria:
