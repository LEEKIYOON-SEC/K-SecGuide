      check_purpose: "가상 스위치에 위조전송(Forged Transmits) 모드를 비활성화하여 네트워크 스니핑, 데이터 유출 등을 방지하기 위함"
      threat: "가상 스위치에 위조전송(Forged Transmits) 모드가 설정되어 있을 경우, 네트워크 스니핑, 데이터 유출 등의 보안 위험이 존재함"
      reference:
        - "※ 위조 전송(Forged Transmits) 모드: 가상 스위치가 수신하는 모든 트래픽을 연결된 모든 가상 NIC에게 전송하는 기능"
    target: "VMware ESXi"
    criteria:
      good: "가상 스위치에 위조 전송(Forged Transmits) 모드 설정이 거부로 설정된 경우"
      vulnerable: "가상 스위치에 위조 전송(Forged Transmits) 모드 설정이 허용으로 설정된 경우"
    action: "위조 전송(Forged Transmits) 모드 거부 설정"
    impact: "일반적 경우 영향 없음"
    examples:
