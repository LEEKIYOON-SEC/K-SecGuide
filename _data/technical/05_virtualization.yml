    target: "VMware ESXi"
    criteria:
      good: "가상 머신의 장치 설정 변경 방지 설정이 활성화(true)된 경우"
      vulnerable: "가상 머신의 장치 설정 변경 방지 설정이 없거나, 비활성화(false)된 경우"
    action: "가상 머신의 장치 설정 변경 방지 활성화 적용"
